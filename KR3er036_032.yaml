body:
  text: 卷三十二腹痛門內經敘腹痛所因舉痛論云寒氣入經而稽遲泣而不行客於脈外則血少客於脈中則氣不通故卒然而痛其痛或卒然而止者或痛甚不可按或按之痛止或按之無益或喘動應手者或脅肋與少腹相引而痛者或腹痛引陰股者或卒然痛死不知人少間復生者或痛而嘔者或腹痛而後泄者或痛而閉不通者各不同形按本論具以上病形異候皆寒氣所因甚詳宜玩本文唯痛而閉不通為熱氣留於小腸腸中痛疸熱焦渴則堅幹不得出為熱痛此述病機寒熱皆能為痛也蓋寒痛者多熱痛者少脈法脈經曰脈細小緊急病速進在中腹中刺痛陰弦則腹痛弦急小腹痛尺脈緊臍下痛尺脈伏小腹痛症疝尺脈實小腹痛當利之心腹痛痛不得息脈細小遲者生堅大疾者死腹痛脈反浮大而長者死傷寒論曰傷寒脈陽澀陰弦腹中急痛里有虛寒論傷寒腹痛成無己云陰寒為邪者則腹滿而吐食不下自利益甚腹自痛太陰證也發汗不解醫反下之因而腹滿時痛者屬太陽也桂枝加芍藥湯主之大實痛者桂枝加大黃湯主之東垣曰腹中諸痛皆因勞役過甚飲食失節中氣不足寒邪乘虛而入客之故卒然而作大痛經言得炅則止炅者熱也以熱治寒治之正也然腹痛有部分臟位有高下治之者宜分之按以上脈證言諸虛痛矣然邪傳入裡熱結下焦實滿血結硬痛皆實痛也脈經云腹滿按之不痛為虛痛者為實此述病機虛實之異又兼部分高下言也論腹痛為陰毒所致詳見寒門論腹痛屬熱原病式曰熱鬱於內而腹滿堅結痛者不可言為寒也按丹溪曰腹痛有積熱者或死血食積濕痰皆能作痛脈弦者食脈滑者痰清痰多作腹痛宜分治之詳以上蓋言寒熱之分故此論及以後病例皆不之及論腹痛屬血成無己曰邪氣聚於下焦則津液不得通血氣不得行或溺或血留滯於下是生脹滿而硬痛也若從心下至少腹皆硬滿而痛者是邪實也須大陷胸湯下之若但少腹硬滿而痛小便利者則是蓄血之證小便不利者則是溺澀之證論腹痛為疝所致見疝門論腹痛為瀉痢詳見滯下等門論腹痛為積聚所致見積聚門論腹痛為腸癰所致見瘡瘍門論治腹痛大法此事難知曰傷寒中脘痛太陰也理中建中黃耆湯之類臍腹痛少陰也四逆真武附子湯之類少腹痛厥陰也重則正陽回陽丹之類輕則用當歸四逆湯太陰連少陰痛甚者當變下利不止雜證而痛四物苦楝湯酒煮當歸丸之類夏月腹痛肌熱惡熱脈洪疾手太陰足陽明主之黃芩芍藥湯秋腹痛肌寒惡寒脈沉疾足太陰足少陰主之桂枝芍藥湯四時腹痛芍藥甘草湯主之按此治法本傷寒與夫寒疝時行治例也然學者觀以上諸病機則脈治思過半矣腹痛治法溫散之劑桂枝加芍藥湯治腹滿時痛脈弱按此太陰例藥也理中丸治霍亂頭疼身寒腹痛方並見寒門小建中湯治傷寒陽脈澀陰脈弦腹中急痛者方見補虛門按以上太陽例藥也真武湯治腹痛下利四肢沉重方見寒門四逆湯治傷寒下利腹痛四肢逆冷甘草二錢附子數大片乾薑三錢上㕮咀水煎服霹靂散治腹痛脈欲絶附子一枚炮取出用冷灰培之取半兩入真臘茶一大錢同研細分二服每水煎臨熟入蜜半匙候溫冷服桃花湯治腹痛下利膿血小便不利赤石脂一兩乾薑一錢粳米一合上末水煎服按以上少陰例藥也當歸四逆湯治傷寒小腹急痛方見寒門按此厥陰例藥也疏下之劑仲景桂枝加大黃湯治腹滿時痛煩躁桂枝生薑各三錢芍藥六錢大黃一錢甘草二錢大棗二枚上㕮咀水煎大陷胸湯治潮熱煩渴從心下至少腹硬滿而痛不可近大黃六錢芒硝一合甘遂一分上先煮大黃去滓納硝再煮後下甘遂末溫服按以上太陽例藥也大承氣湯治關脈實腹滿大便祕按之痛或繞臍痛大黃厚朴枳實芒硝上㕮咀水煎按此陽明例藥也和解之劑黃連湯治胸中有熱胃中有邪氣腹中痛欲嘔吐者用此升降陰陽黃連甘草炙乾薑桂枝各三錢人參二錢半夏半合上㕮咀水煎入大棗二枚芍藥甘草湯白芍藥甘草炙上等分㕮咀水煎入生薑元戎云腹痛脈弦傷氣用本藥脈洪傷金加黃芩脈緩傷水加桂枝脈澀傷血加當歸脈遲傷火加乾薑按以上並太陽例藥也加減小柴胡湯治寒熱脈弦腹中痛本方去黃芩加芍藥四逆散治寒邪變熱傳裡小便不利腹中痛或泄利甘草炙枳實炒柴胡芍藥上等分每半兩水煎黃芩芍藥湯治腹痛脈洪黃芩白芍甘草上㕮咀水煎加生薑按以上並少陽例藥也雜方元戎四物苦楝湯治臍下虛冷腹痛四物湯四兩玄胡苦楝各一兩炒上㕮咀水煎服每服一兩酒煮當歸丸治小腹下痛當歸一兩茴香半兩附子良薑各七錢上四味酒煮乾再焙炒黃鹽丁香各半兩全蠍二錢柴胡二錢升麻木香各一錢苦楝半錢甘草炙半錢玄胡四錢上酒煮糊丸梧子大每二三十丸空心白湯下增損當歸丸治三陰受邪心腹㽱痛四物湯半兩防風獨活全蠍各五錢續斷茴香各一兩苦楝玄胡各七錢木香丁香各二錢半上末酒糊丸梧子大每四五十丸白湯下苦楝丸治奔豚小腹痛苦楝茴香附子上三味酒煮焙乾末之每兩入玄胡半兩全蠍炒丁香各十八個為末酒糊丸桐子大每五十丸食前溫酒下尉法見寒門回陽丹治陰毒牡蠣燒不灰木燒良薑炒川烏炮白芍各一錢麝少許上細末每用一錢男病用女唾津調塗外腎女病用男唾調塗乳上謹按以前諸方皆傷寒例法也余屬血屬積聚屬疝等因作痛方例見各門茲不備録
