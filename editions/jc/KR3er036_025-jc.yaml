body:
  text: 卷二十五反胃門敘吐脈證金匱云病人脈數數為熱當消穀引飲而反吐者以發其汗令陽微膈氣虛脈乃數數為客熱不能消穀胃中虛冷故也脈弦者虛也胃氣無餘朝食暮吐變為胃反寒在於上醫反下之今脈反弦故名曰虛趺陽脈浮而澀浮則為虛澀則傷脾脾傷則不磨朝食暮吐暮食朝吐宿穀不化名曰胃反脈緊而澀其病難治論膈噎治病之因丹溪云胃為水穀之海脾為消化之器清和則健而運行世人以痰飲嘔吐諸氣多服香熱之藥偏助氣血沸騰其始也胃液凝聚其久也脾氣耗敗傳化漸遲又以烏附丹劑服之積久血液俱耗胃脘乾槁其槁在上近咽之下水飲可行食物難入間或可入入亦不多名之曰噎其槁在下與胃為近食雖可入難盡入胃良久復出名之曰膈亦曰反胃大便秘小若羊屎然名雖不同病出一體或曰千金治噎膈反胃未嘗廢薑桂等藥何吾子之多言也予曰氣之鬱滯久留清道非借香熱不足以行然悉有大黃石膏竹茹芒硝澤瀉前胡朴硝茯苓黃芩蘆根栝蔞等藥為之佐使其始則同其終則異也病邪易伏其病自安論五噎五膈嚴氏云三因同五噎五膈者由喜怒不常七情傷於脾胃鬱而生痰痰與氣搏升而不降飲食不下蓋氣留於咽嗌者則成五噎結於胸膈者為五膈五噎之名憂思勞食氣也五噎之名憂恚寒熱氣也其病令人胸膈痞悶嘔逆噎塞妨礙飲食治法調順陰陽化痰下氣陰陽平勻氣順痰下則病無由而作矣按膈噎之證皆由氣聚成積自積成痰痰積之久血液俱病以其為病在咽在膈故前人立膈噎二者之名三因方又分五噎五膈病狀徒有其名為治則一而已故不敘焉又嚴氏為化痰下氣之說夫氣之不下痰之不化必有為病之因苟不治其本而專以香燥之藥治其標痰氣何由而自下也論三陽結為膈病子和云內經曰三陽結謂之膈三陽者大小腸膀胱也結謂熱結也小腸熱結則血脈燥大腸熱結則不圊膀胱熱結則津液涸三陽既結則前後閉澀下既不通必反上行所以噎食不下縱下而復出也此湯火不下推而上行也故經曰少陽所至為嘔湧溢食不下此理明矣後世強分為十膈五噎其𣲖既多其惑滋甚人之溢食初未遽然也或傷酒食或胃熱欲吐或胃風欲吐醫者不察本原投下香桂胡椒丁香之屬設如傷酒傷食正可攻逐豈可言虛便將熱補素熱之人三陽必結食必上潮醫氏猶云胃寒不納燔針灼艾三陽轉結歲月彌深遂成噎病世傳五噎寬中散有姜有桂十膈散有附有烏其可用乎今代劉河間治膈氣噎食承氣三湯獨超近代用藥之時更詳輕重假如閉久宜先潤養小著湯丸累累加之關扄自透其或咽噎上阻痰涎微用酸苦湧出因而治下藥勢易行設或不行蜜鹽下導結散陽消飲食自下莫將巴豆耗卻天真按此論三陽結為膈病力關世俗言胃冷用熱藥之誤可謂明矣但用藥專指承氣而言則失之太峻蓋此藥有實熱者可用之其有脾胃衰虛並血液枯竭之人皆在所禁也論噎為諸氣所致針經曰怒氣所至食則氣逆而不下勞氣所至為咽噎病為喘促思氣所至為中痞三焦閉塞為咽噎不利論噎塞由陰中伏陽所致發明曰噎者六腑之所生陽也氣也塞者五臟之所生陰也血也二者皆由陰中伏陽而作也謹按噎為七情所發或因三焦傳化失常所致此即主於氣也或血液所虧胃脘乾槁或血積所致即皆因於血也塞由填塞不通之義故發明有治幽門不通噎塞不便通幽湯例蓋陽無陰不能施化陰之失位而陽伏其中傳化不變而反上行矣然人有所擊撲墜跌內致血瘀忽即吐而食不能納此由氣血俱傷所可見也大抵始由氣致者初當從氣治之由血致者當從血治之豈可類用香熱之劑反耗氣血耶但世俗拘泥不能究乎病情遂成危證也悲夫治吐分三焦法病機云治吐有三氣積寒也皆從三焦論之上焦吐者皆從於氣氣者天之陽也其脈浮而洪其證食已暴吐渴於飲水大便燥結氣上衝胸發痛其治當降氣和中中焦吐者皆從於積有陰有陽食與氣相假為積而痛其脈浮而匿其證或先痛而後吐或先吐而後痛治法當以小毒藥去其積檳榔木香行其氣下焦吐者皆從於寒地道也其脈沉而遲其證朝食暮吐暮食朝吐小便清大便秘而不通治法當以毒藥通其閉塞溫其寒氣大便漸通復以中焦藥和之不令大便秘結而自愈也按此分三法治吐以上焦為陽陽主熱下焦為陰陰主寒中焦為寒熱相半之分有陰而有陽此亦大略之法耳蓋以其在上者則食已而暴吐在下者則食久而始吐久暴之間所以為寒熱之別難專以上下為寒熱之別也王冰曰食不得入是有火也食入反出是無火也與此同意又原病式曰嘔湧溢食不下火氣炎上胃膈熱甚則傳化失常故也論治噎之法並治驗丹溪曰或云胃脘乾槁其治可得用乎予曰古方用人參以補肺御米以解毒竹瀝以清痰乾薑以養血粟米以實胃蜜以潤燥正是此意張雞峰亦曰噎當是神思間病惟內觀自養可以治之此言深中病情治法亦為近理夫噎病生於血乾夫血陰氣也陰主靜內外而靜則臟腑之火不起而金水二氣大勝陰血自生腸胃津潤傳化合宜何噎之有因觸類而長之曾制一方治一中年婦人以四物湯加和白陳皮去皮留尖桃仁生甘草酒紅花濃煎入驢尿飲以防其或生蟲也與數十帖而安又台州一匠者年僅三十勤於工作而有艾妻且喜酒面白其脈澀重則大而無力令謝去工作臥於牛家取新溫牛乳細細呷之每頓盡一杯一晝夜可五七次盡卻食物以漸而至八九次半月大便潤月餘而安或口乾蓋酒毒未解間飲甘蔗汁少許或又曰古方治膈噎未有不言寒者何也予曰古人著方必為當時抱病設也其證實因於寒故用之得效非以為定式也但今人為染此病率因痰氣久得醫藥傳變而成其為無寒也明矣謹按反胃之證其始也或由飲食不節痰飲停滯或因七情過用脾胃內虛而作古方不察病因悉指為寒用香燥大熱之藥治之夫此藥止能逐寒邪行滯氣其於飲食痰積豈能祛逐七情之火反有所熾脾胃之陰反有所耗是以藥助病邪日以深痼其中病情丹溪先生言之詳矣夫治此疾也咽嗌閉塞胸膈痞悶似屬氣滯然有服耗氣藥過多中氣不運而致者當補氣而自運大便燥結而羊矢似屬血熱然服通利藥過多致血液耗竭而愈結者當補血潤血而自行有因火逆衝上食不得入其脈洪大有力而數者或痰飲阻滯而脈結澀者當清痰泄熱其火自降有因脾胃陽火亦衰其脈沉細而微者當以辛香之藥溫其氣仍以益陰養胃為之主非如局方之惟務燥烈也若夫不守戒忌厚味房勞之人及年高無血者皆不能療也反胃治法和中利痰散氣之劑金匱大半夏湯治胃反嘔吐者千金云治反胃不受食食入即吐半夏二升人參三兩白蜜一升千金有白朮生薑上以水一斗二升和蜜揚之二百四十遍煮藥取一升半溫服一升後再服茯苓澤瀉湯治胃反吐而渴欲飲水者茯苓半斤澤瀉四兩甘草桂枝各二兩白朮三兩生薑四兩上水一斗煮取三升內澤瀉再煮取二升半溫服八合日三外臺有小麥一升按以上二方兼出太陰嘔吐噦例藥也病機和中桔梗湯治上焦氣熱上衝食已暴吐脈浮而洪桔梗一兩半半夏曲二兩陳皮去白枳實炒白茯苓各一兩白朮一兩半厚朴一兩薑製煮法如前上㕮咀每服一兩取清溫調木香散二錢隔夜空服三服之後氣漸下吐漸止然後去木香等末每料中加芍藥二兩黃耆一兩半服之病愈即已如大便燥硬食不盡下以大承氣湯去硝微下之少利為度再服前藥補之木香散方檳榔木香各等分為末按此太陰陽明經藥也治風木之劑病機青鎮丸治上焦吐頭髮痛有汗脈弦柴胡二兩黃芩七錢半甘草半兩青黛二錢半人參半錢上為細末薑汁浸蒸餅為丸如桐子大每服五十丸生薑湯下食後服按此少陽經藥也金花丸治吐食而脈弦者由肝乘於脾而吐宜治風安脾半夏一兩檳榔二錢雄黃二錢半上細末如上法丸薑湯下從少至多漸次服之按此厥陰例藥也青鎮丸治肝火之藥金花丸治風痰乘於脾胃之藥故總入風木之劑治熱疏下之劑金匱大黃甘草湯治食已即吐者大黃四兩甘草一兩上水三升煮取一升分溫再服按此出太陰嘔吐噦例藥也病機荊黃湯治暴吐者上焦熱氣所沖也脈浮而洪荊芥穗一兩人參五錢甘草二錢半大黃三錢上粗末都作一服水煎去滓調檳榔散二錢空心服檳榔散方檳榔二錢木香一錢半輕粉少許為丸亦可按此厥陰陽明太陽經藥也發明人參利膈丸治胸中不利痰嗽喘滿利脾胃壅滯治膈氣聖藥木香檳榔七錢半人參當歸藿香一兩甘草枳實各一兩大黃酒浸厚朴制二兩上為末滴水丸桐子大溫水送下按此太陰陽明經藥也治寒之劑病機紫沉丸治中焦吐食由食積與寒氣相假故吐而痛半夏曲代赭石砂仁各五錢杏仁沉香木香白朮各一錢烏梅肉丁香檳榔各二錢橘皮二錢肉果巴豆霜各半錢另研上為末入巴豆霜令勻醋糊為丸如黍米大每服五十丸食後柿霜湯下吐愈則止按此太陰陽明經藥也厚朴丸主翻胃吐逆飲食噎塞氣上衝心腹中結疾厚朴黃連二兩半吳茱萸湯洗七次紫菀菖蒲柴胡桔梗茯苓皂角炙桂刮乾薑炮巴豆霜另研蜀椒炒出汗人參各半兩川烏頭炮去皮臍二兩半上為細末入巴豆霜勻煉蜜為劑旋丸桐子大每服三丸漸次加之以利為度薑湯下春夏加黃連二兩秋冬加厚朴二兩按此太陰陽明厥陰經藥也理氣之劑嚴氏五噎散治五噎食不下嘔啘痰多咽喉噎塞人參半夏桔梗炒白豆蔻木香杵頭糠白朮畢澄茄沉香枇杷葉乾生薑各一兩甘草炙半兩上細末每服二錢入生薑七片煎服五膈散治五膈胸膈痞悶諸氣結聚肋脅脹滿痰逆噁心枳殼炒木香青皮大腹子白朮半夏曲炒丁香天南星乾薑炒麥蘖炒草果仁各一兩甘草炙半兩上細末每服二錢水煎入姜局方五膈寬中散治七情四氣傷於脾胃以致胸膈痞滿停痰氣逆遂成五膈之病青皮陳皮丁香各四兩厚朴制一斤甘草炙五兩白豆蔻一兩香附子炒砂仁木香各三兩上為末每服二錢姜鹽湯點服按以上三方並太陰陽明經藥也謹按反胃諸方古方悉是香燥大熱之藥皆不足為法今姑存其一二至於丹溪所言補血益陰潤燥和胃調中等藥雖無其方自宜隨證用之觀其立論則思過半矣雜方燒針丸方見小兒門
