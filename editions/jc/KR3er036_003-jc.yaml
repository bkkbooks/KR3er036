body:
  text: 卷三傷風門敘風之為病內經曰風為百病之長又曰風勝則動又曰賊虛邪者陽受之又曰傷於風者上先受之按風本陽邪故善動善變甚傷於陽者所以各從其類也脈經云脈浮而大者風傷寒論云太陽病脈浮而緩者名曰中風又云太陽中風陽浮而陰弱論傷風與傷寒六經轉變相同陳無擇云經曰春傷於風乃四時之序也或表中風在經絡中循經流注以日傳變與傷寒無異但寒泣血故無汗惡寒風散氣故有汗惡風為不同仲景太陽經分傷寒傷風不同而後人纂集者不分門類但以傷寒暑濕時氣疫沴凡太陽病皆謂之傷寒今別立傷風一門且依先哲以太陽經為始分注六經學者當自知按此分傷風六經用藥可謂發諸家之未備在足太陽膀胱經用桂枝湯足陽明胃經用杏子湯足少陽膽經用柴胡加桂湯足太陰脾經用桂枝芍藥湯足少陰腎經用桂附湯足厥陰肝經用八物湯其方以桂枝湯三味加以各經之藥皆是辛溫解散之劑然既云與傷寒傳變相似此六方亦可以盡其變也學者當求仲景之法以調治之可也今不載其方詳見本文謹按傷風一證仲景與傷寒同論其藥雖有麻黃桂枝之分至於傳變之後亦未嘗悉分之也諸家之論皆與感冒四氣並中風條內袞同出治惟陳無擇別立傷風一方在四淫之首且依傷寒以太陽為始分注六經可謂詳密但以風本外邪諸方例用解表發表而治然受病之源亦有不同者且風為天地浩蕩之氣四時八風之變未嘗無也然人亦未嘗悉傷之也間有受傷者皆因不能法道清淨腠理不密表上陽虛之所致也內經曰清淨則內腠閉拒雖有大風苛毒弗之能害是也又有內挾痰熱其氣拂鬱風邪易於外束者若表虛受風專用發表之藥必致汗多亡陽之證若內挾痰熱而受風者亦宜內外交治不可專於解表也或曰此雲表虛與成無己注傷寒中風表虛同與予曰不同也彼以太陽中風而於有汗無汗分虛實實者加麻黃虛者加葛根俱解表也此雲表虛者當固守衛氣而散風者也傷風治法辛溫解表之劑仲景桂枝湯治太陽經傷風自汗桂枝芍藥各三兩甘草一兩上咀生薑三片棗一枚煎按此發散足太陽經風邪之藥也局方神朮散治傷風頭痛鼻塞聲重蒼朮五兩藁本白芷細辛羌活川芎甘草炙各一兩上為末三錢水一盞姜三片蔥三寸煎傷風鼻塞蔥茶調下按此足太陽少陰手陽明經藥也辛平解表之劑消風百解散治頭疼發熱咳嗽鼻塞聲重荊芥白芷陳皮麻黃蒼朮甘草上咀姜三片蔥白三根煎按此手太陰陽明經藥也川芎茶調散治諸風上攻頭目昏疼鼻塞聲重薄荷八兩荊芥川芎各四兩羌活白芷甘草各二兩防風一兩半細辛一兩上為末每服二錢食後茶調下按此足太陽少陰手太陰陽明厥陰經藥也消風散治諸風上攻頭目昏眩項背拘急鼻塞聲重及皮膚頑麻瘙癢癮疹婦人血風荊穗甘草炙陳皮去白厚朴各半兩白殭蠶人參茯苓防風芎藭藿葉蟬蛻去土炒羌活各二兩上為末每服二錢荊芥茶清調下瘡癬溫酒調下金沸草散治肺經受風頭目昏疼咳嗽聲重沸唾稠黏荊芥穗四兩前胡三兩旋覆花三兩麻黃三兩甘草炙赤芍半夏各一兩上咀姜三片棗一枚煎服活人書減麻黃赤芍加細辛赤伏苓按此手足太陰經藥出陽明旋覆代赭石例解利痰飲之藥也辛涼解表之劑柴胡升麻湯治頭痛壯熱惡風體疼鼻塞咽乾痰盛咳嗽涕唾稠黏柴胡前胡黃芩各六兩半荊芥七兩半赤芍石膏各十兩升麻五兩桑白皮乾葛上咀姜三片豉十粒水煎按此足少陽陽明經藥也辛涼解表攻裡之劑錢氏大青膏發散風邪天麻一錢麝一字匕白附子末生用一錢半硃砂研一字青黛研一錢天竺黃一字匕蠍尾去毒生半錢烏梢蛇肉半錢上同再研細生蜜和成膏每服半皂子大至一皂子大月中兒粳米大大人彈子大同牛黃膏溫薄荷水化下一處服之宣明防風通聖散方見中風門謹按傷風諸方俱是解表之劑蓋以風從外入之邪也其所挾有寒熱溫涼之不同故此分辛溫辛平辛涼之異然風雖外邪傳變入里亦宜隨證施治錢仲陽論傷風當發散者用大青膏解不散有下證者用大黃丸可謂得仲景之奧矣諸方於此俱未曾論及也又前論表虛受風與內挾痰熱之方亦未詳備學者當自求之所謂大黃丸亦附於後大黃黃芩二味各等分水丸
