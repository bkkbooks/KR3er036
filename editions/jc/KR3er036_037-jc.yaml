body:
  text: 卷三十七心下痞滿門論痞為濕土之病內經云備化之紀其病痞又云太陰所至為積飲痞膈按原病式云痞與否同不通泰也謂精神榮衛血氣津液出入流行之紋理閉密而為痞也論傷寒心下痞成無己云傷寒心下滿者不經下後則有吐下之殊若下後則有結胸痞氣之別經曰病人手足厥冷脈乍緊邪結在胸中心滿而煩當吐之又云脈浮而大心下反硬有熱屬臟者攻之此二者不經汗下而心下滿或吐之或下之隨其邪氣之高下要在泄其邪也又邪氣在表未應下而強下之邪氣乘虛結於心下實者硬滿而痛為結胸虛者滿而不痛為虛痞蓋結胸是實邪大陷胸湯主之痞是虛邪須諸瀉心湯散可也論痞為痰飲及諸氣所致詳見各門論傷寒雜病痞皆血證秘藏云內經曰備化之紀其病痞又曰太陰所致為積飲痞膈太陰者濕土也主壅塞乃土來心下為痞滿也傷寒下之太早亦為痞乃因寒傷榮血心主血邪入於本故為心下痞仲景瀉心湯數方皆用黃連以瀉心下之土邪至於酒積雜病下之太過亦作痞滿皆血證也蓋下多則亡陰亡陰者即損脾胃謂脾胃水穀之陰亡也故胸中之氣以其血虛而下陷於心之分故致心下痞上宜理脾胃以血藥治之若全用氣藥導之則其痞益甚而復下之氣愈下降必變為中滿鼓脹非其治也又有虛實之殊如實痞大便秘厚朴枳實主之虛痞大便利芍藥陳皮主之飲食所傷而為痞滿者當用藥消導其胸中窒塞欲吐者則宜吐之難知云傷寒痞者從血中來從外之內從無形雜病痞者亦從血中來從內之外從有形故無形以苦泄之有形以辛散之按痞之凝滯閉塞人皆知氣之不運也獨東垣指以血病言之謂下多則亡陰而損血此前人之未論也世有用氣藥治痞而不效者蓋不知此理故也論諸瀉心湯用藥寒熱不同保命集云三陰三陽之標本治各不同有用寒藥而為熱痞大黃黃連之類也有用寒熱藥者陰與陽不和而痞大黃黃連加附子之類也有用辛熱藥多而寒藥少者陰盛陽虛而痞半夏甘草生薑瀉心三方之類瀉心湯者非瀉心火之熱瀉心下之痞也通而論之其藥陽多而陰少蓋病發於陰而得之有大黃黃連瀉心湯獨為陰心下痞而脈疾一證桂枝後用從太陽浮弱所變余皆陰陽雜用論痞為熱證直格云傷寒里之陰分已受熱邪是病發於陰也或熱微下證未全誤下之早則裡熱除去表熱乘虛入里而作痞也故仲景攻痞多用大黃黃連黃芩寒藥爾後或加附子乾薑之類者是以辛熱佐其寒藥欲令開發痞之怫熱結滯也非攻寒耳按前保命集論瀉心湯分陰陽寒熱多少而用藥可謂詳切矣而此論則專主於熱二者似乎不同要之各有所當蓋直格是言其受病之本保命集是論其用藥之標若以為痞有陰寒之證耶則仲景瀉心五方何皆用黃芩黃連之藥若以為痞無陰陽之異耶何瀉心湯又有兼用乾薑附子半夏生薑之類者也一言其本一論其標而已謹按痞之為病由陰伏陽蓄氣與血不運而成處心下位中央䐜滿痞塞皆土之病也與脹滿有輕重之分痞則內覺痞悶而外無脹急之形脹滿則外亦有形也前人所論皆指誤下而致之蓋誤下則裡氣虛故傷寒之表邪乘虛入於心下雜病則所受之邪氣亦蓄於心下因致痞也亦有不因誤下而得之如中氣虛弱不能運化精微為痞者有飲食痰積不能施化為痞者有濕熱太甚土乘心下為痞者故古方治痞用黃連黃芩枳實之苦以泄之厚朴生薑半夏之辛以散之人參白朮之甘苦溫以補之茯苓澤瀉之淡以滲之隨其病之所在以調之也既痞同濕治惟宜上下分消其氣如果有內實之證庶可略與疏導世人苦於痞塞喜行利藥以求速效暫時通快痞若再作益以滋甚是皆不察夫所謂下多亡陰之意也心下痞滿治法治熱之劑仲景大黃黃連瀉心湯治心下痞按之濡其脈關上浮者或寸沉關浮而有熱者大黃二兩黃連一兩上銼以麻沸湯二升漬之須臾絞去滓分溫再服按此手少陰經藥也出陽明例成無己云大黃黃連以導瀉心下之虛熱以麻沸湯漬服者取其氣薄而泄虛熱也又按活人云伊尹湯液論大黃黃連黃芩湯共三味今監本無黃芩脫落之也又保命集無黃芩卻加甘草一兩散寒泄熱之劑仲景附子瀉心湯治心下痞而復惡寒汗出脈沉遲也大黃二兩黃連黃芩各一兩附子一枚炮去皮別煮上銼以麻沸湯二升漬之須臾絞去滓內附子汁分溫再服半夏瀉心湯治汗下後身寒痞滿而嘔食飲不下脈微按之不痛非柴胡證半夏半升洗黃芩乾薑人參各三兩黃連一兩大棗十二枚甘草二兩炙上七味以水一斗煮取六升去滓再煮取二升溫服一升日三服生薑瀉心湯治汗下後胃中不利乾噫食臭自利腸鳴脅下有水氣而心下痞滿比半夏瀉心湯加生薑四兩減乾薑作一兩甘草瀉心湯治下之後腹中雷鳴心下痞硬再下之痞益甚此非結熱以胃中虛客氣上逆也比半夏瀉心湯無人參加甘草作四兩按以上諸瀉心湯元戎雲手少陰藥也以其心下痞故入陽明例況服梔子黃芩黃連黃柏大黃為上下通經之劑安得不例陽明乎秘藏大消痞丸治一切心下痞悶及積年久不愈者黃連炒黃芩各六錢薑黃白朮各一錢炙甘草砂仁乾生薑神麯炒各一錢人參二錢枳實炒五錢橘皮二錢澤瀉三錢厚朴炒三錢豬苓一錢半半夏四錢上同為細末水浸蒸餅丸桐子大每五十丸至百丸白湯下枳實消痞丸治右關脈浮弦心下虛痞惡食懶倦開胃進食枳實黃連各五錢乾生薑二錢半夏曲三錢厚朴炙四錢人參三錢白朮三錢炙甘草二錢茯苓大麥面各二錢上同為細末水浸蒸餅為丸每三五十丸溫水下按以上二方並半夏瀉心湯加減法也內有枳朮湯四君子五苓平胃等利濕消痞補虛之藥也溫中散飲之劑寶鑑枳實理中丸治中脘痞滯氣不宣通積寒停飲食不化人參乾薑炮白朮枳實甘草炙各一兩上為細末煉蜜為丸如雞子黃大每服一丸細嚼白湯下或沸湯化服活人有茯苓深師消飲丸治停飲心下痞方見痰飲門按以上二方並出陽明飲痞例理氣之劑活人桔梗枳殼湯治傷寒痞氣胸滿欲純桔梗枳殼去穰炒各三兩上銼水二盞煎至一盞去滓分作二服按此手太陰經藥也出少陰枳殼例活人云審知是痞先用湯尤妙綠枳桔行氣下膈先用之無不驗也海藏云活人用此非治痞也審知錯下必成痞是氣將陷於胸中故先用此便不至於痞也若已成痞而用則失之晚胸中之氣反痞矣先之一字預早之意也先用此若不應後當以仲景痞藥治之若執此治痞其害深矣宣明檳榔散治傷寒陰證下後成痞滿而不痛按之軟虛檳榔枳殼等分上為末每服三錢煎黃連湯調下寶鑑三脘痞氣丸治三焦痞滯水飲停積脅下虛滿木香白豆蔻青皮炒京三稜炮各一兩檳榔半兩半夏湯洗七次大腹子陳皮各二兩砂仁沉香各半兩上為末麵糊為丸桐子大每服三十丸加至六十丸食後陳皮湯下按此出太陰調氣例藥也秘藏木香消痞丸治因憂氣結中脘腹皮厚微痛心下痞滿不思飲食木香半兩柴胡四錢橘皮三錢甘草炙半夏各一兩乾薑半兩當歸尾一錢紅花半錢上為細末水浸蒸餅丸服之補虛之劑加味補中益氣湯治內傷心下痞方見內傷門脈緩有痰而痞加半夏黃連脈弦四肢滿閉便難而心下痞加柴胡黃連甘草大便秘燥加黃連桃仁少加大黃歸身心下痞夯悶者加白芍黃連心下痞腹脹加五味子白芍砂仁如天寒少加乾薑或中桂心下痞中寒者加附子黃連心下痞嘔逆者加黃連生薑陳皮如冬月加黃連少入丁香藿香葉能食而心下痞加黃連半錢枳實三錢如不能食心下痞者勿加止依方服之食已心下痞別服橘皮枳朮丸按難知雲中滿者勿食甘不滿者當食之如自覺滿而外無脹急之形乃痞也是不滿也當以甘而撐柱之又太陽病下之腹滿時痛為脾桂枝加芍藥湯滿木也為甘所主故用芍藥之酸克其滿酸涼除滿急收能除甘所生甘溫生滿緩散能除酸所主也謹按痞證有氣不運化及陰虛損血者前論已詳故收入此補虛之劑但世俗不明此理往往例用峻快藥下之復痞或致危篤者多矣
