body:
  text: 卷八咳嗽門諸經敘咳內經曰五臟六腑皆令人咳非獨肺也皮毛者肺之合也皮毛先受邪氣邪氣以從其合也五臟之咳久乃移於六腑本文腑臟咳狀見後湯液方下按咳論五臟六腑千金方又引心主咳然則十二經皆有咳證也千金方曰論云有風咳有寒咳有肝咳有心咳有脾咳有肺咳有腎咳有膽咳有厥陰咳有肢咳十咳之異欲語因咳言不得竟謂之風咳飲冷食寒因之而咳謂之寒咳心下堅滿咳則支痛其脈反遲謂之肢咳咳則引脅下痛謂之肝咳咳而唾血引手少陰謂之心咳咳而涎出續續不止引少腹謂之脾咳咳引頸項而唾涎沫謂之肺咳咳則耳無所聞引腰並臍中謂之腎咳咳而引頭痛口苦謂之膽咳咳而引舌本謂之厥陰咳風咳者不下之寒咳肢咳肝咳刺足太衝心咳刺手神門脾咳刺足太白肺咳刺手太泉腎咳刺足太谿膽咳刺足陽陵泉厥陰咳刺手太陵按此論五臟泊風寒肢膽厥陰經為十咳其引現證與經論臟腑咳證皆稍異詳肢咳即氣與支飲證也經有三焦咳而無心主此有心主而無三焦然已發其秘矣惜乎胃大小腸膀胱咳及針治皆略之不議脈法脈經曰關上脈微為咳肺脈微急為咳而唾血咳而脈弦澀為少血脈緊者肺寒雙弦者寒浮緊者虛寒脈浮而緩傷風脈細傷濕數則為熱沉數者為實熱脈弦為水偏弦為飲脈沉為留飲洪滑多痰咳脈浮直者生浮軟者生咳證死脈咳而脈緊者小沉伏匿者咳而羸瘦脈形堅大者咳而脫形發熱脈小堅急者肌瘦下脫形熱不去咳而嘔腹脹且泄其脈弦急者皆死不治論咳與嗽本一證子和曰內經陰陽應象論云秋傷於濕冬生咳嗽五臟生成篇云咳嗽上氣診要經終篇云春刺秋分環為咳嗽示從容篇云咳嗽煩冤者腎氣之逆也此四篇中連言咳嗽其餘篇中止言咳而不言嗽如生氣通天論云秋傷於濕上逆而咳與大象論文義同而無嗽字乃知咳即嗽明矣謹按咳與嗽本兩字義內經已作一證連言之愚詳大抵咳者氣動也陽也嗽者兼血也陰也況是證其本雖殊其標則一故世俗不以為疑唯潔古發內經微旨其義見下病機機要云咳謂無痰而有聲肺氣傷而不清也嗽謂無聲而有痰脾濕動而為痰也咳嗽謂有聲有痰也因傷肺氣動於濕因咳而有嗽也夏月嗽而發熱者謂之熱痰嗽小柴胡四兩加石膏一兩知母半兩用之冬月嗽而發寒熱謂之寒嗽小青龍加杏仁服之蜜煎生薑湯蜜煎橘皮湯燒生薑胡桃皆治無痰而嗽者此乃大例更當隨時隨證加減之痰而能食者大承氣微下之痰而不能食者厚朴湯主之論嗽分六氣母拘於寒子和曰素問言皮毛者肺之合也邪因而客之則為肺咳後人見是斷嗽為寒更不參較他篇豈知六氣皆能為嗽然可以辨其六者之狀風乘肺者日夜無度汗出頭痛痰涎不利熱乘肺者急喘而嗽面赤潮熱手足寒乳子亦多有之寒乘肺者咳喘上壅涕唾出血甚者七竅血溢燥乘肺者氣壅不利百節內痛頭面汗出寒熱往來皮膚乾燥細瘡燥癢大便秘澀涕唾稠黏寒乘肺者或因形寒飲冷冬月坐臥濕地或胃冷風寒秋冬水中感之嗽急而喘此非六氣之云乎按此只述六氣為病故其論中集司天勝復為咳之略但無濕乘肺式方治則又有之式蓋脫簡爾然丹溪先生論咳有因勞因痰因肺脹因食積作痰發熱致嗽或嗽而聲嘶者此因血虛受熱所致皆內因病本之不同如傷寒小青龍湯治例為水飲與表寒相合而咳真武湯所主為水飲與裡寒相合而咳傷寒中風往來寒熱胸滿心煩喜嘔而咳加減小柴胡主之為陽邪傳肺加味四逆散主陰邪傳裡而咳者此皆外因傳變之例豈可枚舉但咳證之標一人故不歷求其本也觀子和之論然亦啟其微爾論咳分三因陳無擇云傷風咳者憎寒壯熱自汗惡風口乾煩燥傷寒咳者憎寒發熱無汗惡寒煩躁不渴傷暑咳者煩熱引飲口燥或吐涎沫聲嘶咯血傷濕咳者骨節煩疼四肢重著灑淅此屬外因五臟咳而不已則六腑受之者此屬內因如咳而發作寒熱引腰背痛或喘滿此因房勞傷腎或中滿腹脹搶心痛不欲食此因飢飽傷脾或咳而左脅偏疼引小腹並膝腕疼此因疲極傷肝或吐白涎口燥聲嘶此因呼叫傷肺或咳而煩熱自汗咽乾咯血此因勞神傷心並屬不內外因也假如尺脈浮澀而數則知傷腎右關脈濡則知飲食傷脾左關脈弦短則知疲極傷肝但不應人迎氣口者即是不內外因也嚴氏云咳嗽始關於肺終則聚於胃使人多涕唾而面浮腫氣逆也治法當審脈證三因若外因邪氣止當發散又須原其虛實冷熱若內因七情則隨其部經在與氣口脈相應浮緊為虛寒洪滑為多痰當以順氣為先下痰次之有停飲而咳又須消化之切不可用烏梅粟殼澀酸之藥其寒邪未除亦不可使用補藥尤忌憂思過度房室勞傷遂成瘵疾矣按此論咳證備三因可謂詳悉但外因現證與前子和論六氣異者此蓋言邪氣外感非乘客於肺之比也惜乎諸因方治未備所論脈證治法極闖其微至禁不可便用澀補甚得大法之要大抵此證其原實多故不可便用澀之補之也然不能忌憂思戒房室而性躁及脫營之人皆所難療論濕痰主嗽潔古曰嗽者秋傷於濕積於脾經曰秋傷於濕冬必咳嗽大抵素秋之氣宜清而肅反動之則氣必上衝而為咳嗽甚則動於濕而為痰也是知脾無留濕雖傷肺氣不為痰也有痰者寒少熱多各隨五臟而治之假令濕在肝經謂之風痰濕在心經謂之熱痰濕在脾經謂之濕痰濕在肺經謂之氣痰濕在腎經謂之寒痰宜隨證而治之咳而無痰者以辛甘潤其肺咳而嗽者治痰為先故以南星半夏勝其痰而咳嗽自愈枳殼陳皮利其氣而痰自下按此論咳因濕在於經致痰為咳五臟亦皆有之可謂發內經之秘矣然至氣鬱津液不降或停水飲所致或腎氣虛弱火炎水涸津液湧而為痰涎於上此氣飲及真臟為病非諸經之留濕致病也故易老云半夏止能泄痰之標而不能治痰之本是矣詳以上所言枳殼等利氣下痰恐非易老語也論痰飲治咳詳見痰飲門論嗽發早晏病本不同丹溪曰上半日嗽者屬胃中有火午後嗽者屬陰虛五更嗽多者此胃中有食積至此時滯肺氣不利諸邪或痰皆然春是春升之氣或外感夏是火炎上最重秋是濕熱傷肺冬是風寒外來也論乾咳嗽治法原病式曰人瘦者腠理疏通而多汗泄血液衰少而為燥熱故多為勞嗽之疾也丹溪曰咳而無痰者此係火鬱之證乃痰鬱火邪在中同苦梗以開之下用補陰降火不已則成勞此證不得志者有之謹按咳無痰者本肺氣傷而不清咳久則痰鬱於中不能上出故當用藥以開提之實者宣法亦可施也凡嗽久亦有痰中兼血有或帶血絲者燥熱血少者皆當取其化源故曰滋陰降火燥熱勞嗽是宜合而論治論咳為肺痿金匱方論曰熱在上焦者因咳為肺痿得之或從汗出或從嘔吐或從消渴小便利數或從便難又被快藥下利重亡津液故寸口脈數其人咳口中反有濁唾涎沫者為肺痿之病若口中辟辟燥咳即胸中隱隱痛脈反滑數此為肺癰咳唾膿血脈數虛者為肺痿數實者為肺癰按此言肺痿屬熱如咳久肺癟聲啞聲嘶咯血此屬陰虛火熱甚是也本論治肺痿吐涎沫而不咳者其人不渴必遺尿小便數以上虛不能制下故也此為肺中冷必眩多涎唾用炙甘草乾姜此屬寒也肺痿涎唾多心中溫液溫液者用炙甘草湯此補虛勞也亦與補陰虛火熱不同是皆宜分治故肺痿又有寒熱之異也咳嗽治法治風之劑局方消風百解散治咳嗽聲重身熱頭疼按此手太陰陽明藥也金沸草散治咳因感風寒頭痛聲重方並見傷風門按此手足太陰藥也敗毒散治痰嗽身熱鼻塞柴胡前胡羌活獨活桔梗枳殼茯苓甘草人參川芎各等分上㕮咀水煎每一兩或半兩按此足太陽少陽手太陰藥也表裡氣血之劑子和搜風丸方見中風門按此手足太陰陽明足太陽藥也按以上諸方並出太陽解表例但此丸下濕熱痰之劑也實亦汗下之異治寒之劑小青龍湯治感風寒表不解而咳心下有水氣或喘方見痰飲門金匱方治咳而脈浮去芍加厚朴杏仁石膏小麥簡易九寶湯治咳而身熱發喘惡寒麻黃薄荷陳皮桂心紫蘇杏仁甘草桑白皮大腹皮各等分上㕮咀入蔥姜煎按此手太陰足太陽藥也散風寒下氣之劑人參杏子湯止嗽散風寒逐痰飲人參半夏茯苓白芍桂枝乾薑細辛甘草各一錢五味子半錢杏仁一錢上㕮咀入姜煎按此手足太陰足太陽少陰藥也半夏溫肺湯止嗽喘治虛寒方見痰飲門局方華蓋散治感寒而嗽胸滿聲重蘇子陳皮赤茯苓桑白皮麻黃各一兩甘草十兩上㕮咀入姜煎按此手太陰之本藥也氣分之劑金匱射干麻黃湯治咳而上氣喉中水雞聲射干細辛紫菀款冬花各一錢半麻黃生薑各二錢半夏二錢半五味子一錢大棗二個上㕮咀水煎作一服按此足太陽例藥也按以上諸方並足太陽解表例兼逐飲降痰下氣之法不同況寒證亦有輕重用者自宜取擇治暑之劑人參白虎湯治咳而身熱脈虛發渴東垣清暑益氣湯治中暑身熱自汗咳而脈虛局方黃連香薷飲治暑熱乘肺咳而脈洪方並見暑門按暑嗽亦自病本不一姑錄此三方可見治例輕重亦殊如消暑丸亦其法也方見暑門治濕之劑五苓散治咳而煩脈緊而細按此足太陽藥解表之劑也桑白皮各二兩上為末瓷器內盛每日熱茶清點服按以上二方手太陰之的藥也或曰咳之病本不同何用藥往往必於肺然咳者因聲名病也故多本於肺經云肺象金堅勁扣之有聲邪擊於肺故為咳也且肺為腑臟之華蓋主於氣生皮毛朝百脈布化精氣者也或一臟一脈不利或九氣所動或天之六氣所感或水穀寒熱內因所動則肺亦病矣故咳證雖曰病本不同是以治例往往相類但病有輕重所兼之殊方亦奇偶溫涼之異爾宣明知母茯苓湯治咳嗽不已往來寒熱自汗肺痿甘草茯苓各一兩知母五味子人參薄荷半夏柴胡白朮款冬花桔梗麥門冬黃芩各半兩川芎二錢阿膠三錢上㕮咀每一兩入姜煎按此足少陽例藥也手足太陰之劑東垣加減瀉白散治陰氣在下陽氣在上咳嗽嘔吐喘急桑白皮一兩地骨皮七錢甘草陳皮青皮五味子人參各五錢白茯苓三錢上㕮咀每服半兩水煎入粳米二十粒寶鑑加減瀉白散治咳而口乾煩熱胸膈不利氣喘促桑白皮一兩地骨皮知母陳皮桔梗各五錢青皮細黃芩甘草炙各三錢上㕮咀每服五錢水煎食後溫服按此一方手太陰氣分藥也寶鑑曰華陀云盛則為喘減則為枯活人云發喘者氣有餘也凡看文字須要會得本意盛而為喘者非肺氣盛也喘為氣有餘者亦非肺氣有餘也氣盛當認作氣衰有餘當認作不足肺氣果盛為有餘當清肅下行而不喘以其火入於肺衰與不足而為喘焉故言盛者非言肺氣盛也言肺中之火盛也言有餘者非言肺氣有餘也言肺中之火有餘也故瀉肺以苦寒之劑非瀉肺也瀉肺中之火實補肺也用者不可不知然以上一方略有加減不同故兩存之局方款冬花散止嗽祛痰散風熱知母桑白皮款冬花麻黃阿膠貝母杏仁甘草半夏上㕮咀入姜煎按此手太陰之藥出足太陽麻黃例兼發表也然治風與寒皆宜解表但亦有可下者如傷風有下證同況咳證多兼痰飲宜後滾痰小胃選用金匱澤漆湯治咳而脈沉小柴胡內減柴胡加紫參白前各五錢桂枝三錢澤漆三合另煮上九味㕮咀內澤漆汁中煮取溫服按此出太陽解肌例然未至為肺痿藥也理氣之劑三因參蘇飲治咳嗽發熱局方四七湯治咳而痰涎在喉嗌間不下二陳湯治咳而胸膈不利蘇子降氣湯治痰嗽喘促氣不升降方並見痰飲門東垣加減三奇湯治咳嗽上氣喘促胸膈不利桔梗陳皮甘草青皮人參紫蘇桑白皮各五錢半夏七錢杏仁三錢五味子四錢上㕮咀每六七錢入姜煎濟生橘蘇飲前方減桔梗青皮人參加貝母白朮寶鑑人參款花膏治肺胃虛寒久嗽不已咽膈滿悶咳嗽痰涎勞嗽款冬花人參五味子各八錢紫菀桑白皮各一兩杏仁八錢木香檳榔蘇葉半夏湯泡數次各五錢上熬成膏入煉蜜丸如雞頭大每一丸食後細嚼淡薑湯下按以上三方理氣導痰之劑也皆本手太陰例比之前四方此則兼有滋補之意又當隨臟氣而用之可也收斂之劑局方人參清肺湯治喘嗽胸滿煩熱聲喑自汗地骨皮知母杏仁人參甘草阿膠桑白皮烏梅粟殼各等分上㕮咀水煎按此以甘寒降火兼酸收辛金之散涼而澀之也人參定喘湯治咳而上喘人參麻黃半夏阿膠甘草桑白皮五味子各一兩半粟殼二兩上㕮咀入姜煎每半兩或一兩按此以辛散之甘緩之酸收之本於寒邪者可用宣明寧神散治咳嗽多年不已常自汗服藥不效者粟殼一兩醋炒烏梅半兩上為末每二三錢沸湯調下按此劫劑也非虛脫者勿用故上澀之藥似難例使滋陰之劑金匱腎氣丸治腎陰虛弱津液不降敗濁為痰致咳逆者方見補虛門按此論見痰飲門良方補肺湯治勞嗽桑白皮熟地黃各二兩人參紫菀黃耆川五味子各一兩上為末每二錢水煎入蜜少許服按此二方少陰例藥也然勞嗽諸方如前治熱之劑皆可選用但因勞而嗽則非嗽為本也良方劫勞散例是矣故補劑不復具例治邪注之劑深師四滿丸治五嗽一上氣嗽二飲嗽三鱢嗽四冷嗽五邪嗽乾薑桂心躑躅花芎藭紫菀芫花根皮各二分蜈蚣一條去頭足炙細辛甘草炙鬼督郵人參半夏各一分上為末煉蜜丸如大豆許每五丸米飲下日三未效加至七八丸忌羊肉餳蔥生菜按此太陽例藥邪謂邪惡鬼注之疾故立是方如千金方謂夢與鬼交及飲食者用通氣丸全以蜈蚣是也蓋魯有如是而治愈者矣姑存之以備其旨但今人罕能識矧治療乎且云通療五嗽恐未必然也如鱢嗽以臭而名之病體豈無熱與濕熱乎治痰諸方青州白丸子水煮金花丸治嗽而脈弦面青四肢滿便溺秘多怒按此治風痰之劑也王隱君滾痰丸機要小黃丸治嗽而脈洪面赤煩熱心痛口乾按此治熱痰之劑也局方溫中丸機要薑桂丸治嗽而脈沉面色黧黑小便急痛足寒而逆按此治寒痰之劑也以上方並見痰飲門白朮丸治嗽而脈緩面黃肢體沉重嗜臥不收腹脹食不消南星半夏各制一兩白朮一兩半為細末浸湯蒸餅為丸桐子大每五六十丸薑湯下按此治濕痰之劑也玉粉丸治咳而脈澀面白氣上喘促灑淅寒熱悲愁不樂南星半夏各制一兩陳皮一兩上末浸蒸餅丸桐子大每三四十丸人參薑湯下按此治氣痰之劑也瑞竹堂化痰丸順氣快脾化痰消食半夏南星去皮白礬皂角切生薑各一斤上用水煮至南星無白點為度去皂莢不用姜切同曬乾陳皮青皮去穰紫蘇子炒蘿白子炒別研杏仁去皮尖炒研葛根神麯炒麥蘖炒唐球子香附子各一兩合前四味一處碾為末上浸蒸餅為丸如桐子大每服五七十丸臨臥食後茶酒任下按此治食痰之劑也丹溪小胃丹治膈上熱痰濕痰肩膊疼痛甘遂水濕麵裹再浸半日大戟長流水煮一時再水洗芫花醋拌勻過一宿瓦上微炒焦各半兩黃柏三兩炒大黃紙裹濕灰內煨再切酒浸炒一兩半上為末粥丸麻子大每二三十丸津唾下按此治濕熱之劑也干緍湯大半夏七個泡切皂莢去皮一寸甘草炙一寸上㕮咀入姜三大片煎服按此治風濕之劑也導痰湯半夏四兩南星枳實赤茯苓陳皮各一兩甘草半兩上㕮咀每服一兩入姜煎按此理氣導痰之劑也然諸飲致咳導痰治積諸方詳見痰飲門茲不備錄腑臟湯液諸方小柴胡湯治肝臟發咳兩脅下痛甚則不可以輾轉則兩脅下滿方見熱門黃芩加半夏生薑湯治膽腑發咳嘔苦水若膽汁黃芩生薑各三錢甘草炙芍藥各一錢大棗二個半夏半合上㕮咀水煎桔梗湯治心臟發咳咳而喉中如梗狀甚則咽腫喉痹苦梗三錢甘草六錢上㕮咀水煎芍藥甘草湯治小腸腑發咳咳而失氣芍藥甘草炙各四錢上㕮咀水煎升麻湯治脾臟發咳咳而右脅下痛痛引肩背甚則不可以動升麻白芍甘草各二錢葛根三錢上㕮咀水煎烏梅丸治胃腑發咳咳而嘔嘔甚則長蟲出烏梅三十個細辛附子桂枝人參黃柏各六錢乾薑一兩黃連一兩半當歸蜀椒各四錢上酒浸烏梅一宿去核蒸之與米飯搗如泥和諸藥末相得加蜜丸桐子大每三十丸白湯下麻黃湯治肺臟發咳咳而喘息有聲甚則吐血麻黃三錢桂枝二錢甘草一錢杏仁二十個上㕮咀水煎赤石脂禹餘糧湯治大腸腑發咳咳而遺屎赤石脂禹餘糧各二兩並打碎上水煎服麻黃附子細辛湯治腎臟發咳咳則腰背相引而痛甚則咳涎麻黃細辛各二錢附子一錢上㕮咀水煎茯苓甘草湯治膀胱腑發咳咳而遺溺茯苓二錢桂枝二錢半生薑五大片甘草炙一錢上㕮咀水煎異功散治久咳不已三焦受之其狀咳而腹滿不欲飲食此皆聚於胃關於肺使人多涕唾而面浮腫氣逆也人參茯苓白朮甘草陳皮等分上㕮咀或為末每服二三錢入薑棗煎服謹按以上諸方並傷寒例藥也故存之以備其旨然咳證以三因論之則一臟一腑病機亦非止於寒也熏法治久嗽風入肺者用鵝管石雄黃鬱金款冬花碾末和艾中以生薑一片留舌上灸之以煙入喉中為度如作筒子卷藥燒煙吸之亦妙灸法千金方云咳者灸兩乳下黑白際各數十壯即瘥又以蒲當乳頭周匝圍身令前後正中當脊骨灸十壯上氣咳嗽短氣氣滿食不下灸肺募五十壯上氣咳逆短氣風勞百病灸肩井二百壯上氣咳逆短氣胸滿多唾唾惡冷痰灸肺俞五十壯
