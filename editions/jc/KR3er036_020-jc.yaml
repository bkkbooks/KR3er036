body:
  text: 卷二十積聚門諸經敘積之始黃帝針經百病始生第三云積者蓋厥氣生足悗悗生脛寒脛寒則血脈凝澀凝澀則寒氣上入於腸胃入於腸胃則䐜脹䐜脹則腸外之汁沫迫聚不得散日以成積卒然多飲食則腸滿起居不節用力過度則絡脈傷陽絡傷則血外溢血外溢則衄血陰絡傷則血內溢血內溢則後血腸胃之絡傷則血溢於腸外有寒汁沫與血相搏則併合凝聚不得散而成積矣或外中於寒內傷於憂怒則氣上逆氣上逆則六輸不通溫氣不行凝血蘊里不散津液凝澀滲著而不去而成積矣難經曰肝之積名曰肥氣見後方下云云以季夏戊己日得之何以言之肺病傳於肝肝當傳脾脾季夏適王王者不受邪肝復欲還肺肺不肯受故留結為積故知肥氣以季夏戊己日得之心之積名曰伏梁云云脾之積名曰痞氣云云肺之積名曰息賁云云腎之積名曰奔豚云云並見本文按滑氏本義曰越人之意蓋以五行之道推其理勢之所有者演而成文耳初不必論其情感亦不必論其遠不遠與其必然否也讀者但以所勝傳不勝及王者不受邪遂留結為積觀之則不以辭害志而思過半矣謹按越人論五臟積傳受之本病也然針經又主絡脈傷及飲食七情所致而論之可謂詳悉然今較之積聚因飲食傷及七情而成者多且三因方於五積無主治引經況他書乎故具法不取今以東垣方附於後脈法脈經曰脈來細而附骨者積也寸口積在胸中微出寸口積在喉中關上積在臍旁上關上積在心下微下關積在少腹尺積在氣街脈出在右積在右脈出在左積在左脈兩出積在中央各以其部處之脈來小沉而實者胃中有積聚不食食即吐肺積脈浮而毛按之辟易心積脈沉而芤上下無常處肝積脈弦而細腎積脈沉而急脈沉重而中散者因寒食成癥脈左轉而沉重者氣癥陽在胸中右轉出不至寸口者內有肉癥也論積聚癥瘕不同難經曰積者陰氣也聚者陽氣也故陰沉而伏陽浮而動氣之所積名曰積氣之所聚名曰聚故積者五臟所生聚者六腑所成也積者陰氣也其始發有常處其痛不離其部上下在所終始左右有所窮處聚者陽氣也其始發無根本上下無所留止其痛無常處謂之聚故以是別知積聚也原病式曰證者腹中堅硬按之應手然水體柔順而今反堅硬如地者亢則害承乃制也瘕者中雖硬而忽聚忽散無其常故其病未及癥也經曰血不流而滯故血內凝而為瘕也小腸移熱於大腸乃為慮瘕大腸移熱於小腸謂兩熱相搏則血溢而為伏瘕血澀不利月事沉滯而不行故云為慮瘕為慮與伏同傳寫誤爾謹按積者實停蓄之總名癥者有所成而名之亦皆積爾瘕者血病也似不可言為聚聚者陽氣也然大小腸移熱為瘕如此則亦聚爾但前人施治亦未見有分其異同者唯丹溪先生曰積塊在中為痰飲在左為血積在右為食積氣不能作塊成聚塊乃有形之物痰與食積死血爾此深得病情之旨學者可因此例而求諸論積聚分三因陳無擇云癥瘕屬肝部積聚屬肺部夫癥者堅也瘕者假也假物而成形然七癥八瘕之名經論亦不詳出雖有蛟蛇鱉肉發蝨米等七證初非定名偶因食物相感而致患爾若婦人癥瘕則由內外不內外因動傷五臟氣血而成古人謂為痼疾以蛟蛇等為生瘕然亦不必泥此並屬血病蛇發等事皆出偶然但飲食間誤中之留聚假血而成自有活性亦猶永微中僧病噎者腹中有一物其狀如魚即生瘕也按此論積聚等屬臟部蓋分氣血爾亦不必拘此然生瘕亦有外因而成者如昔之徐之才治取蛤精疾生於足間者若此陳於三因何不之及論婦人腸覃石瘕之積水脹篇曰石瘕何如岐伯曰石瘕生於胞中寒氣客於子門子門閉塞氣不通惡血當瀉不瀉衃以留止日以蓋大狀如懷子月事不以時下皆生於女子可導而下寶鑑曰夫膀胱為津液之腑氣化則能出矣今寒客於子門則必氣塞不通血壅不流而衃以止之結硬如石是名石瘕也此氣先病而血後病故月事不來則可宣導而下出者也故難經云任之為病其內苦結男子為七疝女子為瘕聚此之謂也非大辛之藥不能已可服見睍丹腸覃何如岐伯曰寒氣客於腸外與胃相搏不得榮因有所繫瘕而內著惡氣乃起瘜肉乃生其始生者大如雞卵稍以益大至其成如懷子之狀久者離歲按之則堅推之則移月事以時下此其候也夫腸者大腸也覃者延也大腸以傳道為事乃肺之腑肺主衛衛為氣氣得炅則泄寒則凝今寒客於大腸故衛氣不榮有所繫止而結瘕在內貼者其延久不已是名腸覃也氣散則清氣聚則濁結為證聚所以惡氣發起瘜肉乃生小漸益大至期而鼓其腹則如懷子狀也此氣病而血未病故月水不斷以時下本非妊娠可以此為辨矣按此謂石瘕為血壅不流故月事不來腸覃為清氣聚而濁結成瘕故血未病月水不斷而知此二積之異然亦有諸積所致或有病癰膿而似此二證者不可不察也論五積六聚治同郁斷子和曰且積之成也或因暴喜怒悲思恐之氣或傷五味之食或停溫涼寒熱之飲或受六氣之邪其初甚微可呼吸按導而去之不幸遇庸醫強補而留之留而不去遂成五積夫肥氣者不獨氣有餘也其中亦有血矣蓋肝藏血故也伏梁者火之郁也以熱藥散之則益甚以火炙之則彌聚況伏梁證有二名同而實異不可不詳焉其一上下左右皆有根在腸胃之外有大膿血此伏梁義同腸癰其二身體髀股胻背腫環臍而痛是即風根不可動動則為水溺澀之病此二者內經雖言不可動止謂不可大下非謂全不可下恐病去而有害痞氣者舉世皆言寒則痞內經以為濕則痞雖因飲冷而得其陽氣為濕所蓄以熱攻之則不散以寒攻之則濕去而寒退矣息賁者喘息憤而上行也此舊說也余以謂賁者賁門也手太陰之筋結胸裡故貫合賁下抵季脅其痛支轉筋痛甚則成息賁手心主結於賁其病胸痛息賁又云肺下則居賁迫肝善脅下痛肝高則上支賁門脅悅為息賁若是言之是積氣於賁而不散此靈樞說五臟處言此賁自是多故予發之賁豚者賁與奔同銅人言或因讀書得之未必皆然也腎主骨此積最深難察大忌吐湧以其在下止宜下之故予嘗以獨聖散吐肥氣揃以木架必燠室中吐兼汗也肝之積便言風也吐出數升後必有血一二滴勿疑病當然也續以磨積之藥調之嘗治伏梁先以茶調散吐之兼汗以禹功導水奪之繼之以降火之藥調之又嘗治痞氣萬舉萬全先以瓜蒂散吐其酸苦黃膠腥腐之物三二升次以導水禹功下二三十行末以五苓淡劑等藥調之又嘗治息賁用瓜蒂散不計四時置燠室中更以火一爐以助其汗吐汗下三法齊行此病不可逗留久則傷人又嘗治賁豚以導水通經三日一下之一月十下前後百行次用治血化氣磨積之藥調之此積雖不傷人亦與人偕老若六聚之物在腑屬陽而無形亦無定法仿此而行之何難之行按此論五積之異同可謂極備病情之要積為鬱而用吐法更甚得古人之妙矣但每吐後繼之以禹功導水之劑則不可為例矧古人施吐必本積因而用藥如徐文伯以油為宮人吐發瘕楮澄以蒜為李道念吐雞子積甄權以雄黃為人吐發瘕成蛇者蓋所因不同而用藥殊也大抵禹功五苓之劑十下百行等法用於濕熱盛實及體厚者則可設有陰虛氣痿積聚實而血氣弱者豈可例用乎論痰積飲積主於濕詳見痰飲門論治積大法許學士云大抵治積或以所惡者攻之或以所喜者誘之則易愈如硇砂水銀治肉積神麯麥蘖治酒積水蛭虻蟲治血積木香檳榔治氣積牽牛甘遂治水積雄黃膩粉治涎積礞石巴豆治食積各從其類也若用群隊之藥分其藥勢則難取效須要認得分明是何積聚兼見何證然後增減斟量使之不爾反有所損要在臨時通變也謹按諸積有不因氣動而成者如偶有所食或誤吞錢物之類是也因氣動而成者如七情所致或飲食勞倦或五臟傳受之類是也故所積之物不一氣血之聚有殊或成蠱瘤生瘕之類難測故須是認得分明是何積聚用藥宜各從其類然亦要看元氣虛實或攻取峻削或養正漸除可也不爾則豈但有損而已論養正積自除衛生寶鑑曰潔古云養正積自除譬如滿座皆君子縱有一小人自無容地而出令其真氣實胃氣強積自消矣潔古之言豈欺我哉內經曰大積大聚衰其太半而止滿實中有積氣大毒之劑尚不可過況虛中有積者乎此乃治積之一端也邪正虛實宜詳審焉按或云積非下之不可今言養正而後積除將以待正氣而除乎將以待藥力而除乎然人之有積則皆為身中之邪氣若君子座中之有小人也惟其調正氣則真氣運行不失其常而積自除夫君子眾而正直在位其小人自然退避矣不然則正氣虛而真氣乖致積增膜膈胃亂真正氣絕而死矣亦若小人得志則政亂法壞而君子有所不能制焉且夫養正者非為飲食起居之間也蓋積既成矣形漸悴矣必用調養使榮衛充實而積自除余有堅而不去者方可亟下之此先補後攻期於邪去正復而後已然除之不以漸則必有顛覆之害矣若昔之武氏斫喪唐宗幾於改物尚賴狄張諸公匡扶之力漸除黨與興復丕祚惜乎中宗不鑑前轍之失而留三思至致韋氏之禍其猶積余之尚在者而不亟下之更不慎守禁戒遂縱口嗜欲病證復起而不可制其有不喪身者未之有也積聚治法五臟積方東垣肥氣丸治肝之積在左脅下如覆杯有頭足久不愈令人發咳逆㾬瘧連歲不已厚朴半兩黃連七錢柴胡二兩椒四錢巴豆霜五分川烏頭炮去皮一錢二分乾薑炮半錢人參二錢半白茯苓一錢半昆布二錢半甘草炙三錢廣朮炮二錢半皂角去皮弦煨一錢半上件除茯苓皂角豆霜另末外為極細末和勻煉蜜為丸如桐子大初服二丸一日加一丸二日加二丸漸漸加至大便微溏再從二丸加服周而復始積減太半勿服伏梁丸治心之積起臍上大如臂上至心下久不愈令人煩心黃連一兩半厚朴制人參各半兩黃芩三錢乾薑菖蒲巴豆霜各五分桂一錢紅豆二分川烏頭五分炮茯神丹參炒各一錢上件除巴豆霜外為細末另研豆霜旋旋入末煉蜜為丸如桐子大服如上法淡黃連湯下痞氣丸治脾之積在胃脘覆大如盤久不愈令人四肢不收發黃疸飲食不為肌膚厚朴四錢半黃連八錢吳茱萸三錢黃芩二錢白茯苓澤瀉人參各一錢川烏頭炮川椒炒各半錢白朮二分巴豆霜四分桂四分茵陳酒炒乾薑泡砂仁各一錢半上件除豆霜另研茯苓另末旋入外同為細末煉蜜為丸如桐子大淡甘草湯下服如上法息賁丸治肺之積在右脅下覆大如杯久不已令人灑淅寒熱喘咳發肺壅厚朴制八錢黃連炒一兩三錢乾薑泡白茯苓川椒炒紫菀各一錢半桂川烏頭炮桔梗白豆蔻陳皮京三稜天門冬各一錢巴豆霜四分人參二錢青皮五分上件除茯苓巴豆霜旋入外為末煉蜜丸如桐子大以淡薑湯送下服如上法以上四方秋冬加厚朴減黃連四分之一奔豚丸治腎之積發於小腹上至心下若豚狀或下或上無時久不已令人喘逆骨痿少氣及治男子內結七疝女人瘕聚滯下厚朴制七錢黃連五錢白茯苓澤瀉菖蒲各二錢川烏頭丁香半錢桂二分巴豆霜四分全蠍附子獨活各一錢玄胡索一錢半苦楝酒煮三錢上除巴豆霜茯苓另為末旋入外為細末煉蜜丸如桐子大淡鹽湯下服如上法按以上諸方宜隨證加減用之所謂益元氣泄陰火破滯氣削其堅也吐劑瓜蒂散方見痰飲門按吐法意略具前宜兼看各門吐劑倒倉法丹溪曰人之七情厚味停痰瘀血互相糾纏日積月深鬱結成聚甚者如桃核之穰諸般奇形之蟲成於中形於外發為癱瘓為勞瘵為蠱脹為癩疾為無名奇病宜行此法用黃牡牛肉擇肥者買一二十斤長流水煮糜爛融入湯中為液以布濾出渣滓取淨汁再入鍋文武火熬成琥珀色則成矣每飲一鍾少時又飲如此者積十數鍾寒月則重湯溫而飲之病在上者欲其吐多病在下者欲其利多病在中者欲其吐利俱多全在活法而為緩急多寡也須晴明日早於一室明快不通風處以安病人視所出之物可盡病根則止吐利後或渴不得與湯水其小便必長取以飲病者名曰輪迴酒與一二碗非惟可以止渴抑且可滌灌余垢睡一二日覺飢甚乃與粥淡食之待三日後始與少菜羹自養半月覺精神渙發形體輕健沉疴悉除其後須五年忌牛肉消導之劑御藥院方助氣丸治三焦痞閉胸膈滿悶氣不流通蘊結成積痃癖氣塊並皆治之京三稜莪朮各炮二斤青皮陳皮並去白白朮各十五兩檳榔枳殼木香各十兩上為末糊丸如梧子大每五十丸煎水下按此治諸氣積藥也然世俗治積之方多兼氣藥欲其氣化而積易散殊不知氣虛者何以抵受中夾熱者豈不助火反傷氣耶故用者宜分虛實寒熱選使況此方雜削氣之藥過半而云助氣恐未必然也三因散聚湯治久氣積聚狀如癥瘕隨氣上下發作有時心腹絞痛攻刺腰脅小腹䐜脹大小便不利半夏檳榔當歸各三分陳皮杏仁去皮夾炒桂各二兩茯苓甘草炙附子炮川芎枳殼炒厚朴制吳茱萸湯泡洗各一兩大黃大便利去之上㕮咀每服四錢水煎濟生大七氣湯治積聚狀如癥瘕隨氣上下發作有時心腹㽲痛上氣窒塞小腹脹滿桔梗肉桂藿香葉甘草炙青皮各二分益智仁京三稜陳皮蓬朮香附子炒各一兩半上㕮咀每服五錢水煎按此二方治聚之劑也然聚瘕用湯盪滌之意亦要隨臟氣虛實寒熱而增損之可也東垣草豆蔻丸治酒積或傷寒冷物胃脘痛咽膈不通草豆蔻煨白朮各一兩大麥蘖神麯各炒黃芩半夏各半兩枳實炒二兩炒鹽半錢陳皮青皮乾生薑各二錢上為極細末湯浸蒸餅丸如綠豆大每服百丸煎水下按此治酒積飲積藥也入氣血之分廣朮潰堅湯治有積塊堅硬如石形如袢大令人坐臥不安中滿腹脹方見腹脹門寶鑑香殼丸破痰癖消癥塊及冷積木香丁香各五錢京三稜銼酒浸一宿青皮廣朮銼酒浸一宿用去皮巴豆三十粒同炒巴豆黃色枳殼炒川楝子茴香炒各一兩上末醋糊丸如梧子大硃砂為衣每服二十丸姜鹽湯下按此治氣積寒積之劑下焦藥也丹溪阿魏丸治肉積連翹半兩糖球子一兩黃連六錢半阿魏一兩醋煮作糊上為末用阿魏糊丸如梧子大每二三十丸白湯下保和丸治食積糖球子三兩半夏茯苓各一兩神麯二兩陳皮連翹蘿蔔子各半兩上為末粥糊丸如梧子大每三四十丸白湯下按此二方食積藥也又此方治痰積飲積之劑丹溪曰脾虛者須以補脾藥下之切不可獨用虛虛之禍疾如反掌益慎之也氣實新病宜於攻下諸方選用又不必拘此宣明三稜湯治癥瘕痃癖積聚不散堅滿痞膈食不下腹脹蓬朮當歸各半兩京三稜二兩白朮一兩檳榔木香各三分上為末每三錢沸湯調下按此治癥瘕之劑氣血藥也然瘕者雖硬而忽聚散即聚也屬陽氣也經云血不流而寒薄故血內凝而瘕益又屬血爾固當兼治之此方亦可以推其變從虛實加減而輕重之可也謹按針經備陰絡傷汁血相搏併合成積或臟氣傳受及子和論七情為郁皆元氣自病不繫傷諸飲食致者當先調理不可妄下故以上五臟方消導法宜選用氣虛弱甚者又宜消息此養正積自除之意若傷諸飲食致者元氣未病初非下之削之不可然治之不早元氣日減正氣日偷方用下削而能獲安者實僥倖焉至是者亦宜上法先補後攻可也醫反是之多致誤爾若積鬱在身形氣飲食如常者則以下削堅之方或吐或下的在選用衰其太半宜漸除之否則失機後時而不救者多矣然有除之未盡元氣未復而使內縱口味恣七情病遂復起者亦不鮮矣嗚呼世道不古人之不謹致積又不能歸罪於已安心調理卒致殞沒不得以盡其天年者固不足惜然醫之不能精明其道誤人生命者豈無所報耶削堅之劑楊氏木香檳榔煎丸治脾積氣塊腹脅走痛口吐清水肉豆蔻五枚木香肉桂各一兩檳榔七枚乾漆半兩炒令煙盡硇砂半兩另研胡椒四十九粒上為末次入硇砂和勻煉蜜丸如梧子大每七丸橘皮湯下按此治肉積寒積藥也入氣血之分局方丁香脾積丸治諸般食積氣滯胸脹滿心腹刺痛丁香木香巴豆高良薑醋煮各半兩莪朮一兩三稜二兩青皮一兩皂角三大挺燒上入百草霜三匙同碾細為末糊丸如麻子大每十丸至二十丸按此治寒冷食積藥也鄧山房感應丸治食積化宿滯黑角沉香檀香丁香木香陳皮青皮黃連砂仁香附子半夏三稜蓬朮煨各一兩為細末肥烏梅百錢重巴豆三百粒肥白者去衣膜心上用瓷器一隻盛巴豆上以梅肉蓋之卻用米醋浸過與梅肉平於甑坐蒸至極熟以巴豆紅色為度卻擂二件如泥用糯米飯和前藥勻搗千百下丸如蘿蔔子大每十丸湯下按此下氣積食積藥也宣明積氣丹治一切新久沉積氣塊面黃黑瘦癥瘕積聚口吐酸水檳榔二個芫花京三稜黃連牛膝樟柳根各一兩肉豆蔻二個硇砂二錢青皮陳皮石菖蒲各三錢大戟大黃甘遂白牽牛乾薑青礞石乾漆各半兩蓬朮一兩巴豆木香各二錢半上為末醋糊為丸如桐子大每服一丸臨臥燒棗湯下量病人虛實加減與服按此下飲積氣積肉積水積藥也本事硇砂丸治一切積聚痰飲心脅引痛硇砂三稜乾薑白芷巴豆去油各半兩大黃乾漆各一兩檳榔肉豆蔻各一個木香青皮胡椒各一分上為末釅醋二升煮巴豆五七沸復下三稜大黃末同煎五七沸入硇砂煎成膏卻入別藥和勻杵丸如綠豆大每五丸薑湯下按此下肉積氣積例藥因其中用白芷為散水行氣故更言治痰飲也破積導飲丸治積塊堅硬飲食不消心下痞悶木香檳榔陳皮青皮枳殼炒枳實炒廣朮炮三稜炮半夏神麯炒麥蘖乾生薑茯苓澤瀉甘草炙各半兩牽牛頭末六錢巴豆三十粒去皮心油上細末入巴豆霜令勻薑汁糊丸梧子大每三十丸溫薑湯下按此治飲積酒積氣積藥也然世俗方類此者甚多大抵多合以熱劑不能以盡病情之變唯此方庶幾用者自宜取擇三因破飲丸方見痰飲門晞露丸治傷寒於內氣凝不流結於腸外久為癥瘕時作疼痛腰不得伸廣朮三稜各酒浸一兩乾漆炒五錢茴香炒青皮雄黃穿山甲炮各三錢硇砂四錢研輕粉一錢川烏五錢炮麝香半錢巴豆三十粒去殼同三稜術炒黃色去巴豆不用上細末和勻薑汁糊丸梧子大每三二十丸溫薑湯下空心服按此治腸覃寒積之劑也寶鑑見睍丹治婦人石瘕狀如懷子者附子四錢炮鬼箭羽紫石英各三錢澤瀉肉桂玄胡木香各二錢血竭一錢半水蛭一錢炒煙盡檳榔二錢半桃仁炒三十個三稜五錢大黃二錢同三稜酒浸一宿焙上各研勻酒糊丸梧子大每三十丸食前用鹽湯或酒下按此治血積藥也溫白丸治心腹絞痛久癥癖塊大如杯碗十種水病八種痞塞九種心痛紫菀吳茱萸菖蒲柴胡桔梗厚朴制皂角去皮尖弦茯苓黃連桂川椒炒去目乾薑炮巴豆去心膜油人參各半兩川烏炮去皮臍二兩半上末入巴豆研令勻蜜丸梧子大每三丸生薑湯下按此治食積寒積藥也經驗方塌腫神應丸治諸腫蟲毒肚脹如鼓脾癖癥瘕氣塊上喘氣急咳嗽倚息不得睡服藥不效者三稜莪朮青皮陳皮乾漆燒各一兩芫花七錢半大戟三錢硇砂巴豆霜各一錢上前藥和一處用好米醋一大碗慢火上煮醋乾為度取出曬乾碾為末醋和作丸如梧子大每四五十丸生薑湯下五更服隨用椒目六兩蘿白子半斤炒香熟用手帕盛於患處熨如冷再炒熨至再三大小便行後才住熨以溫稀粥補之按此治癥瘕之劑飲積氣積水積血積藥也聖散子治遠年積塊硇砂六兩川大黃八兩大麥蘖六兩乾漆燒過萹蓄茴香炒瞿麥檳榔各一兩如婦人乾血氣加穿山甲二兩炮上末每五錢溫酒調下仰臥此藥只在心頭至明大便如爛魚小便赤為驗取出並無毒性小兒用一錢量大小與之按此氣血藥也謹按治積之方氣實者故宜峻削故古方多相類近世又多用推逐之劑如剪紅丸蠟丸去積亦是一法但不分氣血蟲物諸積之異人之虛實不同往往誤人故皆不錄其或可吐者宜從子和之法氣虛羸弱者觀東垣諸方已啟其微用者當自求其意而為通變可也
