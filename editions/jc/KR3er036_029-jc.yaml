body:
  text: 卷二十九眼目門論目為血脈之宗內經曰諸脈者皆屬於目目得血而能視針經曰五臟六腑精氣皆上注於目而為之精精之窠為眼骨之精為黑眼血之精為絡其窠氣之精為白眼肌肉之精則為約束里擷筋骨血氣之精而與脈併為繫上屬於腦後出於項中故邪中於項因逢其身之虛其入深則隨眼系入於腦則腦轉腦轉則引目系急目系急則目眩以轉矣邪中其精其精所中不相比也則精散精散則視岐故見兩物目者五臟六腑之精榮衛魂魄之所常營也神氣之所主也故神勞則魂魄散志意亂是故瞳子黑眼法於陰白眼赤脈發於陽故陰陽合傳而為精明也目者心之使也心者神之舍也故神精亂而不轉卒然見非常之處精神魂魄散不相得故曰惑也東垣曰夫十二經脈三百六十五絡其血氣皆上走於面而走空竅其清陽氣上散於目而為精其氣走於耳而為聽因心煩事冗飲食失節勞役過度致脾胃虛弱心火大盛則百脈沸騰血脈逆行邪害空竅失明則日月不明矣夫五臟六腑之精氣皆稟受於脾上貫於目脾者諸陰之首也目者血脈之宗也故脾虛則五臟之精氣皆失所司不能歸明於目矣心者君火也主人之神宜靜而安相火化行其令相火者包絡也主百脈皆榮於目既勞役運動勢乃妄行又因邪氣所並而損血脈故諸病生焉凡醫者不理脾胃及養血安神治標不治本是不明正理也按此論目為腑臟血脈精氣之宗至為詳悉豈但世俗拘之於五輪八廓而已也論目昏赤腫翳膜皆屬於熱原病式曰目昧不明目赤腫痛翳膜皆瘍皆為熱也及目膜俗謂之眼黑亦為熱也或平白目無所見者熱氣鬱之甚也或言目昧為肝腎虛冷者誤也是以妄謂肝生於目腎主瞳子故妄言目昧為虛而冷也然腎水冬陰也虛則當熱肝木春陽也虛則當冷腎陰肝陽豈能同虛而為冷者歟或通言肝腎之中陰實陽虛而無由目昧也俗妄謂肝腎之氣衰少而不能至於目也不知經言熱甚目瞑眼黑也豈由寒乎又如仲景言傷寒病熱極則不識人乃目盲也正理論曰由熱甚怫鬱於目而致之然也若目無所見耳無所聞悉由熱氣怫鬱玄府閉密而致氣液血脈榮衛精神不能升降出入故也各隨鬱結微甚而有病之輕重也故知熱鬱於目無所見也故目微昏者至近則轉難辨物由目之玄府閉小也隔縑視物之象也或視如繩翼者玄府有所閉合者也或目昏而見黑花者由熱氣甚而發之於目亢則害承乃制而反出其泣氣液昧之以其至近故雖微而亦見如黑花也及衝風泣而目暗者由熱甚而水化制之也故經言厥則目無所見夫人厥則陽氣並於上陰氣並於下陽並於上則火獨光也陰氣並於下則足陰足陰則脹也夫一水不能勝五火故目眥而盲是以衝風泣下而不止夫風之中於目也陽氣內守於睛是火氣燔目故見風泣下按此論熱甚怫鬱陰陽並厥玄府閉密緻目病之由為詳蓋一主於火熱之化也若由飲食辛熱七情所動六氣淫鬱氣血虛實則東垣子和陳無擇輩論亦已詳然亦有痰熱濕熱與夫服食金石燥熱之藥致者或久病後榮衛虛弱肝氣腎陰不足或元氣精氣虛衰及脫營為病皆有虛熱實熱之殊並宜分治論眼證分表裡治機要曰在腑則為表當除風散熱在臟則為里宜養血安神暴發者為表而易治久病者在裡而難愈論目疾宜出血最急子和曰聖人雖言目得血而能視然血亦有太過不及也太過則目壅塞而發痛不反則目耗竭而失明故年少之人多太過年老之人多不及但年少之人則無不及年老之人其間猶有太過者不可不察也夫目之內皆太陽經之所起血多氣少目之銳眥少陽經也血少氣多目之上綱太陽經也亦血多氣少目之下綱陽明經也血氣俱多然陽明經起於目兩旁交頞之中與太陽少陽俱會於目惟足厥陰經連於目系而已故血太過者太陽陽明之實也血不及者厥陰之虛也故出血者宜太陽陽明蓋此二經血多故也少陽一經不宜出血血少故也刺太陽陽明出血則目愈明刺少陽出血則目愈昏要知無使太過不及以血養目而已凡血之為物太多則濫太少則枯人熱則血行疾而多寒則血行遲而少此常理也目者肝之外候也肝主目在五行屬木雖木之為物太茂則蔽密太衰則枯瘁矣夫目之五輪乃五臟六腑之精華宗脈之所聚其白人屬肺金肉輪屬脾土赤脈屬心火黑水神光屬腎水兼屬肝木此世俗皆知之矣及有目疾則不知病之理豈知目不因火則不病何以言之白輪變赤火乘肺也肉輪赤腫火乘脾也黑水神光被翳火乘肝與腎也赤脈貫目火自甚也能治火者一句可了故內經曰熱勝則腫凡目暴赤腫起羞明隱澀淚出不止暴寒目瞞皆太熱之所為也治火之法在藥則鹹寒吐之下之在針則神廷上星囟會前頂百會血之翳者可使立退痛者可使立已昧者可使立明腫者可使立消惟小兒不可刺囟會為肉分淺薄恐傷其骨然小兒水在上火在下故目明老人火在上水不足故目昏內經曰血實者宜決之又經曰虛者補之實者瀉之如雀目不能夜視及內障暴怒大憂之所致也皆肝主目血少禁出血止宜補肝養腎至於暴赤腫痛皆宜以䤵針刺前五穴出血而已次調鹽油以塗髮根甚者雖至於再至於三可也量其病勢以平為期按此謂目疾出血最急於初起熱痛暴發或久病郁甚非三稜針宣泄不可然年高之人及久病虛損並氣鬱者宜從毫針補瀉之則可故知子和亦大略言爾於少陽一經不宜出血無使太過不及以血養目而已斯意可見論內障外障龍木論曰眼疾有七十二般內障二十三候外障四十九候病狀一一不同據其疾狀認識既不差錯治療必有所憑謹按諸候詳見本論然內障為黑水神光昏翳外障則有翳膜者是今論中雖具諸候而所用藥多本風熱故並略去然內障有因於痰熱氣鬱血熱陽陷陰虛脫榮所致種種病因皆略之不議況外障之翳有起於內眥外眥睛上睛下睛中當視其翳色從何經而來如東垣治例魏邦彥夫人目翳從下而上病自陽明來也綠非五色之正殆肺腎合而為病也乃就畫家以墨調膩粉合成色諦視之與翳色同矣肺腎為病者無疑乃瀉肺腎之邪而以入陽明之藥為之使既效而他日復病作者三其所從來之經與翳色各異因詢此必經絡不調目病未已問之果然如所論治之疾遂不作若此憑其色究其所兼所本之因處治而不愈者蓋邪蘊日久而實元氣陰氣不足所致也當以王道論治庶可但世俗不能守此理遂致失明者多矣悲夫論瞳子散大東垣曰瞳子散大者由食辛熱之物太甚故也所謂辛主散熱則助火上乘於腦中其精故散精散則視物亦散大也夫精明者所以視萬物者也今視物不真則精衰矣蓋火之與氣勢不兩立故經曰壯火食氣壯火散氣手少陰足厥陰所主風熱連目系邪入中人各從其類故循此道而來攻頭目腫悶而瞳子散大皆血虛陰弱故也當除風熱涼血益血以收耗散之氣則愈矣論倒睫赤爛東垣曰夫眼生倒睫拳毛者兩目緊急皮縮之所致也蓋內復熱致陰氣外行當去其內熱併火邪眼皮緩則眼毛立出翳膜亦退用手法攀出內臉向外速以三稜針出血以左手爪甲迎其針鋒立愈目眶歲久赤爛俗呼為赤瞎是也當以三稜針刺目眶外以瀉濕熱而愈按以上所論可謂深達病情然是證亦多是血熱陰虛火動所致蓋血所以滋經脈養毛髮者也故當外治以瀉其瘀熱內治以杜絕其源可也論目不能遠視為陰氣不足東垣曰能遠視不能近視者陽氣不足陰氣有餘也乃氣虛而血盛也血盛者陰火有餘氣虛者氣弱也此老人桑榆之象也能近視不能遠視者陽氣有餘陰氣不足也乃血虛氣盛血虛氣盛者皆火有餘元氣不足火者元氣穀氣真氣之賊也元氣來也徐而和細細如線邪氣來也緊而強如巨川之水不可遏謹按陽氣者猶日火也陰氣者金水也先儒所謂金水內明而外暗日火內暗而外明者也然人目眼備臟腑五行精華相資而神明故能視即此理之常也雖經曰目得血而能視殊不言氣者蓋血得氣為水火之交而能神明之也否則陰虛不能視遠陽乏不能視近是為老人桑榆之漸然學者於目病能求諸此則思過半矣論目疾分三因陳無擇云病者喜怒不節憂思兼併致臟氣不平鬱而生涎隨氣上厥逢腦之虛侵淫眼系蔭注於目輕則昏澀重則障翳眵淚胬肉白膜瞞睛皆內所因或數冒風寒不避暑濕邪中於項乘虛循系以入於腦故生外翳醫論中所謂青風綠風紫風黑風赤風白風白翳黃翳等隨八風所中變生諸證皆外所因或嗜欲不節飲食無時生食五辛熱啖炙爆馳騁田獵冒涉煙塵勞動外情喪明之本皆不內外因治之按論中所言致證之因至為詳悉惜乎其方多本於風熱及水臟陽虛處治而未備學者當自為通變矣論偷針眼巢氏曰凡眼內眥頭忽結成疱三五日間便生濃汁世呼為偷針此由熱氣客在眥間熱搏於津液所成但其勢輕者小小結聚汁潰熱歇乃瘥謹按世傳眼眥初生小疱視其背上即有細紅點如瘡以針刺破眼時即瘥故名偷針實解太陽經結熱也人每試之有驗然巢氏但具所因而不更分經絡其諸名實所遇者多矣眼目治法治風之劑局方密蒙花散治風氣攻注兩眼昏暗眵淚羞明並暴赤腫羌活白蒺藜炒木賊密蒙花石決明各一兩菊花二兩上為末每服二錢茶清食後調下三因羌活散治風毒上攻眼目昏澀翳膜生瘡及偏正頭疼目小黑花累累者羌活川芎天麻青皮旋覆花南星炮藁本各一兩上為末每服二錢水煎入姜三片薄荷七葉按以上並足太陽厥陰藥也東垣明目細辛湯治兩目發赤微痛羞明畏日怯風寒怕火眼睫成紐眵糊多癮澀而難開眉攢腫悶鼻塞涕唾稠黏大便秘澀麻黃羌活各三錢防風二錢藁本白茯苓當歸尾各一錢川芎細辛蔓荊子各半錢荊芥穗一錢半生地黃一錢酒製椒八個桃仁二十個紅花少許上㕮咀分作四服每服水煎食後熱服按此足太陽厥陰手少陰藥也機要四物龍膽湯治目赤暴發雲翳疼痛不可忍四物湯各半兩羌活防風各三錢防己龍膽草各二錢上㕮咀作數服水煎按此足厥陰太陰太陽藥也防風飲子治拳毛倒睫黃耆甘草人參各一錢葛根半錢防風細辛葉蔓荊子各半錢當歸七分半上㕮咀作一服水煎食後服按此足太陽陽明手足太陰藥也治熱之劑局方洗心散方見熱門濟生羊肝丸治肝經有熱目赤睛疼視物昏澀羊肝一具生用局方用白羊肝黃連去須為末上先將羊肝去筋膜於沙盆內搗爛入連末杵和丸如梧子大每五十丸用熟水送下按此手少陰足太陰厥陰藥也東垣瀉熱黃連湯治眼暴發赤腫疼痛黃芩酒製炒黃連同上制草龍膽生地黃各一兩升麻半兩柴胡一兩上㕮咀每四錢水煎去滓於日午前飯後熱服按此手少陰太陰足陽明少陽少陰藥也治風熱之劑局方明目流氣飲治風熱上攻眼目視物不明常見黑花當風多淚隱澀難開大黃煨牛蒡子炒川芎菊花白蒺藜炒細辛防風玄參山梔黃芩甘草炙蔓荊子荊芥木賊各一兩草決明一兩半蒼朮泔浸炒二兩上為末每二錢臨臥用溫酒調下按此手足三陰足陽明太陰藥也洗肝散治風毒上攻暴作赤目腫痛難開隱澀眵淚薄荷葉當歸羌活防風山梔仁甘草大黃川芎各二兩上為末每二錢食後煎水調下按此足太陽厥陰手足太陰藥也錢氏瀉青丸治目暴發赤腫疼痛方見熱門按此足太陽少陽太陰厥陰藥也東垣連翹飲子治目中溜火惡日與火癮澀小角緊久視昏花迎風有淚蔓荊子生甘草連翹各三分柴胡二分黃芩酒製半錢生地黃當歸紅葵花人參各三分黃耆防風羌活各半錢升麻一錢上㕮咀作一服水煎食後熱服按此足三陽少陰厥陰藥也治濕熱之劑神芎丸治濕熱內甚目赤腫或白睛黃色方見火門按此足陽明厥陰藥也東垣龍膽飲子治肝眼流膿生疳翳濕熱為病黃芩炒青蛤粉羌活草龍膽各三錢麻黃一錢半蛇蛻皮穀精草川鬱金炙甘草各半錢升麻二錢上細末每二錢食後茶調服按此足太陽陽明手足太陰藥也以上六方宜隨表裡而輕重之亦不可例用理血之劑局方明目地黃丸治男女肝腎俱虛風邪所乘熱氣上攻目翳遮睛目澀多淚牛膝酒浸三兩石斛枳殼炒杏仁去皮炒防風各四兩生熟地黃各一斤上為末煉蜜丸如梧子大每三十丸食前鹽湯下按此出太陽例又氣藥也簡易加減駐景丸治肝腎氣虛兩目昏暗視物不明車前子炒二兩熟地黃當歸各五兩楮實子川椒炒各一兩五味子枸杞子各二兩菟絲子酒製半斤上為末蜜和丸如梧子大每三十丸食前溫酒下謹按肝為相火有瀉無補況陰水虛而陽火實病目者多故此二方蓋補肝之陰虛也頗有理故收入地芝丸治目不能遠視能近視或亦妨近視生地黃焙乾天門冬去心各四兩枳殼二兩炒甘菊花二兩上為細末煉蜜為丸如桐子大茶清送下百丸食後理氣之劑局方定志丸治眼不能近視反能遠視者白茯苓人參各三兩遠志去心菖蒲各二兩上為細末煉蜜丸如梧子大以硃砂為衣每服七丸至二三十丸溫米飲下食後日三服按以上二方手太陰少陰藥也濟生桑白皮散治肺氣壅塞毒氣上攻眼目白睛腫脹日夜疼痛玄參桑白皮枳殼炒升麻杏仁炒旋覆花防風赤芍黃芩甘菊花甘草炙甜葶藶炒各一兩上㕮咀每半兩入姜三片煎按此又治風熱之劑也出太陽例養陽之劑東垣神效黃耆湯治渾身麻木不仁或頭面或手或腿腳麻木不仁兩目緊急縮小及羞明畏日或視物無力黃耆二兩人參八錢炙甘草一兩蔓荊子三錢白芍一兩陳皮半兩上㕮咀每五錢水煎臨臥熱服蓋氣聰明湯治飲食不節勞役形體脾胃不足得內障耳鳴或多年目昏暗視物不能此藥能令人目廣大久服無內外障耳鳴耳聾之患黃耆甘草人參各半兩升麻葛根各三錢蔓荊子一錢半芍藥黃柏酒炒各一錢上㕮咀每服三錢水煎臨睡熱服近五更再服之得腫更妙如煩悶或有熱漸加黃柏春夏加之盛暑夏月倍之若此一味多則不效人參補胃湯治勞役所傷飲食不節內障昏暗前黃耆湯減陳皮耆再減半加黃柏一兩酒拌透上㕮咀每服三四錢水煎食遠稍熱服後兩目廣大視物如童時覺兩腳踏地不知高下蓋冬天多服升陽藥故也病減住服按以上手足太陰少陰藥也滋陰之劑東垣連柏益陰丸羌活獨活甘草當歸尾制防風五味子各半兩石決明燒三錢草決明細黃芩黃柏知母黃連酒拌炒各一兩上件為細末煉蜜為丸如綠豆大每服五十丸漸加至百丸食遠茶清送下常多服補陽湯少服此丸滋陰腎氣丸此壯水之主以鎮陽光熟地黃三兩牡丹皮半兩生地黃四兩澤瀉茯苓各二兩半當歸尾山茱萸柴胡五味子乾山藥各半兩上件於石臼中杵為細末煉蜜丸如桐子大每服五七十丸鹽湯空心服按以上並少陰藥也養陽滋陰之劑局方菊睛丸治肝腎不足眼目昏暗常見黑花多淚枸杞子三兩蓯蓉酒浸炒巴戟去心各一兩甘菊花四兩上為末煉蜜丸如梧子大每五十丸溫酒鹽湯食遠任下東垣滋陰地黃丸治眼目瞳子散大於黃睛視物無的或卒然見非常之處熟地黃一兩生地黃一兩半柴胡八錢天門冬炙甘草枳殼各三錢人參地骨皮各二錢黃連五味子各三錢黃芩半兩當歸身半兩酒拌焙上件為細末煉蜜為丸如綠豆大每百丸溫茶清送下日進二次忌辛辣生冷之物按此二方足少陰之劑也前方主右腎此方主左腎之藥故亦異爾補陽湯治陽不勝其陰乃陰盛陽虛則九竅不通青白翳見於大眥及足太陽少陰經中郁遏足厥陰肝經氣不得上通於目故青白翳內阻也當於太陽少陰經中九原之下以蓋肝中陽氣衝天上行此乃先補其陽後於足太陽太陰標中標者頭也瀉足厥陰肝經火下伏於陽中乃次治也內經云陰盛陽虛則當先補其陽後瀉其陰是也每日清晨服補陽湯臨臥服益陰丸若天色變飲食不調俱不得服羌活獨活甘草人參熟地黃黃耆白朮各一兩澤瀉陳皮各半兩生地黃白茯苓知母炒各三錢柴胡三兩防風白芍各半兩肉桂一錢當歸身酒製三錢上同為粗末每服半兩水煎空心服之沖和養胃湯治內障眼得之脾胃元氣衰弱心火與三焦俱盛飲食失節形體勞役心不得休息故上為此疾服之神效柴胡七錢防風半兩羌活炙甘草黃耆各一兩半當歸制白朮升麻人參葛根各一兩白芍六錢白茯苓三錢乾薑一錢五味子二錢黃芩黃連各七錢上㕮咀每五六錢水煎食遠稍熱服按以上足三陽手足太陰藥也治障翳諸方龍木論還睛丸治眼內赤澀有花或黑或白或紅皆因肝臟積熱肺受風邪初患之時宜令針治諸穴內服此人參桔梗黃芩熟地黃防風茺蔚子車前子知母各二兩細辛五味子各二兩半玄參半兩上為末煉蜜丸如梧子大空心茶下十丸按本論治內障諸方與此相類者甚多姑存此法局方蟬花無比散治大人小兒風毒傷肝或為氣攻一切眼目昏暗漸生翳膜及久患頭風牽搐兩眼漸漸細小連眶赤爛茯苓甘草炙防風各四兩石決明鹽水煮研如粉川芎羌活當歸各三兩赤芍十兩炒蒺藜炒半斤蟬蛻二兩蒼朮十二兩蛇蛻一兩上為末每三錢食後米泔調茶清亦得按此足三陽太陰厥陰藥也蟬花散治肝經蘊熱毒氣上攻眼目赤腫多淚羞明一切風熱昏翳穀精草菊花蟬蛻羌活甘草炙白蒺藜炒草決明防風山梔川芎密蒙花木賊荊芥穗黃芩蔓荊子上為末每二錢食後茶清調下按此足太陽少陽厥陰手太陰藥也本事方羊肝丸菟絲子車前子麥門冬決明子茯苓五味子枸杞子茺蔚子苦葶藶蕤仁地膚子澤瀉防風黃芩杏仁炒細辛桂心青葙子各一兩熟地黃一兩半白羯羊肝只用子肝一片薄切新瓦上炒乾上為細末煉蜜為丸如梧子大每服三四十丸溫水下日三次按此足太陽少陰手太陰少陰藥也秘方撥雲退翳丸皇統年間醫官劉昌祖傳於世栝蔞根枳實甘草炙蔓荊子焙薄荷各五錢川芎木賊浸一宿焙密蒙花荊芥穗地骨皮羌活白蒺藜甘菊花各一兩蛇蛻黃連各三錢川椒七錢半炒去目當歸一兩半酒浸焙乾蟬蛻三錢上為細末煉蜜丸每兩作十丸每服一丸食後臨臥日進三服翳者米泔水下睛暗當歸湯下內障木香湯下按此足太陽厥陰手少陰藥也然翳膜之疾有氣血虛實或夾痰熱七情六淫或陰火動濕熱致者種種不同皆宜求責但以上法不能以盡病情之變學者宜擴充焉點洗諸方局方湯泡散治肝經風熱上壅眼目赤澀睛疼多淚赤芍當歸黃連等分上為末每二錢湯頓調熱洗日三五次御藥院方加荊芥三因立勝散治風熱攻眼隱澀羞明腫痛黃連秦皮防風黃芩等分上㕮咀水煎熱用新羊毫筆蘸刷洗眼金露膏除昏退翳截定疼蕤仁槌碎黃丹各一兩黃連半兩蜜六兩上先將黃丹炒令紫色入蜜攪勻下長流水四升以嫩柳枝五七莖一把定攪之次下蕤仁候滾十數沸又下黃連用柳枝不住手攪疑至升七八合罩蘺內傾藥在紙上慢慢滴之勿令塵汙如有瘀肉加硇砂末一錢上火上慢開入前膏子內用龍木論云患傷寒熱病後切不可點恐損眼也斯言可以為藥禁云寶鑑春雪膏治風熱上攻眼目昏暗癢痛癮澀難開多眵淚羞明疼痛或生翳膜黃連四兩銼用童便二升浸一宿去連用淬甘石南爐甘石十二兩淬便汁浸好黃丹六兩水飛硇砂一錢細研水調在盞內頓干為度乳香烏魚骨燒存性當歸各三錢麝香輕粉各少許白丁香半錢上各研另貯先用好蜜一斤四兩煉去蠟卻下甘石末不住手攪次下丹次下諸藥末不住手攪至紫金色不黏手為度搓作鋌子每用一粒新水磨化時時點之忌酒濕面蕎麥之類拔萃方㗜藥治偏頭疼眼疾蒼耳頭薄荷葉盆硝石膏各一錢亂文者乳香華細辛貫芎各半錢上為極細末早午夕三時㗜鼻寶鑑方無蒼耳乳香細辛有荊芥桔梗蟾光膏治遠年病目不通道路退去云膜須用十二月開成日合白砂蜜四兩用隔年蔥一根去須皮切短與蜜同煮去白膜要候蔥熟為度以綿濾淨紙取蠟面黃丹密陀僧各水飛三錢生用爐甘石火煆五錢水飛以上三味研極細傾入前蜜中桃柳無節者各一枝攪勻當歸赤芍杏仁湯泡去皮尖各五錢黃連去蘆淨二兩川芎半兩秦皮訶子皮防風石膏玄精石井泉石無名異玄參代赭石石決明以上十味各三錢㕮咀用雪水或長流水五升於銀器內熬至二升濾去滓淨再熬至一升傾入前藥蜜內銀器內慢火熬紫金色時再下後藥勿令過火乳香沒藥琥珀硃砂蕤仁各三錢以上五味先乾研極細入蕤仁研細水飛澄清極細才傾入前藥一同復熬以箸點藥於水中不散為度勿令過與不及取下於土中埋七日取出置於銀器或瓷器中如法收貯便再添入後細藥以桃柳枝攪勻南硼砂珍珠珊瑚枝龍腦各一錢麝香半錢上五味研極細入藥中封定如有取不盡藥用淨水斟酌洗渲熬過另放洗眼或膏子稠了傾些小調解灸雀目疳眼法寶鑑云小兒雀目夜不見物灸手大指甲後一寸內臁橫大頭白肉際灸一炷如小麥大小兒疳眼灸合谷二穴各一壯炷如小麥大在手大指次指兩骨間陷者中按灸法詳見資生等經茲不備錄
