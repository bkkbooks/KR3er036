body:
  text: 卷四十九婦人門論經閉不行內經陰陽別論云二陽之病發心脾有不得隱曲女子不月其傳為風消為息賁者死不治東垣曰婦人脾胃久虛或形羸氣血俱衰而致經水斷絕不行或病中消胃熱善食漸瘦津液不生夫經者血脈津液所化津液既絕為熱所爍肌肉消瘦時見渴躁血海枯竭病名曰血枯經絕宜瀉胃之燥熱補蓋氣血經自行矣此證或經適行而有子子不安為胎病者有矣或心包脈洪數燥作時見大便秘澀小便雖清不利而經水閉絕不行此乃血海乾枯宜調血脈除包絡中火邪而經自行矣內經所謂小腸移熱於大腸為痣瘕為沉月澀不利則月事沉滯而不利故云為痣瘕為沉也或因勞心心火上行月事不來安心補血瀉火經自行矣故內經云月事不來者胞脈閉也胞脈者屬心而絡於胞中令氣上迫肺心氣不得下故月事不來也曾治驗裴澤之夫人病寒熱而月事不至者數年矣已加喘嗽醫者率以蛤蚧桂附等投之曰不然夫人病陰為陽所搏溫劑太過故無益而反害投以涼血和血之藥則經行矣已而果然要略曰婦人之病因虛積冷結氣為證經水斷絕至有歷年血寒積結胞門寒傷經絡凝堅在上嘔吐涎唾久成肺癰形體損分在中盤結繞臍寒疝或兩脅疼痛與臟相連或結熱中痛在關元脈數無瘡經候不勻冷陰掣痛少腹惡寒或引腰脊下根氣街云云謹按良方言婦人月水不通由勞傷血氣致令體虛受風寒邪氣客於胞內損衝任之脈並手太陽少陰二經致胞絡內血絕不通如以上病機皆略之不議且血病經閉又豈止手太陽少陰二經耶然亦有不因寒熱或痰飲積聚疝瘕所致如七情所動其為氣病血從一也況陰道常虛不足者實多宜既血證門血屬陰難成易虛論及後丹溪先生等說論經水不調或紫或黑丹溪曰經水者陰血也陰必從陽故其色紅稟火色也血為氣之配氣熱則熱氣寒則寒氣升則升氣降則降氣凝則凝氣滯則滯氣清則清氣濁則濁上應于丹其行有常名之曰經為氣之配因氣而行成塊者氣之凝也將行而痛者氣之滯也來後作痛者氣血俱虛也色淡者亦虛也而有水混之也錯經妄行者氣之亂也紫者氣之熱也黑者熱之甚也今人但見其紫者黑者作痛者成塊者率指為風冷乘之而行溫熱之劑禍不旋踵矣良由病源論月水之病皆曰風冷乘之宜其相習而成俗也或曰黑者北方水之色也紫者黑之漸也非冷而何予曰經云亢則害承乃制熱甚者必兼水化所以熱則紫甚則黑也況婦人性執而鄙嗜欲加倍臟腑厥陽之火無日不起非熱而何若曰風冷必須外得設或有之吾恐千百而一二也按此論經病甚詳大抵不得率指為風冷所乘者此由良方所言世俗往往因之誤人故戒慎之也然冷證外邪初感入經必痛或不痛者久則鬱而變熱矣且寒則凝既行而紫黑故非寒也論經漏不止內經陰陽別論云陰虛陽搏謂之崩東垣曰婦人脾胃虛損致命門脈沉細而數疾或沉弦而洪大有力寸關脈亦然皆由脾胃有虛下陷於腎與相火相合濕熱下迫經漏不止其色紫黑如夏月腐肉之臭中有白帶者脈必弦細寒作於中中有赤帶者其脈洪數疾熱明矣必腰痛或臍下痛臨經欲行先見寒熱往來兩脅急縮兼脾胃證出見或四肢困熱心煩不得眠臥心下急宜大補脾胃而升舉血氣可一服而愈或人故貴脫勢人事疏少或先富後貧心氣不足其火大熾旺於血脈之中又致脾胃飲食失節火乘其中形質肌肉容顏似不病者此心病者不行於診故脾胃飲食不調其證顯矣而經水不時而下或適來適斷暴下不止治當先說惡死之言勸諭令拒死而心不動以大補氣血之藥舉養脾胃微加鎮墜心火之藥治其心補陰瀉陽經自止矣痿論云悲哀太甚則胞絡絕則陽氣內動發則心下崩數溲血也故本病曰大經空虛發則肌痹傳為脈痿此之謂也良方論曰婦人崩中由臟腑傷損衝任血氣俱虛故也衝任為經脈之海血氣之行外循經絡內榮臟腑若無傷損則陰陽和平而氣血調適若勞動過多致臟腑俱傷而衝任之氣虛不能約制其經血故忽然暴下或由陰陽相搏為熱所乘攻傷衝任血得熱則流散甚者至於昏悶其脈數疾小為順大甚者逆按此備言經脈致病之因本於臟腑傷損合前東垣所論極言因熱因虛或悲哀七情等所致病機殆無餘蘊矣脈法脈經曰尺脈滑血氣實婦人經脈不利少陰脈弱而微微則少血少陰脈滑而數者陰中則生瘡寸口脈浮而弱浮則為虛弱則無血脈來至狀如琴絃若少腹痛主月水不利孔竅生瘡肝弦沉主月水不利腰腹痛尺脈來而斷絕者月水不利寸關調如故而尺脈絕不至者月水不利當患小腹引腰痛氣滯上攻胸臆也經不通繞臍寒疝痛其脈沉緊此由寒氣客於血室血凝不行結積血為氣所沖新血與故血相搏故痛漏血下赤白脈遲者脈小虛滑者生急疾者大緊實數者死暴崩下血寸口脈微遲尺脈微弦微遲為寒在上焦但吐爾今尺脈微弦如此即小腹痛引腰脊痛者必下血也寸口弦而大弦則為減大則為芤減則為寒芤則為虛寒虛相搏脈則為革婦人則半產漏下尺脈急而弦大風邪入少陰之經女子漏自下赤漏下赤白日下血數斗脈急疾者死遲者生尺寸脈虛者漏血漏血脈浮不可治也論赤白帶下機要云赤者熱入小腸白者熱入大腸其本實熱冤結於脈不散故為赤白帶下也冤屈也結也屈滯而病熱不散先以十棗湯下之後服苦楝丸大玄胡散調下之熱去濕除病自除也按此止是論有餘之證也論見下良方論云帶下起於風氣寒熱之所傷或產後早起不避風邪風邪之氣入於胞門或中經脈流轉臟腑而發下血名為帶下若傷足厥陰肝之經其色青如泥傷手少陰心之經其色赤如紅津傷手太陰肺之經其色白形如涕傷足太陰脾之經則其色黃如爛瓜傷足少陰腎之經則色黑如衃血此其因也按此言風氣寒熱之所傷諸臟致證似言外邪大抵此證多有本於陰虛陽竭榮氣不升經脈凝泣衛氣下陷精氣累滯於下焦奇經之分蘊積而成其病或醉飽房勞服食燥劑所致也白物如涕之狀故言帶者亦病形也經云帶脈為病而得名而白者屬氣赤屬血東垣舉脈訣云崩中曰久為白帶漏下多時骨木枯言崩中者始病血崩久則血少復亡其陽故白滑之物下流不止此可見未得全拘於帶脈矣詳病亦有濕痰流注於下焦或腎肝陰淫之濕勝或因驚恐而木乘土位濁液下流或思慕為筋痿內經所謂二陽之證發心脾是也或余經濕熱屈滯於少腹小腹之下而病本殊則皆為氣血虛損榮衛之精氣累滯而成其病標一也前人立論殆盡病機則治法無定若戴人以帶下得兩手脈俱滑大而有力乃上用宣去痰飲下以導水丸泄濕熱繼以淡劑滲之此為瀉實也如其諸脈微細或沉緊而澀按之空虛或洪大而澀按之無力正為元氣不足陰虛筋痿虛極中寒等證東垣有補陽調經固真等例乃兼責虛也丹溪先生治因濕痰下注用海石南星椿根皮之類較之前人下之而復吐以提其氣或發中兼補補中兼利燥中兼升發潤中益氣溫而兼收澀之例不同蓋病機有輕重淺深之異爾論師尼寡婦異乎妻妾之治寶鑑曰宋褚澄療師尼寡婦別制方蓋有為也此二種寡居獨陰無陽欲心萌而多不遂是以陰陽交爭乍寒乍熱全類溫瘧久則為勞史記倉公傳載濟北王侍人韓女病腰背痛寒熱眾醫多以為寒熱倉公曰病得之欲男子不可得也何以知診得其脈肝脈弦出寸口是以知之蓋男子以精為主婦人以血為主男子精盛以思室女人血盛以懷胎也如厥陰脈弦出寸口又上魚際則陰盛可知故知褚氏之言有謂矣論胎產諸證病機機要云治胎產之病從厥陰經論之無犯胃氣及上二焦為之三禁不可汗不可下不可利小便發汗者同傷寒下早之證利大便則脈數而已動於脾利小便則內亡津液胃中枯燥製藥之法能不犯三禁則榮衛自和而寒熱止矣如發渴而白虎氣弱則黃耆血刺痛而用當歸腹中痛而加之芍藥大抵產病天行從增損柴胡雜證從增損四物宜詳察脈證而用之謹按以上云胎產禁例大抵主於元氣本病為要至於病體所因不同學者又必當處於權變也且胎前之證良方悉具但每證治例殊少如胎漏胎痛子煩子腫等證出方皆是治本病之例設所因不同或有所兼之證如胎漏下血亦有氣虛血熱腹痛亦有濕熱者或形志苦藥不一七情所動氣動血病胎氣即損雖治例未能以盡其變然欲學者臨證自推充而行之爾今於諸證未能一一悉具聊以證治數例附於後云胎自墮論丹溪曰陽施陰化胎孕乃成血氣虛乏不足榮養其胎則墮譬如枝枯則果落藤痿則花墜又有勞恐傷情內火便動亦能墮胎譬如風撼其木人折其枝也火能消物造化自然病源乃謂風冷傷於子臟而隨此未得病情者也予見賈氏婦但有孕至三個月左右必墮診其脈左手大而無力重則澀知其血虛也以其壯年只補中氣使血自榮時正初夏教以濃煎白朮湯下黃芩末一錢與數十帖得保全而生因而思之隨於內熱而虛者於理為多曰熱曰虛蓋孕至三月上屬相火所以易墮不然何以黃芩熟艾阿膠等為安胎妙藥耶難產論丹溪曰世之難產者往往見於鬱悶安佚之人富貴奉養之家若貧賤者鮮有之古方止有瘦胎飲一論而其方為湖陽公主作也恐非至到之言蓋用之者其難自若子族妹苦於難產遇胎則觸而去之予甚憫焉視其形肥而勤於女工知其氣虛久坐氣不運而愈弱兒在胞胎因母氣虛不能自運耳當補其母之氣則兒健易產令其有孕至五六月來告遂於大全良方紫蘇飲加補氣藥與之數十帖因得男甚快因以此方隨母之性稟與時令加減服者無不應用臨蓐時腹不覺痛產母亦無病因名方曰達生散云論局方胎產用藥之誤丹溪曰或問婦人一門無非經候胎產用藥溫熱於理頗通吾子其妄言乎予曰婦人以血為主血屬陰易於虧欠非善於調攝者不能保全也余方是否若神仙聚寶丹則有不能忘言者其方治血海虛寒虛熱盜汗理宜補養琥珀之燥麝香之散可以用乎面色痿黃肢體浮腫理宜導濕乳香沒藥自可治血可以用乎胎前產後虛實不同逐敗養新攻補雜病積塊堅證赤白崩漏宜於彼者必妨於此而欲以一方通治乎世人以其品貴名雅又喜其常服可以安神去邪令人有子殊不知積溫成熟香竄散氣服者無不被禍自非五臟能言醫者終不知覺及至變生他證悖理肉汁發陰經之火易成內傷之病先哲具有訓戒或以羊雞濃汁作糜而又常服當歸丸當歸建中湯四聖理中丸雖是滋補悉犯桂附乾薑僣熱之劑臟腑無寒何處消受若夫兒之初生母腹頓寬便啖雞子且吃火鹽不思雞子難化火鹽發熱展轉為病醫者不識委指他病率爾用藥寧不誤人予每見產婦之無疾者必教以卻去黑神散與夫雞子火鹽諸般肉食且與白粥將理間以些小石首鯗魚令甘淡食之至半月以後與少肉雖雞子亦須豁開煮之大能養胃卻痰彼當富貴之家驕恣之婦率有白帶頭風氣痛膈滿痰逆口乾經事不調發脫體熱皆是陽勝陰虛之病天生血氣本自和平日勝日虛又焉知此等謬妄有以啟之耶論婦人服熱劑求子之誤丹溪曰無子之因多起於父氣之不足豈可獨歸罪於母血之虛寒況母之血病奚止虛與寒而已哉然古方治婦人無子惟秦桂丸一方其性熱其辭確今之欲得子者率皆服之無疑夫求子於陰血何至輕用熱劑耶或曰春氣溫和則物生冬氣寒凜則物消不假熱劑何由子髒得暖而成胎予曰詩言婦人和平則樂有子和則血氣不爭平則陰陽不乖今得此丸經血必轉紫黑漸成衰少或先或後始則飲食驟進久則口苦舌乾陰陽不平血氣不和焉能成胎縱使有成子亦多病以其能損真陰也鄭憲史子生七個月得淋云云見淋閟門謹按婦人無子多因經血不調或陰虛血少積聚痰氣嗜欲等致種種不同奚止虛與寒而已然經寒者亦有之但不可例為常法爾是以先生論此戒後人不得病機之的者斯藥勿妄行也況無子之因亦豈止於婦室者如東垣云李和叔問中年以來得一子至一歲之後身生紅絲瘤不救後三四子至一二歲皆病瘤而宛何緣至此疾翌日思之謂曰汝乃腎中伏火精氣中多有紅絲以氣相傳生子故有此疾俗名胎瘤是也汝試視之果如其言遂以滋腎丸數服以瀉腎中火邪補真陰不足忌酒辛熱之物其妻與六味地黃丸以養陰血受胎五月之後以黃芩白朮二味作散啖五七服後生子至三歲前證不復作今已年壯噫合觀先生以上所論則其旨深矣婦人治法調經之劑局方四物湯治衝任虛損月水不調臍腹㽲痛當歸川芎白芍藥熟地黃各等分上㕮咀每半兩水煎服按此手足太陰厥陰藥也逍遙散治血虛煩熱月水不調臍腹脹痛痰嗽潮熱甘草炙半兩當歸茯苓白芍白朮柴胡各一兩上㕮咀每半兩入姜薄荷葉煎服按此足三陽三陰藥也散血中濕熱之劑膠艾湯治勞傷血氣衝任虛損月水過多淋漓不斷阿膠炒川芎甘草炙各二兩當歸艾葉炒各三兩熟地黃白芍各四兩上㕮咀每半兩水煎按此溫經補血之藥也厥陰例良方溫經湯治婦人血海虛寒月水不利當歸川芎芍藥桂心牡丹皮莪朮各半兩人參甘草牛膝各一兩上㕮咀每五錢水煎服薑黃散治血臟久冷月水不調臍腹刺痛當歸牡丹皮延胡各二兩芍藥三兩川芎紅花桂心莪朮各一兩川薑黃四兩上為末每一錢水煎服酒同煎按此二方通經之劑破血之藥非止於溫經也臟冷氣血滯者可用姑存之加減四物湯經候微少漸漸不通手足煩疼漸瘦生潮熱脈微數本方去地黃川芎加澤蘭葉三倍甘草半分經候過多本方去熟地黃加生地黃經行身熱脈數頭昏本方加柴胡黃芩各半兩經行微少或脹或疼四肢疼痛加延胡沒藥白芷與本方等淡醋湯調下末子經候不調心腹㽲痛只用芎歸二味名君臣散鹿茸丸治衝任虛損又為風寒所乘尺脈微小甚者可灸關元穴鹿茸炙赤石脂禹餘糧各一兩續斷二兩柏葉附子炮熟地黃當歸酒浸艾葉上為末酒糊丸梧子大每五十丸空心溫酒下按此足少陰厥陰藥也今人多用之故收入治血虛濕勝帶下甚捷元戎加味四物湯氣充經脈故月事頻並臍下多痛本方加芍藥經欲行臍腹絞痛本方加玄胡檳榔苦楝木香經水過多本方加黃芩白朮經水澀少本方加葵花紅花經水適來適斷或有往來寒熱宜先服小柴胡去寒熱後以物湯和之丹溪加味四物湯經候過而作疼血氣俱虛也宜本方對四君子湯服之經候將來作痛者血實也本方加桃仁黃連香附經水不及期血熱也本方加黃連過期血少也本方加參朮帶痰加半夏陳皮過期紫黑有塊者血熱也必作痛本方加香附黃連過期而淡色者痰多也芎歸二味合二陳湯服紫色成塊者熱也本方加黃連柴胡肥人不及日數而多痰者多血虛有熱本方加香附南星半夏黃連白朮瘦人血枯經閉者本方加桃仁紅花或越鞠丸方見血門簡易當歸散治經候不勻或三四月不行或一月再至或婦人天癸過期經脈不調當歸川芎白芍黃芩白朮各半兩山茱萸肉一兩半上為末每二錢空心溫酒調下日三次按此足厥陰少陰藥也寶鑑生地黃丸治婦人血實厥陰脈弦而長病惡風體倦乍寒乍熱面赤心忪或時自汗如傷寒狀宜服抑陰藥生地黃柴胡秦艽黃芩各半兩芍藥一兩上末蜜丸梧子大每三十丸烏梅湯吞下日三次按此手足少陰太陰足太陽藥也謹按以上諸方皆調理法也然血分成水氣腸覃等證詳見各門茲不備錄大抵經病實者破之結者散之虛者補之要在適事為故也理氣之劑澹寮煮附丸治經候不調血氣刺痛腹脅膨脹頭暈噁心崩漏帶下並宜服之香附子擦其皮不以多少米醋浸一日用瓦銚煮冷醋盡上醋糊為丸梧子大日乾每五十丸淡醋湯下一方香附一斤艾葉四兩當歸二兩制同名艾附丸嚴氏抑氣散治婦人氣盛於血變生諸證頭暈膈滿香附四兩茯神甘草炙各一兩陳皮二兩上為末每二錢食前沸湯調下按此方主於氣煮附丸則氣中之血藥也然氣鬱甚者宜於氣證門選用不必拘此東垣益胃升陽湯治婦人經候不調或血脫後脈弱食少水泄日三二行黃耆二錢人參甘草炙當歸身陳皮各一錢白朮三錢升麻柴胡各半錢炒曲一錢半黃芩半錢秋去之上㕮咀每半兩水煎腹痛加芍藥補中益氣湯治婦人室女經候不調脈微食少體倦或熱方見熱門按此二方氣血之藥血脫益氣之大法也紺珠正氣天香湯治婦人一切氣氣上湊心心胸攻築脅肋刺痛月水不調臺烏藥二錢香附子八錢陳皮蘇葉各一錢乾薑半錢上㕮咀每七八錢水煎服謹按婦人經病多有因於七情六郁致者故集以上例以備其義大抵氣行不失其常則經血亦行也通經之劑良方通經丸治婦人室女經候不通臍腹疼痛或成血瘕川椒炒蓬朮乾漆炒當歸一錢半青皮乾薑大黃桃仁炒川烏桂心各一錢上為末將一半用米醋熬成膏和余藥成劑臼中杵之丸如梧子大陰乾每三五十丸醋湯下嚴氏方無川烏有紅花加味四物湯嚴氏名六合湯治婦室經事不行腹中結塊疼痛腰痛本方加桂蓬朮各等分上㕮咀每四錢水煎服紅花當歸散治婦人血臟虛竭或積瘀血經候不行時作腹痛腰胯重疼小腹堅硬及室女經不通紅花當歸尾紫葳牛膝甘草蘇木銼各三兩白芷桂心各一兩半赤芍九兩劉寄奴五兩上為細末空心熱酒調三錢一名凌霄花散桂枝桃仁湯治經不通繞臍寒疝痛其脈沉緊此由寒客於血室血凝不行桂枝芍藥生地黃各二兩桃仁五十個甘草一兩上為粗末每服五錢水煎入薑棗地黃通經丸治經不行結積成塊臍下如覆杯熟地黃三兩虻蟲去頭足炒水蛭糯米炒桃仁各五十個上為細末煉蜜丸如梧子大空心溫酒下五丸未知加至七丸嚴氏琥珀散治婦人室女月事凝滯腹脅脹痛及血逆攻心眩暈不省劉奇奴牡丹皮熟地黃玄胡索烏藥赤芍莪朮三稜當歸桂心各一兩上用前五味用烏豆一升生薑半斤切片米醋四升同煮豆爛為度焙乾入後五味同為細末每服二錢用溫酒調服空心食前戴人玉燭散治經候不通腹脹或痛四物湯對調胃承氣湯上㕮咀水煎服按以上諸方並出厥陰例藥也然有本於氣虛氣鬱血虛痰積等因不同宜於前調經理氣諸方內選用治崩漏之劑生地黃散治經漏下血脈虛洪經水紫黑方見血證門簡易黃芩湯治崩中下血陽乘陰經水沸溢黃芩不以多少上為末每一二錢燒秤錘淬酒調下按此二方治熱之劑也一法用此味治天癸當住每月卻行或過多不止出瑞竹堂方名芩心丸伏龍肝散治氣血勞傷衝任經虛血非時崩下臍腹冷痛脈遲弱食少或赤白帶下伏龍肝赤石脂麥門冬各一兩甘草炙半兩川芎三兩當歸乾薑七錢半桂半兩艾葉三兩熟地黃二兩上件為粗末每四錢入棗煎按此治寒例藥補血固虛之劑也備金散治婦室血崩不止香附子四兩炒當歸尾一兩二錢五靈脂一兩炒上為末每五錢淡醋湯調空心食前服一方只用香附一味澹寮茯苓補心湯治婦人亡血過多或氣逆心悶四物湯一分半參蘇飲三分上㕮咀入姜煎按以上方理氣補榮之劑也良方縮砂散治血崩新縮砂不以多少瓦上炒香為細末米飲調下三錢五靈脂散治血山崩不止靈脂十兩水煎去滓澄清再煎成膏入神麯二兩和丸如梧子大每三二十丸溫酒下荊芥散治崩中不止用此一味於麻油燈上燒焦為末每三錢童便調下瑞竹堂方蒲黃散治崩中不能止破故紙蒲黃千古石灰各等分炒過上為末每二三錢淡酒或淡醋湯調下按以上諸方皆劫劑也東垣升麻除濕湯治婦人女子漏下惡血月事不調或暴崩不止多下水漿之物皆由飲食失節或勞傷形體或素有心氣不足因飲食勞倦致令心火乘脾其脈緩而弦急按之洪大皆脾土受邪也柴胡羌活蒼朮黃耆各一錢半防風甘草炙升麻藁本各一錢蔓荊子七分獨活當歸各半錢上㕮咀作一服水煎食前服涼血地黃湯治婦人血崩是腎水陰虛不能鎮守胞絡相火故血走而崩也生地黃半錢黃連羌活柴胡防風各二分黃柏知母升麻藁本細辛川芎各二分甘草一錢荊芥穗蔓荊子黃芩各一分當歸半錢紅花少許上㕮咀作一服水煎按以上二方升劑也經漏不止氣血下陷非此不能治當歸芍藥湯治婦人經脈漏下不止其色鮮紅或先因勞役脾胃虛損氣短氣逆自汗不止身熱食懶大便或泄體倦無力黃耆一錢半白朮蒼朮當歸身白芍各一錢熟地黃半錢甘草炙生地黃各三分陳皮半錢柴胡二分上㕮咀作一服水煎按此補劑也治帶下之劑千金方治帶下脈數者枸杞根一兩生地黃五錢上二味酒煮一升至三合作一服按此治熱例藥也元戎六合湯治婦人赤白帶下脈沉微腹痛或陰中痛四物湯四兩桂附子炒五錢上㕮咀每五錢水煎食前服按此治寒之劑也宣明導水丸治濕熱鬱於下焦之分赤白帶下不止躁熱煩渴方見濕門按此治濕熱之藥下劑也嚴氏當歸煎丸治赤白帶下腹內疼痛不飲食羸瘦當歸赤芍炒牡蠣煆熟地黃阿膠炒白芍炒續斷酒浸各一兩地榆五錢上為末醋糊丸梧子大每五十丸空心米飲下按此治血虛之劑潤燥藥也良方白芷散治赤白帶下白芷一兩海螵蛸二個燒胎髮一團煆上為細末空心溫酒調下二錢伏龍肝散治婦人赤白帶下久患不瘥肌瘦黃瘁多困乏力棕櫚不以多少燒灰火然急以盆蓋蔭伏龍肝於鍋灶直下取炒令煙盡屋梁上塵懸長者如無灶頭虛空中有炒令煙盡上三味等分碾和令停入龍腦麝香各少許每服二錢溫酒調下淡醋湯亦可患十年者半月可安按以上方皆劫劑也益母草散治赤白惡露下不止益母草開花時採陰乾為細末空心溫酒調二錢日三服東垣固真丸治白帶久不止臍腹冷痛陰中亦然白石脂一錢火燒赤乾薑炮四錢黃柏酒製白芍各一錢白龍骨二錢柴胡一錢當歸身二錢上除石脂龍骨另研外同為細末水煮糊丸如桐子大每十丸食前煎水下按此寒熱之劑又止澀藥也桂附湯治白帶腥臭多悲不樂大寒肉桂一錢附子三錢黃柏知母甘草炙升麻各半錢黃耆一錢半人參七分上㕮咀作一服水煎食前服按此補陽氣極虛用黃柏等為引用又升降陰陽藥也補經固真湯治白帶下流不止始病崩中日久血少復亡其陽故白滑之物不止也柴胡甘草郁李仁研黃芩各一錢乾薑二錢橘皮半錢人參二錢白葵花去萼一朵上㕮咀水煎空心服按此補例藥也衛生湯治帶下不止脈微弱腹痛白芍炒當歸各二兩黃耆三兩甘草一兩上㕮咀或末每五錢水煎空心服下苦楝丸三十粒按此補血之劑也苦楝丸治赤白帶下苦楝碎酒浸茴香炒當歸各等分上為末酒糊丸桐子大每五十丸空心酒下按此謂邪入小腸故用此燥丙藥也酒煮當歸丸治㿗疝白帶下注腳氣腰以下如在冰雪中以火焙乾厚衣蓋其上猶寒冷不任寒之極者面白如枯魚之象肌肉瘦削小便不止與白帶常流不禁病甚者當歸一兩茴香半兩良薑附子炮各七錢以上四味㕮咀以好酒一升半煮至干再焙乾炒黃鹽全蠍各三錢丁香苦楝甘草炙各半錢柴胡二錢升麻木香各一錢玄胡索四錢上與前同為細末酒煮糊為丸如梧子大每五七十丸空心淡醋湯下忌酒濕面油膩物按此升陽勝濕之劑氣血藥也升陽燥濕湯治白帶下陰戶痛控心急痛身黃皮緩身重如山陰中如水防風良薑乾薑郁李仁甘草各一錢柴胡一錢三分橘皮黃芩各半錢白葵花七朵上㕮咀分作二服水煎空心服按此升散之劑也坐藥勝陰丹三柰子川烏頭大椒各半錢柴胡羌活各二分全蠍三個蒜七分甘松二分破故紙八分與蒜同煮升麻枯礬各二分麝香少許上為細末煉蜜丸如彈子大綿裹留系在外納丸藥於陰戶內按此劫藥也灸法氣海一穴在臍下一寸五分主月事不調帶下崩中因產惡露不止統臍㽲痛灸五壯帶脈二穴在季脅下一寸八分陷者宛宛中灸七壯主婦人月水不調及閉不通赤白帶下氣轉運背引痛不可忍血海二穴在膝臏上內膁白肉際二寸中治女子漏下惡血月事不調逆氣腹脹灸三壯陰谷二穴在膝內輔骨後大筋下小筋上按之應手屈膝取之治婦人漏血不止腹脹滿不得息小便黃如蠱膝如錐不得屈伸小腹引痛灸三壯關元一穴在臍下四寸主婦人帶下瘕聚因產惡露不止斷產下經冷可灸百壯安胎之劑金匱方當歸散妊娠宜常服之當歸黃芩白芍川芎各一兩白朮半兩上五味為末酒飲調服方寸七日二次按此方養血清熱之劑也瘦人血少有熱胎動不安數曾半產者難產者皆宜服之以清其源而無後患也千金茯苓半夏湯治妊娠惡阻心悶吐逆頭眩四肢怠惰煩疼痰逆嘔吐惡寒自汗黃瘦半夏泡七次炒黃茯苓熟地黃各三兩橘紅細辛人參芍藥紫蘇川芎各二兩苦梗甘草各半兩上㕮咀每四錢水煎空心服局方參橘散治妊娠三月惡阻吐逆不食或心虛煩悶橘皮茯苓各一兩麥門冬白朮厚朴制甘草炙各半兩上㕮咀每四錢入姜竹茹煎一方加人參名竹茹湯良方名人參橘皮湯良方膠艾湯治妊娠或因頓僕胎動不安腰腹疼痛或胎上搶心或去血腹痛膠一斤炙艾葉數莖指迷方加秦艽上二味以水五升煮取二升分三服阿膠散嚴氏方作膠艾湯不問妊娠月數深淺或頓僕或因毒藥胎動不安腰痛腹滿搶心短氣熟地黃艾葉白芍川芎黃耆阿膠當歸甘草炙各一兩上㕮咀每四錢入薑棗煎金匱方無黃耆佛手散治妊娠傷胎下血當歸三錢川芎二錢上㕮咀水煎食前服安胎散治妊娠自高墜下或為重物所壓觸動胎氣腹痛下血胃虛嘔逆並宜服之縮砂不以多少炒過上為末每二錢用酒調服艾鹽湯亦可簡易方知母飲治妊娠心脾壅熱咽膈渴苦煩悶多驚赤茯苓黃芩黃耆各三兩知母麥門冬甘草各二兩上㕮咀每四錢入桑白皮熟時再入竹瀝些小服竹葉湯治妊娠心驚膽怯終日煩悶名曰子煩白茯苓四兩防風麥門冬黃芩各三兩上㕮咀每四錢入竹葉五片水煎外臺方有竹瀝二合無葉一方有黃芩知母拔萃方枳殼湯治胎漏下血或因事下血枳殼炒黃芩各半兩白朮一兩上為末每一錢白湯調下宣明方無枳殼二黃散治胎漏下血生地黃熟地黃上為末煎白朮枳殼湯調下二錢或錢半按良方論云婦人有子之後血蓄以養胎矣豈可復能散動耶所以然者有娠而月信每至是亦未必因血盛也若謂榮經有風則經血喜動以其風勝則可此例可見胎漏之因非止一端也治者宜擴充焉地黃當歸湯治胎痛當歸一兩熟地黃二兩上為末每半兩水煎良方等分為末蜜丸名內補丸許學士云大率婦人妊娠唯在抑陽助陰蓋此等藥甚多然胎前藥唯惡群隊若陰陽交錯別生他病唯是枳殼散所以抑陽四物湯所以助陰故爾然枳殼散瘥寒若單服之恐有胎寒腹痛之疾以內補丸佐之則陽不至強陰不至弱陰陽調停有益胎嗣此前人未嘗論及也愚詳陰陽調停不若不服為愈全生方白朮散治妊娠面目虛浮肢體腫如水氣名曰子腫白朮一兩生薑皮大腹皮陳皮白茯苓各半兩上為末每二錢米飲調下指迷方有桑白皮無術李氏天仙藤散治妊娠自三月成胎之後兩足自腳面漸腫腿膝以來行步艱辛以至喘悶飲食不美狀似水氣至於腳指間有黃水出者名曰子氣天仙藤洗略炒香附子炒陳皮甘草烏藥等分上為末每服三錢水煎入姜三片木瓜三片紫蘇三葉同煎空心食前服日三次腫消止藥按此二方治證例相類故並錄之嚴氏紫蘇飲治胎氣不和湊上心腹脹滿疼痛謂之子懸大腹皮川芎白芍陳皮蘇葉當歸各一兩人參甘草各半兩上㕮咀每四錢入薑蔥煎安榮散治妊娠小便澀少遂成淋澀名曰子淋麥門冬通草滑石各三錢當歸燈芯甘草各半兩人參細辛各一兩上為細末每二錢煎麥門冬湯調下羚羊角散治妊娠中風頭項強直筋脈攣急言語謇澀痰涎不利或時發搐不省人事名曰子癇羚羊角鎊川獨活酸棗仁炒五加皮各半錢薏苡仁防風當歸川芎茯神杏仁各四分木香甘草各二分半上㕮咀每五錢入姜煎八味丸治妊娠小便不通名曰轉胞亦治子淋方見補虛門丹溪參朮散治妊娠轉胞四物湯加人參白朮半夏制陳皮甘草上㕮咀入生薑煎空心服按丹溪曰轉胞之病胎婦之稟受弱者憂悶多者性急躁者食味厚者庸或有之古方皆用滑利藥鮮有應效因思胞不自轉為胎所壓展在一邊胞系了戾不通耳胎若舉起居於其中胞系自疏水道自利然胎之墜下必有其由近吳宅寵人患此兩脈似澀重則弦左稍和予曰此得之憂患澀為血少氣多則胎氣弱而不能舉弦為有飲血少則胎弱氣多有飲中焦不清而隘則胞知所避而就下乃以以上藥與服隨以指探喉中吐出藥汁候少頃氣定又與之次早亦然至八帖安此法恐偶中耳後又治數人亦效未知果何如耶仲景云婦人本肌肥盛頭舉自滿今反羸瘦頭舉中空胞系了戾亦多致此病但利小便則愈宜服腎氣丸以中有茯苓故也地黃為君功在補胞若頭舉等語其義未詳恐有能知之者按以上安娠諸法皆氣血本病之藥故非辛熱苦寒之劑蓋產前當清熱養血也然有外感風寒內傷生冷以辛熱散之溫之大積大聚以藥衰其大半而止經曰婦人重身毒之何如岐伯曰有故無殞故無殞也斯法亦不為本病之謂也故任娠諸證例藥詳見大全良方茲不備錄束胎丸第八個月服之黃芩炒夏一兩春秋七錢半冬半兩白朮二兩茯苓七錢半陳皮三兩忌火上為末粥為丸桐子大每三四十丸空心白湯下達生散又名束胎散大腹皮三錢人參陳皮各半錢白朮白芍各一錢甘草炙二錢紫蘇葉莖半錢當歸尾一錢或加枳殼縮砂上㕮咀作一服入青蔥五葉黃楊腦七個煎服於八九個月服十數帖甚得力或夏加黃芩春加芎冬依正方或有別證以意消息又方於第九個月服黃芩怯弱人減半白朮一兩滑石枳殼各七錢半上為末粥丸如桐子大每服三十丸空心熱湯下按世俗婦室妊娠鮮有服束胎藥者蓋局方良方諸法未能以盡其妙用者多輒動娠故率不敢行然丹溪先生因制以上諸方以備世俗取擇實好生君子之一端也滑胎易產藥枳殼散治妊娠胎肥壅隘難產臨月服之粉草一兩炙商州枳殼二兩炒上為細末百沸湯點二錢空心日三服一方枳殼六兩甘草一兩一方有糯米半升淘控干同炒為末溫隱居加當歸木香各等分又法張氏方治妊娠胎肥動止艱辛臨月服之縮胎易產治氣寬膈枳殼五兩甘草一兩半香附子二兩炒上為細末薑湯點服神寢丸滑胎易產入月服之通明乳香半兩枳殼一兩上為末煉蜜丸梧子大空心酒下三十丸陸氏名寤生丸乳香只一分保氣散安胎易產或居處失宜偶然頓僕胎動胎痛漏胎下血兼服佛手散香附子四兩山藥二兩縮砂一兩木香四錢粉草一兩益智仁紫蘇各半兩上為細末白湯點二錢入月服之益元散入月服之滑胎易產方見前產間藥施氏催生如意散臨產腰疼方可服之人參乳香各一錢末辰砂半錢上三味一處研臨產急用雞清一個調藥末再用生薑汁調冷服如橫生倒產即時端順而生催生佛手散方見前嚴氏無憂散治胎肥氣逆或人瘦血少胎弱臨蓐難產者便產須知名保生無憂散當歸川芎白芍各一兩枳殼炒五錢乳香三錢木香一錢半血餘灰二錢甘草上為末每二錢水煎服簡易集效黑散子催生兼治橫生逆產百草霜白芷末等分上和勻每二錢童便並好醋調稀更以沸湯調下局方催生丹治產婦生理不順產育艱難或橫或逆並宜治之十二月兔腦髓去皮膜研如泥乳香另研細如泥母丁香二錢半麝香另研五分半上三味和勻以兔腦和丸如雞頭大陰乾油紙裹每一丸溫水下即產兒手中握出良方催生乳香膏名如神開骨膏又名乳珠丹一法滴乳為末豬心血為丸五月五日午時合上如桐子大硃砂為衣每一粒面東酒吞下未下再服如胎乾者先與四物湯秘方益母丸專治橫生逆產難產並安胎順氣神效益母草五月採陰乾石臼搗為末煉蜜丸如彈子大每一丸或二丸臨產以童便和溫酒送下氣不順木香參湯送下或作小丸吞服亦可獨聖散黃葵子炒七十粒研爛酒服濟君急若也臨危難產時免得全傢俱哭泣小品療橫生倒產手足先出方用粗針刺兒手足入二分許兒得痛驚轉即縮自當回順而生一法鹽塗兒足底又可急搔爪之並以鹽摩產婦腹上即產機要半夏湯治胎衣不下或子死腹中或子衝上而昏悶或血暴下及胎幹不能產者半夏曲一兩半桂七錢半桃仁三十個炒大黃半兩上為細末先服四物湯三兩次服此生薑同煎良方治死胎不下其證產母舌青黑及胎上冷者子已死或指甲青舌青脹悶甚者口中作屎臭先以平胃散一帖作兩服每服酒水各一盞同煎至一盞卻投朴硝半兩研細再煎數沸溫服胎化血水而下鹿角散治因熱病胎死腹中鹿角屑一兩上水煎入蔥白五莖豉半合丹溪云燒過治產後血暈當歸湯治子死不下川當歸三兩川芎二兩上為末水酒各半調下四錢未下再服一方只用川芎末酒煎服香桂散下死胎麝香半錢桂心三錢為末上和勻只得一服溫酒調下一方朴硝末二錢溫童便調下必效方牛膝湯治胎衣不出腹臍堅脹急痛即殺人服此胞即爛下死胎牛膝瞿麥各四兩當歸三兩通草六兩滑石八兩葵子五兩上切細以水九升煮取三升分三服宣明硇砂散治胎死腹中不下硇砂研細當歸各一兩上二味研極細只分作二服溫酒調下如重車行五里不下再服局方至寶丹見本方花蕊石散治胎死腹中及胎衣不下花蕊石一斤上色硫黃四兩上二味相拌勻煉製見良方黑龍丹治產後一切血疾產難胎衣不下危急惡疾垂死者但灌得下無不全活當歸五靈脂川芎良薑熟地黃各一兩銼以沙合盛赤石脂泥封紙筋鹽泥固濟炭火十斤煆令通赤去火候冷取開看成黑糟色取細研卻入後藥百草霜五兩硫黃乳香各一錢半花蕊石琥珀各一錢上五味並細研與前藥再研如法修制和勻以米醋煮麵糊丸如彈子大每服一丸炭火燒令通赤投於生薑自然汁與童便入酒漉出控乾研細只此酒下一方取死胎用烏雞一隻去毛細切水煎三二升湯通手用衣帛蘸摩臍下胎自出產後雜方局方芎歸湯治產後去血過多暈煩不省當歸芎藭等分上㕮咀每半兩水煎服腹疼加桂名桂香散一名琥珀散治腹中痛急自汗頭眩少氣加羊肉名羊肉湯黑神散治產後惡露不盡胎衣不下血氣攻心及腹痛不止黑豆炒半升熟地黃當歸肉桂乾薑甘草白芍蒲黃各四兩生地黃局方良方俱無此味便產須知有之上為末每二錢酒童便各半調服一名烏金散按此手少陰足厥陰太陰陽明表裡血藥也立方大意見前丹溪之論矣今人以為治產後百病率用之故收入然用者自宜通變人參當歸散治產後去血過多血虛則陰虛陰虛則內熱心煩短氣自汗頭痛熟地黃人參當歸桂麥門冬各一兩白芍二兩炒上㕮咀每五錢入竹葉生薑煎當歸黃耆湯治產後失血多腰疼身熱自汗當歸三兩黃耆二兩白芍一兩半炒上㕮咀每五錢入姜煎失笑散治產後心腹絞痛欲死及兒枕痛蒲黃炒五靈脂各等分上為末醋調二錢熬成膏湯化服之一法治小兒枕痛各單服經驗方三聖散治兒枕痛當歸桂玄胡索上等分為細末每服二錢熱酒或童便調下嚴氏清魂散治產後血暈昏不知人更宜取漆器於床前燒熏之頻置醋炭更服此藥澤蘭葉人參各一兩荊芥穗四兩甘草炙八錢川芎二兩上為末每二錢熱湯溫酒各半盞調下抵聖湯治產後血氣傷於脾胃復脅滿悶嘔逆噁心赤芍半夏澤蘭葉陳皮人參各二錢甘草炙一錢上㕮咀作一服入生薑煎當歸羊肉湯治產後發熱自汗肢體疼痛名曰蓐勞當歸人參各七錢黃耆一兩生薑半兩上㕮咀用羊肉一斤煮清汁五大盞去肉入前藥煎四盞去柤作六服良方茯苓散治產後心虛怔忡不定言語錯亂人參甘草山藥當歸各一錢生薑遠志茯苓桂心麥門冬各半錢大棗上㕮咀水煎機要增損柴胡湯治產後經水適斷感於異證手足撁搐咬牙昏冒柴胡八錢黃芩四錢半人參三錢甘草炒四錢石膏四錢知母三錢黃耆五錢半夏三錢上為粗末每半兩入薑棗煎血風湯治產諸風痿攣無力秦艽羌活防風白芷川芎芍藥白朮當歸地黃茯苓半夏黃耆等分上為末一半為丸煉蜜桐子大一半為散溫酒送下五七十丸愈風散治產後中風口噤牙關緊急手足瘛瘲如角弓狀荊芥穗略炒為末上每三錢豆淋酒調下童便亦可一方加當歸謹按產後多有血病神強瘛瘲而似中風者宜用此藥通血脈而清神或加當歸者為然非外因例藥也是以姑錄此一法義見後丹溪論獨行散治產後血暈昏迷五靈脂炒上為末水酒童便調下二錢當歸散治產後氣血俱虛無大補恐增客熱宜服此去惡露當歸白芍川芎黃芩各一兩白朮半兩上為細末溫童便調下二錢黃耆湯治產後汗不止因陰虛而得黃耆二錢白朮防風熟地黃牡蠣煆白茯苓麥門冬甘草炙各半錢上㕮咀每半兩入棗煎加減四物湯治產後陰虛發熱或日間明瞭暮則發熱增寒當歸川芎生地黃柴胡上等分每四五錢水煎瑞竹堂方治產後血塊腹痛京芎炒當歸炒熟地黃白芍炒各半兩蒲黃炒二分上同為細末每服二錢空心溫酒調下丹溪參朮膏治產後胞損成淋瀝證人參二錢半白朮二錢桃仁陳皮各一錢黃耆一錢半茯苓一錢甘草炙半錢上㕮咀水煎豬羊胞後入藥作一服丹溪曰嘗見尿胞因收生不謹以致破損而得淋瀝證有徐氏婦於壯年得此因思肌肉破傷在外者且可補完胞雖在腹恐亦可治診其脈虛甚因悟曰難產之人多是氣虛難產之後血氣尤虛因用峻補以參朮膏煎以豬羊胞極飢時與之每劑用一兩至一月而愈恐是氣血驟長其胞可完若稍遲緩恐難成功嚴氏趁痛散治產後血滯筋脈拘攣腰背強直遍身疼痛當歸桂白朮牛膝甘草各三錢黃耆獨活生薑各半兩上㕮咀每半兩水煎按此手足三陰藥出大陽例治表之劑也然惡露不盡絞痛不止宜良方芎歸湯散治里之劑以大黃桃仁等藥下之血蓄經絡成血塊宜沒藥丸以虻蟲水蛭等藥逐之皆變法也茲不詳錄故以上諸方皆調理之劑余有異證詳見大全良方謹按產後血滯於經多成癰腫或有致不救者蓋氣血虛損逆之甚也大抵此兼陰虛火動凡辛溫之劑宜慎之矧產後用藥有三禁我丹溪先生謂產後如無惡阻當大補氣血雖有雜證以末治之如中風切不可作風治與小續命湯必先補氣血然後治痰當以左右手之脈分其氣血多少而治如發熱惡寒皆是氣血左手脈不足用補血藥多於補氣藥右手脈不足用補氣藥多於補氣藥惡寒發熱腹痛者當去惡血以求通變之意也
