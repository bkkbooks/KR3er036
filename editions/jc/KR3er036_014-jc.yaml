body:
  text: 卷十四寒門內經敘寒氣為痛為積為嘔為泄舉痛論云寒氣入經而稽泣經脈不行客於脈外則血少客於脈中則氣不通故卒然而痛重中於寒則痛久矣寒氣客於小腸募原之間絡血之中血泣不得注於大經血氣稽留不得行故宿昔而成積寒氣客於腸胃厥逆上出故痛而嘔也寒氣客於小腸小腸不得成聚故腹痛後泄矣謹按篇中具寒氣客於諸脈及相引腹股等為痛甚詳宜玩本文為積又詳見積聚門論寒為癥瘕堅痞厥逆諸證原病式曰諸病上下所出水液澄徹清冷下痢清白吐痢腥穢食已不飢堅痞腹滿急痛癥瘕㿗疝屈伸不便厥逆禁固皆屬於寒論寒為滯下泄瀉咳嗽諸證詳見滯下等門按以上諸論病機多屬內中於寒口食生冷所致皆非外感證也因茲所類但以傷寒外感分例然以上病機亦有標本不同故不復參附詳見各門脈法難經曰傷寒之脈陰陽俱盛而緊澀傷寒論曰脈陰陽俱緊者名曰傷寒寸口脈浮而緊浮則為風緊則為寒浮澀而緊為傷寒謹按傷寒脈及六經傳變本論已詳茲不備錄惟許學士百證歌第一篇甚得旨要但其中二句訛舛如脈浮而緩風傷榮浮緊兼澀寒傷衛正與仲景脈理差別此非許學士之不精蓋亦後人傳寫之誤也許學士云仲景言脈大浮數動滑此名陽也沉澀弱弦微此名陰也脈訣以動脈為陰弦為陽何也大抵此兼眾脈而合言之也唯傷寒如此雜病各見一脈仲景之意若曰浮大者陽也兼之以動滑數之類安得不為陽沉細者陰也兼之以澀弦數之類安得不為陰故仲景論動脈則曰陽動則汗出陰動則發熱數脈見於關上上下無頭尾如豆大厥厥動搖名曰動也又結胸證云脈浮而動浮則為風動則為痛故兼數與浮而言動脈則陽脈陽病也宜矣仲景論弦者狀如弓弦按之不移弦則為減又曰支飲急弦又少陰證雲手足寒脈弦遲故此兼遲而言弦則為陰證脈也宜矣故仲景傷寒脈不可與雜病脈同日而語也今陽證往往浮大而厥厥厥動搖其沉細而弦者必陰證也何疑之有哉故知治傷寒當以仲景脈法為本脈經曰遲緊為寒寒則緊弦澀遲沉細為寒脈小實而緊者病在內冷脈沉而細下焦有寒脈累累而貫珠不前至有風寒在大腸脈細小緊急病速進在中寒為疝瘕寸口脈遲上焦有寒脈緊寒之實也關脈遲胃中寒尺脈遲澀寒在下焦弦小者寒癖遲而緩微而緊皆有寒也論傷寒中寒受病不同丹溪曰仲景論傷寒矣而未及乎中寒先哲治胃大寒而昏用附子理中而安其議藥則得之矣曰傷曰中未聞有議其異同之者因思傷寒有即病有不即病必大發熱邪循經而入以漸而深中寒則倉卒感受其病即發而暴傷寒之人因其舊有鬱熱風寒外來肌腠自密郁發為熱其初也用麻黃桂枝輩發表而安以病體不甚虛也中寒之人乘其膚腠疏豁一身受邪難分經絡無熱可發溫補自解此胃氣之大虛也傷寒熱雖甚不死中寒若不急治去生甚遠其虛實蓋可見矣謹按仲景論傷寒至三陰病例可汗外感也韓祗和例溫中即中寒也張潔古三陰可下王海藏例可補皆言內傷也但韓氏不直指中寒而就於陰證立便例例可溫中之法與仲景三陰病論證不同乃別立方意指中寒而未甚瑩故丹溪先生重明此意然皆宜詳玩臨證合宜處治也論陰陽虛盛惡寒與傷寒不同內經曰陽虛則外寒者陽受氣於上焦以溫皮膚分肉之間令寒氣在外則上焦不通上焦不通則寒氣獨留於外故寒慄陰盛則內寒者因厥氣上逆寒氣積於胸中而不瀉不瀉則溫氣去寒獨留則血凝泣凝則脈不通其脈盛大以澀故中寒按此言陰陽虛盛為寒本七情所動之致義見調經論篇皆與傷寒中寒受病不同者也東垣曰夜則惡寒晝則安靜是陰血自旺於陰分也夜則惡寒晝則惡寒是重陰無陽也當亟瀉其陰峻補其陽夜則安靜晝則惡寒是陰氣上溢於陽中也按此亦陰盛所致之本病非感寒外因也傷寒外因三陽惡寒皆表邪未解太陰手足自溫故不惡寒少陰厥陰手足厥逆而惡寒者陰盛然也與此稍異論陰毒王海藏云陰毒本因腎氣虛寒因欲事或食生冷物而後傍風內既伏陰外又傷寒或先感外寒而後伏陰內外皆陰則陽氣不守遂發陰毒身重眼睛疼身體倦怠而甚熱四肢厥逆冷額上及手背冷汗不止或多煩渴精神恍惚如有所失三二日間或可起行不甚覺重診之則六脈沉細而疾尺部短小寸口或無若服涼藥則渴轉甚躁轉急有此證者急服還陽退陰之藥則安惟補虛和氣而已宜服正元散之類陰證不宜發汗如氣正脈大身熱未瘥用藥發汗無妨或寸口小而尺脈微大亦同積陰感於下則微陽消於上故其候沉重四肢逆冷腹痛轉甚或喉不利或心下脹滿結硬躁渴虛汗不止或時狂言爪甲面色青黑六脈沉細而一息七至以來有此證者速宜於氣海關元二穴灸三二百壯以手足和暖為效仍服金液丹來復丹之類隨證治之按此言陽氣不守或積陰感於下微陽消於上遂為陰毒與活人書論陰毒為陰氣獨盛陽氣暴絕者殊有發明矣但言不守與消之義而又不若趙氏釋活人書云陰氣極盛陽氣極微為陰毒陽氣極盛陰氣極微為陽毒庶不為竭絕之證義尤明白陰盛格陽脈附見熱門論諸證寒熱似傷寒詳見熱門謹按世傳以寒痰腳氣食積勞煩四證為似傷寒然以形證較之亦豈止四證而已故集證論詳見熱門論傷寒傳變此事難知云足太陽為巨陽為老陽又為諸陽之首故多傳變爾太陽傳陽明謂之微邪是水傳土也又謂之循經得度傳太陽傳少陽謂之越經傳太陽傳太陰謂之誤下傳太陽傳少陰謂之表裡傳變之邪太陽為甚復傳少陰水勝火火勝水此南北二方之變頃刻之間其害人也甚於太陽多矣若辨之不早必成不救之疾況亂投湯藥者乎太陽傳厥陰謂之首尾傳厥陰與督脈上行與太陽相接又名巡經得度傳災變至重不為不多矣按此可謂發仲景之心法矣趙氏亦曰傷寒六經傳變或虛或實或冷或熱無非邪氣之所為也有次第傳經之陽邪有直入本經之陰邪有下後內陷之邪皆不可不辨也然成無己引華陀云傷寒一日在皮二日在膚三日在肌四日在胸五日在腹六日入胃即傳裡也與成所論七日不解為再經二七日不解為過經皆大約也故一無治例惟六經傳變為的故太陽傳變居多者因其初感邪氣乘虛而入則傳也有三五日止在本經或十數日不傳者有之有傳過一經而不再傳者亦有之有誤服藥而致傳變者多矣大抵邪在陽經則易治傳入陰分則危殆蓋陽微陰盛正虛邪實矣況誤下內陷汗虛別經者則壞異傾危可立待也學者慎之論傷寒只傳足經不傳手經發明曰傷寒受病之由皆出熱論一篇而已皆傳足經不傳手經何也蓋傷寒病冬月得之足太陽膀胱經為首次至足厥陰肝經為尾此病惟傷北方與東方及戌土上有足陽明胃濕之專位兼醜上有足太陰脾土之專位蓋足之六經皆在東北之方經云冬傷於寒即發者為傷寒春發為溫病夏發為溫疫為病最重此之謂也仲景云無奇經則無傷寒緣奇經皆附足六經不附手經寒邪只傷足經者為有奇經故也長夏為大熱病者夏火既王火之方與秋之分皆手經居之水方與春之分皆足經不足及夏火王客邪助於手經則不足者愈不足矣故所用之藥皆泄有餘而非足經藥何者泄有餘則不足者補矣此傷寒只先足經而不言手經也大大意如此至於傳手經者亦有之矣論傷寒傳手經此事難知曰傷寒傳至五六日間漸變神昏不語或睡中獨語一二句目赤唇焦舌乾不飲水稀粥與之則咽終日不與則不思六脈細數而不洪大心下不痞腹中不滿大小便如常或傳至十日以來形貌如醉人虛見神昏不已多用承氣湯下之則誤矣蓋不知此熱傳手少陰心經也然而又未知自何經而來答曰本太陽經傷風風為陽邪陽邪傷衛陰血自燥熱蓄膀胱壬病逆傳於丙丙丁兄妹由是傳心心火自上迫而熏肺所以神昏也謂肺為清虛之藏內有火邪致令神昏宜梔子黃芩黃連湯若脈在丙者導赤散脈在丁者瀉心湯若誤用涼膈散乃氣中之血藥也在左手寸脈沉滑有力者則可用之或用犀角地黃湯近於是也本方所說若無犀角以升麻代之是陽明經藥也此解陽明經血中熱藥若脈浮沉俱有力者是丙丁中俱有熱也可以導赤瀉心各半服之則宜矣此證膀胱傳丙足傳手經也下傳上也丙傳丁也表傳裡也壬傳丁者艮傳離也越經傳也又謂腑傳臟也活人云傷寒只傳足經不傳手經此言不盡意也有從足經而傳手經者何以知之經云傳寒或止傳一經或間傳三經不可一途而取之但憑其脈與外證治之此活法也與食則咽者邪不在胃也不與則不思者以其神昏故熱邪既不在胃誤與承氣湯下之其死也必矣謹按傷寒本只傳足經以上又例傳手經之義可謂發病機之秘矣蓋只是邪蘊日久因足經實手經虛故冤熱爾有因汗下差誤而傳有因七情或勞倦等而致者有之大抵傳於經必有所因所以古人有救逆復脈等法豈但切中病情實啟後人之意例爾論傷寒陰分發熱為反用溫汗法趙嗣真曰詳仲景論發汗湯劑各分輕重不同如麻黃桂枝青龍各半越婢等湯各有等差至於少陰發汗二湯雖同用麻黃附子亦自有輕重加減之別故以加細辛為重加甘草為輕辛散甘緩之義也其第一證以少陰本無熱此發熱故曰反也蓋發熱為邪在表而當汗又兼脈沉屬陰而當溫故以附子溫經麻黃散寒而熱須汗解故加細辛是汗劑之重者第一證既無裡寒之可溫又無裡熱之可下求其所用麻黃附子之意則是脈亦沉方可名曰少陰病身亦發熱方可行發表藥又得之二三日病氣尚淺比之前證亦稍輕故不重言脈證而但曰微發汗所以去細辛加甘草是汗劑之輕者向使脈不沉身不熱又無他證則是無病人也又何藥焉仲景本分作兩證以別汗劑之輕重活人書卻於第二證中除去無證兩字改作常見少陰熱陽證者所謂少陰熱陽證如經云心中煩不得臥或咽瘡聲不出者或咳而嘔渴或口燥咽乾或腹脹不大便數證皆是也夫豈麻黃附子甘草湯發汗劑所可治耶抑又有聞焉麻黃附子細辛湯為治少陰病之脈沉反發熱者固也而仲景又有四逆湯治太陽病之發熱反脈沉者均謂之反也仲景云病發熱頭疼脈反沉若不瘥身體頭疼痛者當救其里宜四逆湯此證出太陽篇又云少陰病始得之反發熱脈沉者麻黃附子細辛湯此證出少陰篇切詳太陽病發熱頭痛法當脈浮今反沉少陰脈沉法當無熱今反熱仲景於此兩證各言反者謂反常也蓋是太陽病脈似少陰少陰病證似太陽所以謂之反而治之異也今深究其旨均是脈沉發熱以其有頭痛故為太陽病陽證當脈浮今反不能浮者以裡虛久寒正氣里微所致又身體疼痛故宜救里使正氣內強逼邪出外而乾薑生附亦能出汗而解假使里不虛寒則當見脈浮而正屬太陽麻黃湯證也均是脈沉發熱以其無頭痛故名少陰病陰病當無熱今反寒邪在表未傳在裡但皮腠鬱閉而為熱而在裡無病故用麻黃細辛以發表邪之熱附子以溫少陰之經假使寒邪入里則外必無熱當見吐利厥逆等證而屬正少陰四逆湯證也由此觀之表邪浮淺發熱之反猶輕正氣衰微脈沉之反為重此四逆湯為劑不為不重於麻黃附子細辛湯也又可見熟附配麻黃髮中有補生附配乾薑補中有發仲景之旨微矣嗟夫常病用常法夫誰不知設有證變者或脈變者往往疑似參差亦欲以常法例治之惑矣如仲景所論太陽少陰兩證脈沉發熱雖同而受病與用藥自別此實證治之奇異醫法之玄微故並及之謹按傷寒六經證仲景例表裡六經藥矣而又於每經表藥中分脈證輕重而用藥如此實萬世無窮之惠也然歷世而下得此意例之妙者能幾人哉但近世習俗不求其意托時世風土之異或例用氣藥以治傷寒表邪逆誤多矣沉里證乎論見後發表諸方下論傷寒兩感王海藏曰天之邪氣感則害人五臟以是知內外兩感臟腑俱病欲表之則有里欲下之則有表表里既不能一治故云兩感者不治然所稟有虛實所感有淺深虛而感之深者必死實而感之淺者猶可治治之而不救者有矣未有不治而獲生者矣余嘗用大羌活湯間有生者十得二三故立此以待好生君子用之按本方治法見後趙嗣真曰仲景論兩感為必死之證而復以治有先後發表攻裡之說繼之者蓋不忍坐視而欲覬其萬一之可活也活人書云宜救里以四逆湯後救表以桂枝湯殊不知仲景云太陽與少陰俱病則頭痛為太陽邪盛於表口乾而渴為少陰邪盛於裡也陽明與太陰俱病則身熱譫語為陽明邪盛於表不欲食腹滿為太陰邪盛於裡也少陽與厥陰俱病則耳聾為少陽邪盛於表囊縮而厥為厥陰邪盛於裡也三陽之頭痛身熱耳聾救表已自不可三陰之腹滿口乾渴縮囊而厥不下可乎活人書引下痢身疼痛虛寒救里之例而欲施於煩渴腹滿譫語囊縮熱實之證然乎否乎蓋仲景所謂發表者葛根麻黃是也所謂攻裡者調胃承氣是也活人書所謂救里則是四逆救表則是桂枝今以救為攻豈不相背若用四逆湯是以火濟火而腹滿譫語囊縮等證何由而除臟腑何由而通榮衛何由而行而六日死者可立而待也籲兩感雖為不治之證矣然用藥之法助正除邪虛實實虛補不足損有餘之理學者不可不素有一定之法於胸中也傷寒合病並病論趙嗣真曰愚嘗疑合病與並病之為難明也久矣因姑釋之蓋合病者二陽經或三陽經同受病病之不傳者也並病者一陽經先病又過一經病之傳者也且如太陽陽明並病一證若並而未盡是傳未過尚有表證仲景所謂太陽證不罷面色赤陽氣怫鬱在表不得越煩躁短氣是也猶當汗之以各半湯若並之已盡是為傳過仲景所謂太陽證罷潮熱手足汗出大便硬而譫語者是也法當下之以承氣湯是知傳則入腑不傳則不入腑所以仲景論太陽陽明合病止出三證如前於太陽陽明並病則言其有傳受如此也又三陽經互相合病皆曰下利仲景於太陽陽明合病則主以葛根湯太陽少陽合病主以黃芩湯少陽陽明合病主以承氣湯至於太陽少陽並病其證頭項強痛眩閟如結胸心下痞硬當刺大椎肺俞肝俞不可汗下太陽陽明並病已見上論但三陽合病仲景無背惡寒語句雖別有口燥渴心煩背微惡寒者乃屬太陽證而非三陽合病也三陽若與三陰合病即是兩感所以三陰無合病例也按三陽合病證治見傷寒論陽明例篇傷寒變溫熱病論趙嗣真曰按仲景論謂冬月冒寒伏藏於肌膚而未即病因春溫氣所變則為熱夫變者改易之義也至此則伏寒各隨春夏之氣改變為溫為熱既變之後不得復言其為寒也所以仲景云溫病不惡寒者其理可見矣活人書卻於溫病曰陽熱未盛為寒所制豈有伏寒既已變而為溫尚可言寒能制其陽熱耶又於熱病曰陽熱已盛寒不能制亦不當復言其為寒也蓋是春夏陽熱已變其伏寒即非有寒不能制其陽熱爾外有寒能折陽氣者乃是時行寒疫仲景所謂春分以後秋分節前天有暴寒為時行寒疫也三月四月其時陽氣尚弱為寒所折病熱則輕五月六月陽氣已盛為寒所折病熱則重七月八月陽氣已衰為寒所折病熱亦微是知時行寒疫與溫熱二病所論陽氣盛衰時月則同至於論暴寒之寒與伏寒已變之寒自是相違名不正則言不順矣仲景又云其病與溫及暑病相似但治有殊者要在辨其病源寒熱溫三者之殊則用藥冷熱之品味判然矣謹按王安道傷寒立法考曰讀仲景書當求其立法之意不然則疑信相雜未免通此而礙彼也夫傷寒有即病者則為傷寒不即病者則謂之溫與暑焉其類雖殊其所受之源則不殊也夫仲景之書三陰經寒證居熱證十之七八彼不即病之溫暑但一於熱耳何由而為寒哉就三陰寒證而詳味之然後知予言之不妄或謂三陰經寒證本是雜病為王叔和增入其中又或謂其證之寒蓋由寒藥誤治而致若此者非也夫叔和之增入者辨脈平脈與可汗可下等諸篇而已其六經病篇必非叔和所能讚辭也但厥陰經中下痢嘔噦諸條卻是叔和因其有厥逆而附遂並無厥逆而同類者亦附之耳至若以藥誤治而成變證則為太陽為多縱使三陰證亦或有寒藥誤治而變寒者然豈應如是之眾乎夫惟後人以仲景書通為傷寒溫暑者設遂致諸溫劑皆疑之而不敢用韓祗和雖覺桂枝湯之難用但謂今昔之世不同然未悟仲景書本為即病之傷寒設也且其著微旨一書又純以溫暑作傷寒立論而即病之傷寒反不言及此已是捨本從末全不能窺仲景藩籬又以夏至前胸膈悶嘔逆氣塞腸鳴腹痛身體拘急手足逆冷等證視為傷寒謂與仲景三陰證脈理同而證不同遂別立溫中法以治以予觀之其胸膈滿悶嘔逆氣塞等證既與仲景所敘三陰證不同則是內傷雜病豈溫暑病乎況仲景所敘三陰證求對於春夏溫暑之病不亦惛乎雖然祗和時內傷之理未明而又適當溫暑病作之際其為感也固宜若非內傷雜病則不止暴寒所中之病也且但曰寒而當溫然未嘗求其所以為寒之故也能求其故則知溫暑本無寒證其為寒證者皆內傷雜病與暴寒所中也至於劉守真出亦以溫暑作傷寒立論而遺即病之傷寒其所處辛涼解散之劑固為昧者有中風傷寒錯治之失而立蓋亦不無桂枝麻黃難用之惑也既於此則無由悟夫仲景立桂枝麻黃湯之有所主用桂枝麻黃湯之有其時矣故原病式曰夏熱用桂枝麻黃之類熱藥發表須加寒藥不然則熱甚發黃或出斑矣殊不知仲景主桂枝麻黃湯本不欲用於夏月之時矣苟悟夫桂枝麻黃本非溫暑之劑則群疑冰泮矣何也夫寒之初客於表也開腠理郁陽氣而為熱故非辛溫之藥不能開腠理以泄其熱此麻黃湯之所由立也至於風邪傷表雖反疏腠理而不閉然邪既客表則表之正氣受傷而不能流通故亦發熱也必以辛甘溫之藥發其邪則邪去而腠理自密矣此桂枝湯之所由立也其所以不加寒藥者蓋由寒風在表又當天令寒冷之時而無所避故也後人不知仲景立法之意故有惑於桂枝麻黃之熱有犯於春夏之司氣而不敢用於是有須加寒藥之論夫欲加寒藥於桂枝麻黃之中此乃不悟其所以然故如此耳若仲景為溫暑立方必不如此必別有法但惜其遺帙不傳致使後人有多岐之患若知仲景傷寒論專為即病傷寒作則知麻黃桂枝所宜用之故除傳經熱病之外其直傷陰經與太陽不鬱熱即傳陰經諸寒證皆有所歸著而不復疑為藥寒誤下而生矣若春夏有惡風惡寒有汗無汗之證蓋春夏暴中風寒之新病非冬時受傷過時而發者不然則或是溫暑將發而復感於風寒或因感風寒而動乎久郁之熱遂發溫暑也仲景曰太陽證發熱而渴不惡寒者為溫病觀此則知溫病不當惡寒而當渴其惡寒而不渴者非溫病矣仲景雖不言暑病然暑病與溫病同但復過一時而加重於溫病矣其不惡寒而渴則無異也春夏雖有惡寒惡風表證其桂枝麻黃二湯終難輕用勿泥於發表不遠熱之語也於是而用辛涼解散庶為得宜苟不慎而概用之誠不能免夫狂躁斑黃衄血之變而亦無功也雖或者行桂枝麻黃於春夏而效乃是因其辛散之力而偶中於萬一斷不可視為常道而守之後人以通解散百解散之類不問四時中風傷寒一例施之雖非至正之道然較之不慎而輕用麻黃桂枝以致變者則反庶幾矣若夫仲景於三陰經每用溫藥亦由病之所必須與用之有其時其若概以三陰寒證視為雜病而外之得無負於仲景濟人利物之至仁而誤後世乎自先覺不示傷寒溫暑異治之端緒但一以寒涼為主而諸溫熱之劑悉在所略致使後之學者視仲景書欲仗焉而不敢以終決欲棄焉則猶以為立法之祖而不能外也能明夫仲景本為即病者設法則桂枝麻黃未必難用諸溫熱之劑未必可略矣若謂仲景法不獨為即病者設則凡時行及寒疫溫瘧風溫等證亦通似傷寒六經病諸方治之乎故仲景曰冬溫之毒與傷寒大異為治不同又曰寒疫與溫病及暑病相似但治有殊耳是知溫暑及時行寒疫溫瘧風溫等病必別有治法今不見者亡之也觀其所謂為治不同所謂溫瘧風溫溫毒溫疫脈之變證方治如說之語豈非有法而亡之乎決不可以傷寒六經病諸方通治也夫素問謂人傷於寒為病熱者言常而不言變也仲景謂或寒或熱而不一者備常與變而弗遺也仲景概言古人之所未言大有功於古人者雖欲偏廢可乎按上說與前論互有發明皆甚有功於仲景矣然傷寒卒病與夫時行寒疫但在脈證相符而治之何以能致變逆也夫審傷寒雜病脈異則所用辛溫辛涼之劑判然矣大抵於既傳之後變異多端豈無實肖雜證者故仲景叔和論次雖例有混淆而證因標本不同治則權變不一證例多同而治療有殊故不能不使人致疑也人能求其意合而歸一以觀之則證例自定證定則治法不瘥矣但要將經論熟讀玩味有疑處兼看別書如趙氏為活人書釋疑曰活人書之可疑者甚多仲景論亦有可疑者如白虎湯仲景既雲表不解者不可與而白虎加人參湯證一曰惡風一曰惡寒豈非表不解而復用白虎何耶蓋惡風曰微則但見於背而不至甚於惡風曰時時則時或乍寒而不常是表證已輕非若前證脈浮發熱與汗全不解者加之大熱大渴所以用白虎而無疑也又曰仲景論太陽病得之八九日如瘧狀發熱惡寒熱多寒少其人不嘔清便欲自可一日二三度發脈微緩者為欲愈若脈微而惡寒者此陰陽俱虛不可更發汗更下更吐也面色反有熱色者未欲解也以其不能得小汗出身必癢宜桂枝麻黃各半湯仲景之意蓋以得病八九日如瘧狀發熱惡寒熱多寒少十六字為自初至今之證以下文乃是以後擬病防變之辭當分作三截看若其人不嘔清便欲自可一日二三度發脈浮緩為欲愈此一節乃里和無病而脈微者邪氣微緩也陰陽同等脈證皆向安之兆可不大汗而欲自愈若脈微而惡寒者此陰陽俱虛不可更發汗更下更吐之此節宜溫之若面色反有熱色者未欲解也以其不能得少汗出其身必癢宜各半湯此一節必待汗而後愈也活人書不詳文意卻將其人不嘔清便欲自可九字本是欲愈之證反以他證各半湯汗之又將不可汗吐下證及各半湯證語句並脫略而不言取此證而用彼藥汗其所不當汗何也若是可見仲景文法多如此學者必須反復詳玩熟觀其意其例自見則治不瘥矣故趙氏嘗曰仲景之書一字不同則治法霄壤讀之者可不於片言隻字以求其意歟幸相與勉焉論傷寒雜病分二科王海藏云世之治傷寒有法療雜病有方是則是矣然猶未也吾謂治雜病亦有法療傷寒亦有方方即法也法即方也豈有異乎要當全識部分經絡表裡臟腑豈有二哉以其後世才智之不及古也所以分傷寒雜病為二門故有長於此而短於彼者亦有長於彼而短於此者逮夫國家取士分科為七宜乎愈學而愈陋愈專而愈粗也試以傷寒雜病二科論之傷寒從外而之內者法當先治外而後治內雜病從內而之外者法當先治內而後治外至於中外不相及則治主病其方法一也亦何必分之為二哉大抵雜病之外不離乎表傷寒之內不離乎里表則汗里則下中則和不易之法也劑之寒熱溫涼在其中矣餘風產二條目疾瘡腫小兒等科各自專門無怪其工之陋且粗也是以知證不知脈知藥不知源是豈真知而全識哉耳熟目厭習壞多經涉久誤合則病愈不契則疾甚所嘗見所嘗聞者粗有曉會其所未嘗見未嘗聞者則有所不知也此繼述而不及創物者遠矣嗚呼天之所錫其智識有限量故耶哀哉庸夫以衣食迫以口舌爭視學業如仇讎專妒忌為能幹誤人性命恬不知恤甘為忍人不顧陰理其教之有所失耶時世之有所俾然耶抑疾者之不幸而有所自致耶謹按漢張仲景推充內經傷寒脈證論例立法雖因證傳變而不離即病之傷寒也至宋之李有托時世之異乃別立方用參蘇藿香正氣之類而遺即病之傷寒使世俗因之往往失仲景意況與雜病分二科專傷寒者尚不能備曉其通變主雜病者而不能遍識其彷彿宜乎其教之乖誤為疾之不幸使人不能無憾恨也噫仲景推充內經大法可謂無窮之惠人猶不知其例三百餘法備即病傷寒之傳變宋醫所論為時氣變法非真傷寒也故其方不多且病從外而之內者不離乎風寒暑濕其間傳變者余傷寒皆輕從內而之外者不離乎內傷七情其間壞異者非傷寒之重故有輕重不同因分二科大抵學者要於診候之際辨內外之感傷寒表裡之輕重雜病傷寒脈證所異傷寒雜病治法不殊不殊者雜病之外不離乎表傷寒之內不離乎里所異者傷寒從外而之內雜病從內而之外外感法仲景內傷法東垣六氣推充乎劑張雜病融會乎諸氏萬法歸吾一心一心貫乎萬法不致得此而失彼為二科之分遺乎世之識誚也寒證治法發表之劑麻黃湯治傷寒惡風寒發熱身疼無汗麻黃六錢桂枝四錢甘草炙二錢杏仁二十個上㕮咀水煎如法服按此太陽經藥也葛根湯治傷寒惡寒項背強几几無汗惡風或下利葛根四錢麻黃生薑各三錢桂枝芍藥各二錢甘草炙二錢大棗三枚上㕮咀水煎如法服之按此出太陽例陽明藥也柴胡桂枝湯治傷寒發熱潮熱脈弦自汗或渴或利桂枝二錢黃芩人參白芍各一錢半甘草炙一錢半夏一錢生薑一錢柴胡四錢大棗二枚上㕮咀水煎服按此出太陽例少陽經藥也桂枝湯治傷風寒發熱自汗鼻鳴乾嘔者桂枝白芍生薑各三錢甘草炙二錢大棗二枚上㕮咀水煎如法服按此出太陽例太陰經藥也麻黃附子細辛湯治感寒脈沉或微細反發熱或但欲寐者麻黃細辛各四錢附子炮二錢半上㕮咀水煎按此少陰經藥也當歸四逆湯治感寒手足厥冷脈細欲絕者當歸桂枝白芍細辛各三錢大棗三枚甘草炙通草各二錢上㕮咀水煎按此厥陰經藥也以上六經治寒之例隨脈證加減變法自有仲景論例茲不詳錄桂枝麻黃各半湯治傷寒見風脈發熱自汗或無汗桂枝二錢白芍生薑甘草炙麻黃各一錢半大棗二枚杏仁十二個上㕮咀水煎按此足太陽手足太陰手少陰經藥出太陽例治風寒之劑也夫仲景論以上六經藥然其中有發表解肌溫經不同蓋風寒有淺深榮衛有虛實故也學者審此則用藥湯液之源可得而悉又表裡變誤詳見小兒門葛根升麻湯下謹按傷寒與夫時行寒疫皆宜從仲景以上法然立春以後立秋以前非有時行暴寒而致病者宜從韓祗和法較脈證治之元戎云韓氏十四藥以經絡求之各有部分輕重緩急自有所宜運氣加臨各極其當因時在其中矣不必分至之遠近寒暑之盛衰而謂之因時也但方世俗罕用今附入濕門海藏云韓氏微旨可汗一篇有和解因時法言傷寒之脈頭小尾大傷風之脈頭大尾小李思訓保命新書亦分寸尺與韓氏同非若前人總言尺寸脈俱浮而緊尺寸脈俱浮而緩緊則為傷寒無汗緩則為傷風自汗又有傷寒有汗者有傷風無汗者脈亦互差與證不同前人已盡之矣惟韓李所言頭小尾大即為傷寒尾小頭大即為傷風也人病間有脈證只顯於尺寸者故韓李述為和解因時法也又恐後人疑其不與前聖合遂於本方藥內又立加減數條亦不越前人之意何其當哉兼二公者當宋之盛時故又戒桂枝麻黃不可輕用改用石膏升麻葛根柴胡之平劑當時則可非百代常行時世遷移之活法也可汗一篇若從湯液隨證應見自有定規雖明哲不可逾易簡參蘇飲治感冒風邪發熱頭疼痰咳方見熱門局方十神湯治時氣瘟疫兩感風寒川芎甘草麻黃各四錢乾葛一兩四錢紫蘇升麻白芍白芷陳皮香附各四錢上㕮咀入姜煎每服半兩或一兩藿香正氣散治傷寒頭痛憎寒壯熱大腹皮白芷茯苓紫蘇藿香各三錢厚朴制白朮陳皮苦梗半夏各二錢甘草炙二錢半上㕮咀每五錢入薑棗煎按以上三方今世俗多用之治傷寒故收入然傷寒之病表裡六經仲景言在三陰則可汗傳三陰則宜下此大略言之爾於陽明則又可下少陰則又可汗一經病則有一經表裡藥病居太陽所禁居多在少陽有三禁陽明有二禁三陰非胃實不可下之類並病用刺法是各有其故者蓋恐反致逆而成壞證之戒也至宋之時治傷寒者有變仲景法制以上諸方緣其承平日久民食用之志樂形逸病居疑似之間本因氣逸經滯乃用其法然其間豈全舍仲景之法哉金時劉守真制防風通聖散亦是變法義見中風例中當遇是證則必施是治可也然於傷寒不辨邪於某經深求仲景意例當汗之可設妄以此施治則先虛正氣逆其經絡得汗不解復不求經救逆亂投湯劑其致危殆也必矣是則宋醫處方皆平人氣而不平時氣因於人用藥而不先乎時因於時用藥而不先乎人其理得於人事天和之中其意得於不傳之妙離經取法固不離於經專方治病病固不可以專於方然亦未易可為格例也以待後之明者而正之溫中之劑真武湯治傷寒腹痛小便不利四肢沉重疼痛下痢茯苓白芍生薑各三錢白朮二錢附子一錢半上㕮咀水煎附子湯治感寒身體痛手足寒骨節疼惡寒脈沉弱附子人參各二錢茯苓白芍各二錢白朮四錢上㕮咀水煎按此二方少陰例藥也治寒濕之劑理中湯人參白朮乾薑甘草炙各等分上㕮咀水煎韓氏溫中湯丁皮厚朴各一兩乾薑白朮陳皮丁香各二錢上為末每服二錢入蔥白荊芥穗煎按韓祗和云凡病人兩手脈沉遲或緊皆是胃中寒也若寸脈短小及力小於關尺者此陰盛陽虛也或胸膈滿悶腹中脹滿身體拘急手足逆冷急宜溫之然寒盛體虛者宜從少陰例此止可作溫中藥姑存之海藏黃耆湯人參黃耆茯苓白朮白芍各一兩甘草炙七錢半乾薑陳皮藿香各半兩上㕮咀入生薑煎按以上三方出理中例法也寶鑑鐵刷湯治寒積上焦嘔吐不止痰飲胸膈不快食不下半夏四錢草豆蔻丁香乾薑炮訶子皮各三錢生薑一兩上散作三服水煎附子理中丸治中焦有寒腹痛或感寒頭痛發熱惡寒腹痛不飲水理中湯三兩附子一枚上為末蜜丸如雞黃大每一丸溫湯化下元戎苦楝丸治下焦有寒積小腹急痛奔豚等證川苦楝茴香附子各一兩三味酒煮乾再焙玄胡半兩全蠍十八個炒丁香十八個上為末酒糊丸梧子大每五十丸食前當歸湯下按以上諸方治寒積或食寒物等致者雖分三焦等用則不離乎溫中法也然寒冷之物停蓄於中則當溫劑下之者又不必拘此如氣分寒宜仲景桂枝附子湯選用血分寒宜當歸四逆湯之類要在臨時通變可也發表溫中之劑小青龍湯治感寒發熱頭疼脈沉細或嘔或咳或利或噎或小便不利少腹滿或喘麻黃白芍乾薑甘草炙細辛桂枝各二錢五味子半夏各一錢半附子炮二錢脈浮不用上㕮咀水煎海藏肉桂散治傷寒服冷藥過度心腹脹滿四肢逆冷昏沉不識人變為陰毒惡證肉桂三錢白芍陳皮前胡當歸附子炮人參各一兩白朮木香厚朴炒良薑各三錢吳茱萸半兩上為粗末每服五錢入棗三枚水煎天雄散治陰毒傷寒身重背強腹中㽲痛咽喉不利毒氣攻心心下堅強短氣嘔逆唇青面黑四肢厥逆其脈沉細而厥天雄一兩炮去皮麻黃當歸白朮半夏各半兩川椒一錢肉桂厚朴各一兩生薑陳皮各二錢上為粗末每五錢入生薑棗煎取汁按以上二方表裡氣血藥也出太陽例兼看後兩感法發表攻下之劑桂枝加大黃湯治寒邪傳裡為大滿大實痛關脈實者桂枝生薑各三錢白芍四錢甘草二錢半炙大黃一錢大棗二枚上㕮咀水煎按此太陽例藥也邪雖已傳寒未變熱故用此攻下然既傳之後邪已變熱而用和解下熱諸法則不用溫劑矣故大柴胡等湯詳見熱門及本論例茲不備錄和解之劑柴胡薑桂湯治寒熱自汗方見熱門小柴胡湯治傷寒潮熱而嘔按此並少陽例藥也黃連湯治傷寒胸中有熱胃中有邪氣腹痛欲嘔吐者黃連甘草炙乾薑桂枝各二錢人參半夏各一錢半大棗二枚上㕮咀水煎按此出太陽例藥也與以上三方解表裡中上陰陽交錯之劑傷寒論此法甚多宜隨證選用解兩感之劑海藏大羌活湯羌活獨活防己防風黃芩黃連蒼朮白朮甘草炙川芎細辛各三錢知母生地黃各一兩上㕮咀每半兩水煎熱服未解再服一二劑若有餘證並依仲景法按此出太陽例藥也然傷寒兩感亦有兼風兼濕不同或表裡俱虛俱實之異保命集云兩感可治者感異氣也使表中於風內傷於寒可治者宜加味小青龍湯表熱內寒宜和解之此方宜治表中於風內有熱者則表濕裡寒表寒里濕表裡證俱見者宜擴充也大抵兩感多表里俱虛是以易老曰當切脈逆從知其吉凶兩感之邪三陰三陽皆有之脈從陽可治從陰難治陽生陰死之謂也陰毒外接法回生神膏治陰毒傷寒牡蠣煉粉乾薑等分上為末男病用女唾調手內擦熱緊掩二卵上得汗出愈女病用男唾調掩二乳取汗代灸塗臍膏附子馬藺子蛇床子木香肉桂吳茱萸上六味等分為末用白麵相和生薑汁渨成膏紙上圓三寸許貼臍下關元氣海自晚至曉貼之陰毒傷寒四肢逆者吳茱萸不拘多少上為末溫酒和勻生絹袋盛之熱熨腳心令通暢愈若以為湯煎洗接四肢亦可灰包熨法治下焦積寒冷上焦陽盛更難投溫藥者用灰二三升許入好醋拌和乾溼得所銚內炒令灰熱以帛包裹置臍下熨之頻換灰包令常熱以腹不滿痛為度如得利三兩行或小便行或微似有汗此陰氣外出也灸法附灸法論氣海穴在臍下一寸五分治陰厥脈微絕者石關一穴在臍下二寸關元一穴在臍下三寸治臟結不可攻者及陰汗不止腹脹腸鳴面黑指甲青者宜灸百壯陽陵泉二穴在膝下一寸潔古曰煩滿囊縮宜灸此太谿二穴在足內踝後跟骨上動脈陷中灸七壯治少陰吐利手足不冷反熱脈不至者按傷寒灸穴詳見資生經故不備錄大抵不可刺者宜灸之一則沉寒痼冷二則無脈知陽絕也三則腹皮急而陽陷也舍此三者余皆不可灸蓋恐致逆也今附炙法於下醫學發明曰針經云陷下則灸之天地間無他惟陰與陽二氣而已陽在外在上陰在內在下今言陷下者陽氣下陷入陰血之中是陰反居其上而覆其陽脈證俱見寒在外者則灸之異法方宜論云北方之人宜灸𤋲也為冬寒大旺伏陽在內皆宜灸之以至理論則腎主臟藏陽氣在內冬三月主閉藏是也若太過則病固宜灸𤋲此陽明陷入陰水之中是也難經云熱病在內取會之氣穴為陽陷入陰中取陽氣通天之竅穴以火引火而導之此宜灸𤋲也若將有病者一概灸之豈不誤哉仲景云微數之脈慎不可灸因火為邪則為煩逆追虛逐實血散脈中火氣雖微內攻有力焦骨傷筋血難復也又云脈浮宜以汗解用火灸之邪無從出因火而盛病從腰以下必重而痹名火逆也脈浮熱甚而灸之此為實實而虛治因火而動必咽燥唾血又云身之穴三百六十有五其三十穴灸之有害七十九穴刺之為災並中髓也仲景傷寒例按明堂針經各條下所說禁忌明矣內經云脈之所見邪之所在脈沉者邪氣在內脈浮者邪氣在表世醫只知脈之說不知病證之禁忌若表見寒證身汗出身常清數慄而寒不渴欲覆厚衣常惡寒手足厥皮膚乾枯其脈必沉細而遲但有一二證皆宜灸之陽氣下陷故也若身熱惡熱時見燥作或面赤面黃咽乾嗌乾口乾舌上黃赤渴咽嗌痛皆熱在外也但有一二證皆不宜灸其脈必浮數或但數而不浮不可灸灸之災害立生若有鼻不聞香臭鼻流清涕眼臉時癢或欠或嚏惡寒其脈必沉是脈證相應也或輕手得弦緊者是陰伏其陽也雖面赤宜灸之不可拘於面赤色而禁之也附虛寒溫經諸方補肝散治肝臟氣虛視物不明兩脅脹滿筋脈拘急面色青小腹痛山茱萸當歸五味子山藥黃耆川芎木瓜各半兩乾地黃白朮各一錢獨活酸棗仁各四銖上末每二錢匕以水煎入棗一枚茯神湯治膽氣虛冷頭痛目眩心神恐畏不能獨處胸中滿悶茯神酸棗仁炒去殼黃耆白芍五味子柏子仁各一兩桂心熟地黃人參甘草各半兩上㕮咀每四錢半入姜煎補心丸治本臟虛冷善恐怖如魘狀及女人產後中寒腹痛月水不調當歸川芎白芍甘草附子防風桂心細辛乾薑蜀椒厚朴半夏大黃豬苓各一兩茯苓遠志各二兩上末蜜丸如梧子大酒服五七丸日三加至十丸橘附丸治小腸虛冷小腹疼小便頻而清白橘紅炒桑螵蛸炙龍骨山茱萸附子炮鹿茸酒蒸焙上等分為末酒糊丸梧子大每六十丸空心鹽湯下檳榔散治脾寒飲食不消勞倦氣脹噫滿憂恚不樂檳榔八個人參茯苓陳曲麥蘖吳茱萸厚朴白朮各二兩陳皮一兩半上末食後酒服方寸匕日二次進食散治胃氣虛冷或食生冷或飲食不節胸膈痞塞腹脹怠惰不思食噁心溏泄半夏曲肉豆蔻煨草果仁高良薑麥蘖炒附子炮丁香厚朴陳皮人參青皮甘草炙半兩上㕮咀每四錢入薑棗煎白石英湯治肺氣虛弱惡寒咳嗽鼻流清涕喘息氣微者白石英細辛五味子陳皮鍾乳粉阿膠蛤粉桂心人參甘草炙各五錢紫菀一兩上㕮咀每四錢入姜煎訶梨勒丸治大腸虛冷腸鳴泄瀉腹脅氣痛飲食不化訶子附子肉豆蔻木香吳茱萸龍骨茯苓蓽茇各二錢上末薑汁糊丸梧子大每四五十丸空心米湯下十補丸治腎臟虛弱面色黎黑足冷足腫耳鳴耳聾肢體羸瘦足膝軟弱小便不利或多或少腰脊疼痛附子炮五味子各一兩山茱萸肉山藥牡丹皮鹿茸制桂心茯苓澤瀉各一兩上為末煉蜜丸梧子大每六七十丸空心鹽湯下韭子丸治膀胱虛冷小便白濁滑數日夜無度赤石脂煅韭子炒牛膝酒浸牡蠣煆附子炮覆盆子酒浸桑螵蛸鹿茸制龍骨肉蓯蓉各一兩雞肶胵燒灰沉香各五錢上為末酒糊丸梧子大每六七十丸空心鹽湯下按以上諸方並出五臟治要例
