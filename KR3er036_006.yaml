body:
  text: 卷六泄瀉門此門宜與滯下者瀉痢生死脈法內經云脈細皮寒少氣泄利前後飲食不入是謂五虛死其漿粥入胃泄注止則虛者活脈經云泄注脈緩時小結者生浮大數者死又洞泄食不化不得留下膿血脈微小連者生緊急者死脈訣云下利微小即為生脈大浮洪無瘥日仲景治利大法東垣治利大法按此並見滯下門瀉分寒熱病機機要云臟腑瀉利其證多種大抵從風濕熱論是知寒少熱多寒則不能久也故曰暴瀉非陽久瀉非陰大便完穀下有寒有熱熱者脈疾身多動音聲響亮暴注下迫此陽也寒者脈沉而細身不動作目睛不了了飲食不下鼻準氣息者姜附湯主之若身重四肢不舉朮附湯主之按此以瀉之久暴分陰陽正如傷寒之病始為寒而終則傳變而為熱也然亦必以脈證參訂焉原病式曰瀉白為寒青黃紅赤黑皆以為熱也大抵瀉利小便清白不洽為寒赤色者為熱又完穀不化而色不變其利脾氣虛弱畏冷小便清白不澀身涼不渴脈遲細而微者寒也穀雖不化而色變非白煩渴小便赤澀者熱證也凡穀消化無問色及他證便為熱也寒泄而穀消化者未之有也或火性急速傳化失常穀雖不化而飧泄者亦有之矣仲景云邪熱不殺穀然熱得濕則飧泄也論瀉痢有濕有熱有風有寒機要云有太陰經受濕而為水泄虛滑身重微滿不知穀味久則防變而為膿血脾經傳腎謂之賊邪故難愈若先利而後滑謂之微邪故易痊此皆脾土受濕之所為也有厥陰經下痢不止其脈沉而遲手足厥逆涕唾膿血此難治宜麻黃湯小續命汗之此有表邪縮於內當瀉表邪而愈有暴下無聲身冷自汗小便自利大便不禁氣難布息脈微嘔吐急以重藥溫之漿水散是也論暴注屬火子和云夫暴注瀉水不已內經曰注下也注下水利也暴速甚者屬火宜用水調桂苓甘露飲五苓益元散或以長流水煎放冷服涼膈通聖亦能治之慎不可驟用罌粟殼乾薑豆蔻之類縱瀉止亦轉生他疾止可分陰陽利水道而已按以上所論辨寒熱風濕火等證所以明六淫之邪皆能為瀉為注者亦當各隨所淫之邪分而治之可也論胃氣下降為飧泄機要云夫脾胃同濕土之化主腐熟水穀胃氣和平飲食入胃精氣則輸於脾土歸於肺行於百脈而成榮衛若飲食一傷起居不時損其胃氣則上升精華之氣反下降是為飧泄久則太陰轉少陰而為腸澼論春傷於風夏必飧泄機要云春宜緩形形緩動則肝木乃榮反靜密則是行秋令金能制木風內臟夏至則火盛而金去獨火木旺而脾土損矣輕則飧泄脈泄穀不化重則下痢膿血稠黏良方云經云春傷於風夏必飧泄蓋風喜傷肝春時木旺不受邪反移氣克於脾土脾既受克不能運化因成積滯夏秋之間再感暑濕風冷之氣發動而成痢也論飧泄屬風宜汗子和云飧泄不止完穀不出發汗可也桂枝麻黃湯主之此證以風為根蓋風隨汗出也按飧泄證機要謂胃氣下流及春行秋令良方謂春木旺移氣克脾二論雖殊要之皆因風木傳變而脾土受邪爾子和謂風隨汗解此論固是然亦須隨其傳變而治不可執此一法也瀉分三因三因嚴氏云泄瀉一證經中所謂洞泄飧泄溏泄溢泄濡泄米穀注下是也所因有內外不內外差殊耳經云春傷於風夏必飧泄又云濕勝則濡泄寒甚則為泄暑熱盛之亦為泄至於七情感動臟氣不平亦致溏泄其如飲食不節過食生冷而成泄瀉者乃脾胃有傷也但停滯泄瀉一證直須積滯已消然後用以斷下藥今人往往便固止之多成痢疾者矣治法先理中焦次分利水穀治中不效然後斷下按此三因所分甚詳但外所淫者既六而立方止有其二內之七情為證而又不詳及於治法治瀉痢用吐下汗三法子和云一僧臟腑不調三年不效此洞泄也以謀慮不決而成肝主謀慮甚則兼脾脾濕不流乃上湧痰半盆又以舟車丸浚川散下數行仍使澡浴出汗自爾日勝一日常以胃風湯白朮散調養之按子和為治大率多用此三法洞泄一證縱其果有積滯鬱結之甚元氣壯實者亦不宜驟用此三法況有積滯雖甚而元氣尤虛者哉設使果當用此三法者亦當如仲景察證以辨其吐汗下者有可不可下之殊況仲景治痢又有合下合溫之法焉此得非孟浪乎丹溪論局方用熱藥澀藥治痢之誤按此見滯下門謹按泄瀉一證古方率以為腸胃虛寒與風冷乘之為論故多行澀熱之劑彼瀉痢者豈無積滯豈無熱證乎今觀病機機要所論有屬寒屬風濕屬火之證此因於外而傷者也又云厥陰經動並胃氣下降為瀉痢三因所言七情感動臟氣不平亦致溏泄此則因於內而傷者也外則當調六氣內則當平五臟況又有飲食所傷腸胃停滯所致者治法各不同也然更有因胃氣下流而泄者在法則當升舉因風而成飧泄者則當解散因痰積於上焦以致大腸之不固而泄者又當去上焦之痰而不治其瀉因脾胃氣虛而泄者又當補中益氣使胃氣升騰而泄自止蓋各求其本而治可也泄瀉治法治濕之劑機要白朮芍藥湯治太陰脾經受濕水泄注下體重微滿困弱無力不欲飲食暴泄無數水穀不化宜此湯和之身重暴下是大勢來亦宜和也白朮芍藥各一兩甘草五錢上銼每服一兩水煎治濕瀉茯苓湯又治食瀉濕熱白朮茯苓各七錢半上咀每服一兩水煎食前服一方有芍藥三味等分名白朮散按以上三方和中除濕足太陰陽明經藥也白朮之甘入胃而除脾胃之濕芍藥之酸澀除胃中之濕熱四肢困茯苓利水道而除濕此三味泄痢須用之藥也蒼朮芍藥湯如前證蒼朮二兩芍藥一兩黃芩半兩上銼每服一兩加淡味桂半錢煎服清按此解散濕熱上中二焦之劑太陰經的藥也良方胃苓湯治夏秋之間脾胃傷冷水穀不分泄瀉不止五苓散平胃散上和合薑棗煎空心服按此乃表裡除濕之劑東垣所謂上下分消其濕是也太陽太陰經藥也出陽明飲痞例仲景五苓散宣明益元散方並見濕劑按以上二方除濕利小便之劑太陽經的藥也治風之劑機要防風芍藥湯治泄痢飧泄身熱脈弦腹痛而得及頭痛微汗防風芍藥黃芩各一兩上咀每服半兩水煎服清按此治風辛涼之劑太陰太陽經藥也蒼朮防風湯治泄痢脈弦頭微痛蒼朮二兩防風一兩一方蒼朮四兩麻黃一兩防風五錢姜七片煎按此足太陰陽明經藥也良方神朮散治春傷於風夏必飧泄蒼朮一斤藁本川芎各六兩羌活四兩粉草細辛一兩六錢上粗末每服三錢姜三片煎要出汗加蔥白按以上三方治風勝濕辛溫之劑此則太陽經藥也局方胃氣湯治大人小兒風冷乘虛入客腸胃水穀不化泄瀉注下方見滯下門按此方名曰治風具實和血之藥也治熱之劑局方戊已丸治脾胃濕熱泄痢不止方見滯下門按泄瀉局方多以為寒至劉張始言有屬熱屬火之證故諸方中治熱瀉之方甚少然仲景治傷寒挾熱下痢用葛根黃芩黃連湯但人未之思耳治暑之劑局方來復丹治伏暑泄瀉如水方見本方易簡云硝石性寒佐以陳皮其性疏快硫黃且能利人若作暖藥以止瀉誤矣蓋由啖食生冷或冒暑熱之氣中脘閉結揮霍變亂此藥通利三焦分理陰陽服之甚驗按此出厥陰硫黃例藥也香薷飲治伏暑吐瀉方見暑劑按此治暑之表藥也肺脾經藥也出太陰厚朴例宣明桂苓甘露飲治飲水不消嘔吐泄痢或下痢赤白方見暑劑按五苓散益元散加寒水石解利濕熱太陽經藥也治寒之劑機要漿水散治暴瀉如水周身汗出一身盡冷脈微而弱氣少不能語甚者加吐此為急病半夏一兩湯洗附子半兩泡桂五錢甘草炙五錢良薑二錢半乾薑一作乾生薑五錢上為細末每服三五錢漿水二盞煎至半盞和滓熱服白朮湯白朮芍藥甘草炙各三錢乾薑半兩炮上如前服甚者去乾薑加附子三錢謂辛能發散也局方理中湯治臟腑停寒泄瀉不已方見寒劑按此出厥陰己寒例藥也以上用姜附之藥皆為暴瀉氣脫如五虛等證救急之劑所謂暴瀉非陽者也然有屬火者亦當求責治風寒濕之劑本事麴藭丸治中風或中風濕臟腑滑瀉川芎附子炮神麯白朮等分上為細末麵糊丸桐子大每服三五十丸溫米飲下此藥亦治飧泄按此出太陰例藥也止澀之劑按諸方論並見滯下門去積之劑本事溫脾湯治痼冷在腸胃間泄瀉腹痛宜先取去然後調治不可畏虛以養病也厚朴乾薑甘草桂心附子生各二兩大黃生四錢碎切湯一盞漬半日搦去滓煎湯時和滓下上細銼水二升半煎八合後下大黃汁再煎六合去滓服按泄痢腹痛其證多種有積滯者固宜取去豈但痼冷一端而已須詳證虛實寒熱隨其所宜以調之升發之劑東垣升陽除濕湯自下而上者引而竭之升麻柴胡防風神麯澤瀉豬苓各半兩陳皮三錢蒼朮一兩大麥蘖面甘草炙各三錢如胃寒腸鳴加益智仁半夏各半錢薑棗同煎非腸鳴不得而用之上作一服水煎早飯後熱服之升陽除濕防風湯如大便閉塞或裡急後重數至圊而不能便或有白膿或血慎勿利之利之則必致重病及鬱結而不通也以此湯舉其陽則陰氣自降矣蒼朮泔浸去皮乾淨四兩防風二錢白朮白茯苓白芍藥各一錢上咀除蒼朮另作片子水一碗半煎至二盞內諸藥同煎至一大盞熱服食前按飲食入胃氣上升輸精心肺然後下降若脾胃有傷不能上升反下流腎肝而成泄痢者法宜填補中氣升之舉之不可疏下此東垣發前人所未論也調補脾胃之劑錢氏白朮散治小兒泄瀉胃熱煩渴不問陰陽並宜服之人參白茯苓白朮木香甘草藿香各一兩乾薑按中論即是葛根上為末水煎按此太陰經四君子例藥也治小兒陽明本虛陰陽不和吐瀉亡津液煩熱口乾以參朮甘草甘溫補胃和中木香藿香辛溫芳香可以助脾茯苓甘草分陰陽導水濕葛根甘平倍於衆藥其氣輕浮鼓舞胃氣上行津液又解風肌熱治脾胃虛弱泄瀉之勝藥也易簡白朮湯治證同前前方藿香改黃耆是也祕藏黃耆補胃湯治一日大便三四次溏而不多有時泄腹中鳴黃耆當歸身柴胡益智仁陳皮各三錢甘草炙二錢升麻六分紅花少許上咀作一服水煎食前服補腎之劑機要肉豆蔻丸治腎泄久不愈脈沉細無力者效破故紙炒肉豆蔻麵裹煨各等分上為末棗肉為丸桐子大飲湯下空心本事方破故紙四兩肉豆蔻二兩名二神丸治脾腎虛弱本事五味子散治腎泄五味子二兩吳茱萸半兩細粒緑色者上二味炒香熟為度細末每服二錢陳米飲下有一親識每五更初曉時必溏泄一次此名腎泄服此而愈局方金鎖正元丹治腎虛泄瀉小便頻數虛冷之證五倍子茯苓各八兩硃砂別研三兩龍骨煆三兩紫巴戟去心一斤補骨脂酒浸炒十兩肉蓯蓉洗焙葫蘆巴焙各一斤上為末入研藥令勻酒糊丸桐子大每服三十丸空心溫酒鹽湯任下
