body:
  text: 卷十五瘡瘍門內經論瘡瘍之因生氣通天論云膏粱之變足生大疔又云營氣不從逆於肉理乃生癰腫陰陽應象論云地之濕氣感則害人皮肉筋脈脈要精微論云諸癰腫筋攣骨病痛者此寒氣之腫八風之變也至真大要論云諸痛癢瘡瘍皆屬心火河間原瘡瘍之病原病式云諸痛癢瘡瘍皆屬心火者蓋人近火氣者微熱則癢熱甚則痛附近則灼而為瘡皆火之用也或癢痛如針輕刺者猶飛迸火星灼之然也癢者美疾也故火旺於夏而萬物蕃鮮榮美也炙之以火漬之以湯而癢轉甚者微熱之所使也因而癢去者熱令皮膚縱緩腠理開通陽氣得泄熱散而去故也或夏熱皮膚癢而以冷水沃之不去者寒能收斂腠理閉密陽氣鬱結不能散越怫熱內作故也癢得爬而解者爬為火化微則亦能令癢甚則癢去者爬令皮膚辛辣而屬金化辛能散故金化見則火力分而解矣或云痛為實癢為虛者非謂虛為寒也正謂熱之微甚也或疑瘡瘍皆屬火熱而反腐出膿水者何也猶穀肉果菜熱極則腐爛而潰為汙水也潰而腐爛者水之化也所謂五行之理過極則勝己者反來制之故火熱過極則反兼水化又如鹽能固物令不腐爛者鹹寒水化制其火熱使不過極故得久固也萬物皆然癰淺而大也經曰熱勝血則為癰也三因方曰癰者壅也疽深而惡也三因方曰疽者沮也癤者節也瘍有頭小瘡也疹浮小癮疹也瘤氣赤瘤丹熛熱勝氣也火之色也結核火氣熱甚則鬱結堅硬如果中核也不必潰發但令熱氣散則自消也瘡瘍脈證身重脈緩濕勝除濕身熱脈大心燥時腫乍來乍去遂熱諸痛眩暈動搖脈弦去風氣澀氣滯乾燥亡津液脈澀瀉氣補血寒勝則浮食不入便溺多惡寒脈緊細宜瀉寒水丹溪論相火能動為諸病瘡瘍亦然詳見火證門癰疽當分經絡論丹溪云六陽經六陰經有多氣少血者有多血少氣者有多氣多血者不可一概論也少陽經多氣少血理宜預防肌肉難長驅毒利藥亦難輕用予從叔多慮神勞年近五十左膊外側紅腫如慄予曰勿輕視且先與人參濃湯得數升乃佳與數帖而止旬余值大風拔木瘡上起一紅線繞背抵右肋予曰大料人參湯加芎術補劑與之兩月而安李兄年三十連得憂患且好色又作勞左腿外側臁生紅腫如慄一醫與承氣兩帖下之矣又一醫教與解毒下之予視之脈大實後果死或曰生臀癰者何如予曰臀在少腹之後居其下此陰中之陰也其道遠其位僻雖太陽多血氣運雖及血亦罕來中年後生者須預補之若無積補之功其禍多在瘡成痂之後或半年以來乃病粗工不察或致失手慎之戒之病機機要云瘰癧者結核是也或在耳後或在耳前或在耳下連及頤頷或在頸下連缺盆皆謂瘰癧或在胸及胸之側或在兩脅皆謂之馬刀手足少陽主之按此謂分經用藥則不致有犯禁壞逆之失也然手少陽三焦少陰心太陰肺足少陽膽少陰腎太陰脾多氣少血手厥陰心包絡太陽小腸足太陽膀胱厥陰肝多血少氣手陽明大腸足陽明胃多氣多血也故不可一概論治況以上病例不繫膏粱丹毒火熱之變因虛勞氣鬱所致止宜補形氣調經脈其瘡當自消散蓋不待汗之下之而已也其不詳脈證經絡受病之異者下之先犯病禁經禁故致失手如此丹溪又曰才得腫痛參之脈證但有虛弱便與滋補血氣無虧可保終吉若用尋常驅熱拔毒及氣藥虛虛之禍如指諸掌且夫火熱為病亦有微甚所謂君火相火是也瘡瘍所發而有癰疽癤癧輕重淺深或止發於一經或兼二經者止當求責於一二經則不可干擾余經也若東垣處方用藥是矣矧有兼風兼濕兼痰兼氣兼血兼陰虛等證者病本不同治當求責前論雖略比之世俗外科等書圖人形瘡樣而不分經絡者此則大有徑庭矣治瘡大要三法病機機要云瘡瘍者火之屬須分內外以治其本若其脈沉實當先疏其內以絕其源也其脈浮大當先托裡恐邪氣入內也有內外之中者邪氣至盛遏絕經絡故發癰腫此因失托裡及失疏通又失和榮衛也治瘡之大要須明托裡疏通榮衛之三法內之外者其脈沉實發熱煩躁外無焮赤痛深於內其邪氣深矣故疏通臟腑以絕其源外之內者其脈浮數焮腫在外形證外顯恐邪氣極而內行故先托裡也內外之中者外無焮惡之氣內亦臟腑宣通知其在經當和榮衛也用此三法之後雖未瘥必無變證亦可使邪氣峻減而易愈瘡宜發汗論內經云汗之則瘡已東垣云東南二方者在人則為內小腸熱甲膽風小腸與膽皆居其下其性炎上其瘡外有六經之形證內無便溺之阻隔飲食如故清便自調知不在裡非疽瘡也止癰癤也小則為癤大則為癰其邪所受於下風濕之地氣自外而來侵加於身者也經云榮氣不從逆於肉理乃生癰腫諸痛癢瘡皆屬心火此瘡自外而入是丙小腸左遷入於膽作痛而非癢也此二方皆主血血為病必痛此元氣不足營氣逆行其瘡初出未有傳變在於肌肉之上皮毛之間只於風熱六經所行經絡地分出矣宜瀉其風濕熱醫者只知陰覆其陽則汗也此宜發汗者乃濕熱鬱其手足少陽致血脈凝逆使榮衛周身元氣消弱也其風熱鬱滯於下其面色必赫赤而腫微黯色東方清埋沒之色也風木之性上衝顏必忿色其人多怒其瘡之色亦赫赤腫硬微帶黯色其瘡之形勢亦奮然高起結硬而作痛也其脈止在左手左手主表左寸外洪緩左關洪緩而弦是客邪在於血脈之上皮膚之間宜急發其汗而通其榮衛則邪氣去矣以托裡榮衛湯主之謹按前論大要三法即此瘡宜汗之及先托裡恐邪氣入內言外因也宜先疏內以絕其源言內因也當和榮衛謂不內外因之證也故瘡之發於皮表者因大略言汗其汗下和之間然亦有外治之次第焉如郭氏治驗云一婦人五十九歲右耳下天容穴間患一疔瘡其頭黑靨四邊泡起黃水時流渾身麻木發熱譫語時時昏沉六脈浮洪用烏金散汗之就以鈚針先刺瘡心不痛周遭再刺十餘下紫黑血出方知疼痛就將寸金錠子紝入瘡內外用提丁錠子放於瘡上膏藥貼護次日汗後精神微爽卻用破棺丹下之病即定其疔潰動後用守效散貼塗紅玉錠子紝之八日其疔自出矣茲所謂審脈證汗下之間外治次第如此殊勝不察脈證但見發熱譫語便投涼劑與下或兼以香竄之藥遂致誤人者遠矣瘡辨五善七惡外科精要云熱發於皮膚之間浮腫根小至大不過三二寸者為癤六腑積熱騰出於外肌肉之間其發暴盛腫皮光軟侵展廣大為癰五臟風毒積熱攻焮肉骨風毒猛暴初生一如蓓蕾形自焦枯觸之應者乃疽也夫五善七惡者動息自寧飲食知味一善也便利調勻二善也膿清腫消不臭三善也神采精明語聲清爽四善也體氣和平五善也煩躁時嗽腹痛渴甚或泄痢無度小便如淋一惡也膿血大泄腫焮尤甚膿色敗臭痛不可近者二惡也喘粗短氣恍惚嗜臥三惡也目視不正黑睛緊小白睛青赤瞳子上看者四惡也肩背不便四肢沉重五惡也飲食不下服藥而嘔食不知味六惡也聲嘶色敗鼻青赤面目四肢浮腫七惡也五善見三則瘥七惡見四則危然則病有源同七惡者乃皮緊急而知善也病有源同五善者乃皮緩虛而知惡也知是者豈凡醫之所知哉此事難知論中定癰疽死之地分一伏菟二腓腨三背四五臟俞五項上六腦七髭八髩九頤謹按素問靈樞諸篇具瘡瘍之由生死之要針治之法甚詳宜玩本文大抵以上所言地分皆脈絡所會內系腑臟然患者得而早言醫者審證按法治之則皆為不死矣設不早治治不對證雖發於不死之地分乃恐亦致死矣論瘡瘍攻補法元戎云陷脈為瘻留連肉腠營氣不從逆於肉理乃生癰腫榮逆血鬱血鬱則熱聚為膿正理論曰熱之所過則為癰腫營氣不從亦有不熱者乎答曰膏粱之變芳草之美金石之過氣血不盛榮衛之氣充滿而抑遏不能行故閉塞血氣腐而為癰也當泄之以奪盛熱之氣若其人飲食疏精神衰氣血弱肌肉消薄榮衛之氣短促而澀滯故寒薄腠理閉鬱而為癰腫也當補之以接虛怯之氣亦當以脈浮沉別之既得盛衰泄之則連翹大黃補之則內托之類是也按此辨瘡瘍因熱因寒及氣血鬱而成當攻補之法不同宜與前後諸篇兼看殆無餘蘊矣但世俗昧此理而云是瘡不是瘡且服五香連翹湯然或中或否致誤者多蓋不審形氣虛實瘡毒淺深發表攻裡所因不同故也今以丹溪先生外科精要發揮諸法之義附於後方例之下庶學者幸有所鑑焉論瘡瘍宜灸元戎云瘡瘍自外而入者不宜灸自內而出者宜灸外入者托之而不內內出者接之而令外故經云陷者灸之灸而不痛痛而後止其灸灸而不痛者先及其潰所以不痛而後及良肉所以痛也灸而痛不痛而後止其灸灸而痛者先及其未潰所以痛而次及將潰所以不痛也按此亦約法也因以東垣等法附於左宜參用之凡人初覺發背欲結未結赤熱腫痛先以濕紙覆其上立視候之其紙先干處即是結癰頭也取大蒜切成片如當三錢厚薄安於頭上用大艾炷灸之三壯即換一蒜片痛者灸至不痛不痛灸至痛時方住最要早覺早灸為上一日三日十灸十活三日四日六七活五六日三四活過七日則不可灸矣若有十數頭作一處生者即用大蒜研成膏作薄餅鋪頭上聚艾於蒜餅上燒之亦能活也若背上初發赤腫一片中間有一片黃粟米頭子便用獨蒜切去兩頭取中間半寸厚薄正安於瘡上著艾灸十四壯多至四十九壯按此謂癰疽所發宜灸之也然諸瘡患久成漏者常有膿水不絕其膿不臭內無歹肉尤宜用附子浸透切作大片厚三二分於瘡上著艾灸之仍服內托之藥隔三二日再灸之不五七次自然肌肉長滿矣至有膿水惡物漸潰根深者郭氏治用白麵硫黃大蒜三物一處搗爛看瘡大小捻作餅子厚約三分於瘡上用艾炷灸二十一壯一灸一易後隔四五日方用翠霞錠子並信效錠子互相用之紝入瘡內歹肉盡去好肉長平然後貼收斂之藥內服應病之劑調理即瘥矣蓋不止宜灸於瘡之始發也大抵始發宜灸要汗下補養之藥對證至灸冷瘡亦須內托之藥切當設有反逆不唯不愈恐致轉生他病之患也瘡分三因陳無擇云發背癰疽者該三因而有之論曰癱疽瘰癧不問虛實寒熱皆由氣鬱而成經亦云氣宿於經絡與血俱澀而不行壅結為癰疽不言熱之所作而後成癰者此乃內因喜怒憂思有所鬱而成也身有熱被風冷搏之血脈凝泣不行熱氣壅結而成亦有陰虛陽氣湊襲寒化為熱熱成則肉腐為膿者此亦外因寒熱風濕所傷而成也又服丹石及灸爆酒面溫床厚被所致又盡力房室精虛氣節所致者此乃因不內外所傷而成也故知三因備矣按此所分三因雖備但未具瘡瘍之邪在經在表在裡之異故其治法亦不能詳備也論陰滯陽則生癰陽滯陰則生疽丹溪曰精要雲陽滯於陰脈浮洪弦數陰滯於陽脈沉細弱澀陽滯以寒治之陰滯以熱治之切詳其意陽滯陰滯當作熱治寒治求之寒熱固可作陰陽論於陰於陽分明是於氣於血他無可言也熱滯於氣固無寒滯耶寒滯於血固無熱滯耶何寒不能傷氣熱不能傷血耶以予觀之氣為陽行脈外血為陰行脈內相併分派周流循環一身無停止謂之脈一呼脈行三寸一吸脈行三寸呼吸定息共得六寸一身通行八十一丈得熱則行速而太過得寒則行遲而不及五味之偏七情之厚過氣為滯津液稠厚積而久也為飲為痰滲入脈內血為所亂因而凝濁運行冱泣或為沸騰此陰滯於陽也正血滯於氣也氣病今人或以藥助邪病上生病血之病日增溢出脈外墜道隘塞升降有妨運化失令此陽滯於陰也正氣滯於血也病分寒熱者當是稟受之素偏虛邪之雜合豈可以陽為熱陰為寒耶浮洪弦數氣病之脈也豈可遽此作熱論沉細弱澀血病之脈豈可遽此作寒論此萬病之根本豈止疥癬瘡瘍癰疽而已幸相評其是否明瘡瘍之本末東垣曰生氣通天論云營氣不從逆於肉理乃生癰腫又云膏粱之變足生大疔受如持虛陰陽應象論云地之濕氣感則害人皮肉筋脈是言濕氣外傷則營氣不行榮衛者皆營氣之所經營也營氣者胃氣也運氣也榮氣為本本逆不行為濕氣所壞而為瘡瘍也膏粱之變亦是言厚滋味過度而使營氣逆行凝於經絡為瘡瘍也此邪不在表亦不在裡惟在其經中道病也以上內經所說俱言因營氣逆而作也遍看諸瘡瘍論中多言二熱相搏熱化為膿者有隻言熱化為膿者又言濕氣主瘡寒化為熱而為膿者此皆瘡疽之源也宜於所見部分用引經藥併兼見證中分陰證陽證先瀉營氣是其本本逆助火濕熱相合敗壞肌肉而為膿血者此治次也宜遠取諸物以比之一歲之中大熱無過夏當時諸物皆不壞爛壞爛者交秋濕令大行之際也近取諸身熱病在身止顯熱而不敗壞肌肉此理明矣標本不得邪氣不服言一而知百者可以為上工矣營氣不從逆於肉理乃生瘡癰且營氣者胃氣也飲食入於胃先輸於脾而朝於肺肺朝百脈次及皮毛先行陽道下歸五臟六腑而氣口成寸矣今富貴之人不知其節以飲食肥醲之類雜以厚味日久太過其氣味俱厚之物乃陽中之陽不能走空竅先行陽道反行陰道逆於肉理則濕氣大勝則子能令母實火乃大旺熱濕既盛必來克腎若雜以不順又損其真水腎既受邪積久水乏水乏則從濕熱之化而上行其瘡多出背出腦此為大疔之最重者也若毒氣行於肺或脾胃之部分毒之次也若出於他經又其次也濕熱之毒所止處無不潰爛故經言膏粱之變足生大疔受如持虛如持虛器以受物物無不受治大疔之法必當瀉其營氣以標本言之先受病為本非苦寒之劑為主為君不能除其苦楚疼痛也諸瘡瘍有痛往往多以乳香沒藥雜以芳香之藥止之必無少減之理若使經絡流通臟腑中去其壅滯必無痛矣苦寒之劑除其疼痛藥下於咽則痛立已此神品藥也瘡瘍食肉乃自棄也瘡瘍者乃營氣而作也今反補之而自棄何異雖用藥施治而不能愈地之濕氣自外而入內者瘡癤當先服藥而用針如瘡癤小不欲飲藥或嬰兒之瘡先當溫衣覆蓋令其凝泣壅滯血脈溫和則出血立已者不如此血脈凝滯便針則邪毒不瀉反傷良肉又益其瘡勢也瘡瘍及諸病面赤雖伏大熱禁不得攻裡為陽氣怫鬱邪氣在經宜發表以去之故曰火鬱則發之雖大便數日不見宜多攻其表以發散陽氣少加潤燥之藥以潤之如見風脈風證只可用發表風藥便可以通利得大便行也若只乾燥秘澀尤宜潤之慎不可下也瘡瘍鬱冒俗呼昏迷是也宜汗之則愈驗瘡名色治之當從素問針經聖濟總錄易老瘡論及諸家治瘡用藥法度此為緊要臨病之際宜詳審焉謹按聖濟總錄能悉諸瘡之名色但其用藥則多主寒涼而無通變之法惟以上易老東垣等言深擷針經之大法陳脈病治例之要學者能熟此等議論則臨證處方便自胸中瞭然明白論腸癰陳無擇云癰疽初無定處隨其所發即命名在外則為發背發腦在內則為腸癰內癰心癰肺癰臍癰等證得其法則生失其法則死外證易識內證難明不可不備述也腸癰為病身甲錯腹皮急按之濡如腫狀腹無聚積身無熱脈數此為腸內有膿久積陰冷所成也故金匱有用附子溫之小腹腫痞按之狀如淋小便自調發熱身無汗復惡寒其脈遲緊者膿未成可下之當有血洪數者膿已成不可下此以內結熱所成也故金匱有用大黃利之甚者腹脹大轉側聞水聲或繞臍生瘡或膿從臍出或大便出膿血不治必死其如五內生瘡亦止分利陰陽而已不比外癰須依四節八事之次第也脈經引官羽林婦病醫診之其脈滑而數滑則為實數則為熱滑則為榮數則為衛衛數下降榮滑上升榮衛相干血為濁敗少腹痞堅小便或澀或時汗出或復惡寒膿為已成設脈遲緊即為瘀血血下即愈更內經所載有息積病此見有得之二三年遍身微腫續乃大腸與臍連日出膿遂致不救此亦腸癰之類也不可不審按此言內癰腸癰等候語約而精脈經與此大同小異宜並詳審可也瘡瘍治法純早年居淮南於陳復初契家齋堂得東原郭文才甫家傳瘡科心要二卷持行四方按法每擇用之多獲奇效故不敢湮沒其道因取東垣先生諸試效法雜以古今名方於下每附丹溪先生外科精要發揮之旨以為通變之義亦學者之一助云辛涼發散之劑東垣黃連消毒散治癰疽發於腦項或背太陽經分腫勢外散熱毒焮發麻木不痛者宜先灸之或痛而發熱並宜服此黃連制羌活各一錢黃芩黃柏各半錢酒製生地黃知母制獨活防風當歸尾連翹各四分藁本防己桔梗各半錢黃耆蘇木陳皮澤瀉各二分人參甘草各三分上㕮咀水煎按元好問記云素飲酒於九月中患腦之下項之上出小瘡後數日腦項麻水腫勢外焮瘍醫遂處五香連翹至八日不下而云不可速療十八日得膿俟膿出用藥或砭刺三月乃可平四月如故予記醫經凡瘡見膿九死一生果如醫言則當有束手待斃之悔矣乃請明之診視且謂膏粱之變不當投五香五香已無及當先用火攻之策然後用藥以大艾炷如兩核許者攻之至百壯乃痛覺次為處方云是足太陽膀胱之經其病逆當反治脈中得弦緊按之洪大而數又且有力必當仗其所主而先其所因其始則同其終則異可使破積可使潰堅可使氣如可使必已必先歲氣無伐天和以時言之可收不可汗經與病禁下法當結者散之咸以䎡之然寒受邪而禁咸諸苦寒為君為用甘寒為佐酒熱為因用為使以辛溫和血大辛以解結為臣三辛三甘益元氣而和血脈淡滲以導酒濕扶持秋令以益氣瀉火以入本經之藥和血且為引用既以通經為主用君以黃芩連柏生地黃知母酒製之本經羌活獨活防風藁本防己當歸連翹以解結黃耆人參甘草配諸苦寒者三之一多則滋營氣補土也生甘草瀉腎之火補下焦元氣人參橘皮以補胃蘇木當歸尾去惡血生地黃補血酒製防己除膀胱留熱澤瀉助秋去酒之濕熱凡此諸藥必得桔梗為舟楫乃不下沉投劑之後疽當不痛不拆食進體健如言服之投床大鼾日出乃寤以手捫瘡腫減七八至瘡痂斂都十四日而已世醫用技豈無取效者至於治效之外乃能歷數體中不言之秘平生所見惟明之一人而已詳見試效方內托羌活湯治足太陽經中左右尺脈俱緊按之無力尻臀生癰堅硬腫痛大作羌活黃柏酒製各二錢防風藁本當歸尾各一錢肉桂三分連翹甘草炙蒼朮陳皮各半錢黃耆一錢半上㕮咀水酒各半煎食前溫服取汗白芷升麻湯治手陽明經分臂上生癰左右寸部脈皆短中得之俱弦按之洪緩有力此得之八風之變者也白芷一錢半升麻桔梗各一錢甘草炙半錢黃耆黃芩酒製各四錢生黃芩三錢紅花半錢上㕮咀作二服每水酒各半煎食後溫服內托黃耆柴胡湯治瘡生腿內近膝股或癰或附骨癰初起腫痛勢大此足大陰厥陰之分脈細而弦按之洪緩有力黃耆二錢柴胡一錢羌活半錢連翹一錢半肉桂三分土瓜根酒製一錢生地黃二分黃柏二分當歸尾七分上㕮咀作一服水二分酒一分煎食前服內托黃耆酒煎湯治瘡生腿外側或因寒濕得附骨癰於足少陽經分微侵足陽明經堅硬漫腫行步作痛或不能行柴胡一錢半連翹肉桂大力子炒各一錢黃耆當歸尾各二錢黃柏半錢升麻七分炙甘草半錢上㕮咀水酒各半煎食前服按以上諸方有脈病證治之例立方之旨皆東垣試效法也學者識之則臨病處方當有所據矣當歸拈痛湯治一切風濕熱毒浸淫瘡瘍下注濕毒腳膝生瘡赤腫裡外臁瘡膿水不絕或癢或痛脈沉緊實數動滑者並宜服之羌活半兩人參苦參酒製升麻葛根蒼朮各二錢炙甘草黃芩酒製茵陳葉酒炒各半兩防風當歸身知母酒製澤瀉豬苓各三錢白朮一錢半上㕮咀每服一兩水煎空心服臨睡再服之按此足太陽陽明三陰藥也東垣本處為治腳氣濕熱之劑然世人用治以上諸瘡甚驗故錄之內托升麻湯治婦人兩乳間出黑頭瘡瘡頂陷下作黑眼子其脈弦洪按之細小宜服之並乳癰初起亦治升麻葛根連翹各一錢半肉桂三分黃耆一錢當歸身一錢黍黏子半錢黃柏二分炙甘草一錢上㕮咀作一服水二分酒一分同煎食後服按此足陽明厥陰藥也散腫潰堅湯治馬刀瘡結硬塊子堅如石者在耳下至缺盆中或至肩上或入脅下皆手足少陽經中及瘰癧遍於頦或至頰車堅硬如石在足陽明經中所出或二證瘡已破流膿水並皆治之柴胡四錢升麻三分草龍膽半兩酒製炒黃芩八錢二半酒炒炙甘草三錢桔梗半兩連翹三錢栝蔞根半兩酒製當歸尾白芍各二錢黃柏酒製去皮知母酒製各半兩葛根二錢黃連一錢京三稜酒製微炒廣朮制如上各三錢昆布淨半兩上件㕮咀每服六錢或七錢水二盞八分先浸多半日煎至一盞去渣熱服於臥處身腳在高處頭低垂每含一口作十次咽服畢依常安臥取藥在膈上停蓄故也另攢半料作極細末煉蜜為丸如綠豆大每服百丸或百五十丸用此湯一口送下食後服之藥多少量病人虛實應服藥皆效此例升麻調經湯治頦下或至頰瘰癧此證出足陽明胃之經中來也若瘡深遠隱曲肉底是足少陰腎中來也乃戊傳癸腎是夫胃傳妻俱作塊子堅硬大小不等並皆治之或作丸服亦得升麻八錢葛根五錢草龍膽酒製炒黃芩酒製各半兩當歸尾三錢桔梗連翹各半兩芍藥三錢黃柏酒炒一錢知母酒炒一兩黃連廣朮酒炒甘草炙京三稜酒炒各半兩生黃芩四錢上件另秤一半作末蜜為丸如綠豆大每服百丸或百五十丸一半多作㕮咀每服秤半兩若能食便硬可旋加至七八錢服如潰堅湯法此制之緩也連翹散堅湯治耳下至缺盆或至肩上生瘡堅硬如石動之無根名曰馬刀從手足少陽經中來也或生兩脅或已流膿作瘡未破皆治之柴胡一兩二錢連翹當歸尾酒製芍藥生黃芩各半兩炙甘草三錢土瓜根酒炒草龍膽酒製四次各一兩蒼朮二錢黃芩酒炒二次二錢黃連酒炒二次二錢廣朮京三稜細切各半兩同廣朮酒製一次微炒乾上件另秤一半蜜丸如綠豆大如上法服㕮咀和勻每服半兩服如上法亦緩治之按以上三方本於經分用藥潰堅散郁之劑也消腫湯治馬刀瘡柴胡二錢連翹三錢當歸尾甘草各一錢生黃芩二錢紅花少許黃連黍黏子炒各半錢栝蔞根黃耆各一錢半上件每服半兩或一兩水煎熱服食後按此足少陽例藥也柴胡通經湯治小兒項側有瘡堅而不潰名曰馬刀柴胡連翹當歸尾黃芩生甘草黍黏子桔梗京三稜各二分紅花少許黃連五分上㕮咀作一服水煎稍熱服按此手少陰太陰足少陽厥陰藥也東垣諸法類此者甚多茲不詳錄郭氏亦有治瘰癧數方本攻裡內消之劑故附於後雜方內郭氏升麻牛蒡子散治時毒瘡疹脈浮洪在表者瘡發於頭面胸膈之際升麻牛蒡子甘草桔梗葛根玄參麻黃各一錢連翹二錢上㕮咀姜三片水二盞作一服中和湯治時毒脈弦洪在半表裡者菖蒲牛蒡子羌活川芎防風漏蘆荊芥麥門冬前胡甘草上㕮咀每服一兩水煎按此並出足太陽陽明例藥也機要方治結核耳前後或耳下頷下有者皆瘰癧也桑椹二斗極熟黑色者以布裂取自然汁砂器內文武火慢熬成薄膏子每日白湯點一匙食後日三服辛平發散之劑良方升麻和氣飲治瘡腫癤疥癢痛甘草陳皮各一兩半芍藥七錢半大黃半兩煨乾葛蒼朮桔梗升麻各一兩當歸半夏茯苓白芷各二錢乾薑枳殼各半錢三因方有厚朴半錢上㕮咀每服一兩水煎按此手足太陰陽明經藥也五積散加減法世俗多用之故收入蓋欲燥脾胃勝濕和氣為治瘡之劑然臨證而不通變恐未合宜也當歸飲子治瘡疥風癬濕毒燥癢瘡當歸白芍川芎生地黃白蒺藜防風荊芥各一兩何首烏黃耆甘草各半兩上㕮咀每服一兩水煎或為末每服一二錢亦得按此疏風熱之劑手足三陰藥也血虛者不可缺此聖濟總錄金針散治發背諸瘡腫皂角針春取一半新採一半黑者上一味不拘多少曬乾為末食後酒調二三錢服按丹溪曰此藥治癰疽已破未破皆用直劗領到潰處意謂當入群隊中用也辛溫發散之劑局方托裡十補散黃耆人參當歸各二錢厚朴桔梗川芎防風桂心甘草白芷各一錢上㕮咀水煎謹按衛生寶鑑曰諸痛癢瘡瘍皆屬心火言其常也如瘡盛形羸邪高痛下始熱終寒此反常也固當察時下之宜而權治故曰經者常也法者用也醫者意也隨其宜而治之可收十全之功矣故此方用之於癰疽初發或已發或內托然瘡證脈緩澀或身倦惡寒熱少脈弦或緊細者宜用之散風寒助陽之劑也表裡氣血之藥若施之於積熱焮毒更不分經絡時宜不能不無誤也丹溪曰精要謂排膿內補十宣散治未成者速散已成者速潰誠哉是言也若用之於些小癰疽與冬月時令盡用內托之功若於冬月腫瘍用之亦可轉重就輕移深於淺若潰瘍於夏月用之其桂樸之溫散佐以防風白芷吾恐雖有參耆難為倚仗比見世人用此者不分癰疽冬夏無經絡無前後如盲人騎瞎馬半夜臨深池危哉十六味流氣飲治無名惡腫癰疽等證川芎當歸芍藥防風人參木香黃耆官桂桔梗白芷檳榔厚朴烏藥甘草紫蘇枳殼上㕮咀水煎按此表裡氣血藥也復以疏風助陽之劑世俗多用之故收入非脈之洪緩沉遲緊細者不宜用此每見外科諸家載此往往不分經絡脈證不具時宜但云化毒消腫有云不退者加以補氣血之藥蓋又使人不能無疑也用者當觸類而長之可矣郭氏神效烏金散治癰疽疔腫時毒附骨疽諸惡瘡等證若瘡黑陷如石堅四肢冷脈細或時昏冒譫語循衣煩渴危篤者服此汗之瘡起蒼耳頭五月五日午時效小草烏頭火麻頭火日收採木賊去節蝦蟆頭樺皮節酥炙麻黃去根節上曬乾各等分同入瓷器內鹽泥固濟炭火內從早煆至申分如黑煤色為度碾為末每服二錢病重者三錢用熱酒調下未汗再一服如汗乾卻服解毒疏利之藥如修合此藥必選天睛好日於靜室中勿令雞犬貓畜及陰人見也又名首功玄黑散奪命丹治諸般腫毒疔疽惡瘡蟾酥輕粉各半錢硃砂三錢白礬枯寒水石銅綠各一錢蝸牛二十一個別研乳香沒藥麝香一錢上件為細末將蝸牛別研一處丸如丸不就用好酒糊和丸如綠豆大每服一丸生蔥三五莖嚼極爛吐於手心包藥在內熱酒和蔥送下如重車行五七里汗出為效重者再服一二丸蟾酥丸治療黃一切惡瘡川烏蓮花葉硃砂各一錢半乳香沒藥各二錢輕粉蟾酥各一錢麝香半錢上為細末糊丸菀豆大每服一丸病重者二丸依前法服取汗按以上三方郭氏稱為首藥皆主乎發散散出太陽例後二方出少陰例然皆劫劑也智者當較輕重陰陽之分取擇用之東垣托裡榮衛湯治證見前瘡宜發汗論黃耆紅花桂枝各五錢蒼朮三錢柴胡連翹各二錢羌活防風當歸身炙甘草黃芩各一錢半人參一錢上㕮咀每服一兩水酒各半煎按此足三陽太陰經藥出桂枝例表裡氣血之劑也辛熱發散之劑托裡溫中湯治瘡為寒變而內陷者膿出清解皮膚涼心下痞滿腸鳴切痛大便微溏食則嘔氣短吃逆不絕不得安臥時發昏憒羌活三錢附子炮去皮四錢乾薑炮三錢益智仁丁香沉香木香茴香陳皮各一錢炙甘草二錢上㕮咀作一服水三盞生薑五片煎服衛生寶鑑曰經云寒淫於內治以辛熱佐以苦溫以蓋附大辛熱溫中外發陽氣自里之表以為君羌活苦辛溫透關節炙甘草溫補脾胃行經絡通血脈胃寒則嘔吐吃逆不下食益智丁沉大辛熱以散寒為佐瘡氣內攻氣聚而為滿木香陳皮苦辛溫治痞散滿為使按此手足太陽陽明三陰經藥也辛涼攻裡之劑機要內疏黃連湯治瘡皮色腫硬發熱而嘔大便閉脈洪實者黃連芍藥當歸檳榔木香黃芩梔子薄荷桔梗甘草各一兩連翹二兩大黃二兩半上㕮咀每服一兩入姜煎按此本黃連湯加大黃手足少陽足陽明太陰手三陰之藥也丹溪曰精要以大黃治癰疽之要藥以其宣熱拔毒第二論曰瘡始作皆須以大黃等藥極轉利之又排日不廢繼又自言患癰疽者每有瀉泄皆是惡候此又不能無疑者也借曰前說用大黃恐因病體實而大腑秘結有積熱沉痼之疾者發也止可破結導滯推令轉動而已豈可謂極轉利之而且排曰不廢若利下之後又與利藥恐非防微杜漸之意瘡之始作即周禮腫瘍之時也腫在肌肉若非大滿大實堅之證自當行仲景發表之法借五香湯為例散之於外何必遽以峻下之藥奪其里自取其禍切詳河間謂地之濕氣感則害人皮肉筋脈其在外盛而內行其脈沉實當先疏其內以絕其源又謂嘔啘心逆發熱而煩脈沉而實硬腫發悶皮肉不變色根深而大病在內臟腑秘結當急疏利之宜黃連湯先服一二帖次加大黃未效再加二錢以利為度如有熱證只與黃連湯無熱證少煎內托復煎散時時呷之如此則內外皆通血氣流行彼加大黃者自因體實而腑秘也未當如此之多聖濟射干散治瘡疽發背諸瘡腫痛脈洪實數者射干犀角升麻玄參黃芩麥門冬大黃各一兩山梔半兩上㕮咀每服五錢加竹葉芒硝一錢以利為度按此足陽明手太陰經藥也托裡散治一切惡瘡發背丁疽便毒始發脈洪弦實數腫甚欲作膿者三服消盡大黃牡蠣栝蔞根皂角針朴硝連翹各三錢當歸金銀花各一兩赤芍黃芩各二錢上為粗末每半兩水酒各半煎服按此足厥陰太陰陽明經葉也破棺丹治諸熱腫一切風熱瘡證發熱多汗大渴便閉譫語結陽之證大黃二兩半半生半熟芒硝甘草各二兩上為末煉蜜丸彈子大每服半丸病重一丸至二丸食後童便入酒半盞化服之或白湯合酒化服按此仲景正陽陽明經藥也瀉心湯治瘡毒癰腫發躁煩渴脈實洪數者大黃四兩黃連山梔漏蘆澤蘭連翹黃芩蘇木各二兩犀角一兩上㕮咀每服三五錢水煎服按此手少陰太陰少陽藥也出足陽明例辛平攻裡之劑郭氏瑞效丸治腸癰胃癰內積兼男子婦人積聚證當歸京三稜檳榔木鱉子穿山甲炒各一兩牡蠣為末炒山甲都用連翹枳殼炒各一兩半硇砂焙琥珀各一兩巴豆二十一粒去油麝香少許上為末酒糊丸桐子大每服十丸至二三十丸溫酒下臨臥再服如利動臟腑減丸數大小便有膿血出者卻用別藥調治之萬靈奪命丹郭氏又名延壽濟世膏如意金丹廣效保命丹硃砂備急膏三教濟世膏仙授靈寶膏聖僧慈救膏蓋實一藥也治一切瘡腫疔疽初起脈沉實及服汗藥後毒氣在裡不盡者宜此下之硃砂鹽花各二錢半雄黃明礬生用楓香各二錢黃丹赤石脂琥珀輕粉各一錢半麝香片腦各一錢巴豆去殼水煮十沸蓖麻另研各四十九粒上為末用巴豆蓖麻子膏和藥為丸如和不就加煉蜜就成膏收瓷器內如用時旋丸如雞頭大每服一丸井花水下或湯亦得忌熱物半日大人小兒以意加減與服謹按郭氏用藥格式云凡人患一切瘡腫若脈在表者先服首功玄黑散或奪命丹蟾酥丸之類選用汗之繼服廣效保命膏或化毒涼劑下之若脈在裡者便只服延壽濟世膏或破棺丹下之病屬裡不必汗之故也如是有頭瘡疽就便用硃砂備急膏一丸如黃豆大安於瘡頭上卻用軟黏膏藥蓋護之其瘡必破如瘡暈紫黑色外用宣毒散周圍敷住毒氣如瘡暈赤紅色用水澄膏敷之次日用緊峻碧雲錠子開了瘡口次用緊緩碧霞錠子去其歹肉稍淨卻用緩慢碧玉錠子生肌總名青金錠子不拘日數直待歹肉去淨單用膏藥貼之候膿水盡肌肉平方許貼生好肌斂口之藥若依此法免教人受刀剪針烙之苦如是無頭癰腫待膿成用針刺破方依法收功也愚詳瘡之汗後或始有頭癰疽便用是藥後施錠子雖有次第然病體亦有積熱或風毒氣鬱等證若待開潰次第用藥及無頭癰腫待膿成用法而又不及東垣法之通變神速也如瘡潰動或結歹肉疔疽堅硬卻次第用外治之法方可辛熱發表攻裡之劑飛龍奪命丹治一切疔瘡惡腫癰疽初發或發而黑陷毒氣內陷者天南星雄黃巴豆各一錢硇砂黃丹信石乳香各半錢斑蝥十六個去翅足麝少許上為末取蟾酥和為丸如黃黍米大每服十一二丸或十四五丸看瘡上下食前後以好酒送下量人虛實與之忌油膩魚肉葷物七日按此方世俗多用之故收入然香竄燥毒之劑蓋無經不至者故能宣泄備汗吐下三法病因食一切禽畜毒發所致及瘡脈沉緊細數毒蘊在裡並濕毒用之神效但世人多不分此更不審瘡之大熱大渴毒氣焮發而脈浮洪在表及膏粱積熱之人未宜輕舉況有以半夏代雄黃殊不知雄黃治諸瘡及百節中大風中惡者之意此與郭氏二方皆手少陰例藥茲則表裡法也辛平發表攻裡之劑五香連翹湯治諸瘡腫初覺一二日便厥逆喉咽塞發寒熱沉香木香麝香連翹射干升麻丁香獨活桑寄生炙甘草各一兩大黃一兩半木通乳香各二兩上㕮咀每服五錢水一盞半煎七分溫服取利按丹溪曰精要第一論云不問癰疽瘡癤虛實冷熱先與內托散五香連翹湯沉麝湯等諸方不冷不熱不問老幼少壯陰陽虛實冷熱多服為妙夫癰疽瘡癤臟腑陰陽有淺深虛實冷熱用藥有補瀉溫涼老幼少壯其稟受厚薄形志苦藥隨年歲而增損奈何欲以不冷不熱四五方而通治之又以多服為妙此不能無疑也學者當審經絡察病機而處治大抵豈可仗此為通治之法辛涼發表攻裡之劑千金漏蘆湯治積熱丹毒無名惡腫脈洪實弦滑發熱煩熱者漏蘆麻黃升麻赤芍黃芩甘草白蘞白芨枳殼各四兩大黃十二兩上㕮咀每服一兩入姜煎按此出陽明例藥也驅積熱蘊於表裡之劑防風通聖散方見中風門按此表裡氣血之藥也治一切風毒積熱瘡腫脈候弦洪實數浮緊氣血盛實有不可缺此見近有秘傳外科家方以是藥加人參赤茯苓黃耆蒼朮金銀花名消腫托裡散雖以參耆為主復云人參無亦可蓋使人不能無疑而難用也且臨證加減須較表裡之法如表證多者當從此方以辛甘為主散之也里證多者方可從變故此分辛溫辛平辛涼之異內托之劑機要內托復煎散托裡健胃地骨皮黃芩茯苓白芍人參黃耆白朮桂甘草防己當歸各一兩防風上㕮咀先以蒼朮一斤水五升煎至三升去朮入前十二味再煎至三四盞取清汁分三四次終日飲之又煎蒼朮查為湯去渣依前又煎前十二味渣分飲之五香湯治毒氣入腹托裡若有異證於內加減丁香木香沉香乳香各一兩麝三錢上為末水煎空心服若嘔者去麝加藿香一兩渴者加參一兩按丹溪曰或問內托之法古人有行之者乎曰河間治腫焮於外根盤不深形證在表其脈多浮病在皮肉非氣盛則必侵於內急須內托以救其里宜復煎散除濕散郁使胃氣和平如或未已再煎半料飲之如大便秘及煩熱少服黃連湯如微利及煩熱已退卻與復煎散半兩如此使榮衛俱行邪氣不能內傷也然世俗多用十補散論已見前聖濟托裡湯治諸疔腫發背曾經汗下毒氣投心迷悶嘔吐而痛可服二三次又名內托散乳香明者一兩真綠豆粉四兩一方止用二兩上二味合勻每服一錢或二錢甘草煎湯調下按丹溪曰精要謂內托散一日至三日之內進十數服防毒氣攻衝臟腑名護心散切詳綠豆解丹毒又言治石毒味甘入陽明性寒能補為君以乳香去惡腫入少陰性溫善竄為佐甘草性緩解五金八石及百藥毒為使想此方專為服丹石而發疽者設不因丹石而發疽恐非必用之劑又次與五香連翹湯射干散散結氣消瘀血夫善於驅逐以五般香竄佐之與漏蘆湯相間大黃為佐雖各有黃耆漏蘆甘草之補果能免驅逐之禍乎況大黃入陽明太陽性走而不守瀉諸實熱以其峻捷有將軍之名癰疽因積毒在臟腑非一朝夕今發於外宜以標重為治當先助氣壯胃使根本堅固而行經活血為佐參以經絡時令使毒氣外發此正仲景解表用麻黃桂枝之意治施之早可以內消此乃內托之本意與夫年老者病深者證備者體虛者綠豆雖補將有不勝重任之患矣嘗治一婦人年將七十形實性急而好酒腦生疽方五日脈緊急且澀急用大黃酒煨細切酒拌炒為末又酒拌人參炒入姜煎調一錢重又兩時再與得睡而上半身汗睡覺病已失此亦內托之意又一男子年五十餘形實色黑背生紅腫及胛骨下痛其脈浮數而洪緊食亦嘔正冬月與麻黃桂枝湯加酒黃柏生附栝蔞子甘草節羌活青皮人參黃芩半夏生薑六帖而消此非內托之意歟如此者非一不敢悉具郭氏定疼托裡散治一切瘡腫疼痛不可忍如少壯氣實先用疏利後服此藥粟殼去蒂炒三兩當歸白芍川芎各半兩乳香沒藥桂各三錢上㕮咀每服五錢水煎乳香止痛散治一切瘡腫疼痛不止粟殼六兩制白芷三兩炙甘草陳皮各二兩乳香沒藥各一兩丁香半兩上㕮咀每服三錢水一盞半煎按丹溪曰精要第十三論云初覺則宣熱拔毒既潰則排膿止痛豈瘡之初作無痛耶已潰之後痛又甚耶每見瘡之作也先發為腫氣血鬱積蒸肉為膿故其痛多少瘡之始作時也膿潰之後腫退肌寬痛必漸減而反痛者此為虛也宜補之亦有穢氣所觸者宜和解之亦有風寒逼者宜溫散之審此則以上二方因有所取擇矣東垣黃耆人參湯治諸瘡破後食少無睡及有虛熱並穢氣所觸者人參麥門冬陳皮白朮蒼朮各半錢黃耆一錢黃柏四分炒升麻六分當歸身半錢炒曲三分炙甘草半錢五味子九個上㕮咀作一服水煎按此手足太陰例藥也聖濟竹葉黃耆湯通治疔腫諸瘡發熱而渴淡竹葉二兩生地黃八兩麥門冬黃耆當歸川芎甘草黃芩芍藥人參半夏石膏各二兩上㕮咀每服一兩水煎按此於少陰太陰足陽明藥也托裡黃耆湯治諸瘡發渴脈虛綿黃耆一兩炙甘草一錢上㕮咀水煎東垣聖愈湯治諸瘡血出多而心煩不安不得眠睡此亡血也熟地黃生地黃川芎人參各半錢當歸身黃耆各一錢上㕮咀水煎按以上二方手足太陰之劑一氣分一血分藥也內補黃耆湯治諸瘡腫發背已破後虛弱無力體倦懶言語食無味少睡脈澀自汗口乾並宜服之黃耆麥門冬各一兩熟地黃人參茯苓炙甘草各三錢白芍川芎官桂遠志當歸各半兩上㕮咀或為末每服三錢入薑棗煎按此手太陰例藥也補氣血滋陰助陽之劑聖濟透膿散治諸般癰瘡及貼骨癰不破者宜此不用針刀大蠶繭兒一個燒灰酒調服即透切不可用兩三個恐瘡口亦作兩三孔也按瘡腫有於皮肉厚處發者此法恐不能及用者審之外治之劑郭氏青金錠子銅綠三錢青礬膽礬輕粉砒霜白丁香苦葶藶各一錢腦子麝香各少許上將葶藶研細次下余藥同研極細打稠糊為錠子或煉蜜加白芨末一錢為錠如麻黃粗細二三寸長看瘡口深淺紝入疼者可治不疼難治第一般緊峻碧雲錠子砒霜生開瘡口用第二般緊緩碧霞錠子砒霜煆去死肉用第三般緩慢碧玉錠子去砒加枯礬生好肉用翠霞錠子治年深冷痛日久惡瘡有歹肉用之銅綠寒水石煆滑石各三錢明礬膩粉砒霜雲母石研如粉各一錢二分半上研細末糊為錠子如麻黃粗細長短不拘量瘡口深淺紝之如修合此候天色晴明則可信效錠子治一切惡瘡紅娘子黃丹砒霜鷹屎土硝白芨各一錢半銅綠二錢半腦子麝香各少許上研細末廝兒乳汁和為錠子用中病即止寸金錠子治疔毒惡瘡硃砂二錢黃丹明礬枯砒霜輕粉花咸白芨各一錢半蟾酥腦子麝香少許上研極細末稠糊和為錠子用之紅玉錠子去歹肉生肌用干胭脂白礬枯各三錢輕粉砒霜黃丹腦子麝香少許上研極細末稠糊和錠子用之提丁錠子又名透肉錠子治疔瘡危篤發昏兼治瘰癧雄黃硃砂各二錢青鹽砒霜生白丁香輕粉斑蝥去翅足各一錢半蟾酥麝香各一錢黃蠟蓖麻子三七粒上為細末於銀器內或瓷器內先將蠟溶開和前藥丸如桐子大捻作餅子用針刺破疔瘡放一餅於瘡頭上又刺四邊五七下惡血出為妙卻用軟膏藥貼之立驗內服首功玄黑散或蟾酥丸翠青錠子又名善效錠子治腦疽發背惡瘡並潰爛追膿水長肌銅青四錢明礬枯韶粉乳香另研青黛各一錢半白蘞輕粉各一錢麝半錢杏仁三七粒另研去皮尖如有死肉加白丁香一錢半上研細末稠糊為錠子或糯米飯和亦得看淺深紝之直至瘡平復尤可用之大有神效如前數方不可多用謂犯生砒也此藥無毒恐病家猜疑是毒藥請口內嘗之為憑也搜膿錠子先用追蝕等錠子蝕去歹肉惡物止有膿水皆宜用之自然銅川芎白芷各半兩黃連白蘞各二錢半木香一錢半麝香少許上為極細末糯米飯和為錠子用之或作散末幹上亦佳守效散點疔瘡惡肉砒生白丁香松香輕粉川烏生礬各一錢蜈蚣一條焙上為極細末鈚針刺破瘡口令血出唾津調藥貼之瘡上其根自潰時效針頭散追蝕惡瘡歹肉兼治瘰癧赤石脂半兩乳香白丁香各二錢砒生黃丹各一錢輕粉麝各半錢蜈蚣一條焙乾上為極細末摻於瘡口歹肉自去矣若動刀針其瘡雖可有瘢神聖換肌散去瘰癧頑瘡白殭蠶二錢白礬一錢半砒生斑蝥去翅足草烏頭青黛各一錢麝少許上研極細末乾摻些小於瘡口內用膏藥蓋護其惡肉化為膿水雄黃散治癰疽發背紫暈疼痛不止粟米小粉三兩炒草烏南星絡石百合各一兩白芨二兩乳香沒藥雄黃黃丹各半兩上極細末溫水調敷之水澄膏治風熱腫毒赤紅色攻焮疼痛不止白芨白蘞四錢鬱金一對大黃黃柏黃藥子榆皮各七錢半乳香沒藥雄黃各半兩上細末用新汲水一碗藥末不以多少澄於水內藥定去水敷於腫處上用白紙封之用雞翎掠水濕潤金黃散治熱毒丹流遊走不定疼痛不止寒水石二兩鬱金一對藍實大黃黃柏黃連景天各一兩上細末用雞子清調敷水亦可乳香散治諸疳浸蝕日久不愈下注臁瘡內外踝生瘡頑瘡等證枯礬白膠香赤石脂各半兩黃丹乳香沒藥各二錢輕粉二錢上細末加麝些小如瘡濕幹上干則香油調敷之輕粉散治下注疳瘡蝕臭腐爛疼痛不可忍者黃柏蜜炙密陀僧黃丹高末茶乳香各三錢輕粉一錢半麝少許上末用蔥湯洗瘡後次貼此藥兼治小兒疳瘡奇功散治瘰癧馬刀頑惡等瘡野糞尖幹一兩密陀僧無名異各半兩皂角乳香沒藥各三錢上糞用鹽泥封固炭火燒之去泥取出同藥五味研為末加麝香少許用清油調勻漫敷上濕即乾摻其功神妙立應散治金瘡血出不止並諸瘡久不生肌寒水石一兩半煆花蕊石龍骨黃丹沒藥各半兩黃藥子七錢半一方加白芨乳香輕粉上為細末如一切金刃刀鐮傷者用藥敷上絹帛扎之不作膿血瘡膿水乾貼生肌定疼以上並郭氏方祛風散治一切風毒腫痛天南星二兩白礬草烏各半兩上為末酒調敷生薑汁亦可聖濟方治疔瘡蜣螂心腹下肉稍白者上捕取不以多少貼瘡上半日許未可再上之血盡根出神效走馬散圍一切惡瘡諸腫神效大黃三兩黃柏當歸白芨赤小豆黃芩各二兩荊芥穗半夏各一兩半白芷白蘞南星各一兩檀香雄黃各三錢乳香七錢沒藥五錢紅花一兩上為細末以水調敷如瘡色黯薑汁調瘡未成膿者好米醋調敷乳香善應膏治一切腫毒惡瘡大黃黃耆赤芍杏仁各一兩當歸七錢半穿山甲豬牙皂角各二錢半木鱉子三錢乳香沒藥各半兩血竭輕粉各二錢半黃丹七兩香油一斤上除黃丹乳沒血輕五味外其餘銼於油內浸十餘日砂鍋內熬藥色微黑用槐柳條攪之濾去渣物淨用油入丹熬成膏滴水中不散然後入乳香等四味攪勻為度攤紙上貼瘡至寶玉連膏治一切瘡腫黃連二兩黃柏黃芩大黃生地黃赤芍川椒杏仁白芷桂豬牙皂角當歸尾各半兩蔥白七根淨髮一拳大槐柳榆桑梔柏桃枝條各三錢以上用真香油二斤春浸五日夏三秋七冬十日如上法熬微焦黑濾去渣入松香四兩黃丹碾節淨十兩用藥油熬成膏滴入水中不散然後入下項藥乳香沒藥朴硝龍骨枯礬血竭各半兩輕粉膽礬麝香各二錢共為細末入膏內上用淨瓷器盛頓旋攤紙上貼收斂之劑生肌散白礬枯檳榔各一兩密陀僧一錢半黃丹血竭各一錢輕粉半錢紅玉散軟石膏半兩煆黃丹一錢半炒完肌散定粉枯礬黃連乳香龍骨各二錢黃丹輕粉各一錢上各料為極細末貼瘡口生肌長肉看輕重選用之雜方脂調散治疥瘡膿窠瘡神效蛇床子二兩䕡茹草烏花椒苦參荊芥各一兩雄黃硫黃礬各半兩上為細末豬脂調搽羌活散治頑癬疥癩風瘡成片流黃水久不瘥者羌活獨活明礬硫黃狼毒白鮮皮白附子蛇床子各一兩輕粉黃丹上細末香油調成膏搽之雄黃散治癬桎皮剪草各一兩礬白芨各半兩雄黃二錢半斑蝥七個去翅足草烏頭尖四個上為末水調敷津唾亦可楓實膏治風瘡燥癢癬疥大楓子肉半兩輕粉枯礬各些小上搗為膏擦瘡上一上散治風癢裂折燥瘡苦參一兩白芷焰硝枯礬各半兩荊芥穗三錢寒水石二兩煆白芨三錢上為末油調搽聖濟烏蛇丸治一切風癬多年不效者烏蛇酒浸去骨天麻各二兩槐花半斤附子小便浸宿白附子炮各一兩全蠍炒殭蠶炒羌活乳香各一兩半苦參十兩上為細末生薑汁和蜜各一斤熬成膏入藥和為丸桐子大每三四十丸空心溫酒下夜荊芥湯下宣風換肌散治一切風癬疥瘡疙瘩風瘡炙甘草黃耆當歸各一兩黃連黃芩各酒浸炒大力子炒防風白芷荊芥穗川芎烏蛇肉各半兩羌活蒼朮何首烏各三錢全蠍十個炒上為細末酒調服茶清亦可下二錢東垣內托升麻湯治婦人乳中結核栝蔞仁三錢連翹二錢甘草節青皮各一錢上作一服水煎食後細細呷之連翹飲子治乳癰青皮栝蔞仁桃仁橘葉川芎連翹甘草節皂角針各等分上㕮咀每服七八錢水煎食後細細呷之已破者加參耆當歸未破者加柴胡消毒飲治便毒初發三四日可消皂角針金銀花防風當歸大黃甘草節栝蔞仁各等分上㕮咀水酒各半煎食前溫服仍頻提掣頂中發立效下疳瘡洗藥黃連黃柏當歸白芷獨活防風朴硝荊芥上等分水煎入錢五十文烏梅五個鹽一匙同煎溫洗日五七次用下藥敷木香檳榔黃連銅青輕粉枯礬螵蛸麝各等分上為極細末洗後至夜敷上法制靈雞彈治瘰癧馬刀腋下生者斑蝥七個去頭翅足上將雞子一個頂上敲開些小入藥在內紙封固了於飯上蒸熟取出去殼切開去藥五更空心和米飯嚼服候小便通如米泔水狀如脂即驗也如大小便不通卻服琥珀散三二帖催之然後常服後二藥猶佳妙靈散服前藥後卻將此散與連翹丸相間常服瘡愈方止木香三錢沉香二錢牛膝何首烏當歸螵蛸桑寄生各一兩海藻二兩青葙子昆布海帶甘草節各半兩上末每服三二錢食後溫酒調下內消連翹丸連翹三兩射干白芨夏枯草土瓜漏蘆沙參澤蘭胡桃仁各一兩半上末入桃仁研勻酒糊丸桐子大每服三五十丸空心食前鹽酒下琥珀散治諸般瘡癤表裡有熱小便赤澀白茯苓黃芩茵陳紫草瞿麥茅根石韋烏藥琥珀連翹車前子上各等分為極細末每二三錢燈芯湯調下無時聖濟總錄治漆瘡諸方生柳葉三斤冬用皮煎湯適寒溫洗之芒硝五兩湯化浸洗之豬膏一味熬去滓停冷塗貼之生螃蟹一味取黃塗敷日三五次荷葉燥者一斤煮水洗之以貫眾末摻之干則油和塗雞子黃塗瘡上干則易之不過三次黃櫨木煎湯頻洗之一方穀精草煎湯洗甚速經驗方治腿膝生瘡有膿治金刃傷亦妙五倍子細碾摻之
