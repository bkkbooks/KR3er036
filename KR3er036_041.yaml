body:
  text: 卷四十一風癇門敘癇病之始靈樞云暴攣癇眩足不任身取天柱天柱穴足太陽也又云癲癇瘛瘲不知所苦兩蹺之下男陽女陰按潔古云晝發灸陽蹺夜發灸陰蹺各二七壯陽蹺起於跟中循外踝上行入風池申脈穴也陰蹺亦起於跟中循內踝上行至咽喉交貫衝脈照海穴也又按內經言癲而不言癇古方以癲癇或並言或言風癲或言風癇或言癲狂所指不一蓋癇病歸於五臟癲病屬之於心故今以風癇另立一門而癲狂合為一門也又癇與痓略相類而實不同其病發身軟時醒者謂之癇也身強直反張如弓不時醒者謂之痓也癇病隨其痰之潮作故有時而醒痓病比癇為甚而有挾虛者故因其昏冒而遂致亡者多矣論癇病所因三因云夫癲癇病皆由驚動使臟氣不平鬱而生涎閉塞諸經厥而乃成或在母胎中受驚或幼小感風寒暑濕或飲食不節逆於臟氣而成蓋忤氣得之外驚恐得之內飲食屬不內外三因不同忤氣則一按此所論三因固皆切當但胎內受驚與飲食作癇者多而外感者間而有之論三癇千金方云小兒之癇有三風癇驚癇食癇也風癇緣衣暖汗出風因入也初時先屈指如數乃作驚癇起於驚怖大啼乃作食癇其先不哺乳吐而變熱後發然風癇驚癇時時有之十兒之中未有一二凡是先寒後熱熱者皆食癇也驚癇皆按圖灸之風癇當與豬心湯食癇當下乃愈紫霜丸佳按此論三癇蓋有三因之分風癇屬外因驚癇屬內因食癇屬不內外因也論五癇三因云古方有三癇五臟癇六畜癇等名證不同難於備載別録有五癇之證一曰馬癇作馬嘶鳴以馬屬在午手少陰君火主之故其病生於心二曰羊癇作羊叫聲以羊屬未足太陰濕土主之應乎脾三曰雞癇作雞叫聲以雞屬酉足陽明燥金主之應乎胃四曰豬癇作豬叫聲以豬屬亥手厥陰心包主之應乎右腎五曰牛癇作牛吼聲以牛屬醜手太陰濕土主之應乎肺此五癇應乎五畜五畜應乎五臟者也發則旋暈顛倒口眼相引目睛上搖手足搐搦背脊強直食頃乃蘇各隨所感施以治法錢氏云凡治五癇皆隨臟治之每臟各有一獸犬癇反折上竄犬叫肝也羊癇目瞪吐舌羊叫心也牛癇目直視腹滿牛叫脾也雞癇驚跳反折手縱雞叫肺也豬癇如尸吐沫豬叫腎也五癇重者死病後甚者亦死輕者五色丸主之按千金方敘六畜癇曰馬曰牛曰羊曰豬曰犬曰雞並不以六畜分屬五臟今三因所引五癇無犬癇一證錢氏敘五癇一證無馬癇一證二書以五獸分配五臟各各不同俱不知所由然也三因雖有馬無犬癇及五臟有胃無腎之説亦難據憑無所載焉論癇有陰陽千金方云病先身熱掣瘲驚啼叫喚而後發癇脈浮者為陽癇病在六腑外在肌膚猶易治也病先身冷不驚掣不啼呼而病發時脈沉者為陰癇病在五臟內在骨髓難治也按此論癇之陰陽後世有認為寒熱者誤也蓋此疾皆以痰熱所作而得其傷於陽分在表而淺則曰陽癇故云易治其傷於陰分入里而深則曰陰癇故云難治所論陰陽者乃表裡臟腑淺深之謂非寒熱之謂也論癇證由熱原病式云風癇之發作者由熱甚而風燥為其兼化涎溢胸膈燥爍而氣瘲昏冒僵仆也治癇用吐下之法子和書云夫癇病不至目瞪如愚者用三聖散投之更用火盆於暖室中令汗吐下三法並行次服通聖散百餘日則愈矣至於目瞪如愚者不可治內經曰神不守謂神亂也大凡此疾乃肝經有熱吐後可服瀉青丸下之按癇病多由風痰膠固胸膈上下故大法先宜吐之吐後可用清熱之藥如東垣安神丸守真龍會丸之類皆可服不獨通聖散也痰實在裡不解宜導痰清熱亦不獨瀉青丸也癇分脈藥寒溫不同難知云治洪長伏三脈風癇驚癇發狂惡人與火灸第三第九椎服局方妙香丸以針投眼子透冷水內浸少時服之如本方法治弦細緩三脈諸癇似狂李和南五生丸按此以脈之陰陽虛實分而用藥可謂善矣但癇病出於風熱痰之所致而其藥有寒熱之異者由其標本虛實傳變之不同故也謹按癇病古方或云風癇或云驚癇或云癲癇由此疾與中風顛狂急慢驚相類故命名不同也原其所由或在母腹中受驚或因聞大驚而得蓋小兒神氣尚弱驚則神不守舍舍空則痰涎歸之或飲食失節脾胃有傷積為痰飲以致痰迷心竅而作者治法必當尋火尋痰而論前人多用鎮墜清心之藥固可以治熱可以清痰若有頑痰膠固者此藥未易驅逐在上者必先用吐吐後方宜服此更有痰實在裡者亦須下之隨病輕重而用也或曰癇有陰陽何也豫曰此與急慢驚者可同論也陽癇不因吐下由其有痰有熱客於心胃之間因聞大驚而作若熱盛雖不聞驚亦自作也宜用寒藥以攻治之陰癇亦本於痰熱所作醫以寒涼攻下太過損傷脾胃變而成陰宜用溫平補胃燥痰之藥治之若曰不因壞證而有陰陽之分則是指痰熱所客表裡臟腑淺深而言癇病豈本自有陰寒者哉風癇治法清心安神之劑寶鑑龍腦安神丸治男女五般癲癇無問遠近發作無時茯神三兩人參地骨皮甘草麥門冬桑白皮各二兩馬牙硝二錢龍腦麝香各三錢牛黃半兩硃砂二錢烏犀一兩金箔三十五片上為細末煉蜜為丸如彈子大金箔為衣如風癇病冬月溫水化下夏月涼水化下不以時二三歲者日進二服小兒一丸分二服虛勞發熱咳嗽新汲水化下按此手少陰太陰經藥也出厥陰例神應丹治諸癇辰砂不以多少研上以豬心血和之得所以蒸餅裹劑蒸熟取出就丸如桐子大每服一丸食後臨臥煎人參湯下按此手少陰經藥也出厥陰硃砂例墜痰清神之劑錢氏五色丸硃砂半兩研水銀一分雄黃一兩熬真珠末一兩研鉛三兩同水銀熬上煉蜜丸如麻子大每服三四丸煎金銀薄荷湯下三因六珍丹治風癇失性顛倒欲死或作五畜等聲掣縱吐沫久而方蘇雄黃雌黃未鑽真珠各一兩鉛二兩熬成屑丹砂半兩水銀一兩半上研令極勻蜜丸桐子大每服三丸至五丸薑棗湯下須搗二三萬杵乃可丸礬丹治五癲五癇無問陰陽冷熱虢丹晉礬各一兩上用磚鑿一窠可容二兩許先安丹在下次安礬在上以炭五斤煆令炭盡取出細研以不經水豬心血為丸如緑豆大每服十丸至二十丸橘皮湯下元戎二白丸白礬一塊約一兩上用生蒸餅裹劑蒸熟去皮可丸入輕粉一字或半錢量虛實加減丸桐子大每服二三十丸生薑湯下小兒丸小些子和硃砂滾涎散治五癇硃砂白礬生用赤石脂硝石各等分上為細末研蒜膏為丸如緑豆大每服三十丸食後荊芥湯下寶鑑琥珀壽星丸天南星一斤掘坑用火煆燒坑紅出炭淨入好酒一升潑火穴中放入南星蓋穴勿令通氣過一宿取出焙末入珠子四兩硃砂二兩半為衣上以豬心血打薑糊丸如桐子大每服五十丸煎人參湯送下空心日三服按以上六方雖俱手少陰經藥並出厥陰例治痰溫熱之劑李和南五生丸治癇有神治陰脈弦細緩者南星半夏川烏白附子各一兩大豆去皮一兩上為細末滴水為丸每服三丸至五丸不過七丸薑湯下元戎小靈寶丹附子炮一兩天麻全蠍白殭蠶炒藿香葉南星炮白附子炮各半兩上細末酒糊丸桐子大溫酒下一十五丸按以上二方並出厥陰風癇例藥也吐劑局方碧霞丹治痰涎壅塞牙關緊急心神迷悶目睛上視五種癇疾時作搐搦石碌研丸度飛十兩附子尖烏頭尖蠍精各七十個上為末入石碌令勻面糊丸如雞豆每服用薄荷汁半盞化下一丸更以酒半合溫服之須臾吐出痰涎然後隨證治之如口噤斡開灌之子和三聖散方見吐劑治痰攻下之劑嚴氏控涎丸治諸癇久不愈頑涎散聚無時川烏生半夏各半兩鐵粉三錢甘遂二錢半殭蠶不炒生薑汁浸一宿半兩全蠍去尖七個上為細末生薑自然汁成薄糊丸如緑豆大硃砂為衣每服十五丸食後薑湯下忌甘草按此厥陰例藥也三因控涎丹方見痰飲門錢氏白餅子方見痰飲門千金紫丸治食癇先寒後熱方方見內傷門拔萃妙香丸治時疾傷寒解五毒潮熱積熱及小兒驚百病辰砂研九兩牛黃半兩金箔九十片研龍腦膩粉麝香研各七錢半巴豆三百十五個去皮心研去油上合研勻煉蜜去蠟淨入沙蜜白者七錢半同煉勻為丸每兩作三十丸米飲調下按海藏云此治脈洪長大有力內熱者無力內寒五生丸主之治小兒每一丸分十五粒每服二丸蜜水下出厥陰風癇例藥也以上五方有寒熱溫涼之異用者隨證擇焉平肝瀉火之劑宣明當歸龍膽丸治腎水陰虛風熱蘊積時發驚悸筋脈搐搦暗風癇病方見諸火門千金龍膽湯治嬰兒出腹血脈盛實寒熱溫壯四肢驚掣發熱並諸驚癇方龍膽鉤藤皮柴胡黃芩桂枝芍藥茯苓一作茯神甘草各六銖螳螂二枚大黃一兩上㕮咀以水一升煮取五合為劑服之按此少陽厥陰經藥也錢氏瀉青丸方見小兒門通解風熱之劑宣明防風通聖散亦治風癇方見中風門救壞證之劑寶鑑沉香天麻湯治一小兒四歲因長老摩頂受記僧人念咒恐懼發搐痰涎有聲目多白睛強項背一時許方醒後每見皂衣人即發多服犀朱腦麝鎮墜之藥已四年餘此證尚在又添行步動作神思如癡診其脈沉弦而急針經云心脈滿大癇瘈筋攣病久氣弱多服鎮墜寒涼之劑復損正氣致添動作如癡先灸兩蹺各二七壯次服此藥又肝脈小急蓋小兒神氣尚弱因而被驚神思無依又動於肝肝主筋故癇瘈筋攣沉香益智仁川烏各二錢天麻防風半夏附子炮各三錢羌活五錢獨活四錢甘草當歸殭蠶各一錢半經云恐則氣下精怯而上焦閉以羌活獨活苦溫引氣上行又入太陽為引用故以為君天麻防風辛溫以散之當歸甘草辛甘溫以補氣血之不足又養胃氣故以為臣附子川烏益智大辛溫行陽退陰又治客寒傷胃腎主五液入脾為涎以生薑半夏燥濕化痰沉香辛溫體重氣清去怯安神故以為使上銼每服五錢水二盞生薑三片煎至一盞去滓溫服食前三劑而愈按癇證本從熱治然亦有壞證而成陰者如錢仲陽所治王氏子吐瀉諸醫藥下之至虛變慢驚手足瘛瘲而身冷醫復與八正散錢曰不能食而胃中虛若利大小便即死久則脾腎俱虛當身冷而閉目必用益黃散使君子丸補脾遂能飲食後又不語錢以地黃丸補腎一月而安皆此意也此方用大熱之藥乃從權以救前治之失非常治之道也
