body:
  text: 卷二十三腳氣門辨南方腳氣所得之由孫真人云凡四時之中皆不得久坐久立濕冷之地亦不得因酒醉汗出脫衣跣足當風取涼皆成腳氣若暑月久坐久立濕冷之地者則濕熱之氣蒸人經絡病發必熱而四肢痠疼煩悶若寒月久坐久立濕冷之地者則濕冷之氣上入經絡病發則四肢皆酷冷轉筋世有勤工力學之士久坐久立於濕地冷風來入經絡不覺成病也若欲使之不成病者初覺則灸所覺處二三十壯則愈不復發熱黃帝云當風取涼醉以入房能成此疾也東垣云千金外臺總録所録皆謂南方卑濕霧露所聚之地其民腠理疏陽氣不能外固因而履之則清濕襲虛病起於下此由血氣衰弱受清濕之邪氣與血並行於膚腠邪氣盛正氣少故血氣澀澀則痹虛則弱故令痹弱也後人名曰腳氣針經云有道以來有道以去治之多以炙𤋲為佳以導引濕氣外出及飲醪醴以通經散邪所制之方寒藥少熱藥多用麻黃川烏姜附之屬內經云濕淫於內以苦發之麻黃苦溫發之者也川烏辛熱走而不能守通行經絡姜附辛甘大熱助陽退陰亦散清濕之邪又察足之三陰三陽是何經絡所起以引用藥為主治復審六氣中何氣客之治以佐使之藥孫真人云醫者意也隨時增損物無定方真知言哉辨北方腳氣所得之由發明曰異法方宜論云北方者其地高陵居風寒冰冽其俗飲潼酪而肉食凡飲潼酪者以飲多速飲為能經云因而大飲則氣逆又云食入於陰長氣於陽今乃反行陰道是為逆也夫乳酪醇酒者濕熱之物飲之屬也加以奉養太過亦滋其濕水性潤下氣不能詬故下疰於足脛積久而成腫滿疼痛此飲食下流之所致也通評虛實論雲谷入多而氣少濕居下也況潼酪醇酒之濕熱甚於谷者也至真要大論云太陰之勝火氣內菀流散於外足脛胕腫飲發於中胕腫於下此之謂也故飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行合於四時五臟陰陽揆度以為常也若飲食自倍脾胃乃傷則胃氣不能施行脾氣不能四布故下流乘其肝腎濕流於足脛加之房事不節陽盡陰盛遂成腳氣孫真人云古人少有此疾自永嘉南渡衣冠之人多有之亦此意也按此言北方腳氣為脾之濕氣下乘加之房事不節而致當作內因處治可謂發病機之祕然南方是證亦莫不為下虛邪氣乘之故也以陳無擇所論外感當分風濕寒熱內臟虛實所因為治迥出千金之文何此理又不復具焉蓋北方此證殊少耳學者審是則又知南方腳氣有全非外因者焉於紫蘇子等湯例可見論腳氣脈證嚴氏曰古無腳氣之說內經名厥兩漢間名緩風宋齊之後謂之腳氣名雖不同其實一也初得不覺因他病乃始發或奄然大悶經三兩日方覺之先從腳起或緩弱疼痹或行起忽倒或兩脛腫滿或足膝枯細或心中忪悸或小腹不仁或舉體轉筋或見食吐逆惡聞食氣或胸滿氣急或遍體痠疼此其候之不同也其脈浮而弦者起於風濡而弱者起於濕洪而數者起於熱遲而澀者起於寒夫腳氣皆由腎虛而生然婦人亦病腳氣者必因血海虛乘七情遂成斯疾兼今婦人病此者衆則知婦人以血海虛而得之與男子腎虛類矣男女用藥固無異但兼以治憂恚藥無不效也須量人盛衰微加滋補不然則氣血日衰必使年年遇蒸熱而作理之必然陳無擇曰腳氣不專主一氣亦不專在一經故與中風寒暑濕為異耳兼有所雜生諸病未易分別須尋三陰三陽病所在後察脈虛實為治自汗走疰為風勝無汗藥急掣痛為寒勝腫滿重著為濕勝煩渴熱積為暑勝四氣兼中者但推其多者為勝分其表裡以施治也脈浮為風緊為寒緩細為濕洪數為熱見於諸陽在外宜發散沉而弦者亦為風沉而緊者為寒沉細為濕沉數為熱見諸陰在內宜溫利之若大虛氣之間作補湯隨病冷熱而用之千金方論但備諸證不說陰陽經絡所受從何為治按以上所言脈證但備四氣而已至於腫焮發瘡泡為濕熱熱毒之勝腫而重者有濕痰勝或腫或消兼氣不升降諸例皆所未詳陳雲六經證見後各方下論腳氣主於水濕發明曰夫腳氣之疾實水濕之所為也蓋濕之害人皮肉筋脈而屬於下然亦有二焉一則自外而感一則自內而致其治法自應不同故詳析而論之其為病也有證而無名腳氣之稱自晉蘇敬始而關中河朔無有也惟南方地下水寒其清濕之氣中於人必自足始故經曰清濕襲虛則病起於下或者難曰今茲北方其地則風土高寒其人則腠理致密而復多此疾者豈是地之濕氣感之而為邪答曰南方之疾自外而感者也北方之疾自內而致者也二論見前其自外而入者止於下脛腫而痛自內而致者乃或至於手節也經曰足脛腫曰水太陰所至為胕腫此但言其自外者也所治之法前人方論備矣自內而致者治法則未有也謹按前論南北二方腳氣之由己頗詳盡而發明更具此者大抵言是證主於水濕而成故重宣此義合前二論之旨也自內致者古無其法然觀東垣所出數方則意例兼備之矣論江東嶺南瘴毒為腳氣發明曰內經論南方者其地下水土弱霧露之所聚也匯東嶺南大率如此春夏之交山川蒸菀風濕毒氣為甚足或感之遂成瘴毒腳氣其候則腳先屈弱漸至痹疼脛微腫小腹不仁頭痛煩心痰壅逆脯作寒熱便溲不通甚者攻心而勢迫治之誠不可緩支法存所以留意經方偏善此術者豈非江東嶺表此疾得之多歟謹按南方溫熱多陰雨土濕之氣因熱蒸菀人膚腠故疏豁體虛者多感此疾及有遠行足熱乃過溪澗為水寒所傷而致者至其傳變為證不一況瘴毒乎然近江東證多主於水濕亦有夾風夾寒者其發時則或腫或痛濕熱勝者成水泡瘡或成赤腫丹毒或如疝氣攻上引下皆宜詳悉分治論腳氣似傷寒詳見熱門病本不同例下論南方腳氣病禁外臺祕要云第一忌嗔嗔則心煩煩則腳氣發又禁大語大語則傷肺肺傷亦發動又不得露足當風入水以冷水洗足兩腳脛尤不宜冷雖暑月常須著綿袴至冬寒倍令兩脛溫暖微汗大佳依此將息氣漸薄損每至寅丑日割手足甲割少侵肉去氣夏時腠理開不宜當風臥睡睡覺令人按挪勿令邪氣稽留數勞動關節常令通暢此並養生之要拒風邪之法也尋常有力每食後行三五百步疲倦便止腳中惡氣隨即下散雖浮腫氣不能上也發明云第一凡酒及潼酪勿使過度過則損傷脾胃下疰於足脛胕腫遂成腳氣第二欲不可縱嗜欲則腳氣發凡飲食之後宜緩行如上法經云逸者行之又云病在脾忌溫食飽食濕地濡衣論腳氣疏下楊太受云腳氣之疾自古皆尚疏下為疾壅故也然不可太過太過則損傷脾胃使營運之氣不能上行反下注為腳氣也又不可不及不及則使氣壅不得消散今立三方於後詳虛實而用之按三方醫學發明謂導滯湯導引丸除濕丹例是也然亦大略言爾如腳氣在表在氣血之分而疏下之法可例用乎論腳氣洗泄活人書云凡腳氣服補藥及用湯泄洗者皆醫之大禁也發明謂此為南方外感濕氣乘虛襲入為腫痛而言非為北方內受濕氣注下腫痛而言也蓋濕氣不能外達宜淋泄開導泄越其邪也論腳氣宜砭刺楊太受云腳氣是為壅疾治當以宣通之劑使氣不能成壅也壅既成而盛者砭惡血而去其重勢經曰蓄則腫熱砭射之也後以藥治之腳氣治法發表之劑三因麻黃左經湯治風寒暑濕流注足太陽經腰足攣痹關節重痛增寒發熱無汗惡寒或自汗惡風頭疼麻黃乾葛細辛白朮茯苓防己桂羌活甘草防風上㕮咀每半兩入薑棗煎服按此出太陽例治風寒濕之藥也半夏左經湯治足少陽經為風寒暑濕流注發熱腰脅疼痛頭目眩暈嘔吐不食熱悶煩心腿痹緩縱不隨半夏乾葛細辛白朮麥門冬茯苓桂枝防風乾薑黃芩小草甘草炙柴胡上㕮咀每半兩入薑棗煎熱悶加竹瀝喘急加杏仁桑白皮按此出少陽例解風寒濕熱錯雜之邪藥也六物附子湯治四氣流注於足太陰經骨節煩疼四肢拘急自汗短氣小便不利手足或時浮腫附子桂防己各四錢白朮茯苓各三錢甘草炙二錢上㕮咀每半兩入姜煎按此出少陰例治寒濕之藥也局方換腿丸治足三陰經為風寒暑濕之氣所乘發為攣痹緩縱上攻胸脅肩背下注腳膝疼痛足心發熱行步艱辛薏苡仁南星石楠葉石斛檳榔萆薢川牛膝酒浸羌活防風木瓜各四兩黃耆當歸天麻續斷各一兩上為末酒糊丸如梧子大每五十丸鹽湯下按此出厥陰例疏風勝濕藥也五積散方見濕門按此出太陽例治風寒濕之劑氣血藥也東垣當歸拈痛湯治濕熱為病肢節煩疼肩背沉重胸膈不利兼遍身疼痛下注手足足脛腫痛不可忍者方見瘡瘍門按此出太陽例治濕熱之藥也攻裡之劑宣明導水丸治腳氣胕腫疼痛或發熱濕熱盛者按此出陽明例治濕熱之藥也除濕丹方並見濕門按此出太陽例治濕透機關藥也謹按腳氣多系濕熱為病世人用以上方每效故收入然下之法詳見前疏下論但下後便要收拾如滲之清之升之之法是已學者宜擴充焉發表攻裡之劑三因大黃左經湯治四氣流注足陽明經使腰腳赤腫痛不可行大小便祕或惡聞食氣喘滿自汗細辛茯苓羌活大黃煨甘草炙前胡枳殼厚朴制黃芩杏仁等分上㕮咀每半兩入薑棗煎按此出陽明例治濕熱疏風導氣藥也加味敗毒散治足三陽經受熱毒氣流注腳踝上焮赤腫痛寒熱如瘧自汗惡風或無汗惡寒羌活獨活前胡柴胡枳殼桔梗甘草人參茯苓川芎大黃蒼朮等分上㕮咀每半兩入姜煎按此出少陽例治風濕熱氣血藥也東垣羌活導滯湯治腳氣初發一身盡痛或肢節腫痛便溺阻隔先以此藥導之後用當歸拈痛湯羌活獨活各半兩防己當歸各三錢大黃酒濕煨一兩枳實炒二錢上㕮咀每五錢或七錢水煎服按此出陽明例治風熱之藥也理氣之劑濟生檳榔湯治一切腳痛順氣防壅檳榔香附子陳皮紫蘇葉木瓜五加皮甘草炙各一兩上㕮咀每四錢或半兩入姜煎大腹皮散治諸腳氣腫痛小便不利檳榔荊芥穗烏藥陳皮紫蘇葉各一兩蘿蔔子炒半兩沉香桑白皮枳殼炒各一兩半大腹皮三兩木瓜二兩半紫蘇子炒上㕮咀每半兩入姜煎淡寮方治腳氣入腹衝心疼痛腫滿大小便祕沉香木香羌活白芍檳榔各五錢甘草撫芎青皮枳殼各二錢紫蘇葉木瓜各一錢半蘇子六錢上㕮咀每半兩入姜煎按以上三方因於氣滯氣壅者可用故收入然不可防壅而服大抵因氣者宜取擇焉理血之劑金匱八味丸治足少陰經腳氣入腹腹脹疼痛上氣喘急腎經虛寒所致也此證最急以腎乘心水剋火死不旋踵方見補虛門按此治陰虛挾寒濕之藥也三因神應養真丹治足厥陰經為四氣進襲左癱右瘓痰涎半身不遂手足頑麻語言謇澀腳膝榮氣凝滯遍身疼痛四物內加羌活天麻上為末蜜丸雞子大每丸木瓜菟絲子浸酒下按此治血虛挾風濕之劑也加味四斤丸治足痿無力腳膝疼酸方見痿按此治血虛挾風熱之劑也理氣血之劑三因紫蘇子湯治腳弱上氣陰陽交錯清濁不分上重下虛中滿喘急嘔吐自汗無復紀律紫蘇子微炒半夏各五兩前胡厚朴制甘草炙當歸各二兩桂心陳皮各三兩上㕮咀每四錢入棗姜煎服按此出少陽例血虛氣逆者可用通關透肌骨之劑三因勝駿丸治元氣不足為寒濕之氣所襲腰足攣拳腳面連指走痛無定筋脈不伸行步不隨常服益真氣壯筋骨附子一個炮當歸酒浸一宿天麻牛膝酒浸木香酸棗仁炒熟地黃防風各二兩木瓜四兩羌活乳香半兩麝香二錢全蠍炒沒藥甘草炙各一兩上為末用生地黃三斤研如泥入無灰酒四升煮爛如膏以前藥和勻杵令堅每兩作十丸每丸細嚼臨睡酒下如冬月無地黃煉蜜為丸如梧子大每五十丸服按此治血虛而風寒濕勝藥也氣血之劑疏風養血之劑獨活寄生湯治肝腎虛弱風濕內攻兩脛緩縱攣痛痹弱足膝攣重方見腰疼門消導之劑東垣開結導引丸治飲食不消心下痞悶白朮陳皮澤瀉茯苓神麯炒麥蘖曲半夏各一兩青皮乾生薑各半兩枳實炒巴豆霜各一錢半上為末湯浸蒸餅丸梧子大每四五十丸或七十丸溫水下按此治內傷飲食脾胃營運之氣有虧不能上升下注為腳氣故用此導飲行水化脾氣也出太陽例然亦有致腫於身腰以上及面者意見水腫論平治法下雜洗洗藥導氣除濕湯威靈仙防風荊芥地骨皮當歸升麻白芍朔藋葉上等分銼水二斗煮一斗五升去柤熱淋洗無時候敷藥白芷蒼朮羌活各半兩細辛二錢半上為末生薑汁調敷患處
