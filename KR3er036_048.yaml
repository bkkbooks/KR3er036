body:
  text: 卷四十八痹證門內經敘痹經曰風寒濕三氣雜至合而為痹其風氣勝者為行痹寒氣勝者為痛痹濕氣勝者為著痹以冬遇此為骨痹以夏遇此為筋痹以夏遇此為脈痹以至陰遇此為肌痹以秋遇此為皮痹按本論備五臟等痹甚詳宜玩本文脈法脈經曰脈澀而緊痹病論痹證所因不同陳無擇曰雖三氣合痹其用不同三氣襲人經絡入於筋脈皮肉肌骨久而不已則入五臟煩滿喘而嘔者是痹客於肺煩心上氣嗌乾恐噫厥脹滿者是痹客於心多飲數小便小腹痛如懷妊夜臥則驚者是痹客於肝善脹尻以代腫脊以代頭者是痹客於腎四肢懈墮發咳嘔沫上為大寒者是痹客於脾又有腸痹胞痹及六腑各有俞風寒濕所中治之隨其腑俞以施針灸之法仍服逐三氣發散等藥則病自愈大抵痹之為病寒多則痛風多則行濕多則著在骨則重而不舉在脈則血凝不流在筋則屈而不伸在肉則不仁在脾則寒逢寒則急逢熱則縱又有血痹以類相從外有支飲作痹謹按痹之為證有筋攣不伸肌肉不仁者與風證絶相似故世俗多類於風痿痹證通治此千古之弊也徐先生已於卷首分出痿證一門大抵固當分其所因風則陽受之痹感風寒濕之氣則陰受之為病多重痛沉著患者難易得去如錢仲陽為宋之一代明醫自患周痹止能移於手足為之偏廢不能盡去可見其為難治也況今世俗多類於風證通治宜乎不能得其病情也論痹因虛所致嚴氏曰痹證因體虛腠理空疏受之而成逢寒則急蓬熱則縱隨所受邪氣而生證也診其脈大而澀為痹脈來急亦為痹脈澀而緊者亦為痹又有風血痹陰邪入於血經故也謹按人感三氣為痹者正因形虛血虛爾但有在肌皮血脈淺深之異故入臟者死雖陳氏具經論頗詳而其方未能以盡其變學者自宜充擴也痹證治法溫經勝濕之劑三因附子湯治風寒濕痹骨節疼痛皮膚不仁肌肉重著四肢緩縱附子生白芍桂心甘草白茯苓人參各三分白朮一兩上㕮咀每服四錢水煎服按此太陽例藥溫中解表之劑疏風養血之劑三因黃耆五物湯治人骨弱肌重因疲勞汗出臥不時動搖加以微風遂作血痹脈當陰陽俱微尺中少緊身體如風痹狀黃耆芍藥桂心等分上㕮咀每服四五錢入薑棗煎嚴氏蠲痹湯治身體煩疼項背拘急或痛或重舉動艱難手足冷痹腰腿沉重筋脈無力當歸芍藥黃耆片子薑黃羌活各一兩半甘草炙半兩上㕮咀每服四五錢入薑棗煎黃耆酒治風濕痹身體頑麻皮膚瘙癢筋脈攣急言語謇澀手足不遂時覺不仁黃耆防風桂天麻萆薢石斛虎骨炙白芍當歸雲母粉白朮茵芋葉木香仙靈脾甘草川續斷上銼如麻豆大以生絹袋盛好酒一斗浸之春五夏三秋七冬十日每服一盞溫服之不拘時防風湯治血痹皮膚不仁防風二兩川獨活川當歸赤茯苓秦艽赤芍黃芩各一兩桂心杏仁甘草炙各半兩上㕮咀每四五錢入姜煎獨活寄生湯治肝腎虛弱感風濕致痹兩脛緩縱痹弱不仁方見腳氣門謹按以上方多太陽例藥也大抵痹證有兼風兼濕寒熱獨勝腑臟所受不同用者自宜擴充然此證因虛而感既著體不去須制對證藥日夜飲之雖留連不愈能守病禁不令入臟庶可扶持也如錢仲陽取茯苓其大逾鬥者以法啖之閲月乃盡由此雖偏廢而氣骨堅悍如無疾者壽八十二而終惜乎其方無傳治痰飲之劑茯苓湯治支飲手足麻痹多唾眩冒半夏赤茯苓橘紅各一兩枳實桔梗甘草各半兩上㕮咀每服四五錢入姜七片水煎按此言支飲能為痹證即飲能為腳氣證是也大抵因虛而傳注邪客日久榮衛壅鬱多致濕熱經緩不能自收持如逢熱則縱也以上方未能盡其例用者自宜通變也
