body:
  text: 卷十火門內經敘火為諸證諸熱瞀瘈暴喑冒昧躁擾狂越罵詈驚駭胕腫疼酸氣逆衝上禁慄如喪神守嚏嘔瘡瘍喉痹耳鳴及聾嘔湧溢食不下目眯不明暴注瞤瘈暴病暴死皆屬於火論相火動為諸證丹溪曰太極動而生陽靜而生陰陽動而變陰靜而合而生水火木金土各一其性惟火有二曰君火人火也曰相火天火也火內陰而外陽主乎動者也故凡動皆屬火以名而言形質相生配於五行故謂之君以位而言生於虛無守位稟命因動而見故謂之相天主生物故恆於動人有此生亦恆於動其所以恆於動者皆相火助之為也見於天者出於龍雷則木之氣出於海則水之氣也具於人者寄於肝腎一部肝屬木而腎屬水也膽者肝之腑膀胱者腎之腑心胞絡者腎之配三焦以焦言而下焦司肝腎之分皆陰而下者也天非此火不能生物人非此火不能有生天之火雖出於木水而皆本乎地故雷非伏龍非蟄海非附地則不能鳴不能飛不能波也鳴也飛也波也動而為火者也腎肝之陰悉其相火人而同乎天也或曰相火天人所同何東垣為元氣之賊又曰火與元氣不相兩立一勝則一負然則如之何則可使之無勝負乎曰周子曰神發知矣五性感動而萬事出有知之後五者之性為物所感不能不動謂之動者即內經五火也相火易起五性厥陽之火相扇則妄動矣火起於妄變化莫測無時不有煎熬真陰陰虛則病陰絕則死君火之氣經以暑與熱言之相火之氣經以火言之蓋表其暴悍酷烈有甚於君火者也故曰相火元氣之賊周子又曰聖人定之以中正仁義而主靜朱子亦曰必使道心常為一身之主而人心每聽命焉此善處乎火者人心聽命於道心而又能主之以靜彼五火將寂然不作而相火者惟有裨補造化而為生生不息之運用爾何賊之有或曰內經相火注言少陰少陽矣未曾言及厥陰太陽而吾子言之何也曰足太陽少陰東垣嘗言之矣治以炒柏取其味辛能瀉水中之火是也戴人亦言膽與三焦尋火治肝和胞絡都無異此歷指龍雷之火也予亦備述天人之火皆生於動如上文所云者實推廣二公之意或曰內經言火者不一往往於六氣中見之言臟腑者未之見也二公豈他有所據耶子能為我言之乎經曰百病皆生於風寒暑濕燥火之動而為變者岐伯歷舉病機一十九條而屬火者五此非相火為病之出於臟腑者乎考之內經少陽病為瘛瘲太陽病時眩僕少陰病瞀暴喑鬱冒不知人非諸熱瞀瘈之屬火者乎少陽病惡寒鼓慄膽病振寒少陰病灑淅惡寒振慄厥陰病灑淅振寒非諸振鼓慄如喪神守之屬火者乎少陽嘔逆厥氣上行膀胱病沖頭痛太陽病厥氣上衝胸少腹控睪引腰脊上衝心少陰病氣上衝胸嘔逆非諸逆衝上之屬火者乎少陽病譫妄太陽病譫妄膀胱病狂顛疾非諸躁狂越之屬火者乎少陽病胕腫善驚少陰病瞀熱以酸胕腫不能久立非諸病胕腫痛酸驚駭之屬火者乎又原病式曰諸風掉眩屬於肝火之動也諸氣憤郁病痿屬於肝火之升也諸濕腫滿屬於脾火之勝也諸痛癢瘡瘍屬於心火之用也是皆火之為病出於臟腑者然也註文未之發爾以陳無擇之通達且以暖熾論君火日用之火言相火而又不曾深及宜乎後人之不無聾瞽也悲夫論火豈君相五志俱有原病式曰五臟之志過度則勞傷本臟凡五志所傷皆熱也所謂陽動陰靜故形神勞則躁不寧靜則清平也是故上善若水下愚若火如卒暴僵仆多因五志七情過度而卒病也故喜為心火之志病笑者火之甚也五志過極皆為火也謹按或曰火之為病其害甚大其變甚速其勢甚彰其死甚暴何者蓋能燔灼焰燔飛走狂越消爍於物莫能御之遊行乎三焦虛實之兩途曰君火也猶人火也曰相火也猶龍火也火性不妄動能不達於道常以稟位聽命運行造化生存之機矣夫人在氣交之中多動少靜欲不妄動其可得乎故凡動者皆屬火化火一妄行元氣受傷勢不兩立偏勝則病移害他經事非細故動之極也病則死矣經所謂一水不勝二火之火出於天造君相之外又有厥陽臟腑之火根於五志之內六慾七情激之其火隨起蓋大怒則火起於肝醉飽則火起於胃房勞則火起於腎悲哀動中則火起於肺心為君主自焚則死矣丹溪又啟火出五臟主病曰諸風掉眩屬肝火動之類經所謂水不勝五火之火出自人為又考內經病機一十九條內舉屬火者五諸熱瞀瘈皆屬於火之類而河間又廣其說火之致病者甚多深契內經之意曰諸病喘嘔吐酸云云見熱門此皆少陰君火之熱乃真心小腸之氣所為也若瞀瘈暴喑冒昧云云見前此皆少陽相火之熱乃心包絡三焦之氣所為也是皆火之變見為諸病也為脈虛則浮大實則洪數藥之所主各因其屬君火者心火也可以濕伏可以水滅可以直折惟黃連之屬可以制之相火者龍火也不可以水濕折之從其性而伏之惟黃柏之屬可以降之噫瀉火之法豈止如此虛實多端不可不察以臟氣司之如黃連瀉心火黃芩瀉肺火芍藥瀉脾火柴胡瀉肝火知母瀉腎火此皆苦寒之味能瀉有餘之火耳若飲食勞倦內傷元氣火不兩立為陽虛之病以甘溫之劑除之如黃耆人參甘草之屬若陰微陽強相火熾盛以乘陰位日漸煎熬為血虛之病以甘寒之劑降之如當歸地黃之屬若心火亢極鬱熱內實為陽強之病以鹹冷之劑折之如大黃朴硝之屬若腎水受傷其陰失守無根之火為陰虛之病以壯水之劑制之如生地黃玄參之屬若右腎命門火衰為陽脫之病以溫熱之劑濟之如附子乾薑之屬若胃虛過食冷物抑遏陽氣於脾土為火鬱之病以升散之劑發之如升麻葛根之屬不明諸此之類而求火之為病施治何所依據故於諸經集略其說備處方之用庶免實實虛虛之禍也又按火熱之極者經曰壯火散氣壯火之氣衰故有陽極似陰之證河間治身冷唯心胸微暖昏冒不知人事不能言脈微而欲絕者用涼膈散養陰以退陽此因病陽厥而尚不下所致身冷脈微而似陰證亢則害承乃制極變病例也然人火龍火治法與論唯太僕河間丹溪之意已詳其未悉之旨今輯於下王安道曰予讀內經六微旨論至於亢則害承乃制喟然嘆曰至矣哉其造化之樞紐乎王太僕發之於前劉河間闡之於後聖人之蘊殆靡遺矣然學者尚不能釋然得不猶有未悉之旨也歟謹按經帝曰願聞地理之應六節氣位何如岐伯曰云云嘗觀夫陰陽五行之在天地間也高者抑之下者舉之強者折之弱者濟之蓋莫或使然而自不能不然也不如是則高者愈高下者愈下強者愈強弱者愈弱而乖亂之弊日已極矣天地豈能位乎雖然高也下也強與弱也亦莫或使然而自不能不然也故易也者造化之不可常也惟其不可常故神化莫能以測莫測故不息也可常則息矣亢則害承乃制者其莫或使然而自不能不然也歟夫太僕河間已發揮者茲不贅乃其未息之旨請推而陳之夫自顯明之右止君火治之十五句言六節所治之位也自相火之行下止陰精承之十二句言地理之應乎歲氣也亢則害承乃制二句言抑其過也制生則化止生化大病四句言有制之常與無制之變也承猶隨也然不曰隨而曰承者以下言之則有上奉之象故曰承雖謂之承而有防之之義存焉亢者過極也害者害物也制者克勝之也然所承也其不亢則隨之而已故雖承而不見既亢則克勝以平之承斯見矣然而迎之不知其所來跡之不知其所止固若有不可必者然可必者常存乎杳冥恍惚之中而莫之或欺之河間曰已亢過極則反似勝已之化似也者其可以形質求哉故後篇厥陰所至為風生終為肅少陰所至為熱生終為寒之類其為風生為熱生者亢也其為肅為寒者制也又水發而為雹雪土發而飄驟之類其水發土發者亢也其雹雪飄驟者制也若然者蓋造化之常不能以無亢亦不能以無制焉耳夫前後二篇所主雖有歲氣運氣之殊然亢則害承乃制之道蓋無往而不然也惟其無往而不然故求之於人則五臟更相平也一臟不平所不勝平之五臟更相平非不亢而防之乎一臟不平所不勝平之非既亢而克勝之乎姑以心火而言其不亢則腎水雖心火之所畏亦不過防之而已一或有亢即起而克勝之矣餘臟皆然制生則化當作制則生化蓋傳寫之誤而釋之讀之者不覺求之不通遂並遺四句而弗取殊不知上二句止言亢而害害而制耳此四句乃害與制之外之餘意也苟或遺之則無以見經旨之周悉矣制則生化正與下文害則敗亂相對辭理俱順不勞曲說而自通制則生化者言有所致則六氣不至與亢而為平平則萬物生生而變化無窮矣化為生之盛故生先於化也外列盛衰者言六氣分布主治迭為盛衰昭然可見故曰外列害則敗亂生化大病者言既亢為害而無所制則敗壞乖亂之政行矣敗壞乖亂之政行則其變極矣其災甚矣萬物其有不病者乎生化指所生所化者言謂萬物也以變極而災甚故曰大病上生化以造化之用言下生化以萬物言以人論之制則生化猶元氣周流滋營一身凡五臟六腑四肢百骸九竅皆藉焉以為動靜云為之主生化大病猶邪氣恣橫正氣耗散凡五臟六腑四肢百骸九竅舉不能遂其運用之常也或以害為自害或以承為承襲或以生為自無而有化為自有而無或以二生化為一意或以大病為喻造化之機息此數者皆非也且夫人之氣也固亦有亢而自制者苟亢而不能自制則湯液針石導引之法以為之助若天地之氣其亢而自制者固復於平亢而不制者其孰助哉雖然造化之道苟變至於極則亦終必自反而復其常矣學者能本之太僕河間而參之此論則造化樞紐之詳亦庶矣乎氣屬陽動作火論詳見氣門論陰虛火動詳見熱門論積溫蓄熱成火宜汗吐下法子和曰李屏山素飲酒一日得病醫用酒蒸丸熱後目睹天地但見紅色遂成龍火卒不能救棠溪李濟之常病目及居省掾每服補肝散以致睛脹但見窗檻橫排幾至喪明令湧泄五七次繼服涼劑方始如故丹霞朱僧氏代章宗出家既病三陽蓄熱常居靜室不敢見明明則頭疼如錐每置冰於頂上不能解其熱歷諸醫莫能辯其病後治之七日而愈其法用汗吐下三法而已後用涼物清鎮之平復如故謹按以上病例非汗吐下法則不能已人惟陰平陽秘神氣以寧蓋昧者徇情縱欲因致積熱之證非一朝一夕故也治當如此其為治不能究其源委豈得不遂致誤人者哉今以積熱沉寒論附錄於下王安道曰人之所藉以生者氣也氣者何陰陽是也夫陰與陽可以和而平可以乖而否善攝與否吉凶於是乎定夫惟攝之不能以皆善也故偏寒偏熱之病始莫逃於乖否之餘矣雖然寒也熱也苟未至於甚粗工為之而不難設熱積而寒沉良工猶弗能以為計況其下乎奈之何俗尚顓蒙恪恃方藥愈投愈盛迷不之反豈知端本澄源中含至理執其樞要眾妙俱呈且以積熱言之始而涼和次而寒取寒取不愈則因熱而從之從之不愈則技窮矣由是苦寒頻歲而弗停又以沉寒言之始而溫和次而熱取熱取不愈則因寒而從之從之不愈則技窮矣由是辛熱比年而弗止嘆夫苦寒益深而積熱彌熾辛熱太過而沉寒愈滋苟非大聖慈仁明垂樞要生也孰從而全之經曰諸寒之而熱者取之陰熱之而寒者取之陽所謂求其屬也屬也者其樞要之所存乎斯旨也王太僕知之故曰益火之原以消陰翳壯水之主以制陽光又曰取心者不必齊以熱取腎者不必齊以寒但益心之陽寒亦通行強腎之陰熱之猶可籲混乎千言萬語之間殆猶和璧之在璞也夫寒之而熱者徒知以寒治熱而不知熱之不衰者由乎真水之不足也熱之而寒者徒知以熱治寒而不知寒之不衰者由乎真火之不足也不知真水火不足泛以寒熱藥治之非惟臟腑習熟藥反見化於其病而有者弗去無者復至矣故取之陰所以益腎水之不足而使其制夫心火之有餘取之陽所以益心火之不足而使其勝夫腎水之有餘也其指水火也屬猶主也謂心腎也求其屬者言水火不足而求之於心腎也火之原者陽氣之根即心是也水之主者陰氣之根即腎是也非謂火為心而原為肝水為腎而主為肺也寒亦益心熱亦強腎此太僕之至理於規矩準繩之外而非迂生曲士之可以跂及矣火證治法吐劑仲景瓜蒂散子和三聖散元戎勝金丸方並見痰飲門按賈元良曰宣劑者湧吐是也以君召臣曰宣言以上召下之義也俚人以瀉為宣非也古曰春宣五臟之積滯仲景大法春則人病在頭故宜吐之南地人服屠蘇自下而上是也下攻者非也然一切風熱積熱或火熾者其證寸口脈滑而有力胸中實滿煩悗氣上而不化面赤痰盛罵詈驚駭等證並宜吐之但以上諸方恐非所宜義見痰飲門升散之劑東垣瀉陰火升陽湯治肌熱煩熱面赤食少喘咳痰盛脈右關緩弱或弦或浮數羌活甘草炙黃耆蒼朮各一兩升麻八錢柴胡一兩半人參黃芩各七錢黃連半兩酒炒石膏半兩秋深勿用上㕮咀每服一兩或半兩水煎按此發脾胃火邪之劑又心膽肝肺膀胱藥也瀉陰火升發陽氣榮養氣血也升陽散火湯治男子婦人四肢發熱肌熱筋痹熱骨髓中熱發睏熱如燎捫之烙手此病多因血虛而得之或胃虛過食冷物抑遏陽氣於脾土火鬱則發之升麻葛根獨活羌活各半兩防風二錢半柴胡八錢甘草炙三錢人參白芍各半兩甘草生二錢上㕮咀每服半兩或一兩水煎稍熱服按此胃膽脾肺膀胱經藥也千金麥門冬湯治諸病後火熱乘肺咳唾有血胸脅脹滿上氣羸瘦五心煩熱渴而煩悶麥門冬桑白皮生地黃各一兩半夏紫菀桔梗淡竹茹麻黃各七錢半五味子甘草各半兩上㕮咀每服五錢或一兩入姜煎按此心肺藥也然麻黃恐非病後所宜拔萃方地骨皮散治渾身壯熱脈長而滑陽毒火熾發渴地骨皮茯苓各半兩柴胡黃芩生地黃知母各一兩石膏二兩羌活麻黃各七錢半有汗並去之上㕮咀每服一兩入姜煎按此肝心脾肺腎藥又表裡氣血之劑也云歧子曰在五臟之標本者皆可用梔子仁湯治發熱潮熱發狂煩躁面赤咽痛梔子仁赤芍大青知母各一錢升麻黃芩石膏各二錢杏仁二錢柴胡二錢半甘草二錢豉百粒上㕮咀水煎按此脾肺肝膽胃經藥也陽毒升麻湯治傷寒雜病汗吐下後變成陽毒發狂譫妄喉痛下利升麻五錢犀角射干黃芩人參甘草各二錢半上㕮咀水煎按此升散肺胃火熱藥也葛根橘皮湯治諸熱證溫毒成癍或咳或心悶或嘔葛根三錢橘皮杏仁知母黃芩麻黃甘草各二錢上㕮咀入姜煎按此肺胃膀胱經藥也謹按古方治火升散之劑其例少得姑採以上諸方以備其旨折制之劑局方涼膈散按此瀉脾胃肺心主膽三焦大腸火熱藥也調胃承氣湯按此瀉胃火之藥也當歸承氣湯方並見熱門按此瀉脾胃肝火之藥也麥門冬散治丈夫婦人蘊積邪熱心胸煩悶咽乾口燥睡臥不安或大小腸不利口舌生瘡芒硝一兩麥門冬三錢小草黃連升麻犀角屑甘草炙黃芩枳殼大青各半兩上為末每三錢水煎按此瀉心肺肝胃火熱之劑與以上諸方皆鹹寒之藥經云火淫於內治以鹹寒而為正治然亦有氣血上下之分也用者自宜取擇黃連解毒湯治一切火熱毒狂躁煩心口燥咽乾熱勢之甚者及吐下後熱不解而脈洪喘急鄭聲目赤睛疼燥渴黃連黃柏大梔子黃芩各等分上㕮咀水煎按此太倉公火劑湯也瀉心肺腎膀胱大小腸胃火之藥真珠散治男女五臟積熱毒氣上攻心胸煩悶口乾舌燥精神恍惚悶亂生臥不安琥珀真珠粉天花粉鐵粉硃砂生甘草寒水石煆牙硝大黃各等分上為細末每一錢竹葉湯調下按此瀉心腎胃火之劑鎮墜藥也宣明大金花丸治中外諸熱寢汗咬牙睡語驚悸溺血淋閟咳血衄血瘦弱頭痛併骨蒸肺痿勞嗽去大黃加梔子名梔子金花丸黃連黃柏黃芩大黃各等分上為末滴水丸小豆大每二三十丸新水下按此解毒湯之變法也出陽明例但云治瘦弱頭痛以下諸證猶宜詳審用之當歸龍膽丸治腎水陰虛風熱蘊積時發驚悸筋惕搐搦神志不寧榮衛壅滯頭目昏眩肌肉瞤瘈胸膈咽嗌不利腸胃燥澀躁擾狂越罵詈驚駭火熱等證當歸草龍膽大梔子黃連黃柏黃芩各一兩大黃蘆薈青黛各半兩木香一錢麝半錢上為末煉蜜丸如小豆大薑湯下三二十丸按此瀉心肝脾肺腎胃火之藥也神芎丸治一切熱證常服保養除痰飲消酒食清頭目利咽膈能令遍身結滯宣通氣利而愈神強體健耐傷省病大黃黃芩各二兩牽牛滑石各四兩黃連薄荷川芎各半兩上為末水丸如小豆大溫水下十丸至十五二十丸按此瀉肝心脾胃肺膀胱火熱之劑又氣血藥也下濕熱導滯甚捷但云常服神強體健省病與前方云治腎水陰虛虛損者恐未必然升散折制之劑宣明防風通聖散川芎石膏湯方並見中風門局方紅雪通中散治煩熱躁熱毒熱喉閉狂躁胃爛發斑酒毒麝香半兩硃砂一兩川朴硝十斤羚羊角屑黃芩升麻各三兩赤芍竹葉枳殼人參木香檳榔甘草各二兩葛根大青藍葉梔子桑白皮木通各一兩半蘇木六兩上件藥制合見局方按此表裡氣血之藥也紫雪治內外煩熱不解口中生瘡狂易叫走解諸熱毒藥毒邪熱小兒驚癇百病黃金百兩寒水石磁石石膏滑石各三斤打碎以上用水一石煮至四斗去渣入下項甘草炙八兩羚羊角屑犀角屑青木香沉香各五兩丁香一兩升麻玄參並銼細各一斤以上再煮至一斗五升入下項硝石四升芒硝亦得每升得七兩七錢半朴硝十斤提淨者以上入前藥汁中微火煎柳枝不住手攪候有七升投放水盆中半日欲凝入下項藥攪令勻硃砂研三兩麝香當門子一兩二錢半上藥成霜雪紫色每服一錢或二錢冷水調下大人小兒臨時以意加減並食後服按此心脾肺腎胃經藥也千金黑奴丸治火熱陽毒發狂發斑煩躁大渴倍常黃芩釜底煤芒硝灶突墨梁上塵小麥奴麻黃大黃各一兩上為末煉蜜丸如彈大新汲水化服不定再服半丸飲水盡足當發寒寒已汗出乃瘥未汗再服半丸不大渴者不可與按此出陽明藥例取諸火化者為從治之意又表裡之劑也滋陰壯水之劑拔萃六味地黃丸治腎氣虛久新憔悴寢汗發熱五臟齊損瘦弱虛煩骨蒸下血丹溪大補丸降陰火補腎水補陰丸降陰火治煩渴骨熱補腎水真陰不足並見補虛門按此三方足少陰藥下二方入陰中至陰之劑經云壯水之主以制陽光所謂求其屬也局方玄參湯治腎臟實熱心胸煩滿耳聽無聲腰背俯仰強痛口乾溺赤生地黃玄參五加皮黃芩赤茯苓通草石菖蒲甘草炙羚羊角屑麥門冬各等分上㕮咀水煎按此滋腎通心氣血之藥也從治之劑丹溪左金丸瀉肝火行濕為熱甚反佐開痞結治肝邪黃連六兩吳茱萸一兩上為末粥糊丸局方溫膽湯治膽虛痰熱驚悸不眠半夏竹茹枳實各二兩陳皮生薑四兩甘草二兩上㕮咀水煎每服一兩治要茯苓散治心實熱口乾煩渴眠臥不安茯神麥門冬各一兩半通草一兩二錢半知母一兩紫菀桂心各七錢半升麻一兩二錢半淡竹茹半兩大棗十二枚赤石脂一兩七錢半上㕮咀每服一兩井花水煎茱萸散治小腸虛熱或酒後頻吃冷水等物其病臍下結塊連外腎俱腫者吳茱萸二錢半川芎半兩木通四錢半夏一錢上㕮咀每三四錢入蔥煎服瀉熱湯治脾臟熱面黃目赤季脅痛滿半夏母姜各八兩枳實梔子茯苓芒硝各三兩細辛五兩白朮杏仁各四兩生地黃淡竹葉各一升上㕮咀每服一兩或兩半水煎後下硝溫服桂苓甘露飲治胃受濕熱頭疼身熱煩渴吐瀉口乾方見熱門橘皮湯治肺熱氣咳息喘奔橘皮麻黃各三兩紫蘇柴胡各二兩宿姜杏仁各四兩石膏八兩上㕮咀每服一兩水煎生薑泄腸湯治大腸實熱腹脹不通口舌生瘡生薑橘皮竹茹黃芩梔子仁白朮各三兩桂心一兩茯苓芒硝各二兩生地黃十兩上㕮咀入大棗煎每服一兩金匱腎氣丸治腎經虛熱方見補虛門五苓散治發熱而渴小便不利煩躁頭痛方見泄瀉門按內經注曰若調寒熱之逆冷熱必行則熱物冷服下咽之後冷體既消熱性便發由是病氣隨愈矣以上諸方皆從其氣以去拒格之熱可臨證選用求其意例也
