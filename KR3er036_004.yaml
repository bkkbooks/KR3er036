body:
  text: 卷四痰飲門痰飲脈法要略云脈雙弦者寒也皆大下後善虛脈偏弦者飲也肺飲不弦但苦喘氣短又云脈浮而細滑者傷飲脈弦數有寒飲冬夏難治脈沉而弦者懸飲內痛其人短氣四支歷節痛脈沉者有留飲陳無擇云飲脈皆弦微沉滑或云左右關脈大者膈上有痰也可吐之病人百藥不效關上脈伏而大者痰也眼皮及眼下如灰煙黑者痰也仲景四飲要略云四飲者懸飲留飲支飲痰飲是也其人素盛今瘦水走腸間瀝瀝有聲謂之痰飲飲後水流在脅下咳唾引痛謂之懸飲飲水流於四支當汗出而不汗身體重痛謂之溢飲咳逆倚息短氣不得臥其形如腫謂之支飲又有留飲者背寒如手大或短氣而渴四支歷節疼脅下痛引缺盆咳嗽則轉甚又有伏飲者膈滿嘔吐喘咳發則寒熱腰背痛目淚出其人振振惡寒身瞤惕病溢飲者當發其汗懸飲者法當下之痰飲者當以溫藥和之按古方謂四飲生六證者即四飲加伏飲留飲也或云五飲者即留飲伏飲合為一證也三因為痰飲用溫藥從小便去之支飲則隨證汗下以補四飲之治法愚嘗觀仲景治飲諸方之意在表者汗之在裡者下之挾濕則分利之寒熱溫涼隨其所屬以治之何必拘此四證痰分三因陳無擇云人之有痰飲者由榮衛不清氣血濁敗凝結而成也內則七情汨亂臟氣不行鬱而生涎涎結為飲為內所因外則六淫侵冒玄府不通當汗不泄蓄而為飲為外所因或飲食過傷色欲無度運動失宜津液不行聚為痰飲屬不內外因其為病也為喘為咳為嘔為泄為眩暈嘈煩忪悸愪㦜寒熱疼痛腫滿攣癖癃閉痞膈如風如癲未有不由痰飲所致按此分三因為病之狀至為切當而其論中所引三因之藥有外因而用里藥者有內因而用表藥者其意詳見方後論中論治痰理氣之論嚴氏云人之氣道貴乎順順則津液流通決無痰飲之患古方治飲用汗下溫利之法愚見不若以順氣為先分導次之氣順則津液流通痰飲運下自小便中出矣按嚴氏謂氣順則痰自下之說蓋以人之七情鬱結氣滯生涎聚為痰飲治者能使氣道通利則痰自降下也然有病人元有痰積其氣因痰而結滯者豈但理氣而痰能自行耶必先逐去痰結則滯氣自行豈可專主一說又云人身無倒上之痰天下無逆流之水此乃齊東之語夫水性潤下搏而躍之則可使過顙痰性順下被火泛上亦可至巔今庸醫莫察其義又每口誦以語人良可悲夫論痰為諸病王隱君論云痰證古今未詳方書雖有五飲痰諸飲之異而莫知其為病之源或頭風眩目運耳鳴或口眼蠕動眉稜耳輪俱癢或痛或四支遊風腫硬而似疼非疼或為齒頰癢痛牙齒浮而痛癢不一或噫氣吞酸心下嘈雜或痛或噦或咽嗌不利咯之不出咽之不下其痰似墨有如破絮挑膠蜆肉之狀或心下如停冰鐵心氣冷痛或夢寐奇怪之狀或足腕痠軟腰腎骨節卒痛或四支筋骨疼痛難名並無常所乃至手麻臂疼狀若風濕或脊上每日一條如線之寒起者或渾身習習如臥芒刺者或眼黏濕癢口糜舌爛喉痹等證或繞項結核狀若瘰癧或胸腹間如有二氣交紐噎塞煩悶有如煙火上衝頭面烘熱或為失志顛狂或中風癱瘓或勞瘵荏苒之疾或風毒腳氣或心下怔忡如畏人捕或喘嗽嘔吐或嘔冷涎綠水黑汁甚為肺癱腸毒便膿攣跛蓋內外為病百般皆痰所致其狀不同難以盡述蓋津液既凝為痰不復周潤三焦故口燥咽乾大便秘面如枯骨毛髮焦槁婦人則因此月水不通若能逐去敗痰自然服餌有效余嘗用一藥即袞痰丸以愈諸疾不可勝數矣今特相傳於世云脈經云病人一臂不遂時復移在一臂其脈沉細非風也必有飲在上焦活人書雲中脘有痰亦令人憎寒發熱惡風自汗胸膈痞滿有類傷寒但頭不痛項不強為異按所敘病證患者十居八九足見痰之為病誠多也何則人血氣流行無一息間斷才有壅滯津液凝閉鬱而成熱痰逐生焉人於六淫七情飲食起居之際豈能一一中節而無所壅滯乎故余特敘脈經活人二條以證隱君之說有所本也但所制袞痰丸一方難以通治諸疾論飲專主於濕原病式曰積飲留飲積蓄而不散也水得於燥則消散得濕則不消以為積飲土濕主痞故也論痰證有五子和云凡人病痰者有五一曰風痰二曰熱痰三曰濕痰四曰酒痰五曰食痰蓋風痰者形寒飲冷熱痰者火盛制金濕痰者停飲不散酒痰食痰者飲食過傷所致按痰乃積飲所化故原病式列於太陰濕土之條又子和有五痰之說蓋其實一出於濕而所挾所因有五者之異故王隱君之方書論痰有五曰風痰寒痰熱痰氣痰味痰夫味痰者因飲食酒醪厚味而然也氣痰者因事逆意而然也熱痰者因飲食辛辣炙爆重裀厚服而然也寒痰者因冒寒涼而然也風痰者因感風而發或風熱拂鬱而然也此皆素抱痰氣因風寒氣熱味而作非別有此五種之痰也愚謂治法當以疾為本以所挾之氣為標也論痰清濁王隱君云論痰清白者為寒黃而濁者為熱殊不知始則清白久則黃濁清白稀薄漬於上黃濁稠黏凝於下嗽而易出者清而白也咳而不能出則黃濁結滯者也若咯唾日久濕熱所郁上下凝結皆無清白者也甚至帶血血敗則黑痰為關格異病人所不識又清白者氣味淡日久者漸成惡味酸辣腥臊焦苦不一按此以痰之新久分清濁可謂得病機之情矣飲當去水溫補轉劇論子和云留飲一證也古人有四飲五飲之分皆觀病之形狀而定名也予論飲之所得其來有五有愪鬱而得之者有因之而得之者有思慮而得之者有痛飲而得之者有熱而傷冷得之者飲證雖多其因無出於此夫水陰物也但積水則生濕停酒則發燥久則成痰在左脅者同肥氣在右脅者同息賁入肺則多嗽入大腸則為瀉入腎則為湧水在太陽則為支飲皆由氣逆而得之故在上則面浮在下則腑腫在中者支滿痞膈痰逆在陽不去者久則化氣在陰不去者久則成形今之用方者例以飲為寒積皆用溫熱之劑以補之燥之水濕未除反增心火況留飲無補法氣方補則轉增豈知內經所謂留者攻之也且白朮參苓服之尚加閉塞況燔針艾火其痞可知前人處五飲丸用礬石巴豆烏附雖是下攻終同燥熱今劉河間以十棗湯加大黃牽牛制三花神佑丸新得之疾服之氣流飲去而愈昔有病數年不愈予診之左手皆微小右手皆滑而大微小為寒滑大為燥以瓜蒂散湧其寒痰數升汗出如沃次以導水丸禹功散去腸中燥垢亦數升其人半愈然後以痰劑流濕降火開其胃口不逾月而瘥按此論飲乃水濕所為發為諸證不宜溫補可謂詳明但專以三花神佑丸為說則失之太峻也詳見總論中論局方用熱藥治諸氣痰飲嘔吐膈噎之誤丹溪曰夫氣之初病也其端甚微或因飲食不謹或外觸風雨寒暑或內感七情或食味過厚偏助陽氣蘊為膈熱或資稟充實表密無汗津液不行清濁相干氣為之病或痞或痛或不思食或噫腐氣或吞酸或嘈雜或膨滿不求病原便認為寒遽以辛香燥熱之劑投之數帖時暫得快以為神方厚味仍前不節七情又復相仍舊病被劫暫開濁液易於攢聚或半月或一月前證復作如此延曼自氣成積自積成痰此為痰為飲為吞酸之由也良工未遇謬藥又行痰挾瘀血遂成窠囊此為痞為痛為嘔以為噎鬲反胃之次第也飲食湯液滯泥不行滲道蹇澀大便或秘或溏下失傳化中焦愈停醫者不察猶執為冷翻思前藥隨手得失至此賓主皆恨藥欠燥熱顒俟久服可以溫脾壯胃消積行氣以異一旦豁然之效不思胃為水穀之海多血多氣脾為消化之器氣清和則健而運行不息今久得香熱之味偏助氣血沸騰其始也胃液凝聚其久也脾氣耗散傳化漸遲醫者又曰虛而積寒非尋常草木可療徑以烏附助佐丹劑專意服之積而久也血液俱耗胃脘乾槁遂成鬲噎亦曰反胃仲景論飲有六分別五臟諸證可表者汗之可下者利之滯者導之郁者揚之熱者清之寒者溫之偏熱偏寒者反佐而行之挾濕者淡以滲之挾虛者補而養之治法至矣第恨醫者不善處治病者不守禁忌遂使藥助病邪展轉深痼去生漸遠深可哀憫按此論嘔吐痞滿噫腐吞酸噎鬲反胃致病之由皆以氣之初病誤服燥熱結為痰飲所致故列於痰飲門中而於彼諸證內不詳載宜於此通考焉謹按痰之為病仲景論四飲六證無擇敘內外三因俱為切當蓋四飲則敘因痰而顯諸證者三因則論其因有所傷而生痰者也唯王隱君論人之諸疾者悉出於痰此發前人所未論可謂深識痰之情狀而得其與者矣制袞痰丸一方總治斯疾固為簡便較之仲景三因有表裡內外而分汗下溫利之法則疏闊矣況又有虛實寒熱之不同者哉夫痰病之原有因熱而生痰者亦有因痰而生熱者有因風寒暑濕而得者有因驚而得者有因氣而得者有因酒飲而得者有因食積而得者有脾虛不能運化而生者若熱痰則多煩熱風痰多成癱瘓奇證冷痰多成骨痹濕痰多倦怠軟弱驚痰多成心痛癲疾飲痰多成脅痛臂痛食積痰多成癖塊痞滿其為病狀種種難名王隱君論中頗為詳盡學者但察其病形脈證則知所挾之邪隨其表裡上下虛實以治也若夫子和謂飲無補法必當去水故用吐汗下之三法治人常愈又論熱藥治痰之誤固為精切亦有挾寒挾虛之證不可不論夫久痰凝結膠固不通狀若寒凝不用溫藥引導必有拒格之患況有風寒外束痰氣內郁者不用溫散亦何以開鬱行滯也又有血氣虧乏之人痰客中焦閉塞清道以致四支百骸發為諸病理宜導去痰滯必當補接兼行又難拘於子和之三法也大凡病久淹延卒不便死者多因食積痰飲所致何以然蓋胃氣亦賴痰積所養飲食雖少胃氣卒不便虛故也亦有治痰用峻利過多則脾氣愈虛津液不運痰反又生而愈盛法當補脾胃清中氣則痰自然運下此乃治本之法世謂醫中之王道者正此類也論痰證有似邪祟詳見補虛門痰飲治法解表之劑攻下之劑金匱十棗湯治懸飲內痛芫花熬甘遂大戟各等分上搗篩以水一升半煮大棗十枚至八合去渣納藥末強人一錢匕羸人半錢平旦服之不下更加半錢快下後以糜粥自養按此出少陰水氣例藥芫花之辛以散飲二物之苦以泄水甘遂直達水氣所結之處乃泄水之聖藥性有毒不可輕用下同三因控涎丹凡人忽患胸背手足頸項腰胯隱痛不忍筋骨牽引釣痛時時走易不定乃是痰涎在心鬲上下變為此疾或手足冷痹氣脈不通誤認癱瘓非也甘遂去心紫大戟去皮真白芥子各等分上為末糊丸桐子大曬乾食後臨臥淡薑湯或熟水下五七丸至十丸痰猛加丸數一方妙應丸亦只上三味驚痰加硃砂痛者加全蠍酒痰加雄黃全蠍臂痹加木鱉子去油殼驚氣成塊者加穿山甲鱉甲玄胡索蓬朮熱痰加盆硝寒痰加丁香胡椒桂宣明三花神佑丸十棗湯加牽牛大黃輕粉詳見下劑按以上二方仍十棗湯加減法也並出少陰水氣例前方去芫花加白芥子本草主上氣發汗胸膈痰冷蓋胸有痰非此不達此方加牽牛大黃大瀉血氣之濕熱而輕粉又去涎積也虛家不可輕用金匱厚朴大黃湯治支飲脅滿者厚朴一尺大黃六兩枳實四枚上水五升煮二升溫服按此即小承氣湯陽明可下例藥也王隱君袞痰丸括曰甑里翻身甲掛金於今頭戴草堂深相逢二八求斤正硝煆青礞倍若沉十七兩中零半兩水丸桐子意常斟千般怪證如神效水瀉雙身卻不任按此以大黃黃芩為君大瀉陽明濕熱之藥礞石以墜痰沉香則引諸氣上而至天下而及泉為使也有實熱者可用脾胃論蠲飲枳實丸逐飲消痰導滯清膈枳實半夏陳皮去皮各二兩黑牽牛半斤取末二兩上末水煮麵糊丸桐子大每五十丸薑湯下瑞竹堂方神仙墜痰丸皂角不蛀者去皮弦酥炙黃色去子淨一兩六錢黑牽牛一斤取頭末四兩生白礬一兩二錢上為細末清水丸桐子大每五十丸空心溫酒下寶鑑大利膈丸風痰實滿喘嗽風氣上攻黑牽牛四兩生用半夏皂角青皮各二兩槐角一兩炒木香半兩加檳榔大黃各五錢上為細末薑汁糊丸桐子大食後薑湯下五十丸滌痰丸治三焦氣塞下痰飲酒食黑牽牛二兩炒取末木香檳榔青皮陳皮三稜大黃煨枳殼半夏各一兩上末糊丸桐子大每服五十丸食後薑湯下按以上四方所用牽牛皂角木香檳榔者並出厥陰例藥也牽牛以大黃引之則入血以諸氣藥引之則入氣本瀉氣中濕熱之藥大能脫人元氣用者戒之透羅丹治痰實咳嗽胸膈不利皂角酥炙去皮弦一兩黑牽牛微炒一兩杏仁麵炒黃去皮尖一錢巴豆去油另研一錢半夏一兩大黃一兩紙裹水浸慢火焙乾上為細末生薑自然汁為丸桐子大食後薑湯下三十丸按此仲景備急丸加減法也破堅積結聚寒熱兼用之藥也三因破飲丸治五飲停蓄結為癖支滿胸脅搶心疼痛蓽茇丁香胡椒砂仁青皮烏梅肉巴豆去皮木香蠍梢各等分上以青皮同巴豆漿水浸一宿次日漉出同炒橘皮焦去巴豆將所浸水淹烏梅肉炊一熟飯細研為膏如綠豆大每服五十丸臨臥薑湯下津咽亦得按此破堅積寒癖大熱之藥也局方妙香丸治一切久遠沉積巴豆膩粉硇砂硃砂牛黃水銀腦麝上分兩修制見本方按此用巴豆硇砂削堅破癖加以腦麝等辛香飛竄通達五臟入骨透肌之藥也錢氏白餅子巴豆二十四個去皮膜水一斗煮水盡為度半夏湯浸七次焙為末輕粉滑石天南星各一錢上研勻巴豆後入眾藥以糯米飯為丸小豆大捻作餅子煎蔥白湯下按此錢氏用治小兒風痰驚涎癲癇驚搐下痰之藥也以上所用巴豆等方蓋以痰飲癖積結聚堅固非此不能除故易老號斬關奪門之將然大宜詳審不可輕用古方巴豆加減寒熱溫涼五色佐使之藥甚多用之各隨其宜並見元戎吐劑仲景瓜蒂散子和三聖散並見吐劑稀涎散豬牙皂角綠礬晉礬藜蘆元戎勝金丸薄荷瓜蒂藜蘆硃砂豬牙皂角按以上用瓜蒂藥並出三陽可吐藥例古今吐法以病在頭或在胸中但在上焦者皆可用也在經絡者亦可用吐法中就有發散之義焉諸亡血虛家不可用此分利之劑仲景五苓散治瘦人臍下悸吐涎沫而癲眩者水也方見濕門治濕和中之劑金匱苓桂朮甘湯治心下有痰飲胸脅支滿目眩茯苓四兩桂枝白朮各二兩甘草二兩上水六升煮取三升三服小便即利按此太陽經藥也茯苓湯治胸中有痰飲自吐出水後心胸間虛氣滿不能食消痰氣令能食茯苓人參白朮各三兩枳實二兩橘皮二兩半生薑四兩上水六升煮取一升八合分溫三服按此足太陰陽明經藥也枳朮湯治心中堅大如盤水飲所作方見水氣門按此足太陰陽明經藥也澤瀉湯治心下有支飲其人苦眩冒澤瀉五兩白朮二兩上以水二升煮取一升分溫再服按此足太陰陽明太陽少陰經藥也小半夏湯治心下水支飲嘔吐不渴半夏一升生薑半斤上以水七升煮取一升半分溫再服按此足太陰陽明經藥也小半夏加茯苓湯治卒嘔吐心下痞隔間有水眩悸者三因名半夏湯半夏一升生薑半斤茯苓三兩上同煎服如前按此足太陰陽明太陽手太陰經藥也按以上諸方並出太陰痰飲例藥也白朮除濕益燥和中益氣半夏治寒痰和胃勝濕茯苓澤瀉逐水利小便上下分消其濕也局方橘皮半夏方方見本方局方二陳湯治痰飲為患嘔吐噁心頭眩心悸等證方見本方桔梗半夏湯治胸痞痰涎不利氣逆嘔噦桔梗半夏陳皮上等分細末生薑水煎姜糊丸亦可加枳實減半名桔梗湯嚴氏導痰湯治一切痰飲頭目眩暈或痰飲留積不散方見本方上銼姜煎按以上所用橘半等乃足太陰陽明經藥也出太陰嘔噦例許學士神術丸治痰飲茅山蒼朮一斤米泔浸一宿去皮切片焙乾為末生油麻半兩水二盞研細取漿大棗十五個煮取肉研旋入麻漿拌和藥上末為丸桐子大日曬乾每服五七十丸溫酒空心下按此足陽明太陰經藥治濕發散之藥也仁齋加味二陳湯治痰攻眼腫痛並酒家手臂痛重成麻痹二陳湯中加蒼朮片子薑黃制枳殼各少許芎夏湯逐水利飲二陳湯加川芎白朮青皮枳殼上銼姜五片煎蓋川芎半夏能逐水也按此二方乃二陳湯加蒼朮川芎等藥是亦治濕帶表之藥也治風痰之劑局方青州白丸子方見小兒門按此足太陰經藥出厥陰例治風痰行經通痹之熱藥也局方玉壺丸南星半夏天麻白麵辰砂化痰丸南星半夏辰砂白礬上主治修制並見本方易老水煮金花丸治風痰脈弦咳嗽南星半夏各一兩生用天麻五錢白麵三兩雄黃一錢寒水石一兩燒存性上為細末滴水為丸小豆大每服五七十丸至百丸煎漿水沸下藥煮浮為度漉出淡漿水浸另用生薑湯下或通聖加半夏局方川芎丸防風丸皆可用也按以上三方並出太陰嘔噦例治痰挾風之涼藥也良方天南星丸治婦人風疾半夏曲一兩天南星一兩炮晉礬半兩枯白附子炮皂角仁炒黃各一兩按此足太陰厥陰經藥也熱痰之劑仲景小陷胸湯半夏黃連栝蔞實上先以水二盞煎栝蔞實至一盞半下諸藥煎八分溫服未利再服嚴氏半夏丸治肺熱痰嗽栝蔞仁另研半夏湯洗焙各一兩上件和勻薑汁打糊丸按此小陷胸加減法也機要小黃丸治熱痰人參黃芩南星半夏生薑上薑汁糊為丸一方南星半夏黃芩只三味宣明茯苓半夏湯治風熱痰涎二陳湯中加黃芩按此手足太陰經藥也人參半夏丸化痰治涎止咳定嗽諸痰不可盡述人參茯苓南星各半兩半夏乾生薑生白礬寒水石各一兩薄荷葉半兩蛤粉二兩藿香葉一分一法加黃連半兩黃柏二兩上為末麵糊丸如小豆薑湯下二三十丸食後治寒痰之劑深師消飲丸治停飲胸滿嘔逆腹中水聲不思飲食白朮二兩枳實炒乾薑各七錢茯苓半兩上細末蜜丸桐子大溫水下三十丸寶鑑溫胃化痰丸治膈內有寒脾胃傷飲胸膈不快痰涎不已陳皮乾薑白朮各一兩半夏三兩上為末薑汁糊丸桐子大薑湯下二十丸局方溫中化痰丸治停痰留飲青皮良薑乾薑陳皮上主治修合見本方局方丁香五套丸治脾胃虛弱不能宣行水穀故為痰飲結聚胸膈嘔吐不食方見本方按以上諸方乃溫胃燥濕治寒痰溫里之藥也若久痰凝滯內蘊濕熱誤服燥熱多成吞酸膈噎等病用者審之發明半夏溫肺湯治中脘痰水冷氣心下汪洋嘈雜多唾清水脅脹不食此胃虛冷所致其脈沉弦細遲旋覆花細辛桂心人參甘草陳皮桔梗芍藥半夏各半兩赤茯苓三分上咀四錢姜七片煎丁香半夏丸治心下停飲冷痰檳榔三分丁香半夏各一兩細辛乾薑人參各半兩上細末薑汁糊為丸每服三十丸薑湯下機要薑桂丸治寒痰南星半夏官桂各一兩上細末糊丸桐子大每服五七十丸薑湯下按以上三方治寒燥痰溫中散表寒之藥也理氣之劑局方四七湯治七情氣鬱結聚痰涎狀如破絮或如梅核在咽喉之間咯不出咽不下並治中脘痞滿痰涎壅盛上氣喘急紫蘇葉二兩厚朴三兩茯苓四兩半夏五兩上銼生薑棗煎服百一選方三仙丸治中脘氣滯痰涎不利南星半夏各五兩用薑汁作面香附五兩上末糊丸桐子大每服四十丸薑湯下機要去香附加橘皮名玉粉丸治氣痰指迷茯苓丸治中脘留伏痰飲臂痛難舉半夏二兩茯苓一兩枳殼炒半兩風化硝二錢半上末薑汁糊丸薑湯下三十丸按以上三方用南星半夏所以勝痰而兼用諸氣藥即嚴氏順氣則痰自下之意然紫蘇枳殼肺氣藥也厚朴脾胃氣藥也香附肝氣藥也隨臟氣而用不可不分降氣墜痰溫補之劑局方蘇子降氣湯治虛陽上攻氣不升降上盛下虛痰涎壅盛俞山人降氣湯治同前黑錫丹治痰氣壅盛上盛下虛心火炎熾腎水枯竭靈砂丹治上盛下虛痰涎壅盛此藥最能鎮墜升降陰陽四方並見本方按以上諸方並系類聚溫熱之藥而出證皆云治上盛下虛氣不升降夫所謂盛者即心火之炎虛者即腎水之弱火炎水弱則有升無降故津液湧而為痰涎於上今以金石丹藥濕熱香燥之藥而欲補下焦之虛如抱薪救火爾若以為下焦陽虛而議治者亦非也夫陽火之虛則陰水必盛痰涎津液自然隨氣而降又何必用此藥也金匱腎氣丸治短氣有微飲當從小便去之方見補虛門按仲景以腎虛有飲故用此補腎逐水以其中有澤瀉茯苓故也而嚴氏以此方治腎虛寒而不能攝養腎水使邪水溢上多吐痰唾夫腎既虛寒則陽火必盛未審所錄攝養腎水者何物耶夫腎水乃天一所生人之根蒂痰涎乃津液敗濁而成豈可直指腎水不攝而邪水溢上耶若云腎水虛弱陰虧難降使津液敗濁而為痰水故用此藥於義則明白矣謹按痰病多生於濕故古方多用南星半夏之類然亦有所挾之邪故藥有風寒暑濕之異又人身體叚有上下表里故在表者汗之在裡者下之在上者湧之在下者分利之治飲之法可謂詳矣或曰陳無擇以大小青龍五苓承氣為外因參苓八味參蘇為內因十棗葶藶大小半夏控涎破飲為不內外因今吾子所編諸方意不侔此何也予曰大小青龍外因之表藥五苓承氣外因之裡藥也參苓八味內因之裡藥參蘇飲內因之表藥也十棗葶藶控涎破飲不內外因之下藥也大小半夏不內外因和中藥也彼以三因立論故敘藥止以所因為主而不分其表裡內外之異今予以表裡內外分類諸方則難拘其所因也
