body:
  text: 卷二十一消渴門論消中三證之異陳無擇云消渴屬心故煩心致心火散浸渴而引飲諸脈軟散皆氣實血虛也消中屬脾疸熱減則為消中消中復有三有因寒中陰勝陽郁久必為熱中經云脈洪大陰不足陽有餘則為熱中多食數溺為消中陰狂興盛不交精泄則為強中至病強中不亦危矣消腎屬腎盛壯之時不謹而縱欲房勞年長腎衰多服金石真氣既喪口乾精溢自泄不飲而利經云腎實則消不渴而小便自利名曰腎消亦曰內消論三消之疾燥熱勝陰河間曰三消之疾本濕寒之陰氣極衰燥熱之陽氣太甚皆因乎飲食服餌失節腸胃乾涸而氣液不得宣平或耗亂精神過違其度或因大病陰氣損而血液衰虛陽氣悍而燥熱鬱甚或因久嗜咸物恣食炙爆飲食過度亦有年少服金石丸散積久實熱結於下焦虛熱血氣不能制濕熱燥甚於腎故渴而引飲若飲水多而小便多者名曰消渴若飲食多而不甚渴小便數而消瘦者名曰消中若渴而飲水不絶腿消瘦而小便有脂液者名曰腎消此三消者其燥熱同也夫經中有言心肺氣厥而渴者有言肝痹而渴者有言脾熱而渴者有言腎熱而渴者有言胃與大腸結熱而渴者有言脾痹而渴者有言小腸痹熱而渴者有因病瘧而渴者有因肥甘美食而渴者有因醉飽入房而渴者有因遠行勞倦遇大熱而渴者有因傷害胃干而渴者有因病風而渴者雖五臟之部分不同而病之所遇各異其為燥熱亡液一也謹按先生三消之論始言天地六氣五味以配養人身六位五臟而究乎萬物之源終引內經論渴諸證以辨乎世方熱藥之誤比物立象反覆詳明非深達陰陽造化之機者孰能如是哉夫治此疾者補腎水陰寒之虛而瀉心火陽熱之實除腸胃燥熱之甚濟身津液之衰使道路散而不結津液生而不枯氣血利而不澀則病日已矣豈不以滋潤之劑養陰以制燥滋水而充液哉何故世論消渴者多不知其意謂因下部腎水虛不能制其上焦心火使上實熱而多煩渴下虛冷而小便若更服寒藥則元氣轉虛而下部腎水轉衰則上焦心火尤難治也但以暖藥補養元氣若下部腎水得實而勝退上焦心火則自然渴止小便如常而病愈也籲若此未明陰陽虛實之道也夫腎水屬陰而本寒虛則為熱心火屬陽而本熱虛則為寒若腎水陰虛則心火陽實是謂陽實陰虛而上下俱熱矣以彼之言但見消渴數溲妄言為下部寒爾豈知腸胃燥熱怫鬱使之然也且夫寒物屬陰能養水而瀉心熱物屬陽能養火而耗水令腎水既不勝心火則上下俱熱奈何以熱藥養腎水欲令勝心火豈不暗哉彼不謂水氣實者必能制火虛則不能制火故陽實陰虛而熱燥其液小便淋而常少陰實陽虛不能制水小便利而常多此又不知消渴小便多者蓋燥熱太甚而三焦腸胃之腠理怫鬱結滯緻密壅塞而水液不能滲泄浸潤於外以養乎百體故腸胃之外燥熱大甚雖多飲水入於腸胃之內終不能浸潤於外故渴不止而小便多水液既不能滲泄浸潤於外則陰燥竭而無以自養故久而多變於聾盲瘡瘍痤痱之類而危殆其為燥熱傷陰也明矣論治消渴大法東垣曰膈消者以白虎加人參湯治之中消者善食而瘦自汗大便硬小便數叔和云口乾飲水多食飢虛疸成消中者調胃承氣三黃丸治之下消者煩躁引飲耳輪焦乾小便如膏叔和云焦煩水易虧此腎消也六味地黃丸治之總録所謂末敷能食者必發腦疽背瘡不能食者必敷中滿鼓脹皆謂不治之證潔古老人分而治之能食而渴者白虎加人參湯不能食而渴者錢氏方白朮散倍加葛根治之上中既平不復敷下消矣前人用藥厥有旨哉或曰末敷瘡疽者何也此火邪勝也其瘡痛甚而不潰或赤水者是也經云有形而不痛陽之類也急攻其陽無攻其陰治在下焦元氣得強者生失強者死末敷中滿者何也以寒治熱雖方士不能廢其繩墨而更其道也然臟腑有遠近心肺位近宜制小其服腎肝位遠宜制大其服皆適其至所為故如過與不及皆誅罰無過之地也如高消中消制之太急速過病所久而成中滿之病正謂上熱未除中寒復生者也非藥之罪失其緩急之制也處方之治宜加意焉按以上所論三消傳變可謂發病機之旨比與陳氏三因論消中復有三證皆病敷所異大抵末敷發瘡疽者為敷外發脹滿強中為敷內亢極之甚也但三因所出治強中一方然未見其肯綮今姑存之以備其旨且傳脹滿皆不治之證況強中乎消渴治法治熱之劑局方清心蓮子飲調胃承氣湯治消中熱在胃而能飲食小便赤黃方並見熱門三因真珠丸治心虛煩悶積熱煩渴口乾舌燥引飲無度小便或利或不利知母一兩一分黃連苦參玄參鐵粉牡蠣各一兩硃砂二兩麥門冬去心天花粉各半兩金箔銀箔二百片上為末煉蜜入生栝蔞汁少許丸如梧子大用金銀箔為衣每二三十丸先用栝蔞根汁下一服次用麥門冬熟水下病退日二服按此心胃經藥也以上三方有輕重之殊宜選使治燥之劑東垣當歸潤燥湯治消渴舌上白乾燥唇乾口乾眼澀黑處見浮雲大便閉澀乾燥結硬喜溫飲陰頭短縮升麻一錢半柴胡七分甘草六分半一半生細辛一分杏仁六個紅花少許小椒三個生地黃三分黃柏知母石膏桃仁麻仁防風荊芥穗當歸身各一錢上㕮咀作一服水煎清涼飲子治消中能食而瘦口乾舌乾自汗大便結燥小便頻數羌活柴胡炙甘草知母酒製黃耆黃芩酒製各一錢生甘草漢防己生地黃酒製各半錢紅花少許桃仁五個杏仁十個升麻四分防風五分石膏黃柏草龍膽制各一錢半當歸身六分上㕮咀作一服水煎入酒些小此方減黃耆黃芩防風草龍膽加麻黃根三分黃連八分名地黃飲子按以上脾心肝腎藥也清氣之劑局方人參白虎湯治高消上焦燥渴不欲多食方見熱門東垣蘭香飲子治渴飲水極甚善食而瘦自汗大便結燥小便頻數石膏三錢知母酒製一錢生甘草防風各一錢炙甘草人參蘭香連翹白豆蔻仁桔梗升麻各五分半夏二分上為細末湯浸蒸餅和勻成劑捻作薄片子日中曬半乾碎如粉每服二錢食後淡生薑湯下按以上二方主上中二消之劑肺胃經藥也滋陰之劑丹溪補陰丸方見補虛門局方加減八味丸治腎虛消渴引飲金匱腎氣丸減附子加五味子上服如本方法要略治男子消渴小便反多仍用本方簡易地黃飲子治消渴咽乾面赤煩躁人參生地黃熟地黃黃耆天門冬麥門冬去心澤瀉石斛枇杷葉去毛炒枳殼炒甘草炒各等分上㕮咀每三錢水煎服按此心腎脾肺藥也以上三方主下消之劑硃砂黃連丸治心虛蘊熱或因飲酒過多發為消渴硃砂一兩宣連三兩生地黃二兩上為末煉蜜丸如梧子大每四五十丸燈芯棗湯送下按此心脾藥也上消之劑清氣滋陰之劑局方黃耆六一湯治男女諸虛不足胸中煩悸時常消渴或先渴而後發瘡或病諸瘡而後渴者並宜服方見前按此肺腎脾三焦命門之劑也東垣生津甘露飲子治高消大渴飲水無度舌上赤澀上下齒皆麻舌根強硬腫痛食不下腹時脹痛渾身色黃目白睛黃甚則四肢痿弱無力面塵脫色脅下急痛善嚏善怒健忌臀腰背寒兩尻冷甚石膏一錢二分人參炙甘草各一錢白葵半錢麥門冬蘭香當歸身各半錢桔梗三錢生甘草山梔蓽澄茄各一錢藿香二分全蠍二個升麻知母酒製各二錢黃連木香柴胡各三分白芷白豆蔻連翹薑黃各一錢黃柏酒拌杏仁各一錢半上為細末湯浸蒸餅和勻攤薄曬乾杵細食後每二錢抄於掌中以舌砥之隨津唾下或導以白湯少許按此肺胃心腎藥也東垣曰此制之緩也不惟不成中滿亦不傳下消矣三消皆可用宣明麥門冬飲子治膈消胸滿煩心津液干少短氣多為消渴知母甘草炒栝蔞人參五味子生地黃葛根茯神麥門冬去心各等分上㕮咀每五錢入竹葉十四片煎按此肺腎脾胃藥也雜方寶鑑麥門冬湯治消渴日夜飲水不止飲下即溲麥門冬去心黃連冬瓜各二兩上㕮咀每五錢水煎服如無干者用新者一枚重三斤去皮穰分作十二片為十二服每服一片日三次酒蒸黃連丸治消渴飲水無度至二三升小便五七十次發熱瘦弱口乾食已如飢此名消疸今用味苦無毒除熱正氣消渴厚腸消渴之人脾胃惡濕黃連為對黃連淨半斤酒一升湯重蒸伏時曬乾用上末滴水丸梧子大每五十丸食前溫水下仁齋加味錢氏白朮散治消渴不能食木香五味子柴胡各三分藿香一錢乾葛二錢白茯苓甘草炙白朮人參枳殼炒各半錢上㕮咀作一服水煎宣明大黃甘草飲子治男女一切消渴不能止者大豆五升煮三沸去苦水大黃一兩半甘草四兩上三味用井水一桶同煮軟盛放冷令病人食豆渴飲汁無時候食盡病不盡再如前服不三次愈矣三因石子薺苨湯治強中多因耽嗜色欲及快意飲食或服丹真氣既脫煩渴引水飲食倍常陰氣常興不交精出故虛熱注於下焦最為難治薺苨石膏各三兩人參茯神栝蔞根磁石煅淬知母乾葛黃芩甘草各二兩上銼每水三盞腰子一個去脂膜黑豆一合煮至盞半去腰子大豆入藥四錢煎服祕方用紫背浮萍搗汁每頓服半盞效丹溪方黃連末天花粉末生地黃汁生藕汁上二物汁為膏入上藥搜和入牛乳佐以薑汁和蜜湯為膏徐徐留於舌上以白湯少許送下機要方無天花粉有牛乳汁二汁熬膏和末為丸桐子大每二十丸少呷溫水下日進十服
