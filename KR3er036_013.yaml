body:
  text: 卷十三燥門結燥附內經論燥為諸證諸澀枯涸乾徑皴揭皆屬於燥按此河間論治已詳然當分大便閟結或消渴之類為里證皮膚燥澀乾疥爪枯之類為表證而於陽結陰結氣盛血少痰鬱風熱可得而悉燥本風熱論原病式云經曰風熱火同陽也寒燥濕同陰也又燥濕小異也然燥金雖屬秋陰而異於寒濕故反同其風熱也故火熱勝金衰而風生則風能勝濕熱能耗液而反寒陽實陰虛則風熱勝於水濕而為燥也凡人風病多因熱甚而風燥者為其兼化以熱為其主也然陽實陰虛而風熱太甚以勝水濕因而成燥肝主於筋而風氣自甚又燥熱加之液還聚於胸膈則筋太燥也燥金主於收斂徑切緊澀故為病筋脈徑強緊急而口噤也或病燥熱太甚而脾胃乾涸成消渴者或風熱燥甚怫鬱在表而裡氣平者善伸數欠筋脈拘急或時惡寒或筋惕而搐脈浮數而弦也風熱燥並郁甚於里故煩滿而或閟結也及風癇之發作者由熱甚而風燥為其兼化涎溢胸膈燥爍而瘛瘲昏冒僵仆也凡此諸證皆由熱甚而生風燥各有異者由風熱燥各微甚不等故也所謂中風或筋緩者因其風熱勝濕而為燥乃燥之甚也然筋緩不收而痿痹故諸膹郁病痿皆屬金肺乃燥之化也如秋深燥甚則草木痿落而不收病之象也是以手得血而能握足得血而能步夫燥之為病者血液衰少也而又氣血不能通暢故病然也論燥熱勝陰見消渴門論結燥病本不同東垣曰金匱真言論云北方黑色入通於腎開竅於二陰藏精於腎又云腎主大便大便難取足少陰夫腎主五液津液潤則大便如常若飢飽勞逸損傷胃氣及食辛熱味厚之物而助火邪伏於血中耗散真陰津液虧少故大便結燥然結燥之病不一有熱燥有風燥有陽結有陰結又有年老氣虛津液不足而結者治法云腎惡燥急食辛以潤之結者散之如少陰不得大便以辛潤之太陰不得大便以苦瀉之陽結者散之陰結者熱之仲景云小便利大便硬不可攻下以脾約丸潤之食傷太陰腹滿食不化腹響然不能大便者以苦藥瀉之大抵津液耗少而燥者以辛潤之有物而結者當下之若不究其源一概用巴豆牽牛之類下之損其津液燥結愈甚有復下復結極則以至引導於下而不能通者遂成不救之證可不慎哉按此只是論結燥言里證也河間所論則兼表裡而言之矣猶宜以燥熱勝陰相火論諸篇兼看燥證治法治風之劑機要大秦艽湯治血弱陰虛不能養筋筋燥而手足不能運動指爪乾燥屬風熱甚者方見中風門按此散風熱養血之劑太陽例藥也麻仁丸郁李仁麻子仁各一兩另研大黃二兩半以一半炒山藥防風枳殼炒各七錢半檳榔半兩羌活木香各五錢半上為細末煉蜜丸梧子大每三二丸溫水下按此手足陽明足太陽經藥表裡之劑氣分藥也東垣潤腸丸治脾胃中伏火大便祕澀或乾燥祕塞不通全不思食乃風結祕血結祕皆令祕塞也以潤燥和血疏風自然通矣麻子仁桃仁各一兩去皮尖另研羌活當歸尾大黃煨各半兩皂角仁秦艽各五錢上除另研外為細末五上火煉蜜丸如桐子大每三五十丸食前白湯下又有潤燥丸一方於本方加郁李仁防風是也按此足太陰手足陽明表裡藥也治熱之劑宣明當歸龍膽丸方見火門清涼飲子方見熱門和血潤下之劑東垣導滯通幽湯治大便難幽門不通上衝吸門不開噎塞不便燥閉氣不得下治在幽門以辛潤之當歸升麻桃仁各一錢另研生地黃熟地黃各半錢紅花炙甘草各三分上件作一服水煎調檳榔細末半錢服加大黃名當歸潤燥湯元戎四物湯治臟結祕澀者當歸熟地黃川芎白芍藥大黃煨桃仁各等分上㕮咀水煎或為丸服亦得按此手足厥陰經藥也子和脾約丸麻仁一兩二錢半枳實炒厚朴芍藥各二兩大黃四兩蒸杏仁去皮尖炒一兩二錢上為末煉蜜丸梧子大每三二十丸溫水下潤體丸郁李仁大黃桂心黑牽牛當歸黃柏各半兩輕粉少許上為末水丸如梧子大每三四十丸溫水下按以上二方一氣分藥一血分藥也二方故所主不同然氣血不能宣通者非此莫能療而氣虛津液不足者慎之神功丸方見咳門按此手足太陰藥也氣分之劑滋陰之劑拔萃六味地黃丸治下焦燥熱小便澀而數丹溪大補丸治陰虛燥熱方見火門
