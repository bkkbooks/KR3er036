body:
  text: 卷三十四頭痛門論厥頭痛真頭痛靈樞云厥頭痛取足六經手少陰真頭痛頭痛其腦盡痛手足寒至節死不治詳見厥病篇難經雲手三陽之脈受風寒伏留而不去則名厥頭痛入連在腦者名真頭痛按靈樞有厥頭痛之名而不指何邪為病至難經始言風寒伏留不去而三因嚴氏論雲氣血俱虛風寒暑濕之氣所侵傳於陽經伏留不去名曰厥頭痛蓋厥者逆也逆壅而衝於頭也痛引腦巔陷至泥丸宮者名真頭痛非藥之能愈夕發旦死旦發夕死則根氣先絶也斯言得之矣頭痛脈法內經云寸口脈中短者曰頭痛脈經雲陽弦則頭痛又云寸口脈浮中風發熱頭痛脈緊頭痛是傷寒脈緊上寸口者風頭痛脈訣雲頭痛短澀應須死浮滑風痰皆易除傷寒頭痛活人書雲頭痛者陽證也太陽證頭痛發熱惡寒無汗麻黃湯有汗桂枝湯若已發汗未發汗頭痛如破者連須蔥白湯不止者葛根蔥白湯陽明證頭痛不惡寒反惡熱胃實也調胃承氣湯少陽頭痛小柴胡湯太陰少陰並無頭痛之證仲景只有厥陰一證吳茱萸湯按傷寒以足三陽經上行至頭並厥陰與督脈會於巔故止言四經頭痛若雜病所感者諸經皆能頭痛也活人用蔥白湯以通上下之陽氣也諸經內外頭痛用藥法太陽頭痛惡風寒川芎少陽頭痛往來寒熱脈弦柴胡陽明頭痛自汗發熱惡熱白芷太陰頭痛體重痰實腹痛半夏少陰頭痛三陰三陽經不流行而足寒逆為寒厥頭痛細辛厥陰頭痛項痛脈微浮緩欲入太陽其疾痊然亦當用川芎寶鑑作藁本一作吳茱萸氣虛頭痛黃耆血虛頭痛當歸寶鑑作川芎下同諸氣血俱虛頭痛黃耆當歸傷寒太陽頭痛麻黃湯桂枝湯陽明頭痛白虎湯少陽頭痛柴胡湯太陰頭痛脈浮桂枝湯脈沉理中湯少陰頭痛脈沉微熱麻黃附子細辛湯厥陰頭痛外傷本經桂枝麻黃各半湯嘔而微吐水吳茱萸湯按此與後論重出者衆然中間藥味略有不同故兩存之東垣頭痛論金匱真言論云東風生於春病在肝俞在頭項故春氣者病在頭又諸陽會於頭面如足太陽之脈病沖頭痛足少陽之脈病頭角頷痛夫風從上受之風寒傷上邪從外入客於經絡令人振寒頭痛身重惡寒治在風池風府調其陰陽不足則補有餘則瀉汗之則愈此傷寒頭痛也頭痛耳鳴九竅不利者腸胃之所生乃氣虛頭痛也心煩頭痛者病在膈中過在手巨陽少陰乃濕熱頭痛也如氣上不下頭痛巔疾者下虛上實也過在足少陰巨陽甚則入腎寒濕頭痛也如頭半寒痛者先取手少陽陽明後取足少陽陽明此偏頭痛也有真頭痛甚則腦盡痛手足寒至節者死不治有厥逆頭痛者所犯大寒內至骨髓髓者以腦為主腦逆故令頭痛齒亦痛凡頭痛者木也風則溫也治以辛涼秋克春之意故頭痛皆以風藥治之者總其大體而言之高巔之上惟風可到故味之薄者陰中之陽乃自地升天者也然有三陰三陽之異故太陽頭痛脈浮緊惡風寒川芎羌活獨活麻黃之類為主少陽經頭痛脈弦細往來寒熱柴胡為主陽明頭痛身熱目疼鼻乾惡寒發熱惡熱其脈浮緩而長升麻湯或石膏白芷為主太陰頭痛必有痰體重或腹痛為痰癖其脈沉緩蒼朮半夏南星為主少陰經頭痛三陰三陽經不流行而足寒氣逆為寒厥其脈沉細麻黃附子細辛湯為主厥陰頭痛項痛或痰吐涎沫厥冷其脈浮緩吳茱萸湯主之諸血虛頭痛當歸川芎為主諸氣虛頭痛人參黃耆為主為主者主治也兼見何證以佐使藥治之此立方之大法也氣血俱虛頭痛者於調中益氣湯中少加川芎蔓荊子細辛其效如神半夏白朮天麻湯治痰厥頭痛藥也青空膏乃風濕熱頭痛藥也羌活附子湯厥逆頭痛藥也如濕氣在頭者以苦吐之不可執方而治按此論頭痛至為詳悉首言傷寒內傷頭痛歷引內經以明濕熱寒濕偏頭痛真頭痛厥逆頭痛等證細分六經用藥之法後世無以加矣論三陽受病頭痛子和雲頭痛不止乃三陽受病也三陽分部分頭與項痛者足太陽經也攢竹痛俗呼為眉虎骨痛者是也額角上痛俗呼為偏頭痛者足少陽經也如痛久不已則令人喪目以三陽受病皆胸膈有宿疾之致然也先以茶調散吐之吐訖可服川芎薄荷辛涼清上之藥叔和云寸脈急而頭痛是也按此雲頭痛乃三陽受病皆胸膈有痰之致乃指病之壅鬱於上而言也內經云春氣者病在頭蓋天氣在上知病氣亦升於上也吐之所以宣達在上之邪仲景云大法春宜吐是也此亦治頭痛之一法但不可專執於此論頭痛屬火熱之病子和云丹陽僧病頭熱痛不散見明以布圜其巔上置冰於其中日易數次戴人曰此三陽蓄熱故也乃置炭火於暖室中出汗湧吐三法並行七日而愈一婦人偏頭痛五七年大便結燥兩目赤腫眩運世之頭風藥無不服其頭上針艾數千百矣一日戴人診其脈急數而有力風熱之甚也此頭角痛是三焦相火之經乃陽明燥金勝也燥金勝秉肝則肝氣鬱肝氣鬱則氣血壅氣血壅則上下不通故燥結於裡尋至失明治以大承氣湯令河水煎二兩加芒硝一兩煎成頓令分二五服下泄如湯二十餘行次服七宣丸神功丸以潤之菠稜葵菜豬羊血以滑之三劑之外目豁首輕燥澤結釋而愈按此所治之疾既已多年不解豈非風濕熱三氣鬱滯膠固而然哉故其所施之法雖峻而於中病之情則得也又論頭風之甚者久則目昏偏頭風者少陽相火也久則目束小大便祕澀皆宜出血而大下之出血之義是即開鬱解表也謹按頭痛之證其原甚多東垣之論可謂詳矣然自外而致者有風寒暑濕之異若仲景之傷寒東垣分六經之類皆是也自內而致者有氣血痰飲五臟氣鬱之異東垣論氣虛血虛痰厥頭痛之類皆是也大抵四淫皆外邪隨其風寒濕熱多少而治於外也氣血痰飲五臟之證皆內邪亦宜隨其血氣痰飲七情內火分虛實寒熱而調其內以治於外也然氣血虛而用補宜東垣之論若三因等方用附子以治氣虛此則從陽虛立意非人身平和之血氣也若夫久年偏正頭風者多因內挾痰涎風火鬱遏經絡氣血壅滯之證然亦有血虛者須宜分別以治之頭痛治法治風之劑局方川芎茶調散治頭風上攻偏正頭痛方見傷風門祕藏徹清膏川芎薄荷葉各三分藁本一錢甘草生半錢炙甘草半錢蔓荊子細辛各一分上為末每二錢茶清下食後服按此手足少陽厥陰太陽少陰經藥也元戎治三陽頭痛羌活防風荊芥升麻葛根白芷石膏柴胡川芎芍藥細辛蔥白連須若陰證頭痛只用溫中藥足矣如理中薑附輩此則專治三陽頭痛也治風寒之劑仲景麻黃湯治太陽傷寒頭痛無汗桂枝湯治太陽傷風頭痛有汗二方並見傷寒門局方如聖餅子治風寒伏留陽經氣厥痰飲頭痛防風天麻各半兩南星乾薑川芎甘草炙各一兩半夏半兩川烏去皮一兩上細末蒸餅糊丸捻作餅子每五餅同荊芥穗細嚼茶清下按此足三陽經藥也祕藏羌活附子湯治冬月大寒犯腦令人腦痛齒亦痛名曰腦風麻黃不去節黑附子防風白芷白殭蠶黃柏各二分羌活蒼朮各半錢升麻二分黃耆一分甘草二分佛耳草三分無寒嗽去之上㕮咀水煎服按此手足太陽陽明太陰經藥也寶鑑川芎神功散治風熱上攻偏正頭痛川芎川烏白芷南星麻黃各半兩甘草一分上為末每服三錢薑水煎服按此手足少陽厥陰手陽明太陰經藥也三因芎辛湯治傷風寒生冷及氣虛痰厥頭疼如破兼眩暈嘔吐附子去皮臍生用烏頭生天南星乾薑甘草炙川芎細辛各等分上銼散每四錢薑五片茶芽少許煎服按此足少陽經藥也嚴氏小芎辛湯治風寒在腦或感邪濕頭重頭疼眩暈嘔吐川芎一兩細辛白朮甘草炙各半錢上㕮咀每四錢生薑五片茶芽少許煎服局方加減三五七散治風寒入腦陽虛頭痛山茱萸去核三斤細辛一斤半乾薑炮三斤防風四斤附子三十五隻炮去皮臍茯苓去皮三斤上為末每二錢溫酒調下按以上二方亦足少陰經藥也治風熱之劑祕藏青空膏治偏頭疼年深不愈者及療風濕熱頭痛上壅損目羌活防風各一兩柴胡七錢川芎五錢甘草炙一兩半黃連炒一兩細挺子黃芩三兩一半酒洗一半炒上為末每服二錢匕熱茶調如膏抄在口內少用白湯送下如苦頭痛加細辛二分如太陰脈緩有痰減去羌活防風川芎甘草加半夏一兩半如偏頭痛服之不愈減羌活防風川芎一半加柴胡一倍如陽明頭痛只與白虎湯中加白芷按此足三陽經藥也川芎散治頭目不清利川芎三分羌活防風藁本升麻甘草各一錢柴胡七分黃芩炒四錢半黃連四錢半酒洗生地黃一錢上為末每服一二錢茶清調下按此亦三陽經藥也細辛散治偏正頭疼細辛二分川芎七分柴胡二錢黃芩二錢一半酒洗一半炒瓦粉二錢炙甘草一錢半黃連七分芍藥半錢上㕮咀每服三錢煎服按此少陽少陰太陰經藥也寶鑑石膏散治頭疼川芎石膏白芷等分上為末每服四錢熱茶清調下按此陽明少陽經藥也以上東垣治風熱頭痛諸方多不同者以其有臟腑經絡之異也今不詳載其方然有用羌活防風川芎柴胡升麻藁本細辛之異者行各經也有用黃芩黃連黃柏知母石膏生地黃之異者分各臟瀉火也用澤瀉茯苓者導濕也又使邪氣自天而降也用黃耆者補氣行氣也各隨病而增損之意不可拘執也治濕之劑三因芎術湯治濕著頭重眩暈痛極川芎白朮附子生去皮尖各半兩桂心甘草各一分上㕮咀每服四錢薑七片棗一枚同煎食前服按此足少陰經藥也治寒濕之藥有熱者不治痰厥頭痛之劑祕藏半夏白朮天麻湯治素有脾胃之證時顯煩躁大便不利又出入為寒氣所鬱悶亂大作火鬱不伸故也醫疑有熱服疏風丸下之元證不減復添嘔逆食不能停痰唾稠黏湧出不止眼澀頭旋噁心煩悶氣短促上喘無力目不敢開如在風雲中頭苦痛如裂身重如山四肢厥冷是胃氣已損復下兩次重虛脾胃病名曰痰厥頭痛半夏一錢半白朮炒曲各一錢天麻黃耆人參蒼朮陳皮澤瀉茯苓各半錢大麥面一錢半乾薑三分黃柏二分此頭痛苦甚為足太陰痰厥頭痛非半夏不能療目黑頭旋風虛內作非天麻不能除詳見試效方家珍水煮金花丸治頭痛每發時兩頰青黃眩暈目不欲開懶欲言語身重兀兀欲吐數日方過此厥陰太陰合而為病名曰風痰服此藥更灸俠溪二穴不旬日愈局方玉壺丸加雄黃白朮以治風濕按此出太陰嘔噦例治風痰之藥也嚴氏三生丸治痰厥頭痛半夏白附子南星各一分上為細末生薑自然汁浸蒸餅為丸緑豆大每服四十丸食後薑湯下按此藥出厥陰南星半夏例亦治風痰之藥也寶鑑茯苓半夏湯治風熱痰逆嘔吐頭痛大半夏三枚赤茯苓一分黃芩甘草陳皮各二分上銼薑三片煎按此手足太陰經藥治痰挾熱之藥也其治痰挾寒之藥與治風寒之劑相類者採之補氣之劑寶鑑順氣和中湯治年高氣弱清氣不能上升頭面昏悶本無表邪因發汗數次清陽之氣愈虛故苦頭痛惡風不喜飲食氣短脈弱弦細而微宜升陽氣黃耆一錢半人參一錢白朮陳皮當歸白芍五分甘草七分升麻柴胡各三分川芎細辛蔓荊子各二分上銼作一服水煎食後服按此即補中益氣湯加減法也內傷頭痛本方加蔓荊子三分痛甚加川芎二分項痛腦痛加藁本二分若苦頭痛者加細辛二分諸頭痛並用此四味足矣若頭上有熱則此不能治當以清空之劑補血之劑機要四物湯治頭疼四物湯中倍加川芎元戎古方治頭痛欲裂當歸二兩酒一升煮取六合按此二方並出厥陰例藥也搐藥本事方治八般頭風草烏尖細辛等分黃丹少許為末搐入鼻中立效祕方治頭痛不可忍玄胡七枚豬牙皂角肥實者二個青黛二錢上為末水丸成小餅子如杏仁大用時令病者仰臥以水化開用竹管送入男左女右鼻中覺藥至喉少酸令病者坐卻令咬定銅錢一個於當門齒當見涎出成盆即愈三因搐鼻藥蓽茇良薑各一分白芷一錢細辛半錢上為末每服一小字先含水一口分搐鼻內吐水即止祕藏搐鼻鬱金散治風熱頭痛石膏芒硝白芷各二錢鬱金一錢薄荷三分上為末極細口含水鼻內搐之按此陽明經藥也太陽經嚏藥防風二分羌活二分紅豆二個上為末鼻內搐之元戎搐藥瓜蒂散治偏頭痛久不愈服藥及針灸不效者以其濕氣在頭也瓜蒂一味為末少許吹鼻中清水徐徐出一晝夜濕盡病止為度按此以上搐藥元戎云亦吐之義也經云濕氣在上以苦吐之故邪在胸中服之邪在頭目搐之皆吐之屬也張子和點目出淚搐鼻流涕口含漉涎皆以同乎吐也貼藥前本事方或三因藥為末和蔥白搗泥為膏貼兩額上雜方嚴氏蔥附丸治元氣虛壅上攻頭痛附子一隻炮去皮臍上為末蔥涎為丸桐子大空心茶清下玉真丸治腎厥頭痛不可忍其脈舉之則弦按之則堅生硫黃二兩另研石膏硬者半夏湯洗十次硝石另研各一兩上為末研勻用生薑自然汁煮糊為丸桐子大每服四十丸食前米飲下按頭痛古人多從風而議治故其藥雖有辛平辛涼辛溫辛熱之殊大抵皆於解散之中分所挾之寒熱耳至於傷寒頭痛仲景論中亦詳茲不詳載但內因痰厥氣虛血虛頭痛之類東垣雖有論有方學者亦宜隨病審機而用藥亦難拘於所録之方以盡其變也又嚴氏治氣虛頭痛用附子治腎厥頭痛用硫黃等藥本出三因之論其義皆未切當今姑存之以備其説耳
