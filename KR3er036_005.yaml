body:
  text: 卷五滯下門腸澼生死脈法內經曰腸澼便血身熱則死寒則生腸澼下白沫脈沉則生浮則死腸澼之屬身不熱脈不懸絶滑大者生懸澀者死以臟期之又曰陰陽虛腸澼死又曰泄而脫血脈實皆曰難治按此云生死亦是大概言之必須更兼證以詳審之下同脈經云腸澼下膿血脈沉小流連者生數疾且大有熱者死又腸澼筋攣其脈小細安靜者生浮大緊者死嚴氏云凡下利之脈微小者生浮洪者難治腸澼下膿血者脈宜滑大若弦急者死仲景治痢大法下痢脈沉弦者下重脈大者為未止脈微弱數者為欲自止雖發熱不死下痢手足厥冷無脈者灸之不溫若脈不還反微喘者死下痢有微熱而渴脈弱者令自愈下痢脈數有微熱汗出令自愈設脈緊為未解下痢脈數而渴者令自愈設不瘥必清膿血以有熱故也下痢反弦發熱身汗者自愈下痢氣蔽者當利其小便下痢腹脹滿身體疼痛先溫其里乃攻其表溫里宜四逆攻表宜桂枝湯下痢脈滑而數者有宿食也當下之下痢脈遲而滑者實也痢為未止急下之下痢脈反滑當有所去下之安下痢不欲食有宿食者當下之下痢腹滿痛為寒實當下之下痢腹堅者當下之下痢譫語有燥屎當下之下痢三部脈皆平按之心下堅急下之下痢已瘥至其時復發者此為下未盡更下之安下痢脈大浮弦下之當自愈風寒下痢者不可下下後心下堅痛脈遲此為寒宜溫之下痢脈浮大此為虛強下之故也設脈浮革者因而腸鳴當溫之下痢脈遲緊痛未欲止當溫之下痢心痛急當救里可與理中四逆附子輩下痢大孔痛宜溫之按丹溪曰仲景治痢可下者十法可溫者五法或解表或利小便或待其自已區別易治難治不治之證至為詳密但與泄痢袞同立論而未分今載於滯下門內故於瀉痢條內不載宜於此通考焉東垣治痢法病機機要云後重則宜下腹痛則宜和身重則除濕脈弦則去風膿血稠黏以重劑竭之身冷自汗以毒藥溫之風邪內縮宜汗之驚溏為利當溫之又云在外者發之在裡者下之在上者湧之在下者竭之身表熱者內疏之小便澀分利之又曰盛者和之去者送之至者止之兵法曰避其鋭氣擊其惰歸此之謂也祕藏云假令傷寒飲食䐜脹滿而傳飧泄者宜溫熱之劑以消導之傷濕熱之物而成膿血者宜苦寒之劑以內疏之風邪下陷者升舉之濕氣內勝者分利之裡急者下之後重者調之腹痛者和之洞泄腸鳴無力不及拈衣其脈弦細而弱者溫之收之膿血稠黏至圊而不能便其脈洪大而有力者寒之下之按此分風寒濕熱表裡溫補寒下等治至為切當學者尤宜熟玩但其裡急後重腹痛之義未詳今別論於下太陰受濕傳腎為膿血痢機要云有太陰經受濕而為水泄虛滑身重微滿不和穀味久則防變而為膿血脾經傳腎謂之賊邪故難愈者若先利而後滑謂之微邪故易痊此皆脾土受濕之所為也再有風寒二證在泄痢條下論風寒暑濕皆能作痢陳無擇云滯下之證內經所載血溢血泄血便注下古方則有清膿血近世呼為痢疾其實一也多由脾胃不和飲食過度停積於腸胃不能克化又為風寒暑濕之氣干之故為此疾傷熱則赤傷冷則白傷風則純下清血傷濕則下如豆汁冷熱交併赤白兼下治法當先用通利之藥疏滌臟腑嚴氏云以巴豆等劑推其積熱後辨以冷熱風濕之證用藥調治熱赤者清之冷白者溫之傷風而下清血者則祛逐之傷濕而下豆汁者分利之冷熱相併溫涼以調之仍須先調胃氣切不可驟用罌粟訶子之藥止之澀之使停滯不泄多致危殆按赤白分冷熱之說河間論之甚詳其云風下清血濕下豆羹汁者蓋謂風喜傷肝肝主血故下清血者為風也濕喜傷脾脾胃為五穀之海無物不受常兼四臟蓋豆汁之色如五色之相雜故下豆羹汁者為濕也又云治法當先通利此迎而奪之之義若有虛者亦宜審之使果有積滯在腸胃者方所當通利然嚴氏謂巴豆等藥使用之於傷冷物則可若用之於熱者為害非輕又云風則祛逐所謂祛逐者果何法何藥與若以邪氣當祛逐則豈獨於風而寒濕熱為不可耶此又失於明白論滯下分三因陳無擇云古方風停膚腠下瘀血或下鮮血濕毒下如豆羹汁皆外所因之明文也古方有五泄因臟氣鬱結隨其所發使利膿血作青黃赤白黑色一一不同即內所因也又飲食冷熱酒醴醯醢縱情恣欲房室致傷精血腸胃黏溢久積冷熱遂成毒痢皆不內外因治之先推其歲運以平其外察其鬱結以調其內審其所傷以治不內外條然明白不致妄投也按此所分三因治法其理甚當但外因六淫所傷者古方用藥則多有之內因臟氣鬱結與夫飲食房勞而得者諸方則未之見也凡三因所傷皆能幹犯腸胃而為痢今陳無擇立論有三因之分而用藥無三因之別此又所當分而治者失於開示焉時疫作痢大全良方云有一方一家之內上下傳染長幼相似是疫毒痢也治法雖當察運氣之相勝亦不可狎泥當先察其虛實冷熱首用敗毒散加人參甘草陳皮隨證用之按時疫作痢歲常有之其謂當察其運氣之相勝與病冷熱虛實之不同誠為確論蓋欲學者知五運六氣有太過不及勝負之不同以分風寒暑濕燥火為病而平治之也然首專用敗毒散之義何其自狎泥也論食毒作痢陳無擇云飲服冷熱酒醴醯醢腸胃黏溢久積冷熱遂成毒痢嚴用和云或有飲服冷酒寒物房室勞傷精血而成久毒痢則宜化毒以保衛之按人之飲食過傷恣食辛熱寒冷之物皆能致傷腸胃腸胃一傷不能運化傳送遂蓄積停滯而為痢經日飲食不節起居不時者陰受之陰受之則入五臟䐜滿閉塞下為飧泄久為腸澼是也治法當先消化食毒或可攻伐然後隨寒熱溫涼以調之此二論本諸內經而世所未言者也論裡急後重病機云裡急後重脈大而洪實為裡熱甚而閉是有物結墜也若脈浮大甚不宜下雖裡急後重而脈沉細弱者謂寒在內而氣散也可溫養自愈裡急後重閉者大腸經氣不宣通也宜加檳榔木香宣通其氣原病式云下迫後重裡急窘迫急痛也火性急速而能燥物故也按裡急者窘迫急痛是也後重者大腸墜重而下也夫裡急後重其證不一有因火熱者所謂火性急速而能燥物是也有因氣滯此大腸經氣壅而不宣通也有因積滯壅盛者是有物結墜也有氣虛者此大腸氣降而不能升也有血虛者所謂虛坐努責是也治法火熱者寒之清之氣滯者調之積滯者去之氣虛而降者升之舉之血虛者補之各察其所因也切觀前論未為詳盡論泄痢而嘔病機云如痢或泄而嘔者胃中氣不和也上焦不和治以生薑橘皮中焦不和治以芍藥當歸桂茯苓下焦不和而寒治以輕熱甚以重熱藥按此云泄痢而嘔謂胃氣不和所致蓋亦有胃中火逆衝上而嘔者有胃虛而嘔者有積滯毒氣上攻而嘔者有陰虛而嘔者豈可一於胃氣之不和而不他及耶論泄痢腹痛機要云腹痛者和之如發熱惡寒腹不痛藥加黃芩為主腹痛甚者加當歸倍芍藥按泄痢腹痛其證甚多皆因內氣鬱結不行所致理宜行氣散郁為先然亦有挾寒有挾火熱者有因積滯者有血虛者又宜隨證處治為當也今機要雲和之一字總言之耳蓋加當歸倍芍藥之法惟血虛可用論禁口痢百一選方云禁口痢是毒氣上衝心肺所致用石蓮肉以通心氣按痢而能食知胃未病也若脾胃濕熱之毒熏蒸清道而上以致胃口閉塞而成禁口之證理宜除胃口之邪熱而此云毒氣上衝心肺其毒不知指何者之邪然亦有脾胃虛而得者亦有誤服利劑藥毒犯胃者又有服澀熱之劑太早而邪氣閉遏於胃口者必當求責論下痢吃逆丹溪曰吃病氣自下衝上屬火之象古方惡以胃弱言之殊不知胃弱者陰弱也虛之甚也滯下之久多見此證乃因久下而陰虛也詳見吃逆本門辨痢色分五臟原病式曰瀉白為寒青黃紅赤黑皆為熱也蓋瀉白者肺之色也由寒水制火不能平金則金肺自甚故色白也痢色青者肝木之氣由火甚制金不能平木故色青也或言痢色青為寒者誤也仲景少陰病下痢清水色純青熱在裡也大承氣湯下之及小兒熱甚急驚痢色多青為熱明矣痢色黃者由火甚則水必衰而脾土自旺故色黃也痢色紅為熱心火之色也或亦熱深甚也至若痢色黑亦言熱者由火熱亢甚則反兼水化制之故色黑也故傷寒陽明病云云法當大承氣下之大便不黑者難恐作易治諸痢同法按世人多以瀉痢之青白黑三色為寒黃赤二色為熱今觀河間分五臟之論煥然耳目而知世人之非也或曰內經視絡脈之色曰寒多則凝泣凝泣則青黑熱多則淖澤淖澤則黃赤又曰黃赤則熱多白則寒世俗之論豈非本於此與愚曰內經論經脈之常色心赤肺白肝青脾黃腎黑也陰絡之色應其經但陽絡之色隨四時而行應無常色遇天氣之寒則經絡凝泣故其色多青黑遇天氣之熱則經絡淖溢故其色多黃赤此蓋因外氣之寒熱而浮絡相應而然凡人之在冬月炎天與夫久坐遠行其面色相應亦皆然非痢色之出於臟腑隨內氣所感而生也況滯下之證多因濕熱所致內經曰肺熱者色白而毛敗心熱者色赤而經絡溢肝熱者色蒼而爪枯脾熱者色黃而肉蠕動腎熱者色黑而齒槁此雖論痿亦可見五臟之內熱皆能顯此五色今滯下之論五色意實相同然此不可與浮絡之因外氣相應者同語也辨赤白分冷熱之誤原病式曰或言下痢白為寒者誤也若果為寒則不能消穀何由反化為膿也所謂下痢谷反為膿血如世之穀肉果菜濕熱甚則自化腐爛潰發化為膿血也其熱為赤熱屬心火故也其濕為黃濕屬脾土故也燥郁為白屬肺金也經曰諸氣憤郁皆屬於肺謂燥金之化也然諸瀉痢皆兼於濕今反言氣燥者謂濕熱甚於腸胃之內而腸胃拂鬱結而又濕至於否以致氣液不得宣通因以成腸胃之燥使煩渴不止也假如下痢赤白俗言寒熱相兼其說尤誤豈知水火陰陽寒熱者猶權衡也一高則必一下一盛則必一衰豈能寒熱俱甚於腸胃而同為痢乎如熱瘡瘍而出白膿者豈可以白為寒與其在皮膚之分屬金故色白也次在血脈之分屬心火故為血也在肌肉屬脾土故作黃膿在筋部屬肝木故其膿色帶蒼深至骨屬腎水故紫黑血出也各隨五臟之部而見五色是其標也本則一出於熱但分淺深而已大法下迫窘痛後重裡急小便赤澀皆屬燥熱而下痢白者必多有之然則為熱明矣按河間謂赤白不當分冷熱乃屬肺金心火之化又謂五色各屬五臟本則一出於熱其論至當但世患此疾者赤白居多今既以不當分冷熱為治若專以辛苦寒退熱此則治本之法所謂心火肺金之化者抑有別與蓋心主血肺主氣白屬肺金此氣受病也赤屬心火此血受病也赤白相雜血氣俱受病也知此則肝青脾黃腎黑之說亦可得而互明矣論熱藥治痢之誤原病式云或曰白痢既為熱病何故服辛熱之藥亦有愈者耶蓋辛熱之藥能開發腸胃鬱結使氣液宣流通濕潤燥氣和而已蓋病微者可愈甚者鬱結不開其病轉加而死矣凡治熱甚吐瀉亦然夫治諸痢者莫若以辛苦寒藥治之或微加辛熱佐之則可蓋辛能發散開通鬱結苦能燥濕寒能勝熱使氣宣平而已如錢氏香連丸之類是也故治諸痢者黃連黃柏為君以其至苦大寒正主濕熱之病乃若世傳辛熱金石毒藥治諸吐瀉下痢或有愈者以其善開鬱結故也然雖亦有驗者或不中效反更加害按治痢用辛苦寒之劑開鬱燥濕勝熱三法俱備世之用辛熱金石毒藥者誠非也然亦有久痢腸胃虛滑者亦當求責治痢通因通用之法子和云夫下痢膿血腹痛不止可用調胃承氣湯加薑棗煎更下藏用丸瀉訖以五苓益元散調下又一男子瀉痢不止如傾不敢冷坐諸醫皆以為寒治延二十載兩手寸脈皆滑余不以為寒所以寒者水也以茶調散湧寒水五七升又以無憂散泄積水數十行乃通因通用之法也次以淡劑利水道按此用吐下以治痢本內經通因通用之說使腸胃虛滑者其可下乎中氣虛弱者其可吐乎今云可下者謂有積滯在腸胃壅不通者也可吐者謂有痰飲在膈上氣不能降以致大腸不能收斂者也丹溪曰積濕成痰在肺中宜大腸之不固也清其源則流自清矣正是此意論局方用熱藥澀藥之非丹溪曰泄痢一證局方用鍾乳健脾丸朝真丹訶藜勒丸大溫脾丸等藥皆用熱藥為主治澀藥為佐使當為腸虛感寒而成滑者設也彼瀉痢者將無熱證耶將無積滯耶內經曰痢有膿血多屬滯下夫瀉痢證其類尤多先賢曰濕多成泄此確論也然有挾風者固不可得而同矣況風與濕之外又有雜合受邪似難例用澀熱之藥局方出證有兼治裡急者有兼治後重者有兼治裡急後重者此豈非滯下病乎今瀉痢與滯下袞同論治實實虛虛之患將不俟終日矣經曰暴注下迫皆屬於熱又曰暴注皆屬火又曰下痢清白屬於寒屬火熱者二屬水寒者一瀉痢一證似乎屬熱者多屬寒者少局方專以澀熱為用若用之於下痢清白為寒者或可矣所謂下迫者即裡急後重之謂也其病屬火相火所為具毒甚於熱矣投以澀藥非殺而何滯下亦有挾虛挾寒丹溪曰或問河間之言滯下似無挾虛挾寒者乎否乎豫曰泄痢之病水穀或化或不化並無努責惟覺困倦若滯下則不然或膿或血或膿血相雜或腸垢或無糟粕或糟粕相混雖有痛不痛大痛之異然皆裡急後重逼迫惱人似乎皆熱證實證也豫近年涉歷亦有大虛大寒者不可不知敢筆其略以備採覽豫從叔年逾五十夏間患滯下病腹微痛所下褐色後重頻並穀食大減時有微熱察其脈皆弦而澀似數而稍長卻喜不甚浮大兩手相等視其神氣大減豫曰此滯下憂慮所致心血虧脾氣弱耳遂以參朮為君當歸陳皮為臣川芎炒芍藥茯苓為佐使時暄熱甚加少黃連兩月而安婁長官年三十餘奉養厚者夏秋間患滯下腹大痛有人教服單煮乾姜與一帖則痛定少頃又作又與之定由是服乾薑至三斤八日視之左脈弦而稍大似數右脈弦而大稍減亦似數重取之似緊豫曰此必醉飽後吃寒涼太過而當作虛寒治之因其多服乾薑遂教用四物湯去地黃加人參白朮陳皮酒紅花茯苓桃仁煎入生薑汁飲之至一月而安金氏婦年近四十秋初尚熱患滯下腹但隱痛夜重於書全不得睡食亦稍減口乾不飲已得治痢靈砂二帖矣豫觀之兩手脈皆澀且不勻神思倦甚飲食全減因與四物湯倍加白朮以陳皮佐之與十數帖而安此三病者若因其逼迫而用峻劑豈不誤人按滯下之證古人多與泄瀉同論至三因方始能另立條目蓋實有不同夫病有從外感而得者須分六氣之異外既受傷腸胃鬱結遂成赤白等證當隨其寒熱溫涼以調之有因臟氣發動干犯腸胃而得者須察其何臟相乘以平治之又有因飲食失節而得者則又審其何物所傷以消克之世之感此疾者其因誠不越乎是三者但其受病之後腸胃拂鬱膿血稠黏裡急後重諸方雖有寒熱虛實之論劉河間則以為一出於熱然考之內經似亦熱多而寒少也我丹溪先生則以為亦有挾虛挾寒之證深戒學者須宜識此世之局方不辨三因專用澀熱之藥其失甚矣至河間立說專用苦寒疏下之藥則亦未甚為當何則蓋病有虛實治用先後若病氣暴至元氣壯實積滯膠固須宜下之病久氣脫腸胃虛滑不禁者亦宜溫之澀之大抵治痢當從仲景河間之法可溫則溫可下則下或解表或利小便或待其自已劉河間分別在表在裡挾風挾熱挾寒等證後之作者無越於斯但氣血一條未嘗表出立論其於芍藥湯下有曰行血則便自愈調氣則後重除蓋謂溲便膿血血之滯也故曰行血自愈奔迫後重氣之實也故曰調氣自除誠哉是言但膿血赤白亦有氣病血病之分後重裡急亦有氣實血虛之異學者又不可不察詳見前論滯下治法治熱之劑仲景白頭翁湯治熱痢重下者白頭翁二兩黃連三兩黃柏三兩秦皮三兩上四味以水七升煮取二升去渣服一升不愈再服按此治痢在下焦腎虛有熱也經云腎欲堅故用純苦之劑以堅之出太陰例藥也以其下痢屬太陰故也機要黃芩芍藥湯治泄痢腹痛或後重身熱久不愈脈洪疾及下痢膿血稠黏黃芩芍藥各二兩甘草五錢上咀每服半兩水一盞半煎一盞溫服按此手足太陰經之藥也仲景用芍藥甘草湯以復其陰酸以收之甘以緩之酸甘相合以補陰血也芍藥白者補赤者瀉出太陽芍藥甘草例大黃湯治泄痢久不愈膿血稠黏裡急後重日夜無度大黃一兩上細銼好酒二大盞同浸半日許再同煎至一盞半去大黃將酒分為二服頓服之痢止一服如未止再服取利為度後服芍藥湯以和之利止再服黃芩芍藥湯徹其毒也按此乃陽明調蕩滌邪熱之藥用酒煎者欲其上至頂顛外徹皮毛也芍藥湯下血調氣經曰溲而便膿血知氣行而血止也行血則便自愈調氣則後重除芍藥一兩當歸黃連各半兩檳榔木香各二錢桂二錢半大黃三錢黃芩半兩甘草二錢炙上咀每服半兩水煎食後溫服清如利不減加大黃按此行血調氣不熱之藥也大凡用藥之雜與品味之多者難以細分經絡當觀其大體如何此則太陽桂枝例藥也白朮黃芩湯服前藥痢雖除更宜此調和白朮一兩黃芩七錢甘草三錢上咀勻作三服水煎服清按此去濕熱和中活血之藥也錢氏芍藥柏皮丸芍藥黃柏各等分上為末水丸守真芍藥柏皮丸治一切濕熱惡痢芍藥黃柏各一兩黃連半兩當歸半兩上為末水丸如小豆大按此二方補陰降火下焦之藥也出太陽例局方黃連阿膠丸治冷熱不調赤白下痢阿膠炒二兩黃連三兩茯苓二兩上水熬阿膠膏溲和二末為丸米飲服按此補虛退熱除濕之藥也出太陽例海藏云以上苦寒之劑元病不經內傷冷物者宜察亦當審人之虛實及以脈別之治寒之劑局方桃花丸治冷痢腹痛下如魚腦白物赤石脂煆乾薑炮各等分上為末蒸餅糊丸米飲下三四十丸日三服按此出陽明例藥方丹溪曰桃花丸即要略桃花湯也仲景以治便膿血用赤石脂丸者乾薑粳米同煮作湯一飲病安便止後藥意謂病下焦血虛且寒非乾薑之溫石脂之澀且重不能止血粳米味甘引入腸胃不使重澀之體少有凝滯藥行易散餘毒亦無局方不知深意改為丸藥劑以麵糊日與三服果能與仲景之意合否也嚴氏當歸丸治冷留腸胃下痢純白腹痛當歸酒洗芍藥附子炮去皮臍白朮乾薑炮厚朴阿膠各一兩烏梅肉二兩蛤粉炒各一兩上為細末醋糊丸桐子大每服五十丸米飲送下局方訶藜勒散治腸胃虛弱泄利水穀漸成痢疾青皮去穰肉豆蔻麵裹煨肉桂五錢附子炮去皮臍一兩訶子仁各四兩上為末每服三錢姜三片煎服按局方以白痢為寒多用辛熱燥毒之藥若用之於下痢清穀腸虛感寒者或可矣若膿血稠黏屬火之證用之非殺而何但感寒之證吾恐什百而一二也冷熱之劑古方駐車丸治冷熱下痢腸滑赤白黃連六兩乾薑當歸各二兩阿膠上先以醋煮膠令消入前三藥和勻衆手丸桐子大米飲下局方香連丸治冷熱不調下痢赤白膿血相雜裡急後重黃連去蘆二十兩用吳茱萸十兩同炒令赤色去茱萸不用木香四兩八錢不見火上為細末醋糊丸桐子大每服二十丸空心米飲下按此出太陰例藥也戊己丸治胃經受熱泄痢不止黃連吳茱萸去梗炒白芍各五兩上為細末麵糊丸桐子大每服三十丸米飲下按此出厥陰已寒例以上三方出證治冷熱下痢蓋冷熱異氣水火相反豈能同在腸胃為病耶論中辨之詳矣但其制方亦有暗合妙理惜乎世人莫知其深意也三方皆以黃連苦寒之藥為君正治濕熱之氣佐以辛苦溫藥所以開鬱行滯氣血宣通病亦自已乾薑木香茱萸三者各隨經合宜而用要在學者臨機應變又不可拘執於此也治風之劑機要防風芍藥湯治泄痢飧泄身熱脈弦腹痛而渴及頭痛而微汗蒼朮防風湯治泄痢脈弦頭痛良方神朮散治春傷於風夏必飧泄以上三方並見泄瀉門淡寮方倉廩湯治下痢頭痛心煩不食局方敗毒散四錢加陳倉米百粒薑棗煎服按此乃發散風寒之劑出太陽例藥也治熱之劑機要白朮芍藥湯治脾經受濕水泄注下蒼朮芍藥湯同仲景五苓散宣明益元散以上四方並見泄瀉門治暑之劑局方黃連香薷飲治感暑下痢鮮血方見暑門按此解散暑熱心肺藥也出太陰厚朴例宣明桂苓甘露飲子和桂苓甘露飲方並見暑劑按此三方解表利小便大瀉濕熱氣分藥也太陽經藥也攻下之劑仲景大承氣湯方見下劑按此泄熱蕩滌腸胃之劑痞滿燥實四證者可用出陽明例藥也宣明玄青丸治下痢勢惡頻並窘迫或久不愈諸藥不能止須可下之以開除濕熱痞悶積滯黃連黃柏大黃甘遂芫花醋拌炒大戟各半兩牽牛四兩取末二兩輕粉二錢青黛一兩上為末勻水丸小豆大初服十丸每服加十丸日三以快利為度機要厚朴枳實湯治虛滑久不愈多傳變為痢先以此湯防其傳變厚朴一兩枳實炒一兩訶子皮一兩半生熟黃連甘草炙大黃各三錢木香半兩上為末每服三五錢水煎服按以上三方逐積去熱之藥也大黃瀉血也牽牛瀉氣也甘遂大戟芫花泄水也厚朴枳殼泄痞滿也各隨其病所宜選而用之局方蘇感丸去臟腑有積下痢以蘇合香丸與感應丸二藥和勻如粟米大每服五丸淡薑湯空心下按局方之學多以此治痢去積故録於此然二藥之類聚溫熱用於傷寒傷冷之物者則可然有熱之人積滯雖去熱毒必行其害何可勝言哉本事方靈砂丹治一切積痢硇砂硃砂並研細各二錢半上用黃蠟半兩巴豆三七粒去殼皮膜同於銀石器內重湯煮一伏時候巴豆紫色為度去二七粒止將一七粒與前藥同研極勻溶蠟和藥旋丸緑豆大每服三丸至五丸水瀉生薑湯下白痢艾湯下赤白痢烏梅湯下空心服丹溪曰仲景治痢之法下者率用承氣加減何嘗以砒巴豆丹碙決烈燥毒之劑蓋大黃之寒其性善走佐以厚朴之溫善行滯氣緩以甘草之甘飲以湯液灌滌腸胃滋潤輕快無所留滯積行即止此砒丹巴碙熱毒類聚成丸其氣凶暴其體重燥積垢雖行毒氣未歇借使有愈疾之功其腸胃清淳之氣能免旁損暗傷之患乎消積之劑脾胃論聖餅子治瀉痢赤白臍腹撮痛久不愈黃丹二錢定粉三錢密陀僧二錢舶上硫黃三錢輕粉少許上為細末入白麵四錢滴水和如指尖大捻作餅子陰乾食前漿水磨化服之大便黑色為妙元戎聖功丸專治血痢膩粉三錢匕定粉二錢匕一法加蛤粉上研勻水浸蒸餅丸緑豆大艾湯下止澀之劑仲景桃花湯治下痢便膿血赤石脂一斤半銼一半末乾薑一兩粳米一升上三味以水七升煮米令熟去滓溫七合納赤石脂末方寸匕日三服若一服愈勿再服按此方出手陽明例藥也但赤治丙而白治庚也嚴氏禹餘糧丸治腸胃虛寒滑泄不禁禹餘糧石煆赤石脂煆龍骨蓽茇乾薑炮訶子麵裹煨肉豆蔻麵裹煨附子炮去皮臍各等分上為末醋糊丸桐子大每服七十丸空心米飲下局方真人養臟湯治冷熱不調下痢赤白裡急後重腹痛脫肛罌粟殼去蒂蓋蜜炙三兩六錢人參當歸各六錢肉桂八錢訶子皮一兩二錢木香二兩四錢肉豆蔻麵裹煨半兩白芍一兩六錢生甘草一兩八錢白朮六錢上咀每服四錢水煎服臟寒加附子水煮木香丸治一切下痢赤白膿血相雜裡急後重罌粟殼去穰一兩四錢青皮去白二兩八錢甘草二兩四錢當歸洗去蘆六兩訶子炮去核八兩木香不見火六兩上為末蜜丸如彈子大每服一丸水八分蓋煎化溫服祕藏訶子散治腸胃虛寒泄瀉米穀不化腸鳴腹痛脫肛及作膿血日夜無度御米殼去蒂蓋蜜炒半兩訶子煨去核七分乾薑炮六分橘皮半錢上為細末分作二服水煎和滓熱服空心下十劑云澀可以去脫以米殼之酸微澀上收固氣去脫主用為君以訶子皮之微酸上收固血治其形脫橘皮微苦溫益真氣升陽為之使以乾薑大辛熱除寒為臣亦為主治也按以上諸方皆行溫熱之藥固氣止血緊澀腸胃當為腸虛感寒而成滑者設也且滯下之證多屬於熱兼有積滯局方一門專主澀熱似難例用宣明香連丸木香訶子肉麵煨黃連炒各半兩龍骨一錢上為細末飲丸黍米大每服二十丸米飲湯下機要訶子散治泄痢腹痛漸以泄下微少宜此止之法云大勢已去而宜止之訶子皮一兩半生半熟木香半兩黃連三錢甘草炙三錢上為細末每服二錢以白朮芍藥湯下如止之不已宜歸而送之加厚朴一兩竭其邪氣也脾胃論訶藜勒丸治休息痢日夜無度腥臭不可近臍腹攝痛椿根白皮訶子肉半兩母丁香三十個上為細末醋糊為丸如桐子大每服五十丸溫米飲下按以上諸方用溫涼之藥以上痢較之局方專用澀熱則變法矣夫脫則用澀理所當然脫而挾寒溫之熱之可也脫而挾熱涼而澀之可也寒熱各隨所宜而用似難偏執一說宣明三聖散治産後下血痢不止烏魚骨燒綿灰血餘灰各等分上細末每服一錢煎石榴皮湯調下熱服按此專主止血之劑收斂之劑嚴氏烏梅丸治熱留腸胃下痢純血臍腹㽲痛烏梅肉二兩當歸枳殼各一兩黃連二兩上為細末醋糊丸桐子大每服七十丸食前米飲下元戎烏梅散治下痢津少大渴引飲不休烏梅焙乾半兩茯苓一兩木爪一兩一法加桂三錢半上咀每服五錢生薑三片煎按仲景烏梅丸治傷寒吐蛔後人用治下痢此皆酸收之義出太陽桂苓例藥也血劑局方胃風湯治風冷乘虛入客腸胃水穀不化泄瀉注下及腸胃濕毒如下豆汁或下瘀血日夜無度人參白茯苓芎藭桂當歸白芍白朮各等分上粗散每服二錢入粟米數粒同煎食前服按此方名為治風而實非治風乃補血和血益胃氣之藥下血痢而挾虛者實可倚仗出太陽桂苓例藥也良方加味四物湯治血痢四物加阿膠艾葉保命集一方四物內加槐花黃連御米殼等分按此補血溫血之藥出厥陰例藥也宣明白朮湯治孕婦痢膿血白朮黃芩當歸各等分上為末每服三二錢水煎食前服補劑良方十全大補湯治一切婦人病痢四十日諸藥不愈六脈沉弱大凡痢脈宜沉宜弱但服此藥而愈方見補劑上薑棗煎成加白蜜半匙再煎數沸服良方治妊娠下痢腹痛小便澀糯米一合當歸炒黃耆各一兩上細切和勻水煎服按此二方不分經絡補血之劑今人治痢而用此者蓋鮮矣殊不知血氣虛脫之人與夫胎前産後之證此法不可無也故特立條目以表章之雜方良方治疫毒痢敗毒散多加人參甘草陳皮薑棗煎服按此方詳見論中嚴氏茜根丸治一切毒痢及蠱注利血下如雞肝心煩腹痛茜根洗川升麻犀角地榆當歸黃連枳殼白芍上等分為末醋煮米糊為丸如桐子大每服七十丸空心米飲下按此方消化死血解飲食毒之藥百一選方治噤口痢石蓮去殼留心並肉碾為細末每二錢陳皮飲調下此是毒氣上衝心肺藉此以通心氣便覺思食淡寮方治噤口痢毒氣上衝心肺者敗毒散四錢陳倉米一百粒姜三片棗一枚煎上方治脾胃虛弱噤口痢用山藥一味銼如小豆大一半銀器內炒熟一半生用同為末米飲調下按禁口痢古人論之者少故留此三方以備忽然石蓮之通心氣敗毒散散表邪山藥之補脾胃果能開胃口而進食乎導氣湯治下痢膿血裡急後重腹疼作渴日夜無度黃連黃芩大黃白芍當歸木香檳榔上㕮咀水煎此方即前芍藥湯加減桂甘草二味今人多如此用故收入
