body:
  text: 卷四十四癍疹門論癍疹證治潔古云癍疹之病其為證各異瘡發焮腫於外者屬少陽三焦相火也謂之癍小紅靨行皮膚之中不出者屬少陰君火也謂之疹凡顯癍證若自吐瀉者慎勿亂治而多吉謂邪氣上下皆出也癍疹並出小兒難禁是以別生他證也首尾不可下大抵安里之藥多發表之藥少秘則微疏之令邪氣不壅並而能作番次使兒易禁也身溫暖者順身涼者逆按此是例陽證發癍宜與小兒門癍論兼看證治論傷寒發癍有陰陽不同略例曰陽證發癍有四有傷寒發癍有時氣發癍有熱病發癍有溫毒發癍斑斑如錦紋或發之面部或發之胸背或發之四末色紅赤者胃熱也紫黑為胃爛也一則下之早一則下之晚乃外感熱病而發癍也當服玄參升麻白虎等藥謹按四氣發癍溫毒為至重暑證亦發癍固有輕重之殊見面部者傳手經也難知云戊助少陰心火入於手太陰肺也背多者足太陽胸屬足陽明四末屬脾與心也陰證發癍亦出背胸又出手足亦稀少而微紅若作熱證投之涼劑大誤矣此無根失守之火聚於胸中上獨熏肺傳於皮膚而為斑點但如蚊蚋蚤蝨咬形狀而非錦紋也調中溫胃加以茴香芍藥以大建中之類其火自下癍自退可謂治本而不治標也謹按癍證固有陰陽輕重之現證矣陽證大率用托裡清熱化癍涼血陰證止用調中溫胃其癍自消病體自定非若瘡成膿疱也雖輕重俱從火化大抵急則治標緩則治本論中寒發癍略例云完顏小將軍病寒熱間作有癍三五點鼻中微血出兩手脈沉澀胸膈四肢按之殊無大熱此內傷寒也問之因暑臥殿角傷風又渴飲冰酪水此外感者輕內傷者重從內病俱為陰也故先癍衄後顯內陰寒熱間作脾亦有之非往來少陽之寒熱也與調中湯數服而愈論傷寒治誤發癍陳無擇云傷寒發癍者蓋不當下而下之熱則乘虛入胃當下而失下則胃熱不得泄二者皆能發癍其狀如錦繡赤者易治黑者難治蓋熱毒入胃深也按此謂癍主於胃因下早下晚之失而生至如陽證誤用熱劑而發癍或溫毒便發癍者皆宜從脈求其本也仲景云寸脈浮滑者可用瓜蒂散吐之是熱毒蘊於胸膈也又非在胃及虛火之比大抵黑者熱極亢則害承乃制也論癮疹陳無擇云世醫論癮疹無不謂是皮膚間風然既分冷熱冷熱即寒暑之證又有因浴出湊風冷而得之者豈非溫也則知四氣備矣經分諸瘡實熱則痛虛寒則癢又陽明主肌肉屬胃與大腸亦有冷熱分痛癢不可不審世人呼白者為婆膜赤者為血風名義混淆當以理曉察內外隨證治之謹按癮疹多屬脾隱隱然在皮膚之間故言癮疹也發則多癢或不仁者是兼風兼濕之殊色紅者兼火化也癮疹治法升散之劑元戎葛根橘皮湯治癍在肌冬溫始發肌中癍爛咳而心悶但嘔清汁葛根橘皮杏仁知母黃芩麻黃甘草上等分水煎服按此足陽明太陽藥也陽毒升麻湯癍在面傷寒一二日或吐下後變成陽毒腰背痛煩悶不安面赤狂言見鬼下痢脈浮大咽痛升麻五錢犀角射干黃芩人參甘草各二錢半上㕮咀水煎取飲半盞刻許再進溫覆手足得汗出解玄參升麻湯癍在身治汗下吐後毒不散表虛里實發於外甚則煩躁譫妄玄參升麻甘草等分上㕮咀水煎服按以上足陽明藥也陽毒梔子湯治傷寒壯熱百節疼痛而發癍升麻梔子仁黃芩芍藥石膏知母杏仁柴胡甘草上粗末每五錢入姜五片豉百粒煎服按此足陽明少陽藥也消毒犀角飲子治癍及癮疹牛蒡子六錢荊芥防風各二錢甘草一錢上㕮咀水煎按此手太陰藥也解毒防風湯治癍及癮疹癢痛防風一兩地骨皮黃耆芍藥荊芥枳殼牛蒡子各半兩上為粗末每四五錢水煎服按此手足太陰藥也以上諸方本於陽證者宜選用之升麻葛根湯陰毒升麻鱉甲湯治陰癍升麻三兩當歸甘草各二兩蜀椒一兩鱉甲炙雄黃半兩研上為末每服五錢水煎服按此闕三因加味羌活散治感四時所傳肌膚髮為癮疹增寒壯熱羌活前胡各一兩人參桔梗甘草枳殼川芎天麻茯苓各半兩蟬蛻薄荷各三錢上㕮咀搗為末每服二大錢姜三片煎服按此足太陽手太陰少陰藥也調中湯治內傷外感而發陰癍蒼朮一錢半陳皮一錢砂仁藿香芍藥炒甘草炙桔梗半夏白芷羌活枳殼各一錢川芎半錢麻黃桂枝各半錢上㕮咀姜三片水煎服按此足太陽太陰手陽明太陰藥也以上諸方本於陰證者宜選用之和解之劑化癍湯治傷寒汗吐下後癍發脈虛白虎湯加人參守真類粹再加白朮上㕮咀時時煎服之下劑當歸丸治傷寒癍見無大熱脈虛秘悶當歸半兩甘草一分黃連大黃各二錢半上先將當歸熬膏子入藥末三味為丸漸加至利為度涼血之劑黑膏治溫毒發癍生地黃半斤好豉一升上二味以豬膏二斤合煎之至濃汁用雄黃麝香如大豆大內中攪和每服用彈子大湯化服未效再服之大青四物湯大青四兩阿膠甘草各一兩豉八合上㕮咀每服五錢水煎服之
