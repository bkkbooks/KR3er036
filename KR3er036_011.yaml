body:
  text: 卷十一暑門諸經敘暑熱脈證內經曰夏至日後病熱為暑暑當與汗皆出勿止因於暑汗煩則喘渴靜則多言體若燔炭汗出而散脈虛身熱得之傷暑難經曰傷暑得之為正邪火自病也當惡臭其病身熱而煩心痛其脈浮大而散傷寒論曰太陽中熱者暍是也其人汗出惡寒身熱而渴也太陽中暍者身熱疼重而脈微弱此亦夏月傷冷水水行皮中所致也太陽中暍者發熱惡寒身重而疼痛其脈弦細芤遲小便已灑灑然毛聳手足逆冷小有勞身即熱口開前板齒燥若發汗則惡寒甚加溫針則發熱甚數下之則淋甚謹按許學士云傷暑其脈弦細芤遲何也內經曰寒傷形熱傷氣蓋傷氣而不傷形則氣消而脈虛弱所謂弦細芤遲皆虛脈也仲景以弦為陰而朱肱亦曰中暑脈細弱則皆虛脈也可知矣論中暑中熱受病不同潔古曰靜而得之為中暑動而得之為中熱中暑者陰證中熱者陽證東垣曰暑熱之時無病之人或避暑熱納涼於深堂大廈得之者名曰中暑其病必頭痛惡寒身形拘急肢節疼痛而煩心肌膚火熱無汗為房室之陰寒所遏使周身陽氣不得伸越多以大順散熱藥主之是也若行人或農夫於日中勞役得之者名曰中熱其病必苦頭痛發躁熱惡熱捫之肌膚大熱必大渴引飲汗大泄無氣以動乃為天熱外傷肺氣蒼朮白虎湯涼劑主之按此論中暑即仲景所謂暍是也此只作暑熱分之可見有陰陽二證受病不同然夏月受病有陰寒所遏使周身陽氣不得伸越以大順散主之者為中暑蓋當暑月名之猶冬月發熱為傷寒也但中熱治例雖云用蒼朮白虎湯而又處清暑益氣之法況大順散一方是仲景太陽例藥然東垣施用諒不如此必有若蓋氣湯證例發揮日𦾓日𦾓者惜乎無傳故使後人不能無疑也詳後所論矧中暑證亦有於勞役動而得之中熱證亦有於避暑靜而得之大抵因人元氣虛實不同故所受亦異為治豈得而無變法哉論暑傷五臟為證不同陳無擇曰暑熱喜歸心心中之使人噎悶昏不知人入肝則眩暈頑痹入脾則昏睡不覺入肺則喘滿痿躄入腎則消渴凡中暍死治之切不得用冷唯宜溫養得冷則死道途中無湯即以熱土尉臍中仍使更溺概可見矣凡覺中暑急嚼生薑一大塊水送下如已迷悶嚼大蒜一大瓣水送下如不能嚼水研灌之立醒謹按暑暍之證變異不等亦豈止歸五臟也冷熱當憑脈證用之蓋人之形氣有虛實所感有輕重輕則後時而發至秋成瘧痢是也重則即時發者如以上之證至有輕變重重變輕亦自感有淺深傳有兼併爾況人之形志苦樂不一豈得無變異乎大抵四時之證皆然論暑熱傷氣為痿厥諸證東垣曰夫脾胃虛弱必上焦之氣不足遇夏天熱盛損傷元氣怠惰嗜臥四肢不收精神不足兩腳痿軟遇早晚寒厥日高之後陽氣將旺復熱如火乃陰陽氣血俱不足也或四肢困倦精神短少懶於動作胸滿氣促肢節沉疼或氣高而喘身熱而煩心下膨痞小便黃而少大便溏而頻或利出黃糜或如泔色或渴或不渴不思飲食自汗體重或汗少者血先病而氣不病也其脈中得洪緩若濕氣相搏必加之以遲遲病雖互換少瘥其天暑濕令則一也宜以清燥之劑治之或有所遠行勞倦逢大熱而渴渴則陽氣內伐內伐則熱舍於腎腎者水臟也今水不能勝火則骨枯髓虛足不任身發為骨痿者主於火熱也此濕熱成痿令人骨乏無力或熱厥而陰虛或寒厥而氣虛厥者四肢如在火中為熱厥四肢寒冷者為寒厥寒厥則腹中有寒熱厥則腹中有熱為脾主四肢故也按此論暑熱證候即同冬月傷寒傳變為證之不一也彼為寒邪傷形此則暑熱傷氣若真氣元氣虛甚受病忽有於一時不救者與傷寒陰毒頃刻害人實同故東垣啓是病例大開後人之盲瞶矣學者當審究其機宜與痿門兼者論暑為瘧痢詳見瘧門滯下門論暑為吐瀉霍亂詳見本門論中暑宜補真氣東垣曰夫脾胃虛弱遇六七月間河漲霖雨諸物皆潤人汗沾衣身重短氣甚則四肢痿軟行步不正腳欹眼黑此腎水與膀胱俱竭之狀也當急救之滋肺氣以補水之上源又使庚大腸不受邪熱不令汗大泄也汗泄甚則止津液七神無所依津液相成神乃自生津者庚大腸所主三伏之義庚金受囚木無可制故風濕相搏骨節煩疼一身盡痛亢則害承乃制是也五月常服五味子是瀉丙火補庚大腸益五臟之元氣壬膀胱之寒已絶於己癸腎水已絶於午今更逢濕旺助熱為邪西方北方之寒清絶矣聖人立法夏月宜補者補天元真氣非補熱火也今人夏食寒是也為熱傷元氣以人參麥門冬五味子生脈脈者元氣也謹按王太僕曰蒼天布氣尚不越於五行人在氣中豈不應乎天道然為醫者不審陰陽消長升降浮沉之理將何所據焉故丹溪先生有夏月伏陰在內論深明東垣未悉之旨因附於左宜參考焉丹溪曰天地以一元之氣化生萬物根於中者曰神機根於外者曰氣立萬物天地同此一氣人靈於物形肖天地參而為三者以其得氣之正而通之故天地之氣升人之氣亦升天地之氣浮人之氣亦浮降亦降沉亦沉人與天地同一槖籥也子月一陽生寅月三陽生此氣之升也已月六陽生陽盡出地之上矣此氣之浮也人之腹屬地氣於此時浮於肌表散於皮毛腹中之陽虛矣經曰夏月經滿氣溢入孫絡受血皮膚充實長夏經絡皆盛內溢肌中又曰夏氣在孫絡長夏氣在肌肉所以表實者里必虛世言夏月伏陰在內此陰字有虛之義若作陰冷看其誤甚矣或曰以手捫腹明知其冷而何前人治暑病有用玉龍丹大順散桂苓丸單煮良薑與縮脾飲用草果等皆行溫熱之劑何吾子不思之甚也子曰經言春夏養陽王太僕謂春食涼夏食寒所以養陽也其意可見矣若夫涼臺水館大扇風車陰木寒泉水果冰雪寒涼之傷自內及外不用溫熱病何由安詳玩其意實非為內伏陰冷而用之也前哲又謂升降浮沉則順之寒熱溫涼則逆之若謂夏月火令之時妄投溫熱寧免實實虛虛之患乎或曰已月純陽於理或通五月一陰六月二陰陰氣既動豈無陰冷曰此陰之初動於地下也四陽浮於地上燔灼焚炎流金爍石何冷之有孫真人生脈散令人夏月服之非虛而何論暑火證治大法賈元良曰暑者相火行令也夏月人感之自口齒而入傷心包絡之經其脈虛外證頭疼口乾面垢自汗倦怠少氣或背寒惡熱氣甚者迷悶不省而為霍亂吐利痰滯嘔逆腹痛瀉痢下血發黃生斑皆是其證甚者火熱制金不能平木搐搦不省人事其脈虛浮一曰浮者風也虛者暑也俗名暑風證者皆是相火甚而行令也先以溫水化蘇合香丸次進黃連香薷飲加羌活只用雙解加香薷尤良大抵治暑之法清心利小便甚好若自汗甚者不可利小便宜白虎湯清解之次分表裡治之如在表頭疼惡寒雙解散加香薷及二香散十味香薷散之類解之如在半表半裡泄瀉煩渴飲水吐逆五苓散治之熱甚煩渴者益元散清之若表解裡熱甚宜半夏解毒湯下神芎丸酒蒸黃連丸等或人平生素弱及老人冒暑脈微下痢渴而喜溫或厥冷不省人事宜竹葉石膏湯加熟附半個冷飲次以來復丹五苓散治之凡夏月暑證不可服諸熱燥劑致斑毒發黃小水不通悶亂而死矣按此言治暑之法可謂詳備然云暑風相火為病而先用蘇合香丸至用雙解皆當審諦脈證施治不可少有差失詳蘇合香但可用於陰寒所遏或內傷生冷太過及氣中或中惡者此等又不可謂之暑風相火之證矣蓋暑證有陰陽二者不同治法寒熱霄壤之隔學者慎之暑證治法清暑之劑局方香薷飲治一切暑熱腹痛霍亂吐利煩心等證香薷一斤厚朴制白扁豆各半斤上㕮咀每服三四錢水煎按此手足太陰藥也世俗用於暑月中煎飲然氣虛者不可過多蓋厚朴乃泄氣下氣藥也雖活人書用後方亦只是治暑火清心而已故例不可不分黃連香薷飲香薷一斤厚朴制半斤黃連四兩上㕮咀每二三錢水煎按此手太陰少陰藥也益氣之劑局方人參白虎湯治暑熱發渴脈虛人參一錢半知母二錢石膏半兩甘草一錢上㕮咀入粳米一合水煎按此手太陰足陽明藥也出太陽例竹葉石膏湯石膏一兩半夏二錢半甘草人參各二錢麥門冬半兩竹葉上㕮咀入生薑煎按此足陽明手足太陰經藥也東垣人參益氣湯治暑熱傷氣四肢困倦嗜臥兩手指麻木黃耆八錢甘草七錢內炙二錢人參半兩升麻二錢白芍三錢五味子百四十個柴胡二錢半上㕮咀分作四服按此手足太陰足陽明少陽經藥也清暑益氣之劑宣明益元散方見泄瀉門按此足太陽足三陰經藥也選方十味香薷散治伏暑身體倦怠神昏頭重吐利香薷一兩人參陳皮白朮茯苓黃耆木瓜厚朴扁豆甘草各半兩上㕮咀水煎每服一兩按此手足太陰經藥也東垣清暑益氣湯治長夏濕熱蒸人人感之四肢困倦精神少懶於動作胸滿氣促支節疼或氣高而喘身熱而煩心下膨閟小便黃而數大便溏而頻或痢或渴不思飲食自汗體重黃耆升麻蒼朮各一錢人參白朮神麯陳皮各半錢甘草炙黃柏麥門冬當歸各三分葛根二分五味子九個澤瀉半錢青皮二分上㕮咀水煎按此手足太陰少陰足陽明經藥也仲景太陽中暍證例禁汗下溫針無治法宜是湯主之所謂發千古之祕也溫散之劑五苓散治暑濕為病發熱頭疼煩躁而渴方見泄瀉門桂苓丸治冒暑煩渴飲水過多心腹脹滿小便赤少肉桂去皮茯苓各一兩上為末蜜丸每兩作十丸每細嚼一丸白湯下按以上足太陽例藥也縮脾飲解伏熱除煩渴消暑毒止吐瀉霍亂砂仁草果烏梅肉甘草炙各四兩扁豆炒乾葛各二兩上㕮咀每服四錢水煎冷服按此手足太陰少陰足陽明經藥也消暑十全飲香薷扁豆厚朴甘草紫蘇白朮茯苓藿香木瓜檀香上㕮咀水煎按此手足太陰之劑氣藥也然以上二方今世俗多用姑存之以備取擇消毒丸治傷暑發熱頭疼半夏甘草茯苓各半斤上為末生薑汁作薄糊丸如梧桐子大每五十丸水下易簡方以好醋煮半夏薑汁作糊丸按此足三陽少陰手太陰經藥也大順散治冒暑伏熱引飲過多脾胃受濕水穀不分清濁相干陰陽氣逆霍亂嘔吐臟腑不調甘草乾薑杏仁去皮尖桂去皮上先將甘草用白砂炒次入薑卻下杏仁炒過篩去沙淨合桂為末每服二三錢湯點服按此太陽例藥冷香飲子治傷暑暍霍亂腹痛煩躁脈沉微或伏方見霍亂門來復丹治伏暑泄瀉身熱脈弱硝石一兩同硫黃火上微炒用柳條攪結砂子不可大太陰玄精石研舶上硫黃各一兩五靈脂去砂石青皮陳皮各二兩上為末和勻好醋糊為丸菀豆大每服二十丸空心米飲下按此出厥陰例藥也通利三焦分理陰陽溫胃開結治揮霍變亂神志昏憒元氣下陷者甚捷然病因暑火濕熱者勿用治濕熱之劑子和桂苓甘露飲治伏暑發渴脈虛桂人參藿香茯苓白朮甘草葛根澤瀉石膏寒水石各一兩滑石二兩木香一錢上為末每服三錢白湯調下宣明桂苓甘露飲茯苓澤瀉各一兩石膏寒水石二兩滑石四兩白朮桂豬苓各半兩上為末每服二三錢溫湯調下局方辰砂五苓散治伏暑煩渴頭疼身重泄瀉本方加辰砂上為末每二三錢或水或湯調下按此三方並太陽經藥然有溫散淡滲解表不同也治火之劑黃連解毒湯治暑熱證脈洪實而渴大金花丸治一切火熱暑證神芎丸治一切濕熱內甚火暑之實者方並見火門
