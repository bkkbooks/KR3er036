body:
  text: 卷三十五頭眩門論頭眩屬肝虛內經云徇蒙招尤目瞑耳聾下實上虛過在足少陽厥陰甚則入肝按許學士云上虛者肝虛也攻肝虛則頭暈徇蒙者如以物蒙其首招搖不定目眩耳聾皆暈之狀也故肝厥頭暈治宜鉤藤散方見後論眩暈屬肝木風火之證原病式曰諸風掉眩皆屬肝木風主動故也所謂風氣甚而頭目眩暈者由風木旺必是金衰不能制木而木復生火風皆屬陽陽主乎動兩動相搏則為之旋轉故火本動也焰得風則自然旋轉也論傷寒頭眩屬虛成無己云傷寒頭眩責其虛也起則頭眩與眩冒者皆發汗吐下後所致是知陽虛也故針經曰上虛則眩然風家亦多有眩者風主動故爾論眩暈分內外所因等證嚴用和云眩暈之證經雖云皆屬於肝風上攻所致然體虛之人外感六淫內傷七情皆能眩暈當以脈證別之風則脈浮有汗項強不仁寒則脈緊無汗筋攣掣痛暑則脈虛煩悶濕則脈細沉重吐逆及其七情所感遂使臟氣不平鬱而生涎結而為飲隨氣上逆令人眩暈眉稜骨痛眼不可開寸脈多沉此為異耳若疲勞過度下虛上實金瘡吐衄便利及婦人崩傷產後去血過多皆令人眩暈當隨其所因而治之按此所分四氣痰飲亡血等證可謂親切但其所集之方則欠發明學者當自求之論頭風眩暈有飲宜吐子和云大風頭風眩暈手足麻痹胃脘發痛皆風寒濕三氣雜至合而為痹也在上謂之停飲可用獨聖散吐之吐訖後服清上辛涼之藥按此法施於胸膈痰涎閉塞多年眩暈不已血氣充實之人其效甚捷謹按眩暈一證人皆稱為上盛下虛所致而不明言其所以然之故蓋所謂虛者血與氣也所謂實者痰涎風火也原病之由有氣虛者乃清氣不能上升或汗多亡陽而致當升陽補氣有血虛者乃因亡血過多陽無所附而然當益陰補血此皆不足之證也有因痰涎郁遏者宜開痰導郁重則吐下有因風火所動者宜清上降火若因外感而得者嚴氏雖分四氣之異皆當散邪為主此皆有餘之證也世有所謂氣不歸元而用丹藥鎮墜沉香降氣之法蓋香竄散氣丹藥助火其不歸之氣豈能因此而復耶內經所謂治病必求其本氣之不歸求其本而用藥則善矣頭眩治法治風之劑本事川芎散治風眩頭暈山茱萸一兩山藥甘菊花人參茯神小川芎各半兩上為末每服二錢酒調下按此名治風眩而用藥帶補肝之意若因風而頭眩者分其所挾寒熱而用辛溫辛涼之劑可也若因肝虛而病者此藥雖近理亦難執此而用治風寒之劑嚴氏三五七散治陽虛風寒入腦頭痛目眩耳鳴天雄炮去皮細辛各三兩山茱萸乾薑炮各五兩防風山藥炒各七兩上為末每服二錢溫酒調下按此治上焦陽虛發散風寒之藥也若果有風寒所傷而頭眩者但用辛溫辛熱之劑解散可也何必拘此治濕之劑嚴氏芎術湯治冒雨中濕眩暈嘔逆頭重不食川芎半夏白朮各一兩甘草炙半兩上㕮咀每服四錢姜七片煎按此和中散濕之藥也亦可治痰治濕之劑子和芎黃湯治頭目眩暈大黃荊芥川芎防風各等分上為粗末大作劑料水煎去滓服以利為度按此瀉上焦風熱之藥也若果有風熱頭眩如防風通聖之類皆可選揀而用治痰之劑嚴氏玉液湯治七情感動氣鬱生涎隨氣上逆頭目眩暈心嘈忪悸眉稜骨痛大半夏湯洗七次上每服四錢水煎生薑十片煎入沉香水一呷溫服風痰眩暈者宜青州白丸子選用直指二陳湯治因氣鬱痰眩暈二陳加乾生薑煎服按此二方去痰和中之平劑足太陰陽明經藥也若痰氣甚者如吐下之法皆可施自宜隨證而用去痰和中瑞竹堂化痰丸亦妙方見咳門治血虛頭眩之劑嚴氏芎藭湯治一切失血過多眩暈不蘇芎藭當歸酒浸各等分上㕮咀每服四錢水煎服良方治風六合湯治風虛眩暈四物湯加秦艽羌活詳見中風門按以上二方皆補血和血之藥並出厥陰例然芎歸補血之陽而四物則陰陽俱補秦艽羌活可為佐使不宜等分而用治氣虛頭眩之劑直指香橘飲治氣虛眩暈木香白朮半夏曲橘皮白茯苓砂仁各半兩甘草炙丁香各一分上銼每服三錢姜五片煎吞蘇合香丸本方加芎歸各三分官桂半兩治血虛眩暈按直指方云淫欲過度腎家不能納氣歸元使諸氣逆奔而上此眩暈出於氣虛也吐衄崩漏肝家不能收攝榮氣使諸血失道妄行此眩暈生於血虛也夫既曰腎家不能納氣使氣奔上而用此香散辛熱之藥此藥果能降氣乎又曰氣虛此藥果能補氣乎又曰血虛加芎歸官桂夫血虛用芎歸則可矣所加官桂與丁香木香等藥縱使血有虛寒亦難例用若血虛有熱者其害將何如哉孟子所謂盡信書則不如無書者正此類也治下虛頭眩之劑局方黑錫丹治陰陽不升降上盛下虛頭目眩暈養正丹治虛風頭旋吐涎不已此藥升降陰陽二方並見局方以乳香泡湯送下順氣散治體虛痰盛氣不順頭目眩暈南星一兩炮川烏附子各半兩木香二錢半上每服三錢姜十片煎嚴氏沉香磁石丸治上盛下虛頭目眩暈耳鳴耳聾沉香半兩另研磁石火煆醋淬七次研胡蘆巴炒川巴戟去心陽起石煆附子炮椒紅炒山茱萸肉山藥炒各一兩青鹽另研甘菊花蔓荊子各半兩上為細末酒煮米糊丸梧子大每七十丸空心鹽湯下按以上諸方皆是溫熱金石鎮墜之藥雖能補下焦之陽虛然金石體質雖重必候火煆而成佐以燥熱之藥多致飛越之亢況眩暈多有屬風屬火之證用者宜致思焉雜方本事鉤藤散治肝厥頭暈清頭目鉤藤陳皮半夏麥門冬茯苓茯神人參甘菊花防風各半兩甘草一分石膏一兩上㕮咀每四錢姜七片煎按前許學士所論近是則此方用藥其義未詳謹按頭暈諸方用藥俱未切當直指香橘飲之說尤為背理大抵外邪之感理宜解表但隨其風寒暑熱以治痰涎內蓄者必當清痰為先氣虛者宜補氣如東垣之法血虛者宜補血如四物增損之類若腎虛而氣不降者又當益陰而補腎若專執前藥豈能中其肯綮耶
