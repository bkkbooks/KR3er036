body:
  text: 卷九熱門發熱附內經敘熱為諸證諸病喘嘔吐酸暴注下迫轉筋小便渾濁腹脹大鼓之有聲如鼓癰疽瘍疹瘤氣結核吐下霍亂瞀郁腫脹鼻塞鼽衄血溢血泄淋閟身熱惡寒戰栗驚惑悲笑譫妄衄衊血汙皆屬於熱按此病機皆內經氣交變論五常政論至真要論等文河間劉守真撮而為六氣為病今但以身熱發熱分例如以下經言有諸病本之不同故茲病機不復參附一一見各類云餘證仿此敘陰陽虛盛為熱經曰夫熱病者皆傷寒之類也陽勝則熱陰虛則內熱陽盛則外熱內外皆熱則喘而渴故欲冷飲也陽盛則身熱腠理閉喘粗為之俯仰汗不出而熱齒乾以煩冤腹滿死能冬不能夏有四肢熱逢風寒如炙於火者是人陰氣虛陽氣盛也人身非常熱也為之熱而煩滿者陰氣少而陽氣勝故熱而煩滿也三陽之病發寒熱病熱而有所痛者是三陽之動也脈法內經曰大熱病氣熱脈滿是謂重實尺寸脈俱虛是謂重虛粗大者陰不足陽有餘為熱中也王注云粗大謂脈洪大也脈洪為熱脈緩而滑脈尺粗常熱者皆熱中也陽氣有餘為身熱無汗脈反澀者為太過血少陰虛也謹按經曰脈至而從按之不鼓諸陽皆然王注云病熱而脈數按之不鼓動乃寒盛格陽而致之非熱也形證是寒按之而脈氣鼓擊於指下盛者此為熱盛拒陰而生病非寒也又曰推而內之外而不內身有熱也傷寒論曰寸口脈微為陽不足陰氣上入陽中則灑淅惡寒尺脈弱為陰不足陽氣下陷入陰中則發熱也與難經言覆溢相乘及六難浮損沉實義皆診法之至要於熱證大宜諳識難經曰熱病之脈陰陽俱浮浮之而滑沉之散澀脈經曰弦數多熱數為熱極數脈為虛為熱數洪熱煩脈來如懸鉤而浮為熱滑數心下結熱盛緊而數寒熱俱發沉細滑疾者熱脈盛滑緊者病在外熱脈沉而緊上焦有熱下寒脈浮緊且滑直者外熱內冷內不通寸口脈浮大而疾者名曰陽中之陽病若煩滿身熱頭痛腹中熱寸口脈實熱在脾肺數為吐為熱在胃口關脈滑數胃中有客熱緩而滑為熱中牢脈為脾胃盛熱尺脈實為身熱心痛數為臍下熱痛浮為下熱風凡脈洪大傷寒熱病也謹按經曰脈浮緊發熱為傷寒卒病脈浮而大者風脈浮數無熱者為風脈浮如數而有熱者氣也皆與熱證脈相類脈經曰熱病脈小或細喘逆不得大小便腹大而脹汗出而厥逆泄注脈大小不調皆難治熱病已得汗而脈尚躁盛此陰脈之極也死熱病不得汗而脈躁盛者此陽脈之極也死脈浮而澀澀而身有熱者死論熱在氣在血之分東垣曰晝則發熱夜則安靜是陽氣自旺於陽分也晝則安靜夜則發熱煩躁是陽氣下陷入陰中也名曰熱入血室晝則發熱煩躁夜則發熱煩躁是重陽無陰也當亟瀉其陽峻補其陰論五臟有邪身熱各異以手捫摸有三法以輕手捫之則熱重按之則不熱是熱在皮毛血脈也重按之至筋骨之分則熱蒸手極甚輕手則不熱是邪在筋骨之間也輕手捫之不熱重力以按之不熱不輕不重按之而熱是在筋骨之上皮毛血脈之下乃熱在肌肉也肺熱者輕手乃得微按全無日西熱甚乃皮毛之熱其證必見喘咳寒熱輕者瀉白散重者涼膈散地骨散心熱者微按至皮膚之下肌肉之上輕手乃得微按至皮毛之下則熱少加力按之則全不熱是熱在血脈也其證煩心心痛掌中熱而噦以黃連瀉心湯導赤散硃砂安神丸脾熱者輕手捫之不熱重按至筋骨又不熱不輕不重在輕手重手其間熱在肌肉遇夜尤甚其證必怠惰嗜臥四肢不收無氣以動瀉黃散肝熱者重按之肌肉之下至骨之上乃肝之熱寅卯間尤甚其脈弦四肢滿悶便難轉筋多怒多驚四肢困熱筋痿不能起於床瀉青丸柴胡飲子腎熱者輕手重手俱不熱如重手按至骨分其熱蒸手如火其人骨蘇蘇如蟲蝕其骨困熱不任亦不能起於床滋腎丸主之按此手太陰少陰足太陰厥陰少陰本病為皮毛肌肉骨分熱也然面熱者足陽明口中熱如膠足少陰口熱舌乾足少陰耳肌熱若寒手太陽掌中熱手厥陰少陰太陰足下熱而痛足少陰足外熱足少陽身熱膚痛手少陰身前熱足陽明灑淅寒熱手太陰肩上熱肩似拔手太陽中熱而喘足少陰肩背熱及足小指外臁脛踝後皆熱足太陽一身盡熱狂而妄聞妄見妄言足陽明熱而筋縱緩不收陰痿足陽明厥陰手少陰與前熱在氣血之分皆諸經現證腑臟陰陽是動所生之本病也論表裡熱病機機要云有表而熱者謂之表熱無表而熱者謂之裡熱有暴熱而為熱者乃久不宣通而致也有服溫藥而為熱者有惡寒戰栗熱者治法小熱之氣涼以和之大熱之氣寒以取之甚熱之氣以汗發之發之不盡則逆制之制之不盡求其屬以衰之苦者治臟腑屬陰而居內辛者治腑腑屬陽而在外故內者下之外者發之又宜養血益陰其熱自愈按此但總言表裡之意而未分所受標本之源然合前後諸論觀之則其病機著矣論雜病陰陽虛實寒熱與傷寒不同內經曰陰虛生內熱者因有所勞倦形氣衰少穀氣上盛上焦不行下脘不通胃氣熱熱氣熏胸中故內熱陽盛則外熱者因上焦不通利則皮膚緻密腠理閉塞玄府不通衛氣不得泄故外熱陽虛則外寒陰盛則內寒見寒門謹按趙嗣真曰素問論陰陽虛實四證者雜病也難經六難之文論脈也外臺所述之文論傷寒表裡也但仲景所主陰陽虛盛之意理實與焉經云邪氣盛則實精氣奪則虛因正氣先虛以致邪氣客之而為盛實於是有陽虛陰盛陰虛陽盛二證之別如活人書卻將素問所論雜病陰陽虛盛四證合而引證仲景傷寒二證之法又改陽盛外熱作內熱陰盛內寒作外寒所論初未嘗合因拓仲景所主陰陽虛盛之理而詳説之蓋盛者指邪氣而言虛者指正氣而言陰陽虛盛邪正消長之機且正氣在人陽主表而陰主裡邪氣中人表為陰而里為陽若夫表之真陽先虛故陰邪乘陽而盛實表受邪者陽虛也脈浮緊者陰邪盛於外也是謂陽虛陰盛所以桂枝麻黃辛甘之溫劑汗之則陰邪消溫之則真陽長使邪去正安故愈又若里之真氣先虛故陽邪入陰而盛實里受邪者陰虛也脈沉實者陽邪盛於裡也是謂陰虛陽盛所以用承氣酸苦之寒劑下之則陽邪消寒之則真陰長邪去正安故愈如其不然陽盛而用桂枝下咽即斃陰盛而用承氣入胃以亡是皆盛盛虛虛而致邪失正也以是知仲景所主陽虛陰盛陰虛陽盛二證之意深蓋指一為表證一為里之邪正消長而言非兼言表和里病里和表病而謂之陰陽虛盛也況和者無病處也虛者受病處也斯論可謂得仲景之心法然陰虛生內熱詳東垣丹溪之説則又有陰虛外熱之證陽勝外熱考之河間往往有陽勝內熱之例是皆原其病機也然經言者內因證也本病也河間東垣丹溪言者極變之證也標病也所謂亢則害承乃制之例又按仲景論陰陽相搏名曰動陽動為陽虛虛則汗出陰動為陰虛虛則發熱如不汗出發熱而反形冷惡寒者三焦傷也或病因醫所誤汗下之致惡寒發熱者一為陰陽不和一為陰陽陷下致病若此諸例豈止陰陽虛實而已但所因不同極變之異爾論雜證發熱惡寒與傷寒不同許學士曰仲景云假令寸口脈微名曰陽不足陰氣上入陽中則灑淅惡寒也尺脈弱名曰陰不足陽氣下陷入陰中則發熱也此謂元受病而然也又云陽微則惡寒陰弱則發熱此醫發其汗使陽氣微又大下之令陰氣弱此謂醫所病而然也大抵陰不足陽往從之故陽內陷則發熱陽不足陰往乘之故陰上入陽中則惡寒陰陽不歸其分故寒熱交爭是以發熱而惡寒也原病式曰身熱惡寒熱在表也邪熱在表而淺邪畏其正故病熱而反惡寒也或言惡寒為寒在表或言身熱惡寒為熱在皮膚寒在骨髓者皆誤也仲景法曰無陽病寒不可發汗又言身熱惡寒麻黃湯汗之汗泄熱去身涼即愈然則豈有寒者歟大法煩躁多渴欲寒惡熱為病熱也亦有亢則害承乃制之則病熱甚而反覺其冷者也雖覺其冷而病為熱實非寒也其病熱鬱甚而反惡寒得寒轉甚而得暖少愈者謂暖則腠理疏通而陽氣得散怫熱少退故少愈也其寒則腠理因密陽氣怫鬱而熱轉甚故病加爾上下中外周身皆然俗因之妄謂寒病誤以熱藥投之為害多矣又曰陰勝則寒陽勝則熱者謂裡氣與邪熱並之於表則為陽勝而發熱也表氣與邪熱並之於里則為陰勝而寒栗也由表氣虛而裡熱亢則害承乃制故反戰栗也大抵本熱非病寒也或傷寒病寒熱往來者邪熱在表而淺邪惡其正故惡寒也邪熱在裡而深邪甚無畏物畏其極故不惡寒而反惡熱也表裡進退不已故為寒熱往來也此氣不並於表裡故異於瘧而寒熱微也按此數論並言雜病陰陽相乘及火熱盛反兼水化為病亢則害承乃制之例但河間所引傷寒身熱寒熱與仲景及明理論義不相合詳趙氏曰明理論云往來寒熱者邪正分爭也邪氣之入也正氣不與之爭則但熱而無寒若邪正分爭於是寒熱作矣蓋以寒邪為陰熱邪為陽里分為陰表分為陽邪之客於表也為寒邪與陽爭則為寒矣邪之入於裡也為熱邪與陰爭則為熱矣若邪在半表半裡之間外與陽爭而為寒內與陰爭而為熱表裡之不拘內外之無定由是寒熱且往且來日有至於三五甚者則十數發也若以陰陽相勝陽不足則先寒後熱陰不足則先熱後寒此特論雜病陰陽二氣自相乘勝然也非可以語傷寒斯論為甚精切深合仲景之意蓋不唯釋疑於活人書而已可與前篇兼看又按河間言惡寒為寒在表或身熱惡寒為熱在皮膚寒在骨髓者皆誤也而活人書亦以此為表裡言之故趙氏曰詳仲景論止分皮膚骨髓而不曰表裡者蓋以皮脈肉筋骨五者素問以為五臟之合主於外而充於身者也惟曰臟曰腑方可言里可見皮膚即骨髓之上外部浮淺之分骨髓即皮膚之下外部深沉之分與經絡屬表臟腑屬裡之例不同況仲景出此證於太陽篇首其為表證明矣是知虛弱素寒之人感邪發熱熱邪浮淺不勝沉寒故外怯而欲得近衣此所謂熱在皮膚寒在骨髓藥用辛溫至於壯盛素熱之人或酒客輩感邪之初寒未變熱陰邪閉於伏熱陰凝於外熱鬱於內故內煩而不欲近衣此所為寒在皮膚熱在骨髓藥用辛涼必矣一發之餘表解正和此仲景不言之妙若以皮膚為表骨髓為里則麻黃湯證骨節疼痛其可名為有表復有里之證即然仲景傷寒一書人但知為方家之祖而未解作秦漢文字觀故於大經大法之意反有疑似而後世賴其餘澤者往往類輯傷寒方論其間失其本義及穿鑿者亦有之矧以雜病為論但引其例乎茲趙氏釋疑可謂得其旨趣且黃帝針經有論皮寒熱肌寒熱骨寒熱等例如此則仲景所論分邪在皮膚骨髓之殊雖欲以盡證例之變蓋自有所本云惡寒非寒惡熱非熱論丹溪曰經云惡寒戰栗者皆屬於熱又云禁栗如喪神守皆屬於火惡寒者雖當炎月若遇風霜重綿在身自覺凜凜戰栗禁栗動搖之貌如喪神守惡寒之甚原病式曰病熱甚而反覺其寒此為病熱實非寒也或曰往往見有得熱藥而少愈者何也豫曰病熱之人其氣炎上郁為痰飲抑遏清道陰氣不升病熱尤甚積痰得熱亦為暫退熱勢助邪其病益深或曰寒勢如此誰敢以寒涼與之非殺而何豫曰古人遇戰栗之證有以大承氣湯下燥糞而愈有惡寒戰栗明是熱證但有虛實之分耳經曰陰虛則發熱夫陽在外為陰之衛陰在內為陽之守精神外馳嗜欲無節陰氣耗散陽無所附遂致浮散於肌表之間而惡熱也實非有熱當作陰虛治之而用補養之法可也或曰惡寒非寒宜用寒藥惡熱非熱宜用補藥甚駭耳目明示我治之之法可乎豫曰進士周本道年逾三十得惡寒病服附子百數而病甚求豫治診其脈弦而似緩豫以江茶入薑汁香油些小吐痰一升許病減大半又與防風通聖散去硝黃加地黃當歸百餘帖而安周甚喜豫曰未也燥熱已多血傷亦深須食淡以養胃內觀以養神則水可生火可降也不從吾言附毒必發彼勇於仕進一切將外不守戒忌豫曰若多與補血涼藥亦可稍安內外不靜腎水不生附毒必發病安之後官於婺城巡夜冒寒非附子不可以療而性怕生薑只得以豬腰作片煮附子與三帖而安豫曰可急歸知其附毒易發彼以為迂半年後果發背而死又司丞叔平生腳自踝以下常覺熱冬不可加綿於上常自言曰我資稟壯不怕冷豫曰此足三陰之虛宜早斷欲事以補養陰血庶乎可免笑而不答年才五十患痿半年而死觀此二人治法或可知矣或曰傷寒病惡寒惡熱者亦若是耶豫曰若病傷寒者自外入內先賢言之詳矣愚奚庸贅謹按東垣曰發熱惡熱大渴不止煩躁肌熱不欲近衣其脈洪大按之無力者或無目痛鼻乾者非白虎湯證也此血虛發躁當以當歸補血湯主之又有火鬱而熱者如不能食而熱自汗氣短者虛也以甘寒之劑瀉熱補氣非如能食而熱口舌乾燥大便難者以辛苦大寒之劑下之瀉熱補水之比當細分之不可概論與以上皆宜參考如言煩躁虛煩亦與實煩不同如傷寒煩者為真陽內郁陰中伏陽之證與陰虛躁熱病本亦異虛中有熱宜灸論衛生寶鑑云奧屯周鄉之子年二十三病發熱肌熱消瘦四肢困倦嗜臥盜汗大便溏多不思飲食腸鳴舌不知味懶於言語時來時去近半載其脈浮數按之無力正應脈訣云臟中積冷榮中熱欲得精要補虛先灸中脘引清氣上行肥腠理又灸氣海穴乃生髮元氣滋榮百脈灸三里助胃氣撤上熱使下於陰分以甘寒之劑瀉熱火佐以甘溫養其中氣又食粳米羊肉之類固其胃氣以慎言語節飲食至數月病減得平復按此證治乃陽虛而胃氣不足陰陽不升降致發熱者宜灸之以助陽藥以甘寒瀉血中之大熱又非止陰虛之例也論骨蒸勞熱用吐下法子和曰皮膚枯乾痰涎稠黏四肢疼痛面赤唇乾煩躁睡臥不寧或時喘咳飲食少味困弱無力虛汗黃瘦等證先以茶調散輕湧訖次以導水禹功輕瀉三兩行後服柴胡飲子桂苓甘露飲搜風丸白朮調中湯人參散之類量虛實用之如咯血吐血便血此亡血也並不宜吐吐則神昏不可峻服熱藥大忌炙爆酒面宜食疏菜水水涼物亦慎不可過忌則胃口閉形瘦脈大乃死候也諸勞仿此謹按一切病候必憑脈驗證施治則自切當也詳以上勞熱未必不兼陰陽兩虛濕熱自甚或陰虛或勞傷形氣或脾胃虛損為熱之證吐去痰涎及開提郁陷之氣次以調養之法治之猶可若便利與禹功導水重峻之劑吾恐實實虛虛不善用而藥之太過多致殺人且如積熱蓄熱有餘之證非汗吐下法則不能已者不善用而藥之不及亦致誤人矣當必憑脈驗證施治庶不致藥有太過不及之失論虛熱發汗之誤東垣曰仲景論內外不足發熱自汗之證大禁發汗若飲食勞倦雜病發熱自汗表虛之證認作有餘便用麻黃髮之汗大出則表益虛也謹按仲景論傷寒分例不可發汗者三十餘條至一證有二禁者若寒熱有血弱氣虛者也況雜病乎然誤則致逆為禍至速所謂一逆尚引日再逆促命期矣論陰盛格陽身熱治例東垣云馮內翰之侄櫟同病傷寒目赤而煩渴脈息七八至按之不鼓擊經曰脈至而從按之不鼓諸陽皆然此陰盛格陽於外非熱也與薑附之劑汗出而愈詳見試效方按此與王海藏治狂言發斑身熱脈沉細陰證例同東垣又有治腳膝痿弱下尻臀皆冷陰汗臊臭精滑不固脈沉數有力為火鬱於內逼陰向外為陽盛拒陰用苦寒藥下之者此水火徵兆之微脈證治例之妙王太僕曰紀於水火餘氣可知因並録之以勸論諸發熱病本不同此事難知曰一身盡熱先太陽也從外而之內者先無形也為外傷謹按仲景論傷寒證例三陰俱有發熱但微甚不同趙氏曰論中三陽皆有發熱如少陰二證外又有吐利手足不逆冷反發熱者不死少陰病一身手足盡熱以熱在膀胱必便血少陰病四逆散中用柴胡亦有治發熱意又厥陰病先厥後發熱而利者必自止下利脈數有微熱汗出今欲愈面赤身微熱為鬱冒嘔而發熱小柴胡與夫太陰病中風四肢煩疼是三陰皆有發熱明矣但寒傷陰經發熱則為逆手足不和兩脅俱熱如火先少陽也從內而之外者先有形也為內傷內經曰人數醉若飽以入房氣聚於脾中不得散酒氣與穀氣相搏熱盛於中故熱遍於身內熱而溺赤也飲食不節起居不時者陰受之入六腑則身熱不得臥上為喘呼活人書曰傷食令人頭痛脈數發熱但左手人迎脈平和身不疼痛是也難知曰脈人迎氣口俱緊盛或舉按皆實大發熱而惡寒腹不和而口液此內外俱傷也按以上辨內傷外感詳見內傷門內經曰身熱脈弦數戰栗而不惡寒者疸瘧也要略曰發熱身疼而身如熏黃者濕也一身盡疼發熱日晡所劇者此名風濕汗出而身熱者風也活人書雲中脘有痰令人憎寒發熱惡風自汗寸口脈浮胸痞滿有類傷寒但頭不痛項不強為異孫尚云虛煩與傷寒相似身熱脈不浮緊不惡寒但熱而煩或不煩頭不痛腳氣為病大便堅腳膝腫痛兩脛或有腫滿或枯細者方其發時亦有發熱憎寒嘔惡似傷寒證也難經曰發熱惡寒脈來浮數者溫病也身熱頭疼自汗多眠陽脈浮滑陰脈濡弱者風溫也傷寒論曰脈虛身熱得之傷暑東垣云四肢發熱者或口乾舌乾咽乾蓋心生大小腸生熱火熱來乘主位乃濕熱相合故煩躁悶亂也四肢者脾土也火乘之故四肢發熱也或身體沉重走注疼痛蓋濕熱相搏而風熱鬱而不得伸也謹按諸病表熱有相類則脈氣病本之不同也因類以上諸例是故仲景論傷寒卒病發熱而惡寒者發於陽也其脈浮緊而澀為風寒客於榮衛之中也分六經傳變脈證至二百餘例有因壞誤所致及溫瘧風溫溫疫等證皆冬傷於寒發為諸脈證之變此傷寒論之所以作也河間劉守真論熱病因陽氣怫鬱而為熱或鬱結轉甚而惡寒所謂亢則害承乃制陽拯反似陰與傷寒皆相類此原病式之所以作也東垣李明之論內傷脾胃之證始得之多氣高而喘身熱而煩其脈洪大而頭痛或渴不止其皮膚不任風寒而生寒熱與外感傷寒多相似此脾胃論之所以作也斯三君子之論本推明內經病機之旨條熱證標本之不同勿視此以為彼也然學者不審其義而各為專門是以丹溪朱先生曰學先仲景書者以傷寒為主恐誤內傷作外感先東垣書者以胃氣為主恐誤外感為內傷先河間書者以熱為主恐誤以寒為熱不若先主於內經則自然活潑潑地蓋內經之義則精而博者也然則微三君子之論又何由知經義之積隱乎但不審其義而各為專門者視此以為彼誤人多矣籲丹溪之旨微哉切觀仲景之法必憑脈驗證施治變化無窮深合內經之旨如寒邪在表以辛溫之藥汗之在裡以辛熱之藥溫之傳變在半表裡者以甘寒之藥和解之傳變入里者以苦寒之藥下之涼劑亦未嘗委而不用也大抵固憑脈驗證以自通變不可執論專方如此矧人身之病有水火徵兆之微若王太僕曰熱來復去晝見夜伏夜發晝見時節而動是無火也是例固河間論亢則害承乃制病式亦庶幾矣丹溪更有論陰陽為惡寒非寒惡熱非熱者因人身之病水火徵兆幽顯莫測先哲推論亦且至矣然仲景論傷寒脈法亦未嘗不引雜病河間論熱證脈法而且未詳學者能本仲景參叔和脈法自辨內傷外感之分殊如王海藏曰仲景言弦澀為陰叔和言弦澀為陽雖有陰陽之別則不離諸數為熱諸遲為寒仲景叔和言本兩途非相違背合而論之皆是也仲景所言傷寒自外從氣而入以弦脈為陰邪從外入先太陽也叔和所言雜病自內從血而出以弦脈為陽病自內生先少陽也如此則形證有相類脈氣病本之不同學者審是則自然通變不致視此以為彼拘於執論專方而已也熱證治法發表之劑易簡參蘇飲治感冒發熱頭痛或因痰飲凝積為熱狀似傷寒者前胡人參紫蘇乾葛半夏茯苓各三分枳殼陳皮甘草桔梗木香各半錢上㕮咀生薑五片水煎服人參敗毒散方見咳門按此二方足少陽柴胡例藥參蘇飲解見痰飲門局方柴胡升麻湯治發熱頭痛惡風體疼鼻寒咽乾痰盛方見傷風門按此足少陽陽明手太陰藥也葛根解肌湯治發熱惡寒頭痛項強傷寒溫病葛根四錢桂一錢黃芩甘草白芍各二錢麻黃三錢上㕮咀入薑棗煎按此足太陽陽明太陰藥也知母葛根湯治身熱頭痛風溫溫毒證知母一錢半葛根四錢石膏三錢甘草木香升麻黃芩南星人參防風杏仁川芎羌活各一錢葳蕤二錢半麻黃二錢上㕮咀作二服入薑煎按此足太陽陽明手太陰藥也以上三方並足太陽例河間六神通解散治發熱頭痛發渴身疼脈洪無汗麻黃二錢甘草三錢石膏滑石黃芩各四錢蒼朮八錢上㕮咀入薑蔥煎按此足三陽手足太陰藥也出太陽例易老九味羌活湯治發熱惡寒無汗或自汗頭痛項強或傷風見寒脈傷寒見風脈並宜服之羌活防風蒼朮各一錢半川芎白芷生地黃黃芩甘草細辛一錢上㕮咀水煎按此足太陽陽明三陰藥也易老云經曰有汗不得服麻黃無汗不得服桂枝若瘥失則其變不可勝言故立此法使不犯三陽禁忌為解利神方非獨活雜病藥也謹按仲景論傷寒發表藥分六經及解肌可刺諸法蓋恐藥致誤變逆慎之至也今集以上諸方皆傷寒表藥之變法宜詳審脈證而擇用之然易老九味河間通解意雖不同務在藥證相對名實相符方可行之否則犯禁致逆及失其立法之意也是以許文正公曰近世論醫有主河間劉氏者有主易老張氏者張氏用藥依準四時陰陽升降而增損之正內經四氣調神之義醫而不知此妄行也劉氏用藥務在推陳致新不使少有怫鬱正造化新新不停之義醫而不知此無術也然而主張氏者或未盡張氏之妙則瞑眩之劑終莫敢投至失幾後時而不救者多矣主劉氏者或未悉劉氏之蘊則劫效目前陰損正氣遺禍於後日者多矣能用二家之長而無二家之弊則治庶幾乎於此二方製法可見大抵學者當於經論中求之知其所主不可偏執於一家而已攻裡之劑宣明三乙承氣湯治臟腑積熱痞滿燥實堅脹甘草枳實厚朴大黃芒硝上㕮咀入薑煎按此足陽明例藥也發明曰漢張仲景作傷寒論為邪自外入傳於胃者謂之入腑腑之為言聚也胃為水穀之海榮衛之源水穀會聚變化而為榮衛邪氣入胃則胃中之氣菀滯糟粕祕結而為實實則瀉之人所共知如緩急輕重之劑則臨時消息焉不惡寒反惡熱發渴譫語腹滿而喘手足濈然汗出者急下之宜大承氣湯如邪氣未深恐有燥屎少服小承氣湯試之腹中轉失氣者有燥屎也乃可攻之不轉失氣者初硬後溏尚未可攻攻之則腹滿不能食若腹滿不通與小承氣湯微和胃氣勿令大泄如發汗後不惡寒但熱者胃實也當和胃氣調胃承氣湯主之成無己云大熱結實者與大承氣湯小熱微結者與小承氣湯以熱不太甚故於大承氣湯中去芒硝又以結不至堅故減厚朴枳實也如不至大堅滿邪熱甚而須攻下者亦未可投大承氣湯必以輕緩之劑攻之於大承氣湯減厚朴枳實加甘草乃輕緩之劑以調胃也設若大承氣反用調胃治之則邪氣不服小承氣證反用大承氣下之則過傷正氣而腹滿不能食故有勿大泄之戒此仲景所以分治之未嘗越聖人制度後之醫者以此三藥合而為一且云通治三藥之證及無問傷寒雜證內外一切所傷若依此説與仲景之方甚相違背及失軒岐緩急之旨由是紅紫眩亂迷惑世人一唱百和使病者暗受其弊將何訴哉倘有仁心審是者當於內經仲景方中求之貴使藥證相對以聖賢之心為心則方之真偽自可得而知矣當歸承氣湯治燥熱裡熱火鬱為病或皮膚枯燥或咽乾鼻乾或便溺結悶通宜用此當歸大黃各四錢甘草芒硝各三錢上㕮咀入薑煎按此足太陰厥陰陽明藥也凡血證下藥詳見仲景抵當諸湯例茲不備録但此與前方可見有氣血之分發表攻裡之劑宣明雙解散治一切風熱積熱益元散防風通聖散各一兩上每三五錢入蔥白鹽豉五十粒薑三片煎服按此足太陽陽明少陰厥陰手足太陰藥也治風熱鬱熱甚捷但本論云治風寒暑濕飢飽勞役內外諸邪所傷無問雜病便可通解然斯意混同主治而寒濕何以得散內傷不足之證何以抵受邪實實虛虛不無致逆故潘思敬云是仲景調胃承氣湯後人一變加連翹梔子薄荷黃芩謂之涼膈至河間又一變於涼膈中加防風川芎當歸芍藥麻黃石膏桔梗滑石荊芥白朮謂之防風通聖古之復方也今復之又復製法蓋可知矣而學者識之大柴胡湯治傷寒雜證發熱脈沉實弦數熱日數多或有表復有里脈洪頭痛而譫妄或濕熱自利表裡證已急宜此下之柴胡四錢黃芩芍藥各一錢半半夏一錢二分枳實二錢大黃二錢半上㕮咀入薑棗煎按此足少陽陽明太陰厥陰藥也出太陽例清氣之劑局方人參白虎湯治氣熱心煩發渴石膏四錢知母一錢半甘草一錢人參半錢上㕮咀入粳米一合煎按此足陽明少陰手太陰藥也清心蓮子飲治發熱口乾小便白濁夜則安靜晝則發熱黃芩麥門冬地骨皮車前子甘草各三錢半蓮肉茯苓黃耆柴胡人參各二錢半上㕮咀水煎按此足少陽少陰手足太陰藥也宣明柴胡飲子解一切肌熱蒸熱積熱或汗後餘熱脈洪實弦數黃芩甘草大黃芍藥柴胡人參當歸各二錢半上㕮咀入薑煎按此足少陽例又表裡血藥也寶鑑附於氣分熱例下今姑從之學者宜取擇焉機要云若膚如火燎而熱以手取之不甚熱為肺熱目睛赤煩燥或引飲黃芩一味主之晝則行陽二十五度此言氣分熱也涼血之劑清涼飲子治大人小兒血脈壅實臟腑生熱面赤煩渴睡臥不寧大黃芍藥當歸甘草各等分上㕮咀水煎按此足太陰厥陰之的藥也元戎四物二連湯治血虛虛勞發熱五心煩熱晝則明瞭夜則發熱當歸生地黃白芍川芎黃連胡黃連上㕮咀水煎服按此足太陰厥陰手少陰經藥也機要云若夜發熱主行陰夜則行陰二十五度若脅肋熱或一身盡熱或日晡肌熱者皆血病也宜以上方及桃仁承氣選而用之清氣涼血之劑局方洗心散治風壅壯熱頭目昏痛熱氣上衝口苦唇焦咽喉腫痛心神煩燥多渴五心煩熱小便赤澀大便祕滯大黃煨甘草當歸芍藥麻黃荊芥穗各六錢白朮五錢上為末每服二三錢生薑薄荷湯煎服按此足太陽陽明厥陰手足太陰經藥也今人多用之故收入然以白朮合大黃入心故名洗心而從以麻黃荊芥亦是表裡藥甘露飲治男子婦人小兒煩熱胃中客熱口臭齒齦煩渴咽瘡等證熟地黃生地黃枇杷葉山茵陳天門冬麥門冬枳殼黃芩石斛甘草各等分上為末每服二錢水煎服按此足陽明手太陰少陰經藥也龍腦雞蘇丸除煩熱鬱熱肺熱咳嗽鼻衄吐血血崩下血熱淋消渴驚悸解酒毒胃熱口臭口苦開心明目薄荷葉一兩六錢生地黃六錢麥門冬四錢蒲黃炒阿膠炒各二錢黃耆一錢人參木通各二錢銀州柴胡同木通浸二日取汁入膏甘草一錢半上為末用蜜三兩二錢煉過後下地黃末木通柴胡汁熬成膏丸桐子大每二十丸嚼破湯下按此三焦藥也安神清鎮諸方局方至寶丹方見中風門按此氣血之藥通關透肌骨之劑也東垣硃砂安神丸治心神煩亂怔忡兀兀欲吐氣亂而熱似懊憹狀黃連一錢半生地黃當歸身甘草炙各半錢硃砂一錢別研上為末蒸餅丸黍米大每十丸或十五二十丸唾津下按此二方血分藥也牛黃膏治熱入血室發狂不認人者牛黃二錢半硃砂蔚金各三錢腦子甘草各一錢牡丹皮二錢上為細末煉蜜丸皂子大新水化下錢氏安神丸治熱渴心悶脈實頰赤口燥麥門冬馬牙硝白茯苓山藥寒水石各半兩硃砂一兩甘草半兩龍腦一字上為末煉蜜丸雞頭大每服半丸或一丸砂糖水化下按此氣分藥也瀉諸經實熱方局方涼膈散治上焦積熱煩躁多渴面赤面熱頭昏咽燥喉咽腫痛口瘡便溺赤澀狂言譫妄睡臥不安並宜服之大黃朴硝甘草各二兩連翹四兩梔子仁黃芩薄荷葉各一兩上為末每服二錢竹葉蜜些小煎服按此手太陰少陰足太陰陽明藥也輕者宜用桔梗湯母犯下二焦也余仿此桔梗湯見喉痹門調胃承氣湯治中焦實熱胃熱實而不滿大黃一兩甘草二錢半芒硝四錢半上㕮咀水煎按此足陽明經藥也輕者宜用前胡散八正散治下焦積熱二便閉澀多渴咽乾口熱生瘡腫痛淋血大黃瞿麥木通滑石扁竹車前子山梔甘草各等分上為末每服二錢水煎入燈芯按此足太陽陽明經藥也輕者宜用導赤散錢氏瀉青丸治肝經鬱熱當歸龍膽草川芎山梔大黃羌活防風上為末蜜丸雞頭子大每一二丸瀉心湯治心熱黃連一兩上為末水調二三分量病人大小與之瀉黃散治脾熱口臭咽乾藿香葉七錢山梔一兩石膏半兩甘草三兩防風四兩上為末同蜜酒拌微炒香每服一錢瀉白散治肺熱桑白皮地骨皮各一兩甘草半兩上為末每服二三錢東垣滋腎丸治腎熱黃柏三錢知母二錢桂一分半上為末熟水丸桐子大每七八十丸至百丸食前百沸湯下按此五臟藥例也半夏湯治膽腑實熱精神不守熱泄病半夏宿薑各三錢黃芩遠志茯苓各二錢生地黃五錢秫米數合酸棗仁一合上㕮咀長流水煎導赤散治小腸實熱小便赤澀而渴生地黃木通甘草各等分上末入竹葉同煎前胡散治胃氣實熱唇口乾裂中心熱躁大便祕結非時煩渴睡中口內生涎大黃半兩桔梗枳殼前胡杏仁各一錢葛根二錢上為末每二錢入薑煎瀉白湯治大腸實熱腹脹不通俠臍痛食不化喘不能久立口生瘡橘皮淡竹茹黃芩梔子仁柏皮炙各半兩茯苓芒硝各一兩生地黃三兩上銼每四錢入薑棗煎空心服赤茯苓湯治膀胱實熱腹脹小便不通口苦舌乾咽腫不利赤茯苓豬苓葵子枳實瞿麥木通黃芩車前子滑石甘草各等分上㕮咀入薑煎食前服按以上諸方出五臟治要例治虛熱升陽之劑小柴胡湯治潮熱身熱默默不欲飲食或嘔或渴或利或咳人參半夏生甘草黃芩各二錢柴胡四錢生薑五片棗二枚上㕮咀水煎按此足少陽藥也出太陽例主虛勞煩熱能引清氣上行陽道在經主氣在臟主血故更能入血室也東垣升陽益胃湯治肺之脾胃虛怠惰嗜臥四肢不收身體沉重口乾食無味大便不調小便頻數食少食不消灑淅惡寒而或微熱方見內傷門按此手太陰足陽明太陰之藥欲升浮中焦下陷之氣故加太陽諸經藥也補中益氣湯治形神勞役或飲食失節勞倦虛損身熱而煩脈洪大而虛頭痛或惡寒而渴自汗無力氣高而喘黃耆一錢半人參甘草炙各一錢白朮當歸身柴胡升麻陳皮各半錢上㕮咀水煎按此手足太陰少陽經藥表裡氣血之劑也加減見內傷門謹按發明曰經云治熱以寒溫而行之治寒以熱涼而行之治溫以清冷而行之治清以溫熱而行之夫治熱以寒溫而行之者有三皆同大熱在身止用黃耆人參甘草此三味者皆甘溫雖表裡皆熱躁發於內捫之肌熱於外能和之汗自出而解矣此溫能除大熱之至理也熱極生風乃左遷入地補母以虛其子使天道右遷順行諸病得天令行而必愈二也況大熱在上其大寒必伏於內溫能退寒以助地氣地氣者在人乃胃之生氣使真氣旺三也此與熱因寒用寒因熱用必伏其所主而先其所因治法理同而證不同學者最宜深玩治虛熱滋陰之劑楊氏秦艽扶羸湯治肺痿骨蒸成勞或嗽或寒或熱聲嗄不出體虛自汗四肢怠惰柴胡二錢人參鱉甲炙秦艽當歸地骨皮各一錢半半夏紫菀甘草各一錢上㕮咀水煎按此足少陽例藥又氣血之劑也局方當歸補血湯治肌熱躁熱目赤面紅煩渴引飲晝夜不息其脈洪大而虛重按全無此脈虛血虛也若誤服白虎湯必死宜此主之黃耆當歸上㕮咀水煎按此足三陰經藥也十味人參散治虛熱潮熱身體倦怠柴胡甘草人參茯苓半夏白朮黃芩當歸白芍葛根等分上㕮咀入薑煎按此足少陽陽明太陰經藥也瑞竹堂柴胡梅連散治骨蒸勞熱久而不痊三服除根其效如神及五勞七傷虛弱皆治胡黃連柴胡前胡烏梅各三錢上㕮咀每二錢童便一盞豬胋一枚豬脊髓一條韭根白半錢同煎至七分去渣溫服不拘時按此足少陽厥陰手少陰太陰經藥也出少陽例亦是劫劑元戎五蒸湯治骨蒸勞熱自汗甘草人參知母黃芩各二錢茯苓熟地黃葛根各三錢石膏半兩竹葉二十片上㕮咀作一服入粳米一合煎加減見本論按此足陽明手太陰手足少陰經藥也以上並氣血之劑升陽滋陰之劑局方十全大補湯治諸虛不足五勞七傷不進飲食久病虛損時發潮熱者白茯苓人參當歸白朮黃耆川芎肉桂白芍炒熟地黃甘草等分上㕮咀每服一兩入薑棗水煎按此手足三陰氣血藥也人參養榮湯治久病虛損口乾食少咳而下利心驚悸熱而自汗前方減芎加陳皮五味遠志上㕮咀入薑棗煎按此手足太陰藥氣血之劑也黃耆鱉甲散治男女虛熱身瘦五心煩熱四肢怠惰咳嗽咽乾自汗食少人參肉桂桔梗各一錢半生地黃半夏紫菀知母白芍黃耆甘草桑白皮各二錢半天門冬鱉甲各五錢秦艽茯苓地骨皮柴胡各三錢上㕮咀入薑煎每服一兩衛生寶鑑減桂芍地骨皮人參黃耆散按此手太陰例藥氣血之劑然氣亂於胸中為清濁相干者須加氣藥以理之又不必拘此如氣液衰陰血竭古方有兼用烏梅蛤蚧豬腎脊髓人屎等物皆其法也治風熱之劑川芎石膏湯方見中風門仙術芎散治風熱燥熱防風通聖中加菊花藿香砂仁減麻黃芒硝上為末每服一二錢按此足太陽陽明三陰經藥也寒熱之劑柴胡薑桂湯治寒熱自汗柴胡四錢桂枝黃芩乾薑甘草牡蠣各一錢半栝蔞根二錢上㕮咀水煎按此少陽例藥也桂枝麻黃各半湯治發熱惡寒便清不渴脈浮緊而澀方見傷寒例陽旦湯治身熱惡寒頭痛脈洪盛自汗桂枝湯加黃芩一兩按此並太陽例藥暑熱之劑局方黃連香薷飲按此手太陰少陰藥也東垣清暑益氣湯方並見暑門按此手足太陰少陰足陽明藥也濕熱之劑五苓散方見濕門東垣清燥湯方見痿門按此手足太陰氣血之劑也出太陽例火熱之劑黃連解毒湯按此手足太陽陽明少陰手太陰藥也當歸龍膽丸方並見火門按此足陽明厥陰手足太陰少陰藥也風濕熱之劑東垣羌活湯治身重或眩運麻木小便澀大便不調下焦痿軟不能行止羌活防風柴胡各一錢藁本獨活茯苓澤瀉豬苓黃耆甘草炙陳皮黃柏黃連蒼朮升麻川芎各半錢上㕮咀水煎按此疏風勝濕升陽之劑也出太陽茯苓澤瀉例治食熱之劑千金紫丸治飲食傷先寒後熱拔萃妙香丸方見風癇門丹溪越鞠丸治食鬱蒼朮神麯香附山楂醋炒針砂撫芎等分上為末糊丸後加減法為六郁例並附於下氣鬱香附蒼朮撫芎血鬱見血門濕鬱見濕門痰鬱海石香附栝蔞仁南星熱鬱香附撫芎青黛蒼朮按食傷發熱諸例宜於內傷門選用
