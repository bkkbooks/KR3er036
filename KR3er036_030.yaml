body:
  text: 卷三十牙齒門論牙齒諸痛所因東垣曰夫齒者腎之標口者脾之竅諸經多有會於口者其牙齒是也手足陽明之所過上齦隸於坤土乃足陽明胃之脈貫絡也止而不動下齦嚼物動而不休手陽明大腸之脈所貫絡也手陽明惡寒飲而喜熱足陽明喜寒飲而惡熱其病不一牙者腎之標亦喜寒寒者堅牢為病不同熱甚則齒動齦斷袒脫作痛不已故所治療不同也有惡寒作痛者有惡熱而作痛者有惡寒又惡熱而作痛者有惡寒飲少熱飲多而作痛者有惡熱飲少寒飲多而作痛者有牙齒動搖而作痛者有齒袒而為痛者有齒齦為疳所蝕缺少血出為痛者有齒齦腫起為痛者有脾胃中有風邪但覺風而作痛者又有牙上多為蟲所蝕其齒缺少而色變為蟲牙痛者有胃中氣少不能於寒袒露其齒作痛者有牙齒疼痛而穢臭之氣不可近者痛既不一豈可一藥而盡之哉按此論齒惡寒熱等作痛本手足陽明動搖齦脫本足少陰故此三經所主為多然齒袒蟲疳濕熱齦腫血出作痛痛而穢臭者皆胃熱火盛所致亦有諸經錯雜之邪與夫外因者故以上病機現證甚詳學者宜究其機而處治焉論牙痛分三因陳無擇云齒為關門腎之榮骨之餘也腎衰則齒豁精固則齒堅又大腸支脈在牙齦主灌注於牙大腸壅則齒為之浮大腸虛則齒露挾風則攻目頭面疳𧈟則齲脫為痔皆氣鬱而生諸證不同治之謹按頭面外冒風寒或口吸寒冷致牙痛者皆外因也實熱或陰虛火動骨蒸所致氣鬱血熱蟲疰皆內因也硬物所支打擊等致皆不內外所因也故諸證不同治之陳止言經病而不具三因者恐傅梓時脫簡爾論齒痛為風熱濕熱所致東垣曰劉經歷之內年三十餘病齒痛不可忍須騎馬外行口吸涼風則痛止至家則其痛復作家人以為祟神禱於巫師而不能愈病乃濕熱為邪也足陽明多血多氣加以膏粱之味助其濕熱故為此病因立一方不須騎馬常令風寒之氣生於齒間以黃連胡桐淚之苦寒新薄荷葉荊芥穗之辛涼四味相合而作風寒之氣治其濕熱為主以新升麻之苦平行陽明經為使牙齒骨之餘以羊䯒骨灰補之為佐麝香少許入肉為引用為細末擦之痛乃減半又以調胃承氣湯去硝加黃連以治其本服之下三兩行其痛良愈遂不復行按此論實熱例而合辛涼風劑蓋風能勝濕苦以泄熱也今世俗有以大戟芫花小麥椒細辛蒼耳熬湯熱嗽而牙痛立止者正同此例大抵人之牙齒致病實多內則氣鬱血熱骨蒸等因外則咀炙熱受寒冰鹹酸辛辣之味適口豈不漬搏耶且如以醋沃石則石為蘇況人之骨余者乎然雖經絡之喜寒熱氣不同所受病異者則豈全在標爾牙齒治法治風之劑局方細辛散治風蛀牙疼腮頷浮腫荊芥穗細辛各一兩砂仁半兩白芷紅椒草烏各二兩鶴蝨牙皂角蓽茇各半兩上為末每少許頻擦患處有涎吐之仍用水灌嗽按此手陽明足少陰厥陰藥也三因玉池散治風蛀牙疼腫癢動搖牙齦潰爛宣露出血口氣地骨皮白芷升麻防風細辛川芎槐花當歸藁本甘草等分上為末每用一字揩之痛甚取二錢水盞半黑豆半合薑三片煎嗽按此手足陽明厥陰藥也百一選方治風牙疼白芷一兩硃砂一分上為末煉蜜丸櫻桃大每一丸擦牙上按此手陽明之的藥也御藥院方獨活散治風毒牙疼牙根腫痛川芎獨活羌活防風各半兩細辛荊芥薄荷生地黃各二錢上㕮咀每三錢水煎漱咽按此足太陽厥陰少陰藥也元戎立效散治牙疼小椒露蜂房青鹽等分上為細末煎數沸熱嗽即止按此足少陰藥也東垣羌活散治風寒寒濕犯腦項筋急牙齒動搖肉齦袒脫疼痛苦楚麻黃去節三兩羌活一錢半柴胡半兩升麻蒼朮各半兩草豆蔻一錢防風三分半藁本三分細辛少許當歸身六分白芷桂各三分羊脛骨灰二錢半上為末先以溫水漱過擦之按此足三陽太陰藥也治寒之劑御藥院方丁香散治牙齒丁香蓽茇蠍梢大椒等分上為末每少許擦於患處按此足陽明太陰藥也萆薢散搐藥萆薢良薑胡椒細辛等分上為末每少許溫水隨痛處鼻內搐按此足少陰太陰藥也東垣白芷散治大寒犯腦牙齒疼痛麻黃草豆蔻各一錢半黃耆升麻各二錢吳茱萸白芷各四分當歸一錢藁本三分熟地黃一錢桂枝二分半羌活八分上為末先用溫水漱淨以藥擦之按此手足陽明太陽厥陰藥也治風熱之劑元戎胡桐淚散治足陽明經虛風熱所襲流傳牙齒攻注牙齦則致腫結妨悶甚者與齦間津液相搏化為濃汁宜用此藥胡桐淚石膽礬黃礬蘆薈升麻各半兩麝香亂髮灰各一錢硃砂細辛當歸身川芎牛膝各二錢半上為末先以甘草湯漱口後用藥少許敷之以常用少許擦牙去風熱消腫化毒牢固永無牙宣疳血之病按此足陽明厥陰藥也犀角升麻湯治陽明經受風熱口唇頰車連牙腫痛犀角七錢半升麻五錢防風羌活各三錢半川芎白芷白附子黃芩各二錢半甘草一錢半上㕮咀水煎服按此手足陽明太陽藥也治寒熱之劑東垣當歸龍膽散治寒熱停牙痛麻黃升麻黃連龍膽草草豆蔻各一錢白芷當歸尾骨灰各半兩生地黃五分上件為末擦之按此太陽陽明少陰厥陰藥也益智仁律散治寒熱牙疼草豆蔻二錢二分木律二分熟地黃益智仁骨灰各錢半升麻一錢半黃連當歸各四分上為末乾擦之如寒多不用木律按此足陽明厥陰藥也麝香散治熱多寒少牙露根肉齦脫血出齒動欲落大作疼痛妨食涼少忤熱多麻黃根一分草豆蔻黃連各一錢半升麻一錢益智仁二分半當歸生地黃漢防己酒製人參各三分熟地黃二分骨灰二錢麝少許上為抹擦之按此足陽明太陰藥也攻下之劑元戎調胃丸治齒痛血出不止上以謂胃承氣湯為末蜜丸服升麻丸治陽有熱攻注牙齒腫痛脈洪大而實細辛升麻防己羌活牽牛大黃上等分煉蜜丸桐子大每二十丸溫水臨睡服按此二方陽明例藥也論云病源有手陽明之支脈入於齒齒是骨之所終髓之所養若風冷客於經絡傷於骨髓冷氣入齒根則齒痛或胃與大腸俱熱大便祕結經絡壅滯而齒齦痛者治法不同也清胃涼血之劑東垣清胃散治因服熱藥使上下牙疼不可忍引頭腦滿面發熱大痛喜寒惡熱生地黃二分酒製升麻一錢牡丹皮半錢當歸三分黃連三分上作末為一服水煎冷服神功丸治多食肉人口臭不可近牙齒疳蝕牙齦肉將脫齒落血不止黃連酒製砂仁各半兩生地黃甘草各三錢藿香葉木香當歸身蘭香葉如無藿香葉代之各一錢升麻二錢上為末湯浸蒸餅丸如緑豆大每服百丸至二百丸白湯食遠服按此二方並陽明例藥也治蟲之劑祕方馬夜眼燒存性為末敷上立愈瑞竹堂方治蟲牙疼天仙子不以多少燒煙用竹筒抵牙引煙燻之其蟲即死謹按牙齦生蟲乃陽胃土濕熱甚而生也學者宜治其本補劑金匱八味丸治腎虛牙痛方見補虛門三因安腎丸治虛壅牙齒疼痛浮腫方見腰痛門按此二方並少陰例藥也取牙藥本事方取牙落不犯手草烏蓽茇各兩半川椒細辛各三兩上為末每少許揩在患處其牙自落謹按牙齒動搖多因陽明風熱或濕熱疳蝕牙齦坦露故久則動搖脫之漸也然亦宜求其本而治其內堅藥擦其外庶或有可安之意否則一以動搖取之非也況此藥太躁恐非所宜姑採之以備其例爾堅牙藥聖濟總録方治牙齒動搖黑錫半斤大鍋內化成汁入桑條灰柳木槌研合成砂以熟絹羅為末每日早辰揩牙溫水漱在盂內以水洗眼能明目黑鬚鬢食療云治牙動及血𧈟並瘥其齒堅牢皂角二錠鹽半兩上燒令赤細研夜夜用擦牙齒一月西嶽華峰方豬牙皂角及生薑西國升麻熟地黃木律旱蓮槐角子細辛荷葉要相當荷葉取心青鹽等分同燒煆研細將來用最良揩牙牢牙髭發黑誰知世上有仙方元戎麝香間玉散酸石榴皮訶子各二兩升麻緑礬枯何首烏青鹽百藥煎五倍子沒石子各兩半白茯苓一兩石膽礬細辛各半兩荷葉灰白檀川芎白芷甘松茯苓茴香藿香葉豬牙皂角灰木鱉子各二錢蓽茇青黛各一錢半麝香一錢腦子半錢上為末用藥後茶清漱又方無腦子加沉香二錢瑞竹堂方蒺藜散治打動牙齒蒺藜根一味燒灰貼動處東垣白牙散升麻一錢骨灰二錢白芷七分石膏一錢半麝香少許上為末先以溫水漱擦之按齒者骨之餘精氣所養然無病不可常擦蓋精氣腎氣反有所惡耳昔人有以苦參揩牙久病腰者腎受傷也此其鏗焉以上方宜隨證選用嚴氏香鹽散常用牢牙去風冷蛀齲宣露一切齒疾大香附子炒令極黑三兩青鹽半兩另研上為細末如常法擦用
