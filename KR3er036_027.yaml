body:
  text: 卷二十七喉痹門論喉痹為火熱所致原病式曰喉痹痹不仁也俗作閉猶閉塞也火主腫脹故熱客上焦而咽嗌腫脹也子和曰內經云一陰一陽結謂之喉痹王太僕曰一陰者手少陰君火心主之脈氣也一陽者手少陽相火三焦之脈氣也二脈並絡於喉氣熱則內結結甚則腫脹腫脹甚則痹痹甚而不通則死矣夫推原十二經惟足太陽別下項其餘皆湊於喉嚨然內經何為獨言一陰一陽結為喉痹蓋君相二火獨勝則熱結正絡故痛且速也豫謂一言可了者火是也故十二經中言嗌乾嗌痛咽腫頷腫舌本強皆君火為之也惟喉痹急速相火所為也夫君火者猶人火也相火者猶龍火也人火焚木其勢緩龍火焚木其勢速內經之言喉痹則咽與舌其兩間耳然其病同於火故不分也後之醫者各詳其狀強立八名曰單乳蛾雙乳蛾單閉喉雙閉喉子舌脹木舌脹纏喉風走馬喉閉熱氣上行故傳於喉之兩旁近外腫作以其形似是謂乳蛾一為單一為雙也其比乳蛾差小者名閉喉熱結於舌下復生一小舌子名曰子舌脹熱結於舌中舌為之腫名曰木舌脹木者強而不柔和也熱結於咽喉腫繞於外且麻且癢腫而大者名曰纏喉風喉痹暴發暴死者名曰走馬喉痹此八種之名雖詳若不歸之火則相去遠矣其微者可以咸耎之而大者以辛散之今之醫者皆有其藥也如薄荷烏頭殭蠶白礬朴硝銅緑之類也至於走馬喉痹何待此乎其生死人反掌之間耳其最不誤人者無如砭針出血血出則病已易曰血去惕出良以此夫昔豫治一婦人木舌脹其舌滿口諸醫不愈令以䤵針小而鋭者砭之五七度腫減三日方平計所出血幾至盈斗又治一男子纏喉風腫表裡皆作藥不能下豫以涼藥灌於鼻中下十餘行外以拔毒散敷之陽起石燒赤與伏龍肝各等分細末之日以新水掃百遍三日熱始退腫始消又嘗治一貴婦喉痹蓋龍火也雖用涼劑而不可使冷服為龍火宣以火逐之火者烹飪之火是也乃使爆於烈日之中登於高堂之上令侍婢攜火爐坐藥銚於上使藥常極熱不至大沸通口時時呷之百餘次龍火自散此法以熱行寒不為熱病扞扦格故也大抵治喉痹用針出血最為上策但人畏針委曲旁求瞬息喪命凡用針而有針創者宜搗生薑一塊調以熱白湯時時呷之則創口易合銅人中亦有灸法然痛微者可用病速者恐遲則殺人故治喉痹之火與救火同不容少待內經火鬱發之發謂發汗然咽喉中豈能發汗故出血者乃發汗之一端也後之君子母執小方而曰吾藥不動臟腑又妙於出血若幸遇小疾而獲效不幸遇大病而死矣母遺後悔可也論喉痹為傷寒所致龐氏曰經云伏氣之病古方謂之腎傷寒謂非時有暴寒中人伏毒氣於少陰經始衰不病旬月乃發脈微弱法當咽痛以傷寒非喉痹之病次必下痢謹按少陰傷寒一二日病乃不自太陽傳也因是經不足而卒中寒寒邪抑鬱內格陽氣為熱上行於咽門經會之處寒熱相搏而痛或成喉痹為醫不察脈證虛實即用寒涼之劑攻治卒致殞沒而患者自謂其分鳴呼冤哉殊不察少陰病咽痛及生瘡不能言聲不出者藥用甘苦辛溫制其標病以通咽嗌至若傷寒伏氣內發咽痛兼下利清穀裡寒外熱面赤脹微弱者用辛熱之藥攻其本病以順陰陽利止則水升火降而咽痛自無也此非雜病一陰一陽結為喉痹之比不可妄施針砭及寒涼之藥且夫火熱之動為病急速子和論治已詳然傷寒伏氣為病咽痛或腫本陰寒厥甚逼熱上行其喉為痹逼熱下行必便膿血此標熱而本寒也仲景自有治例故子和略之不議若是則火熱喉痹腫甚者急用藥吹點或刺少商合谷豐隆湧泉關衝等穴以解脈絡之結經者內與甘辛涼劑降火制其標本亦不可便用苦寒之藥攻治倘有內寒格熱為病吾恐反增其勢矣論喉痹為痰飲所致詳見痰飲門論喉痹為氣逆所致詳見氣門論喉痹為風燥所因陳無擇云風燥皆使喉痹咽腫則不能吞干則不能咽多因飲啖辛熱或復嘔吐咯傷致咽系乾枯之所為也與喉門自別又有懸門暴腫閉塞喉嚨亦如喉閉但懸壅在上齶俗謂鶯翁又謂之鵝聚俗語聲訛不可不備識喉痹治法點吹藥濟生二聖散治纏喉風急喉痹鴨嘴膽礬二錢半白殭蠶炒去絲嘴半兩上為末每用少許以竹管吹入喉中白礬散治急喉閉白礬一錢巴豆二個去殼作六瓣上將礬於銚內慢火熬化為水置巴豆其內候乾去巴豆取礬研為末每用少許吹入喉中立愈楊氏一字散治時氣纏喉風漸入咽塞水穀不下牙關緊急不省人事者雄黃研蠍梢白礬枯藜蘆豬牙皂角炙各等分上為末每用一豆大鼻內㗜之立效三因玉鑰匙治風熱喉閉及纏喉風焰硝一兩半硼砂半兩白殭蠶一錢腦子一字上研勻以竹管吹半錢許入喉中立愈或加雄黃二錢名金鑰匙宣劑三因解毒雄黃丸治纏喉風及喉痹卒然仆倒失音不出聲或牙關緊急者雄黃一兩巴豆去油十四個鬱金一錢上研醋糊丸緑豆大熱茶清下七丸吐出頑涎即蘇省未吐再服至如死者亦以物斡開口灌之下咽無有不活者吐泄些小不妨丹溪方用射干汁和逆流水吐之用桐油以鵝翎蘸探吐之用燈火油腳吐之治熱之劑局方龍腦雞蘇丸治上焦熱咽腫嗌痛方見熱門淡寮牛蒡子散治風熱上壅咽喉腫痛或生乳蛾牛蒡子研玄參升麻桔梗犀角黃芩木通甘草各等分上㕮咀每半兩水煎入生薑二片拔萃桔梗湯治熱腫喉痹桔梗甘草連翹梔子薄荷黃芩上為㕮咀入竹葉煎百一選方治咽喉腫閉出豆根洗淨新汲水浸少時上以一塊入口中含之咽下苦汁未愈再用治火之劑局方碧雪涼膈散方並見火門絳雪見下御藥院麝香硃砂丸治咽喉腫閉或作瘡或舌根腫痛者馬牙硝生用七錢鉛白霜三錢硼砂三兩龍腦三錢寒水石燒一斤麝香二錢硃砂一兩半甘草十兩熬膏上研極細用膏子和丸如桐子大硃砂為衣每含化一二丸一法減鉛霜麝甘草只五味名絳雪散龍麝聚聖丹治心脾客熱毒氣攻衝咽喉腫赤疼痛或成喉痹或結硬不消愈而復發經久不瘥或舌本腫脹滿口生瘡川芎一兩生地黃犀角屑羚羊角屑南琥珀南玄參連翹各半兩人參赤茯苓馬牙硝腦子麝香各三錢桔梗升麻鉛白霜研各半兩硃砂牛黃各研二錢南硼砂研一兩金箔五十片上為末煉蜜丸每兩作十丸金箔為衣以薄荷湯化下或細嚼或含化之按以上諸方有輕重之分宜隨證選用治風之劑局方如聖勝金錠子治咽喉急閉腮頷腫痛並單蛾雙乳峨結喉重舌木舌並皆治之硫黃細研川芎臘茶薄荷葉川烏炮硝石生地黃各等分上為末生蔥汁搜和為錠每服先用新汲水灌嗽次嚼薄荷五七葉卻用藥一錠同嚼極爛以井花水咽下甚者連進三服並含之即安本事方利膈湯治脾肺有熱虛煩上壅咽喉瘡腫薄荷葉荊芥穗防風桔梗人參牛蒡子炒甘草各等分上㕮咀每半兩食後水煎服治寒之劑仲景半夏湯治傷寒寒相搏咽痛或聲不出者半夏桂枝甘草炙等分上㕮咀每七八錢或半兩水煎放冷細細咽之按本論咽中傷生瘡不能言聲不出者少陰證用苦酒湯或桔梗等方皆可選用三因蜜附子治腑寒咽閉吞吐不利大附子一個去皮臍切作大片蜜塗炙令黃上每含咽津甘味盡更以附片塗蜜炙用治痰之劑王隱君礞石滾痰丸治痰熱咽嗌腫痛不利桔梗半夏湯治痰氣不降咽腫欲成喉痹者方並見痰飲門三因玉粉丸治寒痰壅結咽喉不利語聲不出者半夏洗五錢草烏一字炒桂一字上末生薑自然汁浸蒸餅丸如雞頭大每大人一丸至夜含化多年不愈亦有效針經中說寒氣客於會厭卒然如啞此藥主之
