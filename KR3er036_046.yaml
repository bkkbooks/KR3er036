body:
  text: 卷四十六霍亂門內經敘霍亂所因經曰歲土不及風乃大行云云民病飧泄霍亂體重腹痛筋骨繇並按此言土運不及木乃太過木乘土而為病宜詳玩本文論霍亂脈證內經曰脈伏者霍亂傷寒論曰病嘔吐而利名曰霍亂或發熱頭痛身疼惡寒吐利或自吐下又利止復更發熱也皆是霍亂證傷寒其脈微澀者本是霍亂今是傷寒卻四五日至陰經上轉入陰必利本嘔下利者不可治也保命集云傷寒霍亂轉筋身熱脈長陽明本病也脾胃受濕熱中焦氣滯或因冷飲或傷冷水或感濕氣冷熱不調水火相干陰陽相搏上下相離榮衛不能相維故轉筋攣痛經絡亂行暴熱吐瀉中焦胃氣所主也謹按傷寒傳變為霍亂者殊少惟夏秋之間暄熱人腠理疏感風濕暍之氣而生此證多有陰陽虛實不同脈來浮洪者可治微而遲氣少不語者為難治論霍亂分三因陳無擇曰霍亂者心腹卒痛嘔吐下利增寒壯熱頭痛眩暈先心痛則先吐先腹痛則先利心腹俱痛吐利並作甚則轉筋入腹則斃霍亂惡證無越於斯蓋陰陽反戾清濁相干陽氣暴升陰氣頓墜陰陽痞膈上下奔逸治之惟宜溫暖更詳別三因以調之外因諸風則惡風有汗傷寒則惡寒無汗胃濕則重著傷暑則熱煩內因九氣所致郁聚痰涎飲痞膈不通遂致滿悶隨其勝復必作吐利或諸飽食膾炙恣飧乳酪冰脯寒漿旨酒胃既䐜脹脾臟停凝必內郁發遂成吐利當從不內外因也按此具霍亂三因稍備但立方未能以盡其變學者自宜推格論霍亂轉筋陳氏曰轉筋者以陽明養宗筋屬胃與大腸今暴吐下津液頓亡外感四氣內積七情飲食甜膩攻閉諸脈枯削於筋宗筋失養必致攣縮甚則卵縮舌卷為難治按此言霍亂者多轉筋大抵冷熱不調陰陽相搏故筋攣痛甚者遍體轉筋此實陰陽之氣反戾風寒乘之筋失氣血所榮而為攣縮急痛也論乾霍亂陳氏曰乾霍亂者忽然心腹脹滿絞刺疼痛蟲毒煩冤欲吐不吐欲利不利狀若神靈所附頃刻之間便致悶絶亦涉三因或臟虛或腸胃素厚故吐利不行按此謂人腸胃素厚形氣實者故感四氣則吐利不行而干揮霍撩亂也大抵熱勝痰鬱則悶亂濕勝飲鬱則吐下形氣虛者禍不旋踵嚴氏謂胃中諸食結而不消陰陽二氣擁而反戾揮霍之間變成吐利然飲食致者亦有有餘不足如飲食自倍外感濕暍而乾霍亂者宜吐之或下之過傷者宜消導之痰者劫之寒者溫之熱者清之要在適事為故也論霍亂煩渴陳氏曰煩渴者以陰陽反戾清濁相干水與谷並小便祕澀既走津液腎必枯燥引水自救煩渴必矣按吐利必竭況腎水竭者乎與水者唯宜溫暖熱甚者天水輩以甘緩火也霍亂治例保命集云霍亂陽明證宜和中平胃建中輩或四君子湯脈浮自汗四君子加桂主之脈浮無汗四君子加麻黃吐利轉筋脅下痛脈弦者木剋土也故痛甚平胃加木瓜五錢或建中加柴胡木瓜吐利轉筋腹中痛體重脈沉而細者四君子加白芍良薑吐利四肢拘急脈沉而遲此少陰霍亂四君子加薑附厚朴吐利四肢厥冷脈微緩屬厥陰建中加歸附吐利頭痛而身熱熱多欲飲水者五苓寒多不用水者理中丸主之元戎云太陰證霍亂者理中加橘紅名治中湯若吐下心腹作痛手足逆冷理中去白朮加熟附名四順湯若吐利後轉筋者理中加火煆石膏一兩霍亂治法和中之劑四君子湯平胃散建中湯並治證見前方見虛損門治寒之劑機要漿水散治暴泄如水周身汗出盡冷脈弱不能語言甚者加吐半夏二錢附子乾生薑炙甘草桂各半錢良薑三分半上為末作一服漿水煎服之薑附湯治霍亂轉筋手足厥冷汗嘔逆多乾薑一兩附子一個生用通脈四逆湯治霍亂多寒身冷脈絶吳茱萸三兩炒附子炮一兩桂心通草細辛白芍甘草炙各半兩當歸三錢上㕮咀每服四錢水酒各半加生薑煎理中湯治過食生冷遂成霍亂吐下脹滿食不消心腹痛方見寒門加橘皮名橘皮治中湯嚴氏曰若臍上築動者腎氣動也去朮加桂吐多者去朮加生薑半夏利多者仍用術心悸者加茯苓腹痛者加乾薑腹滿者去朮加附子厚朴治濕之劑三因茯苓澤瀉湯治霍亂吐利後煩渴飲水五苓減豬苓加甘草按此太陽例藥也治暑之劑局方五苓散治霍亂頭痛吐下煩渴方見濕門嚴氏水浸丹治伏暑傷冷冷熱不調口乾煩渴黃丹一兩一分炒巴豆二十五個去皮心上同研勻用黃蠟作汁為丸如梧子大每服五丸以水浸少頃別以新汲水吞下按此劫劑也加味香薷飲治伏暑吐利不止煩悶多渴本方加檳榔黃連上㕮咀每服五錢水酒各半煎服冷香飲子治伏暑吐利煩躁草果仁三兩附子橘紅各一兩甘草半兩上㕮咀每服一兩入薑煎水旋冷服按以上並太陽例藥也有寒熱陰陽不同要在脈證相符而行也溫經之劑三因木瓜湯治霍亂吐下舉體轉筋入腹則悶絶乾木瓜一兩吳茱萸半兩茴香炙甘草各二錢上㕮咀每服四大錢入薑三片蘇葉十片煎按此陽明例藥也大抵轉筋亦有所兼之證不同用者自宜推格墜痰溫補之劑三因胃氣丸治憂思過度脾氣閉聚結痰飲留滯腸胃氣鬱於陰凝之於陽陰陽反戾吐利交作四肢厥冷頭目暈眩或復發熱硫黃不以多少入豬臟內縛定頭米泔酒童便各一碗煮乾一半取出洗去穢曬乾稱十兩用半夏洗去滑五兩人參白茯苓各一兩石膏上為末生薑汁浸炊餅為丸每五十丸至百丸空心食前米湯下理氣溫中之劑三因七氣湯治七氣發郁致臟氣刑剋陰陽反戾變成吐利交作寒熱眩暈痞滿咽塞半夏五錢厚朴桂心各三錢茯苓白芍紫蘇橘皮各二錢人參一錢上㕮咀每服四五錢入薑棗煎訶子散治心脾冷痛霍亂吐利如神訶子甘草炙厚朴制乾薑草果陳皮良薑茯苓神麯炒曲各等分上為末每服二錢入鹽些小水煎服按以上並足陽明經藥也消食之劑三因紅丸子治脾胃虛冷飲食失節宿食留飲聚癖腸胃或因食不調沖冒寒濕忽作霍亂吐利並作心腹絞痛蓬朮三稜各二兩同用米醋炙一伏時胡椒一兩青皮三兩炒阿魏一分上為末化阿魏入陳米粉為丸如梧子大硃砂為衣每服百丸至二百丸不拘時生薑甘草湯下雜方嚴氏洗法治霍亂轉筋蓼一把去兩頭水三升煮二升放溫熏洗漬法治霍亂轉筋入腹鹽多用煎湯於槽中暖漬之三因吐法治乾霍亂蠱毒宿食不消積冷心腹煩滿鬼氣極鹹鹽湯三升熱飲一升刺口令吐宿食便盡不吐更服吐訖復飲三吐乃止此法大勝諸治俗人以為田舍淺近鄙而不用守死而已凡有此證即先用之元戎云吐定用理中湯灸法治霍亂已死腹中有暖氣者鹽內臍中灸二七壯
