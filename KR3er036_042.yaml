body:
  text: 卷四十二破傷風門論破傷風表裡中治法病機云破傷風者同傷寒證治通於表裡分別陰陽有在表有在裡有在半表半裡者在裡宜下在表宜汗在表裡之間宜和解不可過其治也故表脈浮而無力者太陽也脈長而有力者陽明也脈浮而弦小者少陽也若明此三法而施治不中病者鮮矣原病式云夫破傷中風之由者因瘡熱甚鬱結而榮衛不得宣通怫熱因之遍體故多白痂是時瘡口閉塞氣難通泄熱甚則生風也不已則表傳於裡亦猶觸冒傷寒怫熱鬱甚不解則表傳於裡者也但有風熱微甚兼化故殊異矣大法破傷中風風熱燥甚怫鬱在表而裡氣尚平者善伸數缺筋脈拘急或時惡寒或筋惕而搐脈浮數而弦也宜以辛熱治風之藥開沖結滯而愈猶傷寒表熱怫鬱而以麻黃湯辛熱發散者也凡用辛熱開衝風熱結滯宜以寒藥佐之則良免致藥中病而風熱轉甚也如治傷寒發熱用麻黃桂枝加黃芩石膏知母之類是也若世以甘草滑石蔥豉寒藥發散甚妙若表不已漸傷入裡裡又未太甚而脈在肌肉者宜以退風熱開結滯之寒藥調之或微加治風辛熱亦得猶傷寒在半表半裡而以小柴胡和解之也若裡熱已甚而舌強口噤項背反張驚搐惕搦涎唾稠黏胸腹滿塞而或便溺閉結或時汗出脈洪數而弦也然汗出者由風熱鬱甚於里而表熱稍罷則腠理疏泄而心火熱甚故汗出也法宜除風散結寒藥下之後以退風熱開結滯之寒藥調之而熱退結散則風自愈矣凡治此亦宜按摩導引及以藥斡開牙關勿令口噤使粥藥得下也按此論表裡中脈病證治至為詳盡前人所未論也論破傷風所因不同病機云破傷風者有因卒暴傷損風襲之間傳搐經絡至使寒熱更作身體反張口噤不開甚者邪氣入臟有因諸瘡不瘥榮衛虛肌肉不生瘡眼不合風邪亦能外入於瘡為破傷風之候有諸瘡不瘥舉世皆言著灸為上是謂熱瘡而不知火熱客毒逐經諸變不可勝數微則發熱甚則生風而搐或角弓反張口噤目斜亦有破傷不灸而病此者因瘡著白痂瘡口閉塞氣難通泄故陽熱易為鬱結熱甚則生風也按此論所因有四二者因瘡口入風似屬外因一者因灸逐熱似屬不內外因一者因瘡口閉塞內熱生風似屬內因也謹按破傷風證古方藥論甚少豈非以此疾與中風同論故不另立條目也唯河間論傷寒表裡中三法同治用藥甚詳其言病因有因外傷於風有因灸及內熱所作者然與中風相似也但中風之人尚可淹延歲月而破傷風者犯之多致不救蓋中風有在經在腑在臟之異獨入臟者最難治破傷風或始而出血過多或瘡早閉合瘀血停滯俱是血受病血屬陰五臟之所主故此風所傷始雖在表隨即必傳入臟故多死也又此病或瘡口坦露不避風寒而無所傷或瘡口閉合密避風邪而反病此或病已十分安全而忽有此大抵皆由內氣虛而有鬱熱者得之若內氣壯實而無鬱熱者雖傷而無所害也破傷風治法治表之劑病機羌活防風湯治邪初在表羌活防風甘草川芎藁本當歸芍藥各四兩地榆細辛各二兩上㕮咀每五錢水煎熱服無時熱則加大黃黃芩各二兩防風湯治破傷風同傷寒表證未傳入裡急宜服之防風羌活獨活川芎等分上㕮咀每五錢水煎服宜調蜈蚣散大效按以上二方並三陽經藥也蜈蚣散蜈蚣一對鰾三錢上為細末用防風湯調下如表解不已覺轉入里常服左龍丸即後江鰾丸四味是也蜈蚣散治里和至愈可服蜈蚣一對鰾五錢左盤龍五錢炒煙盡野鴿糞是也上為細末每服一錢清酒調下治里至愈可服但有里證不可服次當下之用蜈蚣散四錢巴豆霜半錢燒飯為丸如緑豆大每服一丸加至六七丸清酒調蜈蚣散少許送下宣利為度發表雄黃散里和至愈可服雄黃一錢防風二錢草烏一錢上為細末每服一字溫酒調下天麻雄黃散治表天南星三錢半夏天麻各五錢雄黃二錢半上為細末每服一錢溫酒調下如有涎加大黃為下藥三因防風散治風入瘡口項強牙關緊急欲死又名玉真散防風天南星炮各等分上為末每服三錢童子小便一大盞煎七分熱服香膠散治破傷風口噤直強魚膠燒七分存性上研細入麝香少許每服二錢酒調下不飲米湯下一方以蘇木煎湯下元戎治破傷風欲死者川烏南星半夏並生天麻去蘆各等分上為細末每服一錢豆淋酒調下稍溫服次以酒一二盞投之治破傷風蠍梢七條為細末熱酒調下按此以上八方並厥陰例藥也治半表半裡之劑病機羌活湯治半在表半在裡羌活菊花麻黃川芎石膏防風前胡黃芩細辛甘草枳殼白茯苓蔓荊子各一兩薄荷白芷各半兩上㕮咀每服五錢水煎入生薑五片熱服日二三次按此三陽經藥也地榆防風散治破傷風半在表半在裡頭微汗身無汗不可發汗宜表裡治之地丁草馬齒莧地榆防風各等分上為細末每服三錢溫米湯調下治里之劑病機大芎黃湯治破傷風臟腑小便赤自汗不止者川芎羌活黃芩大黃各一兩上㕮咀五七錢水煎溫服臟腑和為度按此三陽經藥此自汗乃里實也如陽明病汗多急下之江鰾丸治破傷風驚而發搐臟腑祕澀知病在裡可用此下之江鰾銼燒半兩野鴿糞半兩炒雄黃一錢白殭蠶半兩蜈蚣一對炙天麻一兩只用前四味名左龍丸上為細末分作三分將二分燒飯為丸桐子大硃砂為衣將一分入巴豆霜一錢用和亦以燒飯為丸如桐子大不用硃砂為衣每服硃砂為衣二十丸入巴豆藥一丸第二服二丸加至利為度再服硃砂為衣藥病愈即止按此厥陰例藥也治汗之劑病機白朮防風湯治服發表藥過有自汗者白朮黃耆各一兩防風二兩上㕮咀每服五七錢水煎溫服無時臟腑和而自汗者可服此藥若臟腑祕小便赤自汗者無寒也宜速下之用大芎黃湯按此手少陽足陽明太陰太陽經藥也白朮湯治破傷風大汗不止筋攣搐搦白朮葛根各一兩升麻黃芩各半兩芍藥二兩甘草二錢半上㕮咀每服一錢水煎溫服無時按此陽明太陰經藥也理血之劑養血當歸地黃散治病日久氣血漸虛邪氣入胃養血為度當歸地黃芍藥川芎藁本防風白芷各一兩細辛上㕮咀水煎服按此厥陰四物例藥也雜方如聖散方見中風門一方本藥內加兩頭尖二兩
