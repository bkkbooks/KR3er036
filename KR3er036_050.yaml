body:
  text: 卷五十小兒門論色脈法脈經曰小兒四五歲脈呼吸八至細數者吉小兒脈呼吸八至者平九至者傷十至者困診小兒脈法多雀關要以三部脈為主若緊為風癇沉者乳不消弦急者客忤氣小兒是其日數應變蒸之時身熱而脈亂汗不出不欲食食輒吐哯者脈亂無苦也小兒脈沉而數者骨間有熱欲以腹按冷清也小兒大便赤青瓣飧泄脈小手足寒難已脈小手足溫易已小兒病困汗出如珠著身不流者死小兒病其頭毛皆上逆者必死耳間青脈起者瘈痛小兒病而腮限其口唇乾目皮反口中氣出冷手足四垂其臥如縛掌中冷皆死不治脈訣啓蒙曰凡診小兒脈當大指按三部一息六七至為平和八九至為發熱五至為內寒弦脈為風癇沉緩為傷食促急為虛驚弦急為氣不和沉細為冷浮為風大小不調為鬼祟浮大數為風熱伏結為物聚單細為疳癆風腸痛多喘嘔而脈洪為有蟲浮而遲潮熱者胃寒也按此本錢氏脈法也頗詳虎口脈歌曰紫風紅傷寒青驚白色疳黑時因中惡黃即困脾端按全嬰等書云小兒三歲以前虎口第二指上寅卯關有脈紋見者可驗病狀男左女右視之脈紋從寅關起不至卯關者病易治若連於卯關者有病難治如寅連卯卯侵過辰關者十難救一若脈紋小或短者病易治也宜參視之錢氏曰面上證左腮為肝右腮為肺額上為心鼻為脾頦為腎赤者熱也隨證治之目內證赤者心熱導赤散主之淡紅者心虛熱生犀散主之青者肝熱瀉青丸主之淺淡者補之黃者脾熱瀉黃散主之無精光者腎虛地黃丸主之潔古曰青是腹痛桂芍藥潔古曰肝病面白肺病面赤脾病面青腎病面黃心病面黑若肝病驚搐而又加面白痰涎喘急之類此皆難治余皆仿此推之叔和云春得秋脈定知死亦此意也按錢氏云者本病也潔古則兼勝已制化言之故後五臟形證不容不辨也論五臟形證虛實所主錢氏曰肝主風實則目直大叫呵缺項急頓悶虛則咬牙多缺氣熱則外生氣溫則內生肝熱手尋衣領及亂捻物瀉青丸主之壯熱飲水喘悶瀉白散主之肝有風目連札不搐得心熱則搐治肝瀉青丸治心導赤散風甚身反張直不搐心不受熱也當補腎治肝肝有熱目直視不搐得心熱則搐治與有風同凡病或新或久皆引肝風風動而止於頭目目屬肝風入於目上下左右如風吹不輕不重兒不能任故目運札也若熱入目牽其筋脈兩眥俱緊不能轉視故目直也若得心熱則搐以其子母俱有實熱風火相搏故也潔古曰肝主謀勇熱則尋衣捻物目連札直視不能轉視或極則身反強直折皆風熱也目者肝之竅屬木木性急故如是錢氏曰心主驚實則叫哭發熱飲水而搐虛則困臥悸動不安心病多叫哭手足動搖驚悸心氣熱則心胸亦熱欲言不能而有就涼之意故合面臥心熱視其睡口中氣溫或合面睡及上竄搖頭咬牙皆心熱也導赤散主之心實則氣上下澀合臥則氣不得通故喜仰臥則氣得上下通也瀉心湯主之錢氏曰脾主困病則困睡泄瀉不思食實則困睡身熱飲水虛則吐瀉生風肺主喘實則悶亂喘促有飲水者有不飲水者虛則哽氣長出氣肺熱手掐眉目鼻面肺盛復有風冷胸滿短氣氣急喘嗽上氣當先散肺後散風冷肺只傷寒則不胸滿肺虛熱唇深紅色治之散虛熱肺臟怯唇白色當補若悶亂氣粗喘促哽氣者難治肺虛損故也脾肺病久則虛而唇白脾者肺之母也母子皆虛不能相營故名曰怯肺主唇白白而澤者吉如枯骨者死潔古曰肺主氣燥熱則壯熱飲水喘悶鼻乾燥手捫眉面瀉白散胸滿短氣氣急喘嗽上氣皆是肺氣有餘復感風邪之所傷謂之微邪先瀉而復發散之錢氏曰腎主虛無實也惟瘡疹腎實則黑陷腎虛兒本虛怯由胎氣不成則神不足目中白睛多其顱即解自問也面色㿠白此皆難養縱長不過八八之數若恣色欲多不及四旬而亡或有因病而致腎虛者非也又腎氣不足則下竄蓋骨重惟欲墜下而縮身也腎水陰也腎虛則畏明宜補之潔古曰下竄者腎氣不足兩足熱不喜衣覆足然此者臍以下皆腎之所主緣心氣下行於腎部也此乃腎不足而心有餘宜地黃丸論五臟相勝虛實之邪錢氏曰五臟相勝輕重肝臟病見秋木旺肝強勝肺也宜補肺瀉肝輕者肝病退重者唇白而死肺病見春金旺肺勝肝當瀉肺輕者肺病退重者目淡青必發驚更有赤者當搐為肝怯當目淡青色也心病見冬火旺心強勝腎當補腎治心輕者病退重者下竄不語腎怯虛也腎病見夏水勝火腎勝心也當治腎輕者病退重者悸動當搐也脾病見四旁皆仿此治之順者易治逆者難治脾怯當面目赤黃五臟相反隨證治之又曰如肺病又見肝證咬牙多呵缺者易治肝虛不能勝肺故也若目直大叫哭項急煩悶者難治蓋肺病久則虛冷肝強實而反勝肺也視病之新久虛實虛則補母實則瀉子潔古曰肝勝肺則肝病身熱發搐又見肺虛喘而氣短病見於申酉戌時是肝真強也內經曰受所制而不能制謂之真強法當補脾肺而後瀉肝導赤散瀉黃散肺勝肝則肺病喘嗽氣盛見於寅卯辰時木之位又以見肝怯少力正為鬼賊所克法當補肝瀉肺若肺病嗽久虛羸無實不得瀉肺只宜用地黃丸補之不可服瀉白散何謂也經云虛則補實則瀉之按此謂五臟相勝病機不離五行生剋制化之理者蓋小兒初在襁褓未有七情六欲只是形體脆弱血氣未定腑臟精神未完所以有臟氣虛實勝乘之病但世俗不審此理往往遇是率指為外感內傷而用藥致枉死者多矣悲夫矧錢論脫略幸而潔古補之今特參附誠所謂無窮之惠也潔古曰五臟子母虛實鬼賊微正若不達旨意不易得而入焉在前者為實邪子能令母實拒鬼賊不敢傷於母其子又引母所克者妻相助故曰實邪也在後者為虛邪母引子之鬼賊至由此母能使子虛也內經曰子能令母實每能令子虛此之謂也妻來乘夫為微邪未來乘妻為賊邪法當瀉鬼補本臟本臟自病為正邪法當虛則補之實則瀉之內經曰滋苗者必固其根伐下者必枯其上逆其根則伐其本伐其本則敗其真矣按此以五行生剋之道論也義見難經五十難及後五臟治要論宜參考之心主熱自病或大熱瀉心湯主之實則煩熱黃連瀉心湯主之虛則驚悸生犀散主之肺乘心微邪喘而壯熱瀉白散肝乘心虛邪風熱煎大羌湯下大青丸脾乘心實邪泄瀉身熱瀉黃散腎乘心賊邪恐怖惡寒安神丸按乘者猶乘車之乘也大抵五臟之病相乘伏匿隱顯莫測以上但言本病乘勝之道故以五臟治要附於左宜參考焉凡心臟得病必先調其肝腎兩臟腎者心之鬼肝氣通則心氣和肝氣滯則心氣乏此心病先求於肝清其源也五臟受病必傳其所勝水能勝火則腎之受邪必傳於心故先治其腎逐其邪也故其退腎也益肝氣兩方或診其脈肝腎兩臟俱和而心自生疾然後察其心家虛實治之肺主燥自病則喘嗽燥則潤之實則喘而氣盛瀉白散虛則喘而少氣先益黃散而後阿膠散心乘肺賊邪熱而喘嗽先地黃丸中導赤散後阿膠散肝乘肺微邪惡風眩冒昏憒嗽羌活散腎乘肺實邪增寒嗽清利百部丸脾乘肺虛邪體重吐痰泄瀉嗽人參白朮散凡肺之得疾必先觀心之虛實若心火炎盛鑠金即當先抑心氣後吃肺藥若心氣和即更看脾脈若脾氣虛冷即不能相生而肺家生氣不足則風邪易感故患肺寒者皆脾虛得之若脾氣盛實則亦痞膈中焦而大腸與肺表裡不能相通夫中焦熱隔則肺大腸不通其毒熱之氣必上蒸於肺而生疾故患肺熱者多脾實得之心氣盛瀉之脾氣虛者益之脾氣實者通之然後隨其肺之寒熱以治之故有抑心氣益脾氣通脾氣三藥若診其脈氣心脾兩臟俱和而肺自生疾則但察肺家虛實而治之肝主風自病則風搐拘急肝苦急急食甘以緩之佐以酸苦以辛散之實則風搐力大瀉青丸虛則風搐力少地黃丸心乘肝實邪壯熱而搐利驚丸涼驚丸主之肺乘肝賊邪氣盛則前晨呵缺微搐法當瀉肺先補本臟補肝地黃丸主之瀉肺瀉白散主之脾乘肝微邪多睡體重搐先當定搐瀉青丸主之搐止再見後證則別立法治之腎乘肝虛邪增寒呵缺搐羌活膏凡肝得病必先察其肺腎兩臟根其病之所起然後復其肝家本臟之虛實方可治療然腎者肝之母金者木之賊今肝之得病若非腎水之不能相生必是肺金之鬼來相攻擊不得不詳審而求之故其來在肺先治其肺攻其鬼也其來在腎先補其腎滋其根也然後審其肝家本臟之虛實而寒溫之脾主濕自病則泄瀉多睡體重昏倦脾苦濕急食苦以燥之實則泄瀉赤黃睡不露睛瀉黃散虛則泄瀉白色睡露睛白朮散肝乘脾賊邪風瀉而嘔茯苓半夏湯主之心乘脾虛邪壯熱體重而瀉羌活黃芩蒼朮甘草湯主之肺乘脾實邪能食不大便而嘔嗽煎檳榔大黃湯下葶藶丸腎乘脾微邪惡寒泄理中丸之類凡脾之得病必先察其肝心兩臟之虛實根其源之所起然後救療蓋肝是脾之鬼心是脾之母肝氣盛則鬼勝心氣虧則脾家生氣不足盛者抑之則退虧者益之則不乏故有抑肝氣益心氣兩藥診其脈肝心兩臟俱和則是脾自生疾察其虛實而治腎主寒自病則足脛寒而逆人之五臟惟腎無實小兒瘡疹變黑啖則是腎實水克退心火是以水能制火也心乘腎微邪內熱不惡寒桂枝丸肺乘腎虛邪喘嗽皮澀寒百部丸肝乘腎實邪拘急氣搐身寒理中丸脾乘腎賊邪體重泄瀉身寒理中丸本臟虛弱是自己正令不行乃鬼賊之所克害當補本臟之正氣假令肺病喘嗽時於初春見之法當補腎見於夏救肺見於秋瀉肺見於冬補心瀉本臟乃名寒嗽大抵五臟各至本位即氣盛不可更補到所克位不可更瀉五行之間惟腎之一臟母盛而子反受邪而物之性有不可一概論者肺腎是也何則肺屬金射於皮毛所主者氣腎屬水主於骨髓所藏者精氣之輕浮能上而不能下精之沉重能下而不能上此物性之然今肺之盛蓋熱之作也氣得熱而上蒸則肺不能下生於腎而腎受邪矣急食涼藥解之使臟氣溫和自能下生於腎此腎之病必先求之於肺若肺臟安和而腎忽然受病者不過脾之濕相刑于腎而生疾所以有解肺熱去脾邪兩藥若脾肺兩臟俱和而腎自生疾亦察其本臟而治之論外感風寒錢氏曰傷風貪睡口中氣熱呵缺頓悶當發散與大青膏解不散有下證當下大黃丸大飲水不止善食者可微下余不可下也傷風手足冷脾臟怯也當先和脾後發散和解傷風自利脾虛怯也傷風腹脹脾虛也補脾必不喘後發散仍補脾去脹踏氣丸傷風兼臟兼心則驚悸兼肺則悶亂喘息哽氣長出氣嗽兼腎則畏明各隨補母臟虛見故也肝外感風呵缺頓悶口中氣熱當發散若能食飲水不止當微下之餘不可下謹按傷風亦有六經不止詳見傷風門潔古曰小兒外傷於風秋冬用溫熱藥春夏用涼寒藥若大熱飲水能食不大便用大黃丸作散子服之如身表無大熱而小便不利是為有濕熱結膀胱仍用勝濕藥白朮茯苓之類利小便則其熱自退如清便自調慎不可妄下恐外熱逐於內而變結胸危證多矣又曰傷寒依四時陰陽升降順剛柔而施治氣升則順發之氣收則下之有汗發熱惡風脈浮緩者風傷衛桂枝湯無汗發熱惡寒不當風而自增寒脈浮緊者寒傷榮麻黃湯有汗發熱惡風脈浮緊無汗惡寒脈浮緩謂之榮衛俱傷青龍湯桂枝麻黃各半湯無汗發熱不惡風寒脈沉洪者可下之更詳認其厥與不厥量寒熱淺深而治之有汗四肢厥脈沉微者名陰厥四逆湯無汗四肢厥脈沉滑者名陽厥大承氣湯加膩粉如四肢不厥身熱內外皆陽不動涼藥三五服下之論諸熱證病本不同全嬰方論曰夫潮熱者發歇有時或血氣盛實臟腑生熱或傷寒時疫觸受邪氣陰陽相勝也驚熱顛叫恍惚夜熱夕發旦止餘熱者寒邪未盡或傳經之遺熱也食熱者肚背先熱疳熱者骨蒸盜汗壯熱一向不止錢氏云不已甚則發驚癇也煩熱心躁不安喘粗甚則發癇也積熱頰赤口瘡下盛則腰腿癰腫表裡實則身熱便澀虛則汗下後仍熱也風熱汗出身熱呵缺面赤虛熱困倦少力其有久嗽久瀉久痢久血久瘧以致諸疾之後成者皆虛熱也客熱來去不定為陽邪干於心也心受邪則熱形於額故先起頭面身熱多驚由真氣虛而邪氣勝也癖熱涎嗽飲水由乳食不消伏結於中致成癖塊也或痰嗽而驚或嘔逆不定日中咨煎夜則啼叫乍熱乍涼如潮熱也寒熱者如瘧狀陰陽相勝也先寒而後熱陽不足先熱而後寒陰不足寒多而熱少陰勝陽也熱多而寒少陽勝陰也寒熱相半陰陽交攻也血熱者每日己午間發熱過夜則涼疹熱耳鼻尖冷錢氏曰胎熱者生下有血氣時叫哭身熱如淡茶色目赤大便赤黃糞稠急食乳浴法主之按以上辨諸證可謂詳悉但血熱證東垣謂夜則發熱晝則明瞭此血熱也蓋晝陽夜陰也食熱者手心熱噯氣吐乳嘔吐者多宜隨證推格兼玩本文論變蒸身熱全嬰方論曰夫變蒸者以長氣血也變者上氣蒸者體熱變蒸有輕重輕者體熱虛驚耳冷微汗唇中白泡狀如珠子重者寒熱脈亂腹疼啼叫不能乳食輒吐哯其輕者三日重者五日古法以黑散子紫丸子主之其有不熱不驚或無證候暗變者多矣蓋受胎氣壯實故也按本論注云嘗考錢氏與寶鑑論變蒸互說差殊錢氏云一變腎二變膀胱三變心四變小腸五變肝六變膽七變肺八變大腸九變脾十變胃故稱水數一先變也寶鑑云初變肝二變肺三變心四變脾五變腎二者所論皆五行顛倒相生者卻逢相剋相剋者又逢相生大抵陰陽造化相生者順相剋者逆變蒸者是長養血氣滋榮五臟相生之法此理昭然相生者有母子之道相剋者有夫婦之義相生所以相繼相剋所以相治原夫胎者得水火既濟陰陽造化五行相治而成形故始於腎氣之初生也小兒變蒸者當陰陽升降從五臟相繼而成人故始於肝之初變也雖二說互有所長大抵小兒所稟胎氣壯怯不同況所變之證不一古方用以上二藥非本病通變法也故不録論傷寒瘡疹同異錢氏曰傷寒男體重面黃女面赤喘急憎寒口中氣熱呵缺頓悶項急也瘡疹則腮赤躁多噴嚏悸動昏倦四肢冷傷寒當發散之治疹行溫平有大熱者解毒余見前說潔古曰凡傷風則皮澀拘急鼻塞癍疹則睡中發驚悸呵缺嚏噴是為易識矣論急慢驚風錢氏曰急驚因聞大聲或大驚而發搐發過則如故此無陰也當下利驚丸主之此證本因熱生於心身熱面赤引飲口中氣熱大小便黃赤劇則搐也蓋熱甚則風生風屬肝此陽盛陰虛也故利驚丸主之以除其痰熱不可與巴豆及溫藥大下之恐搐虛熱不消也小兒熱痰容於心胃因聞聲非常則動而驚搐矣若熱極雖不聞聲及驚亦自發搐慢驚因病後或吐瀉脾胃虛損遍身冷口鼻氣出亦冷手足時瘛瘲昏睡露睛此無陽也栝蔞湯主之凡急慢驚陰陽異證切宜辨而治之急驚合涼瀉慢驚合溫補如不分別則誤甚矣閻孝忠曰急慢驚風古人無之惟曰陰陽癇陽動而速故陽病曰急驚陰靜而緩故陰病曰慢驚此陰陽虛實寒熱之別治之不可誤也急驚猶有熱熱即生風又或因驚而發則目為連札涎潮搐搦身體口中氣皆熱及其發定或睡起即了了如故此急驚證也當其搐熱漸減食與鎮心退熱藥候定以藥即下其痰熱心神安寧即愈慢驚得大病之餘吐瀉之後或誤取轉泄致脾胃虛損風邪乘之似搐而不甚搐似睡而不似睡四肢與口中氣皆冷睡露睛或胃痛而啼哭如鴉聲此則危證脾胃虛損故也潔古曰急驚陽證也俱腑受病爾小兒客痰熱於心膈是少陽相火旺經云熱則生風因聞大聲而作蓋謂東方震卦得火氣而發搐火本不動得風而動當用利驚丸導赤散瀉青丸地黃丸主之搐止服安神丸慢驚陰證也俱臟受病爾蓋小兒吐瀉病久脾胃虛損若不早治則成慢驚名曰瘛瘲似搐而不甚搐也因脾胃虛損故大便不聚當去脾間風先以宣風散導之後用使君子丸益黃散則其利自止既已失治則脾肺俱虛致被肝木所乘是為慢驚也當用溫補羌活膏全嬰方云驚證因風則目青面紅發搐因驚其病在心忽然叫聲發搐因食則其證噯吐氣即發搐皆陽癇也肺胃經虛則生黏痰痰者肺胃所出也痰則凝滯在於咽喉如牽鋸之聲時復瘛瘲或因吐瀉所致脾虛則肺亦虛涎痰流溢其證亦然皆陰癇也身熱脈浮精神恍惚或吐或瀉不思乳食發搐即是半陰半陽合病身涼脈沉精神倦怠不吐不瀉又能乳食發搐者亦是半陰半陽合病正如傷寒半是表半是里也亦有急驚涼瀉而不愈或與吐下藥太過發為慢驚慢驚溫補而不愈變為急驚互相更變者多矣按以上諸家所論殆盡證治之要矣但錢云慢驚用栝蔞湯恐傳寫誤耳大抵驚主風木甲木屬陽腑病故急易治乙木屬陰臟病故慢難治如大人驚恐即後泄蓋甲木克戊土也況小兒五臟之氣未實神氣未完而自病乎證非病後及吐瀉脾胃虛損得者中有夾火夾熱夾痰夾食病因不同至風邪內陷入腑入臟亦與外中風相似故治此者當本錢氏虛實補瀉法則不致犯禁之誤藥有太過不及之失論發搐有風有熱有痰有食補瀉不同驚癇發搐錢氏曰男發搐目左視無聲右視有聲女發搐目右視無聲左視有聲相勝故也潔古曰男為木左視木位右視金位相擊則有聲男反右視女反左視亦皆有聲早晨發搐錢氏曰因潮熱寅卯辰時身體壯熱上視手足動搖口內生熱涎項頸急此肝旺當補腎治肝也潔古曰潮熱於寅卯辰木之位是肝旺也當補水以制心火瀉肝木以止其搐日午發搐錢氏曰因潮熱已午未時發搐心神驚悸目上視白睛赤色牙關緊口內涎手足動搖此心旺也當補肝治心潔古曰已午未火之位而發潮搐者心熱也導赤散及涼驚丸日晚發搐錢氏曰因潮熱申酉戌時不甚搐而喘目微邪視身體似熱睡露睛手足冷大便淡黃水是肺旺當補脾治心肝潔古曰肺之位而肝強法當補脾恐被木之賊所克害先瀉心肝以銼其勢瀉心導赤散瀉肝瀉青丸而後補脾益黃散夜間發搐錢氏曰亥子丑時不甚搐而臥不穩身體溫壯目睛緊斜視喉中有痰大便銀褐色乳食不消多睡不省補脾治心導赤涼驚主之潔古曰皆因大病之後脾胃虛損多有此疾法當補脾涼心傷寒後發搐錢氏曰傷風后得之口中氣出熱呵缺頓悶手足動搖當發散大青膏主之小兒本怯者多此病也潔古云因傷風而得以上證者同大人傷風寒之類當辨有汗無汗陰陽二證用大青膏仲景小續命之類開發則愈傷食後發搐錢氏曰因食得之身體溫多唾多睡或吐不思食而發搐當先定搐搐退白餅子下之後與安神丸潔古曰傷食發搐謂不因他病忽然而搐此因飲食過度致損脾胃故見多睡或吐不思飲食脾胃既虛引肝風則發搐當先定其搐加羌活防風煎下瀉青丸後用白餅子下其食漸漸用調中丸異功散養其氣百日內搐錢氏曰真者不過三兩次必死假者發頻不為重真者內生驚癇假者外傷風冷蓋血氣未實不能勝任乃發搐也欲知假者口中氣出熱也治之可發散大青膏及用塗囟浴體法錢氏曰惟癍疹能作搐風火相爭故也治當瀉心肝補母雜病目赤兼青者欲發搐咬牙甚者發搐全嬰方曰凡身體壯熱耳輪鼻尖及手足稍俱冷忽發搐者此非驚是豆搐也夫驚搐有陰陽兩證陰者拇指在內陽者拇指在外陽拳者順陰拳逆也凡目鮮目貶目白目青目斜目鬥目轉目瞪聲焦聲嗄聲顫聲輕咂口弄古捲舌露筋噓氣哽氣噎氣撮唇噎乳噎食忽然定睛吐涎吐沫拗頸仰身搖頭擦面藏頭畏明手攣手顫腳彎不伸忽撩忽亂恍惚精神失張失志眠睡不寧睡中喜笑困戛齒齦心煩躁熱啼哭咬人面臉弄色或紅或青伸舒用力微微作聲有以上證候驚搐先證也預防之驅風膏琥珀散更擇對證藥閻孝忠曰似搐而不甚搐此名瘛瘲按此所論諸臟旺實或傷風因食所致發搐旺者當瀉實補虛傷風者當發散食宜下之此則與因驚發搐所異也大抵驚病發搐多自外感自內因者如吐瀉後脾虛所致或熱極生風之類是也餘證發搐以上亦備所因不同但世俗罕能分於臨證用藥不無實實虛虛之失反為害耶論咳嗽錢氏曰嗽者肺感微寒八九月間肺氣大旺病嗽者其病必實非久病也其證面赤痰盛身熱法當以葶藶丸下之若久者不可下也十一十二月嗽者乃傷風咳也風從背脊第三椎肺俞穴入也以麻黃湯汗之有熱證面赤飲水涎熱咽喉不利者宜兼甘桔湯治之若五七日之間其證身熱痰盛唾黏者以褊銀丸下之有肺盛者咳而後喘面腫欲飲水有不飲水者其身即熱以瀉白散瀉之若傷風咳嗽五七日無熱證而但嗽者亦葶藶丸主之後用化痰藥有肺虛者咳而哽氣時時長出氣喉中有聲此久病也以阿膠散補之痰盛者先實脾後以褊銀丸微下之涎退即補肺如上法有嗽而吐水或青緑水者以百祥丸下之有嗽而吐痰涎乳食者以白餅子下之有嗽而咳膿血者乃肺熱食後服甘桔湯久嗽者肺亡津液阿膠散補之咳而痰實不甚喘而面赤時飲水者可褊銀丸下之治嗽大法盛即下之久即補之更量虛實以意增損按此論小兒咳證既有外感內因之殊虛實之異治法外此宜與咳門諸方約之論吐瀉有傷乳食有風有熱有寒有虛錢氏曰吐乳瀉黃傷熱乳也吐乳瀉青傷冷乳也有初生三日內或至十一日吐瀉壯熱不思食大便乳不消或白色是停食當下之後和胃下用白餅子或食乳不消身溫涼不思乳大便青白色此上實下虛也更有兼見證吐瀉因傷風得之身溫乍涼乍熱睡多氣粗大便黃白色嘔吐乳食不消時咳嗽更有五臟兼見證當煎入臟君臣藥先大青膏後服益黃散如先曾下或無下證慎不可下也此乃脾肺受寒不能入食也傷風吐瀉身熱多睡能食乳飲水不止吐痰大便黃水此為胃虛熱渴吐瀉也當生胃中津液以止其渴止後用發散藥止渴多服白朮散發散大青膏傷風吐瀉身涼吐沫瀉青白色悶亂不渴哽氣長出氣睡露睛此傷風任冉輕怯因成吐瀉當補脾後發散此二證多病於春冬也吐瀉於五月二十五日以後身壯熱此熱也小兒臟腑十分中九分熱也或因傷熱乳食吐乳不消瀉深黃色玉露散主之六月十五日以後吐瀉身溫似熱臟腑六分熱四分冷也吐嘔乳食不消瀉白黃色似渴或食乳或不食乳食前少服益黃散食後多服玉露散七月七日以後吐瀉身溫涼三分熱七分冷也不能食乳多似睡悶亂哽氣長出氣睡露睛唇白多噦欲大便不渴食前多服益黃散食後少服玉露散八月十五日以後吐瀉身冷無陽也不能食乳乾噦瀉青褐水當補脾益黃散主之不可下也虛羸脾胃不和不能食乳致肌瘦亦因大病或吐瀉後脾胃尚弱不能傳化穀氣也有冷者時時下利唇口青白有熱者溫狀身熱肌肉微黃此冷熱虛羸也冷者木香丸主之夏月不可服如有證則少服之熱者胡黃連丸主之冬月不可服如有證則少服之潔古曰夏月心火用事治吐瀉不可用溫暖藥秋用溫藥秋深用暖藥更有五臟兼見證如有風瀉防風羌活有熱瀉黃芩大黃有寒瀉附子有濕瀉白朮茯苓有肺瀉芍藥桂定喘荊芥人參如甚加檳榔木香大便不通則加大黃更詳看病新舊新則止之久則腸風之患宜推陳致新法當宣風散導遏以用入臟君臣藥調之益黃散凡大瀉引飲者其病不以新久皆宜服白朮散痢病亦同身熱吐瀉咳嗽是風木入於脾母虛其子亦弱法當煎檳榔豆蔻湯下大青膏後服益黃散身熱吐瀉大渴大便必少是熱入膀胱亡失津液此為大逆是陰陽相乘也五苓散主之身涼吐瀉不渴則知為寒瀉當補之煎附子桂枝湯下大青膏陰陽相乘肝入於胃故發熱而嘔當服白朮散後煎檳榔木香湯下大青膏閻孝忠曰凡小兒吐瀉當溫補之子每用理中丸以溫其中以五苓散導其逆連與數服兼用異功散等溫藥調理之往往便愈若已虛損當速生其胃氣宜與其四味理中丸並研金液丹末煎生薑米飲調灌之惟多服乃效候胃氣已生手足漸暖陰退陽回然猶瘛瘲即減金液丹二分增青州白丸子一二分兼用異功散羌活膏溫白丸鉤藤飲子之類調理至安依此治之仍頻與粥雖至危者往往死中得生十救八九金液丹治小兒吐瀉虛極最妙沈存中良方論金液丹云親見小兒吐利劇氣已絶服之復活者數人真不妄也須多服方驗按此證錢論傷乳食所致分冷熱傷風辨兼見證明寒熱因而治可謂究其緒矣閻主溫中兼用金液丹之類蓋是治寒證濕證及升提下陷之法至潔古更分時令備兼見證而用藥治法殆無餘蘊但吐瀉止作一證然有吐而不瀉瀉而不吐則當別議若吐而不瀉傷冷者宜溫胃瀉而不吐傷冷而脈微者宜灸之亦不可不分蓋病本之不一也論疳證虛實錢氏曰疳者皆脾胃病亡津液之所作也云云疳在內目腫腹脹利色無常或沫青白漸瘦弱此冷證也疳在外鼻不赤爛自揉鼻頭上有瘡不著痂漸繞耳生瘡治鼻瘡爛蘭香散諸瘡白粉散治之五臟疳筋疳骨疳形證詳見本論潔古曰疳者小兒病癖或久吐瀉醫者妄投轉過之藥小兒易為虛實致之胃虛而亡失津液內發虛熱外消肌肉一臟虛則諸臟皆弱其病目胞腫腹脹利色無常漸加瘦瘁久不痊可是腸胃有風積法當用宣風散導之後各依本臟補其母大抵小兒疳病肌羸血氣不足同大人癆瘵之疾按疳證惟錢氏論中最詳宜玩本文論腹痛所因錢氏曰積痛口中氣溫面黃白目無精光或白睛多及多睡畏食或大便酸臭者當磨積宜消積丸甚者當白餅子下之後和胃蟲痛面㿠白心腹痛口中沫及清水出發痛有時安蟲散主之小兒本怯者多此病積痛食痛虛痛大同小異惟蟲痛當口淡而沫自出按小兒腹痛亦有傷冷食乳物及濕熱欲作痢而痛或發痧疹痛者皆宜詳悉論小兒癖積錢氏曰腹中有癖不食但飲乳是也當漸用白餅子下之小兒病癖由乳食不消伏在腹中乍涼乍熱飲水或喘嗽與潮熱相類不早治必成疳以其有癖則令兒不食致脾胃虛而發熱故引飲水過多即蕩滌脾胃亡失津液脾胃不能傳化水穀其脈沉細益不食脾胃虛衰四肢不舉諸邪遂生羸瘦而成疳矣論痘瘡輕重錢氏曰凡瘡疹一發便出盡者必重也瘡夾疹者半輕半重也出稀者輕裡外肥紅者輕外黑裡赤者微重也外白里黑者大重也瘡端里黑點如針孔者勢劇也青乾紫陷睡昏汁出不止煩躁熱渴腹脹啼喘大小便不通者困也凡瘡疹當乳母慎口味凡飢及風寒歸腎變黑難治也有大熱當利小便有小熱宜解毒若黑紫干陷者百祥丸下之不黑者慎勿下看時月輕重大抵瘡疹屬陽出則春夏為順秋冬逆冬月腎旺又盛寒病多歸腎變黑又當辨春膿疱夏黑陷秋癍冬疹亦不順也黑者無問何時十難救一其候寒戰噤牙或身黃腫紫宜急以百祥丸下之復惡寒不已身冷出汗耳骫反熱者死腎氣大旺也下後身熱飲水可治脾旺勝腎寒去而溫熱也先發膿胞後發疹子者順後發癍子者逆先發水疱後發疹子者逆先發膿疱後發水泡多者順少者逆先水泡後癍子多者逆少者順先疹子後癍子者順凡瘡疹只出一般者善潔古曰一發便密如針頭形勢重者合輕其表而涼其內連翹升麻湯若癍已發密重微喘飲水者有熱證則去風藥微下之若出不快清便自調知其在表不在裡當微發散用升麻葛根湯若青乾黑陷身不大熱大小便澀則是熱在內煎大黃湯下宣風散若身表大熱表證未罷不可下若癍疹已出見小熱小便不利當利之已發後有餘毒未散復有身熱瘡腫之類當用茶粉下解毒丸瘡疹已出後有聲音者乃形病氣不病也瘡疹未出先聲音不出者乃形不病而氣病也若瘡疹出而聲音不出者是形氣俱病也當清其肺氣當用八風湯並涼膈散去硝黃亦可論痘瘡用熱藥之誤丹溪曰讀前人之書當知其立言之意苟不知其意求適於用不可得也痘瘡之論錢氏為詳歷舉源流明經絡分表裡虛實開其治法證以論辨深得著書垂教之體使後人如求方圓於規矩較平直於準繩引而伸之觸類而長之可謂無窮之應用也今人不知致病之因不求立方之意倉卒一試設有不應並其書而棄之近因局方之學行素問之道不明類皆喜溫而惡涼喜補而惡解利忽得陳氏方論遂以為錢氏不及也雖然陳氏亦可謂善求病情者大率歸重於太陰一經蓋以手太陰屬肺主皮毛足太陰屬脾主手足肺金惡寒而易於外感脾土惡濕而無物不受觀其用丁香官桂所以治肺之寒用附木半夏所以治脾之濕也使脾與肺果有寒與濕而兼有虛也中病則已何傷之有今徒見其出遲者身熱者泄利者驚悸者氣急者渴思飲者例與木香散異功散者間有偶中之效不思一偏之禍若錢氏方固未嘗廢細辛丁香白朮參耆輩率有監製輔佐之藥但有寒涼者多而補助一法略爾端緒癡人不可說夢錢氏之慮深矣亦將俟達者推充而用之夫渴者用溫藥癢塌者用補藥自陳氏發之迥出前輩然其多用燥熱或未適中恐其立方之際必有挾寒而痘者余嘗會諸家之粹而用之聊陳一二從子六七歲時出痘身熱微渴自利或欲用木香散加丁香十粒煎豫觀其出遲固因其自利而氣弱察其所下皆臭滯因熱蒸而下恐未必寒急止之已投一帖矣與黃連解毒湯加白朮近十帖以解之利止痘出其後肌常微熱手足生癰又與涼劑補一月安一人年七十歲發熱而昏倦其脈大而似數與參耆歸術陳皮大料濃湯飲之二十帖痘出又二十帖膿胞成身無全膚或欲用陳氏本方與之豫曰但虛無寒也又與前方至六十帖而安至正甲申春邑間痘瘡不越一家率與陳氏方童幼死者百餘雖曰天數吾恐人事亦或未之盡也謹按錢氏論痘瘡形色輕重困劇而用藥已具其端緒矣至潔古又辨所兼之證及候音聲察形氣為病而處治治法可謂詳悉但世俗不深求其意反有疑似丹溪先生所以言之諜諜也大抵世俗喜溫而惡涼將錢氏之法不去推充至多疑似如雲不可妄下蓋妄之一字戒慎之意當有可下之理也若瘡疹初發有因裡實而出不快渴而脈數便祕煩躁不下可乎有將懨之際裡實而渴便祕身熱不下可乎或云首尾俱不可下或指為上吐下瀉不可下皆非也但自病體虛實不等時令中治法之異要當適中病情爾故錢氏云看時月此句關係甚妙如冬月盛寒便難例用涼劑且小兒痘瘡本五臟之毒所發非止屬諸痛癢瘡皆出心火之比故陳氏方一出亦多獲效今人用錢氏方亦有致誤者蓋不善用其法之過非製法者之過也宜求乎立方本旨矧歲氣時臨災青淺深不同小兒體有虛實之異用藥不可輕舉詳潔古以微下法中佐以風劑是兼升發之意亦慎之也何熱劑與香竄之藥豈可例用乎然有毒入關竅肌骨間邪氣下陷用此而獲生者或有之恐千百而一二也論癍疹證治王海藏云夫癍之為病皆由子在母腹中時浸漬食母血穢蘊而成毒皆太陰濕土壅滯君相二火之所作也因小兒真氣既盛正氣又旺邪無所容或因天寒傷表或傷里癍由是而生焉治當外者外治內者內治中外皆和其癍自出至於惡寒者發之表大熱者奪之渴者清之祕者通利之驚者安之泄者分之不可執一大抵傷寒同治隨經用藥最為高論假如五日以里諸病與癍疹不能別辨者不可疑似必須發之但各從其所傷應見治之皆不妨癍出若強發之其變不可勝數矣前人言首尾俱不可下者何也曰首不可下者為癍未顯於表下則邪氣不得伸越此脈證有表而無里故禁首不可下也尾不可下者為癍毒已顯於外內無根蒂大便不實無一切里證下之則癍氣逆陷故禁尾不可下也又言溫暖不令通風癍若已出身熱天暄何必蓋覆不使之通風乎後人執此二句不知天令人事通變致誤者多大抵以脈為主浮中沉之診平舉按之候察其虛實定其中外則可以萬全矣論未顯癍證所用之藥外傷升麻湯內傷枳實丸大便䎡者枳朮丸傷冷者溫之神應丸惡寒者發之防風蒼朮湯表大熱者奪之此表者通言三陽也夫陽盛則氣必上行言奪者治之不令上行也大便祕結者下之桃仁承氣四順飲柴胡飲選用察其在氣在血渴者清之大渴者白虎湯小渴者涼膈散小便不通者利之導赤散八正散之類當求上下三焦何經而用藥驚者分輕重安之泄者察寒熱分之已顯癍證所用之藥出不快化毒湯出太多犀角地黃湯地骨皮鼠黏子湯咽不利桔梗甘草黏子湯煩者桔梗甘草梔子湯肺不利紫草甘草枳殼湯太陽出不快荊芥甘草防風湯陽明出不快升麻加紫草湯少陽出不快速翹防風湯四肢出不快防風芍藥甘草湯小兒治法治風之劑小續命湯一名寬筋湯治小兒吐瀉之後因虛生風瘛瘲神昏涎盛不利麻黃去節半兩防風一分半芍藥附子人參川芎白朮防己各一兩黃芩一分桂枝甘草各半兩上為粗末每三歲一錢水煎入薑棗有汗者去麻黃錢氏大青膏治小兒熱盛生風欲為驚搐血氣未實不能勝邪故發搐也大小便依度口中氣熱當發之天麻末一錢白附子一錢半蠍梢半錢硃砂一字麝一字烏蛇肉酒浸焙乾半錢青黛一錢天竺黃一字上同為末生蜜和成膏每服半皂子大月中兒粳米大天麻防風丸見後按以上三方風自內因者宜此汗之可見里之表證與外因不同矧有驚風痰熱食熱等類者臨證並宜選擇驅風膏瀉青丸加辰砂蠍尾按此表裡藥也浴體法天麻末二錢蠍尾硃砂各半錢烏蛇肉酒浸為末白礬各三錢麝一字青黛三錢上同研勻每三錢水煎入桃枝一握並葉五七枝溫洗之勿浴背塗囟法麝一字蠍尾半錢薄荷葉半錢蜈蚣末牛黃末青黛末各一字上研勻熟棗肉劑為膏新綿上塗勻貼囟上四方可出一指許火上灸手頻尉百日裡外兒用此法謹按世俗周歲上下小兒諸風搐證用浴體掐洗法得汗立效殊勝火灸蓋艾有誤加於風熱陽癇也慎之局方敗毒散治小兒傷風身熱鼻塞方見熱門拔萃防風蒼朮湯治小兒邪熱在表惡風風寒所傷防風半兩蒼朮石膏各一兩甘草炙半兩川芎黃芩各二錢半上為粗末每二錢入姜薄荷葉煎升麻黃芩湯治小兒中風身熱頭項強自汗表不和也升麻葛根黃芩芍藥各五錢半甘草二錢半上㕮咀每二錢水煎按此二方陽明經藥也大羌活湯治風熱方見寒門錢氏塌氣丸治脾風腹脹胡椒一兩蠍尾半兩上糊丸粟米大每五七丸至一二十丸按此宣風補脾藥也羌活膏見後驚劑全嬰方加減惺惺散治小兒傷風風熱及傷寒鼻塞發熱驚悸頭痛咳嗽時行風熱蒼朮川芎細辛羌活防風白芷天花粉甘草赤芍桔梗麻黃荊芥當歸薄荷上等分水煎一錢入姜按此太陽例藥也以上諸方宜隨諸經輕重選用殭蠶散治小兒中風不語失音關鬲不通精神昏憒殭蠶半兩羌活一兩麝半錢上為末二歲半錢薑汁少許調和湯浸服又以菖蒲末於舌根上頻用之桂菖散治小兒急中風失音不語桂心一兩石菖蒲一分上為末三歲一錢水煎服若大病後不語者用豬膽汁調下未語再服按此二方出太陽例可見中風傷風例不同故録之治寒之劑仲景桂枝湯治感冒風寒身熱惡寒自汗麻黃湯治胃風寒身熱鼻塞寒栗無汗桂枝麻黃各半湯小青龍湯治感風寒脈緩發熱腹痛或利理中湯治感寒腹痛方並見寒門謹按世俗治傷寒多不本仲景初法矧小兒乎惟近代鄭友端集全嬰方於傷寒多采其例言桂枝湯自西北二方居人四時行之無不驗江淮間惟冬及春可行之自春末及夏以前桂枝證加黃芩一分謂之陽旦湯夏至以後有桂枝可加知母石膏各半兩或加升麻一分若病人素虛寒者正用古方不在加減也可謂得其旨趣故茲寒例與夫變證法並見本論今不詳録但以變法一二附於下葛根升麻湯方見升麻湯上㕮咀水煎按此方陽明藥也世俗用治小兒傷風及發癍瘡疑似之間者皆用之故收入然亦須審諦而行之可也故王海藏云活人言傷寒頭痛如破者連須蔥白湯次又不已者葛根升麻湯恐太陽流入陽明用斷其路故以此湯主之地黃湯內如無犀角以升麻代之是知陽明藥非太陽藥也人或初病太陽證便與此湯是遺太陽不惟遺經反引太陽邪氣入陽明不能解也其變可勝言哉故不可不慎之況小兒乎麻黃黃芩湯治小兒傷寒頭痛身壯熱無汗鼻塞目澀小便清者知不在裡可汗之麻黃三錢赤芍黃芩各一錢半甘草炙桂枝各半錢上為粗末水煎按此太陽例藥也惺惺散治傷寒時氣風熱痰壅咳嗽氣不和桔梗細辛人參甘草炙白茯苓白朮栝蔞根各一兩上為末每二錢水煎入薄荷五葉一方加防風川芎各一分按此少陰例藥也東垣麻黃升麻湯治小兒寒鬱而喘喉鳴臍中鳴腹滿鼻流清涕脈沉急而數麻黃草豆蔻各一錢半益智仁一分半厚朴吳茱萸各二分甘草一分當歸尾升麻曲末蘇木各半分柴胡黃芩各一分紅花少許蠍二個上㕮咀作二服水煎稍熱服按此太陽例藥也然有所兼之證故用是變法隨證加減之也治熱之劑錢氏瀉青丸治肝熱搐搦脈洪實當歸龍膽山梔川芎大黃羌活防風上等分蜜丸雞頭大每服一丸按此瀉乙木之陰火藥也治風熱表裡之劑瀉心湯治心經實熱按此瀉丁火藥也瀉黃散治脾熱目黃口不能吮乳按以上治己土濕熱之藥風勝濕甘寒瀉火也與以上並治實熱之劑瀉白散治肺熱目黃口不能吮乳喘嗽按此瀉肺邪之有餘補辛金之不足也導赤散治內熱小便赤黃心躁睡語按此治丙火藥也安神丸治邪熱驚悸面黃頰赤按此治心肺胃熱氣分藥也清鎮之劑以上方並見熱門地黃丸治疳熱腎虛瀉血失音身瘦目翳生疥解囟不合長大不行可服取效方見補虛門按此治癸水不足藥也地骨皮散治小兒肌熱白虎湯治小兒發熱而渴方並見熱門生犀散治小兒肌熱生犀地骨皮赤芍柴胡葛根甘草上㕮咀水煎按此少陽陽明藥也鱉甲飲治小兒骨熱潮熱盜汗鱉甲炙地骨皮秦艽柴胡枳殼炒知母當歸等分上㕮咀三歲一錢水煎加桃柳枝各三寸烏梅一個按此少陽厥陰藥也氣血之劑鎮心丸治內熱生驚痰盛甜硝一兩人參一兩甘草炙寒水石燒一兩半山藥茯苓各二兩硃砂一兩腦麝各一錢上為末蜜丸雞頭要紅入胭脂量兒大小與服按此手太陰少陰足陽明太陽藥也化毒丹治心胃內熱驚悸生熟地黃各五兩天門冬麥門冬去心焙各三兩玄參二兩甘草炙甜硝各二兩青黛一兩半上為末入硝煉蜜丸如雞頭大每半丸或一丸水下按此手足太陰少陰藥也甘露飲子治心胃熱咽痛口苦生瘡上攻牙齦腫方見熱門大黃丸方見傷風門絳雪丹治小兒諸熱陽盛發狂躁不安目赤煩渴芒硝一兩硃砂一兩上為末浸蒸餅為丸雞頭大三歲兒一丸砂糖水化下無時按以上二方陽明例藥也易老羌活黃芩蒼朮甘草湯治壯熱體重而瀉羌活黃芩蒼朮甘草上等分㕮咀水煎服按此太陽陽明藥也陳氏人參清膈散治小兒潮熱自汗骨蒸人參柴胡當歸芍藥知母桑白皮白朮黃耆紫菀地骨皮茯苓甘草桔梗各一兩黃芩半兩石膏滑石各半兩上為粗末每三錢水煎入姜按此手足太陰足少陽厥陰陽明藥也虛熱煩熱氣血皆可用謹按以上諸方姑隨輕重例因舉其概至於食熱痰熱驚熱等候宜於後方內選用治濕熱攻下之劑錢氏牛黃奪命散治小兒肺脹喘滿胸高氣急兩脅扇動陷下鼻張悶亂嗽渴聲嗄痰涎潮塞俗謂之馬脾風者黑白牽牛各一兩半一半炒大黃檳榔各一兩上為末三歲兒每服二錢冷溫水調下涎多加膩粉少許無時通膈丸大黃牽牛木通等分上為細末水丸粟米大每三五十丸量大小虛實與服按以上二方陽明例藥也治驚之劑宜與風癇門兼看錢氏涼驚丸草龍膽防風青黛各三錢鉤藤二錢牛黃麝各一字黃連五分龍腦一字上糊丸粟米大每三五丸金銀湯下按此治風熱之劑也局方天麻防風丸治小兒驚風身熱喘粗多睡驚悸手足搐搦精神昏憒天麻防風人參各一兩蠍尾炒半兩甘草硃砂雄黃各二錢半牛黃麝各一錢殭蠶炒半兩上為末煉蜜丸櫻桃大硃砂為衣每一丸薄荷湯化下按此治風癇通關竅藥也三因方治陽癇驚風熱證面赤身熱發搐直視牙緊硃砂一錢膩粉麝半錢蘆薈白附子甘草各二錢胡黃連一錢蠍梢七個殭蠶七個金箔七片赤腳蜈蚣一條炙上為末二歲以上服半錢金箔薄荷湯下按此治風熱痰之劑透關通經絡藥也全嬰方睡紅散治小兒急慢驚風手足搐搦目瞪神昏牛黃硼砂腦子真珠水銀砂子各半錢青黛蠍尾炒京墨燒南星半夏同上薑製一斤蛇含石淬各一錢金銀箔各十片麝香一字烏蛇尾並項下七寸並酒浸一宿取出去皮骨炙一錢上為末三歲一字薄荷湯下按此治風熱痰藥通關透肌骨之劑也非風邪下陷者不可輕用東垣硃砂安神丸方見熱門按此寧心清神涼血之劑也謝氏奪命丹治急驚不省人事眼定不動牙關不開唇白並黑者南星半夏各四錢為末並以生薑汁和作餅子曬乾真珠新白者二錢巴豆去油淨一錢硃砂四錢金箔銀箔各十片輕粉麝各半錢上九味各為末和勻飛羅面打糊為丸如黍米大每一歲兒一丸燈芯湯下比金丸治小兒風熱丹毒急慢啞驚前奪命丹中減去金銀箔加真鬱金末三錢丸如上法利驚丸前比金丸中去鬱金加腦子半錢白頸蚯蚓一條用刀截斷首尾兩頭齊跳者用之去土稱二錢丸服如上法按此三方導痰藥也白餅子加減法按以上諸方治陽癇之藥不問急慢但系陽證諸熱者宜隨表裡輕重擇用之錢氏溫驚丸天南星為末入臘月牛膽中百日陰乾為末四兩硃砂一錢天竺黃一兩坯子胭脂片腦各一錢上用牛膽汁和丸雞頭大每一丸小者半丸砂糖水化下羌活膏治脾胃虛肝所熱盛生風或吐瀉後成慢驚者羌活川芎人參白附子赤茯苓各半兩天麻一兩殭蠶炒乾蠍炒白花蛇酒浸焙各一分川附子炮防風麻黃各三錢肉豆蔻母丁香藿香葉沉香木香各二錢輕粉一字真珠末牛黃各一錢半龍腦半字麝一錢雄黃辰砂各一分以上七味各另研上為細末熟蜜劑旋丸大豆大每服一二丸食前薄荷湯或麥門冬湯下三因方治陰癇慢驚黑附子銼去皮南星生半夏各二錢白附子一錢半上研細井花水浸七日每日換水浸控干入硃砂二錢麝一錢拌勻每服一字薄荷湯下量大小與服或丸如粟米大每二十丸薄荷湯下此白丸子方也因分兩不同故兩存之經驗方保生錠子治急慢驚風蛇含石四兩火煆醋淬十數次研為極細末南星一兩先泡細切再炒白附子去皮一兩硃砂三錢另研極細麝一錢上為細末用糯米粉煮作餅搗和前藥令勻作錠子臨用薄荷湯濃磨汁服一二口全嬰方麝香餅治小兒急慢驚風進退不定荏苒經日乍靜乍動嘔吐痰涎潮搐甚者宜此麝香蠍尾去毒蜈蚣二條酒浸酥炙南星炮川烏炮白花蛇酒浸一夕去骨皮焙以上各半兩乳香鐵粉硃砂牛黃各一錢上為末酒煮糊丸如雞頭大拈作餅子三歲兒一餅用薄荷湯下按此厥陰例藥也非風在關竅肯綮者不可用義見中風門通關透骨例全蠍散治小兒急慢驚風潮作不定心肺中風蛇頭一個酒浸蜈蚣一條酥炙蠍一枚草烏一個去皮尖麻黃去節一錢硃砂一錢腦麝各一字上為末一歲一字薄荷湯下奪命散治小兒急慢驚風諸藥無效者一服見效白附子黑附子炮南星炮天麻防風半夏炮麻黃去節硃砂蠍新薄荷葉煨薑汁蘸炙三兩次各一錢上入麝香半錢為末三歲半錢薄荷薑汁更入酒些小熱湯共調下按此二方太陽例藥也鉤藤飲子治吐利脾胃氣弱虛風慢驚鉤藤三分蟬殼防風人參麻黃去節殭蠶炒天麻蠍尾炒各半兩甘草炙川芎各一分麝一錢另研上同為細末每服二錢水煎量多少與之寒多者加附子半錢按此升陽越脾氣藥也寧心膏治小兒精神不定恍惚不寧恐畏多哭驚魘人參白朮白茯苓茯神山藥羌活甘草炙各一錢硃砂一錢腦麝各一字上為末煉蜜丸如雞頭大二歲一丸薄荷湯化下按此養氣疏風清神之藥也寶鑑天麻散治小兒急慢驚風其效如神半夏七錢天麻二錢半甘草炙白茯苓白朮各三錢上水一盞入瓷器內煮水乾將生薑三錢同煮候乾為末每服一錢半薑棗湯調下按此溫脾養胃之劑非止於疏風勝痰藥也大抵小兒血氣未充體虛者多或因病後致者宜與此調理而不為峻劑下陷轉成壞證者此三方則庶幾矣謹按以上諸方治陰癇不問急慢驚但系陰證宜隨表裡輕重選用則半陰半陽慢脾之法例在其中矣經驗方嚏驚開關散牙關緊急者用之㗜鼻並擦牙蜈蚣一條炙直殭蠶炒南星各一錢麝一字豬牙皂角一定略燒存性上各為末研極細少許搐鼻如欲擦牙者用生薑汁蘸藥擦牙上全嬰方探生散治小兒急慢驚風諸藥無效者吹鼻定死生沒藥雄黃各一錢乳香半錢麝一字上為末少許吹鼻如眼淚鼻涕俱出者可治按此二方捷嚏藥也吐風散治小兒急中風口噤不開不省人事全蠍一個炒瓜蒂十個炒赤小豆三十粒上為末一歲一字溫米飲調下未吐再服碧雲散治小兒急風卒中涎潮氣粗不省人事石碌四錢輕粉一錢上為末每一字薄荷湯下酒少許同調下良久先吐後利一方以銅青為末醋糊丸如雞頭大每一丸薄荷湯磨下須臾吐涎似膠以手拽出神效天霜散治小兒急中卒風並急驚口噤搦搐涎盛昏塞不語辰砂粉霜輕粉南星炮各半兩蠍尾白附子藿香葉各一錢上為末一歲半字薄荷湯調下茶亦得未吐再服按以上三方宣劑也宜選用然此方吐中兼汗下也錢氏利驚丸治小兒急驚風涎盛發熱潮搐青黛輕粉各一錢牽牛半兩天竺黃二錢上為末白糊丸如小豆大二十丸薄荷湯下按此下濕熱痰之劑也全嬰驅風膏治小兒肝風筋脈拘急面紅目青眼上驚搐及胎風辰砂蠍尾當歸龍膽草川芎山梔大黃羌活防風甘草各一錢上為末入麝香一字煉砂糖丸如雞頭大三歲一丸薄荷竹葉蜜湯化下按此下風熱之劑也珍珠丸治小兒急慢驚風發搐涎潮壯熱及痰嗽壅塞白附子滑石巴豆十五個去油輕粉南星各一錢上為末糊丸如小豆大三歲一二丸蔥白湯下按此下食痰導滯之劑也白餅子加減法通關散治小兒驚風已退聲不能言上以南星大者炮為末三歲一錢豬膽汁調入咽下喉中便能言炙驚風法附臍風撮口法寶鑑云小兒急驚風灸前頂一穴在百會前一寸若不愈須灸兩眉頭及人中一穴各三壯如小麥大小兒慢驚風灸尺澤穴各七壯在肘中橫紋上動脈中炷如小麥大初生小兒臍風撮口諸藥不效者取然谷穴在內踝前踝骨下陷中可灸三壯針入三分不宜見血立效小兒癲癇瘛瘲脊強互相引灸長強穴二十壯在脊骶端跌地取之乃得小兒癲癇驚風目眩灸神庭一穴七壯在鼻直上入髮際五分小兒風癇者先屈手指如數物乃發也灸鼻柱入髮際宛宛中灸三壯如小麥大小兒驚癇先啼怖啼叫乃發也灸頂上旋毛中三壯及耳後青脈旺如小麥大治痰涎之劑青州白丸子南星三兩半夏七兩白附子二兩川烏半兩各生用上為末絹袋盛井水擺盡為度別換水浸三五日曬乾糯米粉丸按此治寒痰風痰藥也抱龍丸治風痰壅盛驚搐昏睡雄黃辰砂天竺黃各四錢麝香一錢牛膽南星八錢入臘月牛膽中陰乾百日內用如無生者水浸二日焙用上為末煮甘草糊丸如皂子大三歲一丸量大小與服薄荷湯下按此治風痰熱痰藥也宣風散檳榔二個陳皮甘草各半兩牽牛四兩半生半熟上為末每一錢量大小與服湯調下按此下濕痰之劑也褊銀丸治風涎膈實上熱及乳食不消脹氣喘巴豆半兩去油研好墨八錢燒醋碎水銀半兩黑鉛一錢半與水銀結砂子麝香半錢別研上將巴豆末並墨再研和勻入砂子等陳米粥和丸如緑豆大捻作餅子一歲一丸薄荷湯下按此下食痰癖積藥也謹按小兒多痰熱宜用抱龍丸與化毒丹等兼服故茲例不多録治內傷及癖積之劑錢氏白餅子治腹中有癖但飲乳嗽而吐痰涎方見痰飲門按此下痰積食積藥也義見痰飲門消積丸丁香九個砂仁十二個巴豆二個去油烏梅肉三個上為末麵糊丸黍米大三歲以上三五丸以下三二丸溫水下消堅丸消乳癖及下交奶又治痰熱膈實取積硇砂末巴豆去油淨輕粉各一錢水銀砂子兩皂子大黃明膠末五錢上同研勻入麵糊丸如麻子大倒流水下一歲兒一丸食後服按此二方有寒熱輕重之分宜選用後法同寶鑑三稜煎丸治小兒飲食過多痞悶疼痛宿食不化久而成癖廣朮黑角者荊三稜二味濕紙裹煨為末各一兩大黃去皮八兩上將大黃為末石器內以好醋浸令透慢火熬成膏和二藥為丸麻子大或緑豆大每一二十丸食後溫水下鱉甲豬肚丸治癖發熱鱉甲九肋者七錢醋煮黃色青蒿黃連各七錢青皮枳實炒木香各半兩柴胡一兩上細末猔豬肚一個去脂貯藥蒸熟同和梧子大每一三十丸食後人參湯下廣朮化癖丸治乳食不消心腹飽脹壯熱喘粗嘔吐痰逆食症乳癖代赭石醋淬當歸硃砂研枳殼炒廣朮炮荊山稜炮各半兩木香一兩麝香巴豆去油各一分上末研勻糊丸如麻子大每一歲兒二丸米飲下灸癖積法寶鑑云治小兒癖氣久不瘥中脘一穴章門二穴在大橫外直臍季脅端側臥屈上足舉臂取之各灸七壯臍後脊中灸二七壯治小兒脅下滿瀉利體重四肢不收痃癖積聚腹痛不嗜食寒熱取脾俞二穴在第一椎下兩旁相去各一寸五分可灸七壯又治腹脹黃疸可灸三壯治瀉痢之劑錢氏白朮散藿香葉白朮木香白茯苓甘草人參各一錢乾葛二錢上為末每一錢至二錢水煎服異功散四君子湯加陳皮一方只用參朮甘草三味名溫中湯按此二方補脾湯加減法也益黃散陳皮一兩青皮訶子肉甘草炙丁香二錢上為細末每二錢水煎服沒石子丸木香黃連各二分沒石子一個豆蔻仁二個訶子肉三個上為末飯丸麻子大米飲下十五丸量大小與之按此二方兼止澀藥也五苓散治瀉而渴方見濕門羌活膏治小兒泄瀉發搐方見前溫白丸治小兒脾氣虛困泄瀉瘦弱冷疳洞利或驚天麻半兩殭蠶炒白附子乾蠍南星浸各一錢上為末浸寒食麵為丸如緑豆大每五七丸至二三十丸薑湯下仍於寒食麵內養七日取出回生散治小兒吐瀉大南星八九錢以上者上用地坑子一個深三寸燒赤入好酒半盞下南星卻用炭火三兩條蓋候南星微裂取出銼再炒放冷為細末每半錢或一字濃煎生薑防風湯調下按此二方升肺脾之氣藥也金液丹治吐利日久脾胃虛損手足厥逆神昏睡多露睛口鼻氣冷欲成慢驚或身冷脈微自汗小便不禁舶上硫黃十兩去砂石為末砂合子盛八分滿水和赤石脂封繼鹽泥固濟曬乾再入水罐內泥固濟火煆過候冷上於乳鉢內研為細末水浸蒸餅丸桐子大或如緑豆大每五十丸至百丸米飲下按此厥陰例藥也玉露散治傷熱吐瀉黃色寒水石石膏墜白者各半兩生甘草一分上同為細末每服半錢或一錢溫湯調下按此陽明例藥也豆蔻香連丸治泄瀉腹痛腸鳴黃連三分炒肉豆蔻木香各一分上為細末粟米飯丸米粒大每服十丸至二三十丸日夜各四五服米飲下二聖丸治小兒臟腑或瀉或好久不愈黃連黃柏去皮各一兩上為末入豬膽內煮熟丸如緑豆大每二三十丸米飲下按此解毒湯變法也與前方不同宜選用羌活黃芩蒼朮甘草湯治肚熱體重而瀉方見前茯苓半夏湯治風瀉而嘔方見痰飲門東垣升陽益胃湯方見補虛門湯氏助胃膏治小兒氣虛乳食不進腹痛泄瀉腸鳴陳皮山藥各四兩甘草炙砂仁白茯苓藿香桂各二兩肉果人參木香丁香白豆蔻各一兩上為末煉蜜丸和成膏每服雞頭大量大小與之按此出太陽例冬月時令中藥局方水浸丹治伏暑傷冷冷熱不調霍亂吐利煩渴巴豆大者二十五個去皮研細去油盡黃丹一兩炒上研勻用黃蠟熔汁為丸如梧子大每一丸以水浸少項別以新水吞之量大小與服按此足陽明藥也小香連丸治熱痢腹痛木香訶子各一分黃連半兩上為末飯和丸緑豆大米飲下十丸至二三十丸頻服之胃風湯方見泄瀉門全嬰方訶梔散治小兒純下血痢腹痛訶子半兩燒去核梔子仁一錢半上為末三歲半錢米湯調下食前按此治熱之劑也桃花丸治小兒赤白痢腹痛赤石脂川乾薑炮等分上為末糊丸如小豆大三歲三十丸米湯下按此治寒之劑也澀腸丸治小兒下痢赤白後重頻並龍骨海螵蛸訶子炮去核等分上為末糊丸如小豆大三十丸米湯下按此止澀之劑也東垣厚腸丸治小兒乳食不能克化或生腹脹瘦弱痢瀉無常色橘皮三分大麥面半錢半夏三分枳實半錢蒼朮三分青皮二分人參三分厚朴二分曲末半錢上為細末煮糊為丸如麻子大每二十丸溫水下食前按此足陽明太陰藥也按以上諸方姑備其例宜兼看瀉痢二門而分治之治咳嗽之劑麻黃湯治傷風咳嗽喘急無汗方見寒門按此治風寒之劑也敗毒散治時氣咳嗽方見前按此治風溫之劑也紫菀散治小兒咳嗽上氣喉中水雞之聲射干紫菀款冬花各三錢麻黃四錢細辛二錢半夏一錢五味子六錢上㕮咀三歲兒一錢水煎入薑棗少許百部飲治小兒喘嗽日夜不得睡目鮮如突出之狀百部生薑各八錢細辛甘草各三錢貝母白朮五味子各二錢桂心四錢麻黃二錢上㕮咀三歲兒一錢水煎按此二方太陽例藥宜分輕重選用紫蘇子散治小兒咳逆上氣因乳哺無度內挾風冷傷肺氣或啼未定與乳乳與氣相逆不得下蘇子訶子蘿蔔子杏仁炒木香人參各二錢青皮甘草各一錢半上為末每一錢水煎入姜量大小與服按此下氣導痰藥也葶藶丸治乳食沖肺咳嗽面赤痰喘甜葶藶隔紙炒黑牽牛炒漢防己杏仁炒各一錢上為末入杏仁泥取蒸陳棗肉和再搗為丸如麻子大每五丸至七丸生薑湯下按此下濕之劑也全嬰方雄朱丸治小兒咳嗽有痰潮熱雄黃一錢半巴豆七粒半夏半兩上為末糊丸小豆大一歲二丸薑湯下按此導風痰濕痰乳癖藥也潤肺散治小兒涎嗽不已氣急煩渴麻黃二錢甘草一錢人參知母各二錢半陳皮一分桔梗阿膠炒百部各半錢上為末三歲一錢水煎按此手太陰足太陽藥也人參丸治小兒咳嗽有痰氣急噁心人參半夏白朮川薑南星炮上等分為末姜糊丸小豆大三十丸薑湯下按此手足太陰藥也參杏膏治小兒久新咳嗽氣急噁心有痰咯血人參阿膠杏仁炒款冬花五味子甘草訶子貝母上等分為末煉蜜丸雞頭大三歲兒一丸白湯下補肺散治小兒久患咳嗽氣急有痰阿膠糯米各一兩馬兜鈴甘草各半兩杏仁七十粒大力子一分上㕮咀三歲兒一錢水煎服按此二方手太陰之的藥也瀉肺散治小兒肺氣熱盛而咳方見熱門瀉白散治嘔吐之劑茯苓半夏湯方見前瀉劑回生散治小兒吐瀉方見前異功散方見前瀉劑藿香散治脾胃虛有熱面赤嘔噦麥門冬半夏甘草炙石膏各半兩藿香一分上為末每半錢至一錢水煎入姜全嬰方消食丸治小兒生冷傷脾腹痛惡心即局方小七香丸拔萃定吐紫金核半夏末制人參白朮木香丁香藿香各二錢半上為末稀糊為丸如李核大後用沉香硃砂各一錢研勻為衣陰乾每一丸棗湯磨下謝氏燒針丸專主吐逆府丹不拘多少上件研極細去皮小棗肉和劑為雞頭大每用針簽於燈上燒灰為末乳汁下一丸按此亦劫劑也以上方唯藿香散出陽明例藥餘溫劑宜隨輕重選擇出理中例治疳之劑錢氏木香丸治小兒疳瘦腹大木香青黛檳榔豆蔻各一分麝香一錢半續隨子一兩蝦蟆三個燒存性上為末蜜丸緑豆大每三五丸至一二十丸薄荷湯下按此手足太陰藥也六味地黃丸治小兒疳瘦不行解囟骨熱方見補虛門全嬰方蘆薈丸治小兒疳氣腹急骨熱蘆薈木香檳榔各一分黃連一兩蕪荑去皮青皮陳皮各半兩巴豆三七粒同上四味炒黃去豆蝦蟆酒浸炙黃去骨一兩上為末豬膽丸小豆大三歲三十丸米湯下按此手少陰手足太陰藥也蒸雞丸治小兒疳癆骨蒸潮熱盜汗瘦弱腹急面黃食不生肌肉黃連二兩柴胡一兩蕪荑鶴蝨各半兩秦艽知母紫芩使君子去殼炒各一兩上為末黃雄雞一隻重一斤籠之專以大麻子飼之五日後去毛及腸肚淨入前末子以線縫之取小甑子先以黑豆鋪甑底三寸安雞四旁及上黑豆蓋之早蒸至晚取肉研和硬入酒糊丸如小豆大二歲二十丸加減與之米飲下忌豬肉按此手少陰足少陽藥也肥兒丸截疳殺蟲治腹脹消食使君子肉蘿蔔子各二兩小紅棗肉一兩糖球子末飛羅面各二兩上取好黃土和作一爐墩子內底下蘿蔔片鋪一層次將使君子肉鋪在當中次又鋪蘿蔔一層上安棗肉蓋於上以泥封固其外以炭火煆至內三物熟爛了取出以飛面球子末和勻丸如麻子大量兒大小與服米飲下按此足陽明太陽藥也五疳消食丸消疳殺蟲退熱磨積進食使君子肉炒麥蘖炒陳皮麥曲炒蕪荑草龍膽黃連炒糖球子等分上為細末陳米飯為丸如黍米大每十丸米飲下按此手少陰太陰藥也然疳證自有虛實積熱等致不同以上諸方未能以盡其變學者自宜推格治之治瘡疹之劑升麻湯治小兒瘡疹未出發熱升麻葛根芍藥甘草上㕮咀水煎按此足太陽陽明藥也錢氏四聖散治瘡疹出不快紫草木通甘草炙枳殼炒上等分為粗末每一錢水煎服陳氏加黃耆按此足陽明手太陰藥也調肝散治瘡疹大盛宜服此令瘡不入眼生犀二錢半龍膽草一錢黃耆半兩大黃二錢桑白皮半兩炒鉤藤子各一錢石膏半兩麻黃栝蔞甘草上為粗末每二錢水煎服食後按此手太陰足陽明藥也內外實者非此不可化毒湯治豆瘡已出不快紫草茸升麻甘草炙等分上㕮咀入粳米五十粒水煎按此足陽明藥也鼠黏子湯治豆瘡欲出未能得透皮膚熱眼赤心煩咽嗌不利鼠黏子炒四錢荊芥穗二錢甘草一錢防風半錢上為細末沸湯點服去防風名消毒散按此太陽少陽藥首論溫平者此也活血散治豆瘡出不快白芍藥炒一錢上為末酒調服腹痛溫熱水調下按此正的太陰藥也海藏云張和之治四肢出不快加防風大效犀角地黃湯治瘡疹出太盛便血或鼻衄犀角一兩生地黃二兩赤芍三分牡丹皮一兩上㕮咀三歲兒一二錢水煎服按此足太陰少陰手太陰藥也葛根麥門冬散治小兒熱毒斑瘡出多心神煩悶葛根麥門冬各三錢人參二錢石膏半兩升麻甘草茯苓各二錢赤芍一錢上㕮咀每三錢水煎服按此足陽明手太陰藥也連翹散治瘡痘發熱連翹防風梔子甘草上為末水煎按此治熱在外而不厥少陽藥也如聖飲子治瘡疹毒攻咽嗌腫痛桔梗甘草鼠黏子炒各一兩麥門冬半兩上為末竹葉同煎二三錢按此手太陰少陰藥也解毒防風湯防風地骨皮黃耆芍藥荊芥枳殼鼠黏子各半兩上為粗末每服四五錢水煎按此手足太陰藥也真牙湯治癍瘡黑陷者人牙二枚燒存性入麝香少許上為末用紫草升麻湯調下御藥院方無價散治癍瘡不出黑陷欲死者人貓豬犬糞臘月內燒為灰上為末每一字蜜湯調服量大小與之按此二方劫劑也當歸丸治瘡疹能食而大便祕當歸半兩甘草一錢黃連大黃各二錢半上將歸熬膏子入下三味末為丸漸加服至利為度按此足陽明厥陰藥也棗變百祥丸紅牙大戟去骨一兩青州棗去核三十個上用水一碗同煎至水盡為度去大戟不用將棗焙乾可和作劑從少至多服至利為度按此足少陰藥也陳氏異功散治小兒痘瘡欲靨之際頭溫足指冷或腹脹瀉渴氣促或身不壯熱悶亂不寧臥則哽氣煩渴咬牙木香三錢半官桂二錢當歸三錢半人參二錢半茯苓二錢陳皮厚朴二錢半白朮二錢半夏一錢半丁香肉豆蔻二錢半附子一錢半上為粗末每二三錢水煎入薑棗按此足太陽少陰厥陰手足太陰藥也謹按以上瘡疹諸方有升散補脾涼血瀉火清神攻下溫中補劫之法不同學者自宜取擇局方涼膈散治瘡痘已出發熱作渴脈實悶亂便實者方見火門謹按瘡瘍已發有寒熱溫涼不同形氣虛盛之異以上二方宜對脈證選用有起死回生之效也足陽明藥地骨皮鼠黏子湯本方加地骨皮桔梗甘草鼠黏子湯桔梗甘草梔子湯防風芍藥甘草湯並三味治證見前升麻加紫草湯升麻湯加紫草荊芥甘草防風湯三味治證見前紫草甘草枳殼湯四聖散減木通連翹防風湯前連翹散減梔子並治證見前論
