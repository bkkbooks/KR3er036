body:
  text: 卷三十六咳逆門敘咳逆為病內經云歲金太過咳逆金鬱之發咳逆少陰二氣咳逆按內經所言咳逆者止此他書惟傷寒論咳逆脈散者死又金匱治咳逆上氣諸方而已似皆指肺金及火為病也活人書謂咳逆證為極惡仲景所不載孫真人云遍尋方論無此名遂斷咳逆為噦證而靈樞云噦者谷入於胃胃氣上注於肺故寒氣與新穀氣俱入於胃新故相亂真邪相攻氣並相逆復出於胃故為噦注云噦氣仵也仵偶敵也保命集又以咳逆為噫噫氣者胸中氣不交也少陰經至胸中交於厥陰水火相傳而有聲靈樞云噫者寒氣客於胃厥逆從下上覆出於胃故為噫注云噫象火煙隨焰出心不受邪故噫出之愚謂二説各有其義未知是否而難知力辨朱氏之非其論見後論傷寒咳逆有寒有熱活人書云咳逆者仲景所謂噦是也胃寒所生傷寒本虛攻其熱必噦又云傷寒大吐下之極虛後極汗出者因得噦所以然者胃中寒冷故也橘皮乾薑湯羌活附子散半夏生薑湯退陰散主之不瘥者灸乳下必愈然亦有陽證者咳逆者有潮熱時時噦小柴胡湯橘皮竹茹湯又云傷寒噦而腹滿視其前後何部不利利之愈按活人書以咳逆為噦故今從而以仲景言噦者入於咳逆之門縱使仲景言噦非此證而活人論證用藥則是咳逆而非嘔噦大抵咳逆者多由汗下之後胃虛而作活人以虛作寒治故用諸溫熱之藥然亦有虛而有熱者有實而有熱者所引橘皮竹茹湯未能詳盡也咳逆分陰陽證略例雲陽證咳逆者胃熱失下也陰消將盡陽逆上行使陰不內也為之惡候或兼以舌攣語言不正而反昏胃與咽痛者少陰也速下之宜大承氣湯若陽極脈微將盡者不宜下宜瀉心湯養陰退陽而已涼膈芒硝清肺亦可陰證者內已伏陰陰氣太甚腎水檀權肝氣不生胃火已病丁火又消所有遊行相火寒邪迫而率集於胸中亦欲盡也故令人發熱大渴引飲並去蓋覆病人獨覺熱也他人按之身體皆寒此火即無根之火也故用丁香乾薑之類溫胃其火自下咳逆乃止非如陽證以涼膈瀉心湯退心火陰氣乃生且陰證咳逆從嘔噦而生胃寒嘔噦不已陽逆繼之也按咳逆本由陰氣已虛陽火暴甚直衝而上出於胃入於肺而作聲東垣用涼藥者所以瀉熱降火也若夫所謂陰證咳逆者蓋以陰氣先消陽火亦竭浮於胸中亦欲散也故不宜用寒而反以溫藥養胃留其陽氣胃氣一和陽生則陰長之説也而此略例以陽證為失下用承氣瀉心二藥分便祕便軟用之則可矣以陰證為陰氣太甚腎水擅權寒邪迫火而上愚謂腎陰若盛則火自不妄動矣其所謂寒邪者未審其指受外寒耶內寒耶還只是虛耶姑俟明哲又案張子和云火欲上行為寒邪所遏寒不勝火故作聲此則是上寒遏下熱與外寒鬱內熱之義同亦與前説不同辨咳逆與噦不同難知云夫咳逆證活人斷為噦逆其説似是而非蓋噦者乾嘔也若有物直出則為吐也嘔物旋出則為嘔也嘔無物出則為噦也咳逆者或水漬於肺而心痞或連續不已而氣逆或喜笑過多而氣噎或咽飲而錯喉而氣搶或急食乾物而氣塞皆能作咳逆之聲連續不絶俗謂之吃忒是也大抵咳逆者不順之義吃忒者差錯之義二者皆氣不得下為火熱托之而使上至咽喉中噎而止也人或以紙捻鼻嚏而止或詐冤盜賊因恐而止或鼻熱聞食香調氣而止皆抑之駭之而使氣下也千金以咳逆上氣者為病肺脈散者死是心火刑于肺金也是以李氏稱易老云咳逆者火熱奔急上行而肺金不內何其當哉故便祕者大承氣湯下之便軟者瀉心湯主之朱氏斷為胃寒並陽證二法用藥治噦雖勝大抵其噦之意止是氣逆上行似咳逆耳即非仲景所謂咳逆之本證也盡噦者出聲也噦出其氣噦聲盡然後吸咳逆者入聲也抑氣不出逆聲盡然後呼也出入呼吸其大不同兼嘔噦者本於胃咳逆者本於肺何其難辨哉咳逆噦分手足經標本辨難知云活人以咳逆為噦謂若可下之宜調胃承氣湯是邪氣在胃故斷之為噦是則然矣抑不思咳逆者是足陽明失下傳手太陰活人但言其火之本不言其火之標炎上至極高之分而咳逆也合而觀之噦與咳逆同一熱也分而言之噦為本為膽為胃為中咳逆為標為心為肺為上若標病應見止當治標不必名噦若言作噦使後人只見膽胃本而不見心肺標也此一説又足經甲戊而傳手經丁辛也按海藏論咳逆與噦二者不同謂其聲有出入之異臟腑有肺胃標本之殊其説尤長但咳逆與噦其氣皆自下而上嘔噦則直出於口咳逆則至咽膈吃忒而中止然後出也實非有出入之異論雜病咳逆皆由病後胃虛所生三因云咳逆之病古人以為噦耳多因吐利之後胃中虛寒遂成此疾亦有胃中虛膈上熱噦至八九聲相連收氣不回者大抵傷寒久病後老人虛人及婦人産後多有此證者皆病深之候也亦有噦而心下痞悸者有痰水所為別無惡候者是論吃逆病由陰虛火上亦有暴病屬實者附丹溪云吃病者氣逆也氣自臍下直衝上出於口而作聲之名也書曰火炎上內經曰諸逆衝上皆屬於火古方悉以胃弱言之而不及火且以丁香柿蒂竹茹陳皮等劑治之未審孰為降火孰為補虛人之陰氣依胃為養胃土傷損則木氣侮之矣此土敗木賊也陰為火所乘不得內守木挾相火乘之故直衝清道而上言胃弱者陰弱也虛之甚也病人見此似為危證然亦有實者不可不知趙立道年近五十質弱而多怒七月炎暑大飢索飯其家不能急具因大怒兩日後得滯下病口渴自以冷水調生蜜飲之甚快滯下亦漸緩如此者五七日召子視脈稍大不數遂令止蜜水渴時且令以人參白朮煎湯調益元散與之滯下亦漸收七八日後覺倦甚發吃豫知其因下久而陰虛也令其守前藥然滯下尚未止又以煉蜜飲之如此者三吃猶未止衆皆尤藥之未當將以薑附飲之豫曰補藥無速效附子非補陰者服之必死衆曰冷水飲多得無寒乎豫曰炎暑如此陰涼非寒勿多疑待以日數力到當自止又四日而吃止滯下亦安又陳澤仁年近七十厚味之人也有久喘病而作止不常新秋患滯下食大減至五七日後吃作召豫視脈皆大豁衆以為難豫曰形瘦者尚可為以人參白朮湯下大補丸以補血至七日而安此二人者虛之為也又一女子年逾笄性躁味厚暑月因大怒而吃作每作則舉身跳動神昏不知問之乃知暴病視其形氣俱實遂以人參蘆湯飲一碗大吐頑痰數碗大汗昏睡一日而安人參入手太陰補陽中之陰者也蘆則反耳大瀉手太陰之陽女子暴怒氣上肝主怒肺主氣經曰怒則氣逆氣因怒逆肝脈乘火侮肺故吃大作而神昏參蘆喜吐痰盡氣降而火衰金氣復位胃氣得和而解矣謹按咳逆一證古方悉作胃寒所致俱用丁香柿蒂薑附等藥然此證有虛有實有火不可專作寒論蓋傷寒發汗吐下之後與滯下日久及婦人産後而有此者皆陰大虛之為也若平人食入太速而氣噎或飲水喜笑錯喉而氣搶或因痰水停膈心下或因暴怒氣逆痰厥或傷寒熱病失下而有此者則皆屬實也夫水性潤下火氣炎上今其氣自下衝上而作聲非火而何大抵治法虛則補之補中須分寒熱如因汗吐下誤服寒涼過劑當以溫而補之如脾胃陰虛火逆衝上當以平而補之挾熱者涼而補之若夫實者如傷寒失下地道不通因而咳逆當以寒下之如痰飲停蓄心下或暴怒氣逆痰厥此等必形氣俱實別無惡候皆當隨其邪之所在而湧之泄之清之利之也世醫凡遇此疾首以丁香柿蒂為言殊不知此藥不能補虛不能降火不能清氣利痰唯有溫暖助火而已豈宜總治斯疾乎咳逆治法治熱之劑活人橘皮竹茹湯治噦逆嚴氏治吐利後胃虛膈熱而咳逆橘皮一升竹茹一升半甘草二兩炙人參半兩棗子三十個生薑半兩上銼以水一斗煮取三升去滓溫服一升日三服按此出太陰嘔噦例藥也薑棗參橘亦是溫藥故三因云此治胃中虛冷但以此藥比之薑桂丁香則性平故從嚴氏入治熱之劑小柴胡湯治陽證咳逆難知大承氣湯治咳逆大便祕者二方並見寒門瀉心湯治咳逆大便軟利者方見心下痞門治寒之劑半夏生薑湯治噦欲死半夏洗一兩一錢生薑二兩切上水二盞煎八分分作二服橘皮乾薑湯治噦橘皮通草乾薑桂心甘草炙各二兩人參一兩上銼每服四錢水煎溫服日三次按以上二方並太陰嘔噦例藥也三因丁香散治咳逆丁香柿蒂各一錢甘草炙良薑各半錢上為末熱湯點二錢乘熱服不拘時嚴氏柿蒂湯治胸滿咳逆不止柿蒂丁香各一兩上㕮咀四錢薑五片煎家珍有人參一味寶鑑有青陳皮二味並各等分為末水煎服按以上二方並太陰陽明經藥也活人羌活附子散治咳逆嚴氏治吐利後胃寒咳逆羌活附子炮茴香微炒各半兩木香乾薑各一棗許大上細末每服一錢水一盞鹽一捻同煎熱服三因方木香作丁香按此太陽少陰太陰經藥也本事方治陰毒咳逆川烏頭乾薑炮附子炮肉桂芍藥甘草炙半夏吳茱萸陳皮大黃上等分為細末每服一錢薑五片煎去濁渣取清熱服按此三陰經藥也補虛之劑寶鑑炙甘草湯治許伯威中氣本弱病傷寒八九日醫見其熱甚以涼藥下之又食梨三枚痛傷脾胃四肢冷時發昏憒其脈動而中止有時自還乃結脈也心亦悸動吃逆不絶色變青黃精神減少目不欲開蜷臥惡人語以此藥治之甘草炙生薑桂枝人參生地黃阿膠麥門冬麻子仁大棗成無己云補可以去弱人參大棗之甘以補不足之氣桂枝生薑之辛以益正氣五臟痿弱榮衛涸流濕劑所以潤之麻仁阿膠麥門冬地黃之甘潤經益血復脈通心也加以人參桂枝急扶正氣生地黃減半恐傷陽氣銼一兩服之其證減半再服而安按此心肺藥也謹按咳逆諸方古方唯有治寒之劑至於補虛降火養陰之藥及治痰氣厥逆之法皆未詳也學者自宜隨證用之灸法嚴氏云咳逆治法婦人屈乳頭向下盡處骨間是穴丈夫及乳小者以一指為率正男左女右與乳相直間陷中動脈處是穴艾炷如小豆許灸三壯
