body:
  text: 卷十八內傷門按此一門東垣先生內外傷辨法也議論方制精備故不取他書但其間不繫內傷法皆節而不錄內論暑證者附入暑門辨脈法古人以脈上辨內外傷於人迎氣口人迎脈大於氣口為外傷氣口脈大於人迎為內傷此辨固是但其說有所未盡耳外感風寒皆有餘之證是從前客邪來也其病必見於左手左手主表乃行陽二十五度內傷飲食及飲食不節勞役所傷皆不足之病也必見於右手右手主裡乃行陰二十五度故外感寒邪則獨左手人迎脈浮緊按之洪大緊者急甚於弦是足太陽寒水之脈按之洪大而有力中見手少陰心火之脈丁與壬合內顯洪大乃傷寒脈也若外感風邪則人迎脈緩而大或大於氣口一倍或兩倍三倍內傷飲食則右寸氣口脈大於人迎一倍傷之重者過在少陰則兩倍太陰則三倍此內傷飲食之脈若飲食不節勞役過甚則心脈變見於氣口是心火刑肺其肝木挾心火之勢亦來薄肺經云侮所不勝寡於畏者是也故氣口脈急大而數時一代而澀也澀者肺之本脈大者元氣不相接脾胃不及之脈洪大而數者心脈刑肺也急者肝木挾心火而反克肺金也若不甚勞役惟右關脾脈大而數謂獨大於五脈數中顯緩時一代也如飲食不節寒暑失所則先右關胃脈損弱甚則隱而不見惟內顯脾脈之大數微緩時一代也宿食不消則獨右關脈沉而滑經云脈滑者有宿食也辨內傷諸證與外感不同甚哉陰陽之證不可不詳也遍觀內經中所說變化百病其源皆由喜怒過度飲食失節寒溫不適勞役所傷而然夫元氣穀氣營氣清氣衛氣生髮諸陽上升之氣此六者皆飲食入胃穀氣上行胃氣之異名其實一也既脾胃有傷則中氣不足中氣不足則六腑陽氣皆絕於外故經言五臟之氣已絕於外者是六腑之元氣病也氣傷臟乃病臟病則形乃應是五臟六腑真氣皆不足也惟陰大獨旺上乘陽分故榮衛失守諸病生焉其中變化皆由中氣不足乃生髮耳後有脾胃已受勞役之疾飲食又復失節耽病日久事息心安飽食太甚病乃大作概其外傷風寒六淫客邪皆有餘之病當瀉不當補飲食失節中氣不足之病當補不當瀉舉世醫者皆以飲食失節勞役所傷中氣不足當補之證認作外感風寒有餘客邪之病重瀉其表使榮衛之氣外絕其死只在旬日之間所謂差之毫釐謬以千里可不詳辨乎按陰陽應象論雲天之邪氣感則害人五臟是八益之邪乃風邪傷人筋骨風從上受之風傷筋寒傷骨蓋有形質之物受病也緊在下焦肝腎是也肝腎者地之氣難經解云肝腎之氣已絕於內以其肝主筋腎主骨故風邪感人則筋骨疼痛筋骨之絕則肝腎之本亦絕矣乃有餘之證也又云水穀之寒熱感則害人六腑是七損之病乃內傷飲食也黃帝針經解云適飲食不節勞役所傷濕從下受之謂脾胃之氣不足而反下行極則衝脈之火逆而上是無形質之元氣受病也系在上焦心肺是也心肺者天之氣故難經解云心肺之氣已絕於外以其心主榮肺主衛榮者血也脈者血之府神之所居也衛者元氣也神之別行衛護周身在於皮毛之間者肺絕故皮毛先絕神無所依故內傷飲食則亦惡風寒是榮衛失守皮膚間無陽以滋養不能任風寒也皮毛之絕則心肺之本亦絕矣蓋胃氣不升元氣不生無以滋養心肺乃不足之證也謂受病之人飲食失節勞役所傷因而飽食內傷者極多外傷者間而有之世俗不知往往將元氣不足之證便作外傷風寒表實之證而反瀉心肺是重絕其表也安得不死乎古人所謂實實虛虛醫殺之耳若曰不然請以眾人之耳目聞見者證之曏者壬辰改元京師戒嚴迫三月受敵者凡半月圍解之後都人之不受病者萬無一二既而病死者繼踵不絕都門十有二所每日各門所送多者二千少不下一千似此者幾三月此百萬人豈俱感風寒外傷者耶大抵人在圍城中飲食不節乃勞役所傷不待言而知由其朝飢暮飽起居不時寒溫失所動經兩三月胃氣虧乏久矣一旦飽食太過感而傷人而又調治失宜其死也無疑矣非惟大梁為然遠在真祐與定間如東平如太原如鳳翔解圍之後病傷死無不然者余在大梁凡所親見有發表者有以巴豆推之者有以承氣湯下之者俄而變結胸發黃又以陷胸湯丸及茵陳湯下之無不死者蓋初非傷寒以調治瘥互變而似真傷寒之證皆藥之罪也往者不可追來者猶可及輒以平生已試之效著內外傷辨論一篇推明前哲之餘論歷舉近世之變故庶幾同志者審其或中觸類而長之免後人無橫夭耳僭易之罪將何所逃乎上辨陰證陽證外傷寒邪之證與飲食失節勞役形質之病及內傷飲食俱有寒熱舉世盡將內傷飲食失節勞役不足之病作外傷寒邪有餘表實之證反瀉其表枉死者豈勝言哉皆由不別其寒熱耳今細為分解之外傷寒邪發熱惡寒寒熱並作其熱也翕翕發熱又為之拂拂發熱發於皮毛之上如羽毛之拂明其熱在表也是寒邪犯高之高者也皮膚毛腠陽之分也是衛之元氣所滋養之分也以寒邪乘之郁遏陽分陽不得伸故發熱也其面赤鼻氣擁塞不通心中煩悶稍以袒露其皮膚已不能禁其寒矣其表上虛熱止此而已其惡寒也雖重衣下幕逼近烈火終不能樂其寒一時一日增加愈甚必待傳入里作下證乃罷其寒熱齊作無有間斷也其內傷飲食不節或勞役所傷亦有頭痛項強腰痛與太陽表證微有相似余皆不同論中已辨之矣內傷不足之病表上無陽不能御風寒也此則常常有之其躁熱發於腎間者間而有之與外中寒邪略不相似其惡風寒也蓋脾胃不足營氣下流而乘腎肝此痿厥氣逆之漸也若脾氣平常飲食入胃其營氣上行以舒於心肺以滋養上焦之皮膚腠理之元氣也既下流其心肺無所稟受皮膚間無陽失其榮衛之外護故陽分皮毛之間虛弱但見風見寒或居陰寒處無日陽處便惡之也此常常有之無間斷者也但避風寒及溫暖處或添衣蓋溫養其皮膚所惡風寒便不見矣是熱也非表傷寒邪皮毛髮熱也乃腎間受脾下流之濕氣閉塞其下致陰火上動作蒸蒸而燥熱上徹頭項傍徹皮膚渾身躁熱作須待袒衣露居近寒涼處即已或熱極而汗出亦解彼外傷惡寒發熱豈有汗出者乎若得汗則病愈矣以此辨之豈不如黑白之易見乎當內虛而傷之者躁熱也或因口吸風寒之氣鬱其陰火使咽膈不通其吸入之氣欲入為膈上衝脈之火所拒使氣不得入其胸中之氣為外風寒所遏而不得伸令人口開目瞪極則聲發於外氣不得上下塞於咽中而氣欲絕或又因噦因噎因吐而躁熱發必有所因方見此證其表虛惡風寒之證復見矣表虛之弱為陰火所乘躁發須臾而過其表虛無陽不任風寒復見矣是表虛無陽常常有之其躁熱則間而有之此二者不齊作躁作寒已寒作躁已非如外傷之寒熱齊作無有間斷也百病俱有身熱又為之肌熱又為之皮膚間熱以手捫之方知者是也乃肌體有形之熱也亦須皆待陰陽既和汗出則愈矣慎不可於此上辨之以其虛實內外病皆有之故難辨耳只依先說病人自覺發熱惡寒之熱及躁作之熱上辨之為準則矣上辨寒熱外感八風之邪乃有餘證也內傷飲食不節勞役所傷皆不足之病也其內傷亦惡風自汗若在溫暖無風處則不惡矣與外傷鼻流清涕頭痛自汗頗相似分之特異耳外感風邪其惡風自汗頭痛鼻流清涕常常有之一日一時增加愈甚直至傳入里作下證乃罷語聲重濁高厲有力鼻息擁塞不通能飲食腹中和口知味大小便如常筋骨疼痛不能動搖便著床枕非扶不起其內傷與飲食不節勞役所傷然亦惡風居露地中遇大漫風起卻不惡也惟門窗隙中些小賊風來必大惡也與傷風傷寒俱不同矣況鼻流清涕頭痛自汗間而有之鼻中氣短少氣不足以息語則氣短而怯弱妨食或食不下或不飲食三者互有之腹中不和或腹中急而不能伸口不知五穀之味小便頻數而不渴初勞役得病食少小便赤黃大便常難或秘或結或虛坐只見些小白膿時有下氣或泄黃如糜或溏泄色白或結而不通若心下痞或胸中閉塞如刀劙之痛二者亦互作不並出也有時胃脘當心而痛上支兩脅痛必臍下相火之勢如巨川之水不可遏而上行使陽明之經逆行亂於胸中其氣無止息甚則高喘熱傷元氣令四支不收無氣以動而懶倦嗜臥其外感風寒俱無此證故易分別耳上辨外感八風之邪或有飲食勞役所傷之重者三二日間特與外傷風者相似其餘證有特異者若不將兩證重別分解猶恐將內傷不足之證誤作有餘外感風邪雖詞理有重複處但欲病者易辨醫者易治耳內傷及勞役飲食不節病手心熱手背不熱外傷風寒則手背熱手心不熱此辨至甚皎然上辨手背手心若飲食勞役所傷其外證之顯必在口必口失味必失穀味必腹中不和必不欲言縱勉強對答聲必怯弱口沃沫多唾鼻中清涕或有或無即陰證也外傷風寒則其外證必顯在鼻鼻氣不利聲濁不清其言壅盛有力而口中必和傷寒則面赤鼻壅塞而干傷風則鼻流清涕而已內經云鼻者肺之候肺氣通於天外傷風寒則鼻為之不利口者坤土也脾氣通於口飲食失節勞役所得口不知穀味亦不知五味又云傷食惡食傷食明矣上辨鼻口外傷風寒者故其氣壅盛而有餘內傷飲食勞役者其口鼻中皆氣短促不足以息何以分之蓋外傷風寒者心肺元氣初無減損又添邪氣助之使鼻氣擁塞不利面赤不通其鼻中氣不能出並從口出但發一言必前輕而後重其言高其聲壯厲而有力傷寒則鼻乾無涕面擁色赤其言前輕後重其聲壯厲而有力者乃有餘之驗也傷風則決然鼻流清涕其聲嗄其言響如從甕中出亦前輕而後重高揭而有力皆氣盛有餘之驗也內傷食勞役者心肺之氣先損為熱既傷氣四肢無力以動故口鼻中皆短氣少氣上喘懶語人有所問十不欲對其一縱勉強答之其氣亦怯其氣亦低是其氣短少不足之驗也明白如此雖婦人女子亦能辨之豈有醫者反不能辨之乎上辨氣少氣盛內證頭痛有時而作有時而止外證頭痛常常有之直須傳裡實方罷此又內外證之不同也上辨頭痛內傷等病是心肺之氣已絕於外必怠惰嗜臥四肢沉困不收此乃熱傷元氣脾主四肢既為熱所乘無氣以動經云熱傷氣又云熱則骨消筋緩此之謂也若外傷風寒是腎肝之氣已絕於內腎主骨為寒肝主筋為風自古腎肝之病同一治以其遞相維持也故經言膽主骨膀胱主筋是也或中風或傷寒得病之日便著床枕非扶不起筋骨為之疼痛不能動搖乃形質之傷經云寒傷形又云寒則筋攣骨痛此之謂也上辨筋骨四肢外感風寒之邪三日以外谷消水去邪氣傳裡始有渴也內傷飲食失節勞役久病者必不渴是邪氣在血脈中有濕故不渴也初勞役形質飲食失節傷之重者必有渴以其心火熾上克於肺金故渴也又當以此辨之雖渴欲飲水者當徐徐少與之不可縱意而飲恐水多峻下則胃氣愈弱輕則為脹重則傳變諸疾必反復悶亂百脈不安夜加增劇不得安臥不可不預度也上辨渴與不渴仲景傷寒論中風能食傷寒亦能食二者皆口中和而不惡食若勞役所傷及飲食失節寒溫不適三者俱惡食口不知五味亦不知五穀之味只此一辨足以分內外有餘不足二證也傷寒證雖亦能食而不惡食口中和知五味亦知穀味蓋無內證則心氣和脾氣通知五穀之味矣上辨外傷不惡食若勞役飲食失節寒溫不適三者皆惡食論飲食勞倦為胃氣不足所致古者至人窮陰陽之化究生死之際所著內經悉言人以胃氣為本蓋人受水穀之氣以生所謂清氣營氣衛氣春升之氣皆胃氣之別稱也夫胃為水穀之海飲食入胃遊溢積氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行合於四時五臟陰陽揆度以為常也苟飲食失節寒溫不適則脾腎乃傷喜怒憂恐勞役過度而損耗元氣既脾胃虛弱元氣不足而心火獨盛心火者陰火也起於下焦其繫系於心心不主令相火代之相火下傷包絡之火元氣之賊也火與元氣不兩立一勝則一負脾胃氣虛則下流於腎肝陰火得以乘其土位故脾胃之證始得之則氣高而喘身熱而煩其脈洪大而頭痛或渴不止皮膚不任風寒而生寒熱蓋陰大上衝則氣高而喘身煩熱為頭痛為渴而脈洪大脾胃之氣下流穀氣不得升是生長之令不行無陽以護其榮衛不任風寒乃生風熱皆脾胃之氣不足所致也然而與外感風寒之證形頗同而理異內傷脾胃乃傷其氣外感風寒乃傷其形傷外為有餘有餘者瀉之傷內為不足不足者補之治之下之吐之克之之類皆瀉也溫之和之調之養之之類皆補也內傷不足之病苟認作外感有餘之病而反瀉之則虛其虛也難經雲實實虛虛損不足而益有餘如此死者醫殺之耳惟當以甘溫之劑補其中升其陽甘寒以瀉其火則愈內經曰勞者溫之損者溫之蓋溫能除大熱大忌苦寒瀉胃土耳今立補中益氣湯主之論勞役傷與內傷外感不同或因勞役腎間陰火沸騰事間之際於陰涼處解脫衣裳更有新沐浴於背陰處坐臥其陰火下行還歸腎間皮膚腠理極虛無陽為寒涼所遏表虛不任其風寒自認外感風寒求醫解表以重絕元氣取禍如反掌苟幸而免者致虛勞氣血皆弱其表虛之人為風寒所遏亦是虛邪犯表始病一二日之間特與外中賊邪有餘之證頗相似處故致疑惑請醫者只於氣少氣盛上辨之其外傷賊邪必語聲高厲而有力若是勞役所傷飲食不節表虛不足之病必短氣氣促懶語其聲因弱而無力至易見也上辨勞役受病表虛不作表實治之復有一等乘天氣大熱之時在於路途中勞形得之或在田野間勞形得之更或有身體薄弱食少勞役過甚又有修善常齋之人胃氣久虛而因勞役得之者皆與陽明中熱白虎湯證相似必肌體捫摸之壯熱必躁熱悶亂大惡熱渴而飲水以勞役過甚之故亦身疼痛始受病之時特與中熱外得有餘之病相似若誤與白虎湯旬日必死此證脾胃大虛元氣不足鼻口中氣皆短促而上喘至日轉以後是陽明得時之際病必少減若是外中熱之病必到日晡之際大作譫語其熱增加大渴飲水煩悶不止其勞役不足者皆無此證尤易為分解若有難決疑似之證必當待一二日而求醫治療必不至錯誤矣上辨中熱頗相似論飲食自倍腸胃乃傷分而治之痹論云陰氣者靜則神藏躁則消亡飲食自倍腸胃乃傷此混言之也分之為二飲也食也又經云因而大飲則氣逆因飽食筋脈橫解則腸癖為痔飲者無形之氣傷之則宜發汗利小便使上下分消其濕解酲湯五苓散之類主之食者有形之物傷之則宜損其谷其次莫若消導丁香爛飯丸枳朮丸之類主之稍重則攻化三稜消積丸木香見晛丸之類主之尤重則或吐或下瓜蒂散備急丸之類主之以平為期蓋脾已傷又以藥傷使營運之氣減削食愈難消故至真要論云大毒治病十去其六小毒治病十去其七無毒治病十去其八常毒治病十去其九穀肉果菜食養盡之無使過之傷其正也不盡行復如法聖人垂此嚴戒是為萬世福如能慎言語節飲食所謂治未病也謹按王安道曰勞倦傷飲食傷二者雖俱為內傷然不可混而為一難經所謂飲食勞倦則傷脾者蓋為脾主飲食而四肢亦屬脾故飲食失節勞役四肢皆能傷於脾爾非謂二者同類而無辨也夫勞倦傷飲食傷雖與風寒暑濕有餘之病不同然飲食傷又與勞倦傷不同勞倦傷誠不足矣飲食傷尤當於不足之中分其有餘不足何也蓋飢餓不飲食與飲食太過雖皆失節然必明其有兩者之分方盡其理節也者何也無不及無太過之中道也夫飢餓不飲食者胃氣空虛此為不足固失節也飲食自倍而停滯者胃氣受傷此不足之中兼有餘亦失節也以受傷言則不足以停滯言則有餘矣惟其不足故補益惟其有餘故消導亦有物滯氣傷必補益消導兼行者亦有物暫滯而氣不甚傷宜消導獨行不須補益者亦有既停滯而復自化不須消導但當補益或亦不須補益者潔古東垣枳朮丸之類雖曰消導固有補益之意存乎其間其它如木香分氣丸導氣枳實丸大枳殼丸之類雖無補益然施之於物暫滯氣不甚傷者豈不可哉但不宜視為通行之藥爾且所滯之物非枳朮丸之力所能去者亦安可泥於消導而弗知變乎故備急丸煮黃丸瓜蒂散等之推逐者潔古東垣亦未嘗委之而弗用也故善用兵者攻亦當守亦當不善者則宜攻而守宜守而攻其敗也非兵之罪用兵者之罪耳觀乎此則知消導補益推逐之理矣斯論本以上所辨又推廣之因取參附以備其旨又曰經云有所勞倦形氣衰少穀氣不盛上焦不行下脘不通胃氣熱熱氣熏胸中故內熱嗟夫此內傷之說之原乎請釋其義如左夫人身之陰陽有以表裡言者有以上下之分言者有以升降呼吸之氣言者余如動靜語默起居之類甚多不必悉舉此所謂陰虛之陰其所指與數者皆不同蓋勞動之過則陽和之氣皆亢極而化為火矣況水穀之味又少入是故陽愈盛陰愈衰也此陰虛之陰蓋指身中之陰氣與水穀之味耳或以下焦陰分為言或以腎水真陰為言皆非也夫有所勞倦者過動屬火也形氣衰少者壯火食氣也穀氣不盛者勞傷元氣則少食而氣衰也上焦不行者清陽不升也下脘不通者濁陰不降也夫胃受水穀故清陽升而濁陰降以傳化出入滋榮一身也今胃不能納而穀氣衰少則清無升濁無降矣故曰上焦不行下脘不通然非謂絕不行不通也但比之平常無病時則謂之不行不通耳上不行下不通則鬱矣鬱則少火皆成壯火而胃居上焦下脘兩者之間故胃氣熱熱則上炎故熏胸中而為內熱也斯東垣所謂勞傷形體所謂飲食失節而致熱者此言正與調經論篇之旨相合宜引此段經文於內外傷辨以為之主今特採附並外傷內傷所受經旨異同論錄於下客或難予曰素問陰陽應象論雲天之邪氣感則害人五臟水穀之寒熱感則害於六腑太陰陽明論云犯賊風虛邪者陽受之食飲不節起居不時者陰受之陽受之則入六腑陰受則入五臟兩說正相反願聞其解余復之曰此所謂似反而不反者也夫感天之邪氣犯賊風虛邪外傷有餘之病也感水穀寒熱食飲不節內傷不足之病也二者之傷臟腑皆嘗受之但隨其所從所發之處而為病耳不可以此兩說之異而致疑蓋並行不相悖也讀者當合而觀之其旨斯盡若曰不然請以諸處所論證之金匱真言論曰風觸五臟邪氣發病八正神明論曰夫八正之虛邪以身之虛而逢天之虛兩虛相感其氣至骨入則傷五臟靈樞經曰五臟之中風又曰東風傷人內舍於肝南風傷人內舍於心西南風傷人內舍於脾西風傷人內舍於肺北風傷入內舍於腎觀乎此則天之邪氣固傷五臟矣靈樞又曰邪之中人也無有常中於陰則溜於腑又曰虛邪之中人也始從皮膚以入其傳自絡脈而經而輸而伏沖之脈以至於腸胃又曰東北風傷人內舍於大腸西北風傷人內舍於小腸東南風傷人內舍於胃觀乎此則天之邪氣豈不傷六腑乎素問曰飲食自倍腸胃乃傷觀乎此則水穀寒熱固傷六腑矣靈樞又曰形寒飲冷則傷肺難經曰飲食勞倦則傷脾觀乎此則水穀寒熱豈不傷五臟乎至於地之濕氣亦未必專害皮肉筋脈而不能害臟腑邪氣水穀亦未必專害臟腑而不能害皮肉筋脈也但以邪氣無形臟主臟精氣故以類相從而多傷髒水谷有形腑主傳化物故因其所由而多傷腑濕氣浸潤其性緩慢其入人也以漸其始也自足故從下而上從淺而深而多傷於皮肉筋脈耳孰謂濕氣全無及於臟腑之理哉至若起居不時一語蓋勞後所傷之病不繫上文異同之義故不及之論酒飲傷夫酒者大熱有毒氣味俱陽乃無形之物也若傷之止當發散汗出則愈矣此最妙法其次莫如利小便二者乃上下分消其濕何酒病之有今之酒病者往往服酒蒸丸大熱之藥下之又有用牽牛大黃下之者是無形元氣受病反下有形陰血乖誤甚矣酒性大熱已傷元氣而復重瀉之況亦損腎水真陰及有形陰血俱為不足如此則陰血已虛真水愈弱陽毒之熱大旺反增其陰火是謂元氣消亡七神何依折人長命不然則虛損之病成矣金匱要略云酒疸下之久久為黑疸慎不可犯此戒不若令上下分消其濕解酲湯主之謹按酒者是有形之物即水飲同體也今言無形元氣受病不得傷於有形陰血者蓋謂酒者濕熱之物入胃則臟氣俱熱逐氣升降之際而半有消耗之矣至傷於腸胃則升之不散降之不下鬱於氣分無形之地位故言無形之物非若水飲然體全降於腸胃中也若今人之飲醇酒則便少此其可驗是以傷則宜汗之泄之不得用重峻下劑蓋此等藥不能入氣分反傷有形陰血爾但斯意隱然使人不能無疑故或有辨之者茲不復具然昔人有用下劑者蓋或有酒飲傷積日久而汗之泄之不能愈則重峻下劑而或可哉故用者自宜對證詳審勿以辭害意可也論傷食宜吐解云盛食填塞於胸中為之窒塞兩手寸脈當主事兩尺脈不見其理安在胸中有食故以吐出之食者物也物者坤土也是足太陰之號也胸中者肺也為物所傷肺者手太陰金也金主殺伐也與坤土俱在於上而旺於天金能剋木故肝水生髮之氣伏於地下非木鬱而何吐去上焦陰土之物木得舒暢則鬱結去矣食塞於上脈絕於下若不明天地之道無由違此至理水火者陰陽之徵兆天地之別名也故曰獨陽不生獨陰不長天之用在於地下則萬物生長矣地之用在於天上則萬物收藏矣此乃天地交而萬物通矣此天地相根之道也故陽火之根本於地下陰水之源本於天上故曰水出高源故人五臟主有形之物物者陰也陰者水也上三部脈主之偏見於寸口食塞在上是絕五臟之源源絕則水不下流兩尺竭絕此其理也何疑之有論內傷飲食用藥所宜所禁內傷飲食付藥者受藥者皆以為瑣末細事是以所當重者為輕利害非細殊不思胃氣者營氣也衛氣也穀氣也清氣也資少陽生髮之氣也人之真氣衰旺皆在飲食入胃胃和則穀氣上升穀氣者升騰之氣也乃足手少陽元氣始發生長萬化之別名也飲食一傷若消導藥的對其所傷之物既消則胃氣愈旺五穀之精華上騰乃清氣為天者也精氣神氣皆強盛也七神衛護生氣不乏增益大旺氣血周流則百病不能侵雖有大風苛毒弗能害也此一藥之用其利博哉易水張先生嘗戒不可用峻利食藥食藥下咽未至藥丸施化其標皮之力始開便言空快也所傷之物已去若更待一兩時辰許藥盡化開其峻藥必有情性病去之後脾胃安得不損乎脾胃既損是真氣元氣敗壞促人之壽常時用枳朮丸一藥消化胃中所傷下胃不能即去須待一兩時辰許食則消化是先補而後化其所傷則不峻利矣因用荷葉燒飯為丸荷葉一物中央空虛象震卦之體震者動也人感之生足少陽甲膽也甲膽者風也生化萬物之根蒂也左傳云履端於始序則不愆人之飲食入胃營氣上行即少陽甲膽之氣也其手少陽三焦經人之元氣也手足經同法便是少陽元氣生髮也胃氣穀氣元氣甲膽上升之氣一也異名雖多止是胃氣上升者也若內傷脾胃以辛熱之物酒肉之類自覺不快覓藥於醫者此風習以為常醫者亦不問所傷付之以集香丸巴豆大熱藥之類下之大便下則物去遺留食之熱性藥之熱性重傷元氣七神不熾經云熱傷氣正謂此也其人必無氣以動而熱困四肢不舉傳變諸疾不可勝數使人真氣自此衰矣若傷生冷硬物世醫或用大黃牽牛二味大寒藥投之物隨藥下所傷去矣遺留食之寒性藥之寒性重瀉其陽陽去則皮膚筋肉血脈無所依倚便為虛損之證論言及此令人寒心夫辛辣氣薄之藥無故不可亂服非止牽牛而已至人要大論云五味入口各先逐其所喜攻攻者克似瀉也辛味下咽先攻瀉肺之正氣正氣者真氣元氣也其牽牛之辛辣猛烈奪人尤甚飲食所傷脾胃受邪當以苦味泄其腸胃可也肺與元氣何罪之有夫牽牛不可用者有五此其一也況胃主血為物所傷物者有形之物也皆血病血病瀉氣此其二也且飲食傷於中焦止合克化消導其食重瀉上焦肺中已虛之氣此其三也食傷腸胃當塞因塞用又寒因寒用枳實大黃苦寒之物以治有形是也反以辛辣牽牛散瀉真氣犯大禁四也殊不知針經有云外來客邪風寒傷人五臟若誤瀉胃氣必死誤補亦死其死也無氣以動故靜若內傷腸胃反瀉五臟必死誤補亦死其死也陰氣有餘故躁今內傷腸胃是謂六腑不足之病及瀉上焦虛無肺氣肺者五臟之一數也為牽牛之類朝損暮損其元氣消耗此乃暗折人壽數犯大禁五也良可哀嘆又曰胃惡熱而喜清大腸惡清冷而喜熱兩者不和何以調之岐伯曰調此者飲食衣服亦欲適寒溫寒無悽愴暑無出汗飲食熱無灼灼寒無凔凔寒溫中適故氣將持乃不致邪僻詳見本經是必有因用豈可用俱寒俱熱之食藥致損者與內經云內傷者其氣口脈反大於人迎一倍二倍三倍分經用藥又曰上部有脈下部無脈其人當吐不吐者死如但食不納噁心欲吐者不問一倍二倍不當正以瓜蒂散吐之但以指或以物探去之若所傷之物去不盡者更診其脈問其所傷以食藥去之以應塞因塞用又謂之寒因寒用泄而下降乃應太陰之用其中更加升發之藥令其元氣上升塞因塞用因曲而為之直何為曲內傷胃氣是也何為直而升發胃氣是也因治其飲食之內傷而使生氣增益胃氣完復此乃因曲而為之直也若依分經用藥其所傷之物寒熱溫涼生硬柔軟所傷不一難立定法只隨所傷之物不同各立治法臨時加減用之其藥又當問病人從來稟氣盛衰所傷寒物熱物是喜食而食之耶不可服破氣藥若乘飢困而食之耶當益胃氣或為人所勉勸強食之宜損血而益氣也診其脈候傷在何臟方可與對病之藥豈可妄瀉天真生氣以輕喪身寶乎且如先食熱而不傷繼之以寒物因後食致前食亦不消化而傷者當問熱食寒食孰多孰少斟酌與藥無不當矣喻如傷熱物二分寒物一分則當用寒藥二分熱藥一分相合而與之則榮衛之氣必得周流更有或先飲酒而後傷寒冷之食及傷熱食冷水與冰如此不等皆當驗其節次所傷之物約量寒熱之劑分散各各對證而與之無不取驗內傷治法消導之劑潔古枳朮丸治痞消食強胃枳實麩炒一兩白朮二兩上同為細末荷葉裹飯燒為丸如桐子大每五十丸多用白湯送下按論云用術者本意不取其食速化但久令人胃氣強食不復傷也丁香爛飯丸治飲食所傷丁香皮甘草炙各二錢砂仁益智仁甘松各三錢丁香京三稜炮木香廣朮炮各一錢香附子半兩上為細末湯浸蒸餅為丸如綠豆大每三十丸白湯下或細嚼亦可不拘時候按此寒濕勝者最宜用之東垣橘皮枳朮丸治老幼元氣虛弱飲食不消或臟腑不調心下痞悶橘皮枳實各一兩白朮二兩上為細末荷葉燒飯為丸如桐子大每五十丸溫水送下食遠服按此內傷用藥之大法所貴服之強人胃氣令益厚雖猛食多食而不傷此能用食藥者也曲糵枳朮丸治為人所勉強食之破心腹滿悶不快白朮二兩枳實炒神麯炒麥蘖麵炒各一兩上為細末荷葉燒飯丸如桐子大每五十丸溫水下木香枳朮丸破滯氣消飲食開胃進食木香枳實炒各一兩白朮二兩上制服如前木香化滯湯治內憂氣食濕面結於中脘腹皮底徹痛心下痞滿不思飲食食之不散常常痞氣木香紅花各三錢橘皮當歸梢各二錢柴胡四錢草豆蔻甘草炙各半兩半夏一兩枳實炒二錢上銼如麻豆大每服三五錢入姜煎食遠服半夏枳朮丸治因食冷內傷半夏湯洗焙枳實炒各一兩白朮二兩上為細末荷葉燒飯為丸如綠豆大每五六十丸溫水下如食傷寒熱不調每服加二黃丸十粒草豆蔻丸治秋冬傷寒冷物胃脘當心而痛上支兩脅膈咽不通草豆蔻麵裹煨一兩神麯炒半兩白朮一兩橘皮乾生薑青皮各二錢黃芩麥蘖半夏炒鹽各半兩枳實炒一兩上為細末湯浸蒸餅為丸如綠豆大每服五十丸白湯下量所傷多少加減服之按論云如冬月用別作一藥不用黃芩歲火不及又傷冷物加以溫劑是其治也然有熱物傷者從權以寒藥治之隨時之宜不可不知也除濕益氣丸治傷濕面心腹滿悶肢體沉重枳實麩炒白朮黃芩各一兩蘿白子炒熟去氣半兩神麯炒一兩紅花三錢上為細末荷葉燒飯為丸如綠豆大每五六十丸白湯下二黃丸治傷熱食痞悶兀兀欲吐煩亂不安黃芩二兩黃連酒浸一兩升麻柴胡各三錢甘草一錢枳實半兩炒上為極細末湯浸蒸餅丸如綠豆大每五七十丸白湯下白朮丸治傷豆粉濕面油膩之物白朮半夏湯洗神麯炒枳實炒各一兩橘皮七錢黃芩半兩白礬枯三錢上為細末湯浸蒸餅為丸如綠豆大一倍每五十丸白湯下量所傷加減服論曰素食者多用乾薑故加黃芩以瀉之按以上諸方並宜隨寒熱所用出太陰例葛花解酲湯白豆蔻砂仁葛花各半兩木香半錢青皮三錢陳皮白茯苓豬苓人參各一錢半白朮神麯炒澤瀉乾生薑各二錢上為細末和勻每三錢白湯調下但得微汗酒病去矣論云此蓋不得已用之豈可恃賴日日飲酒是方氣味辛辣偶因酒病服之則不損元氣何者敵酒病故也若頻服之損人天年也除濕散治傷馬乳並牛羊駱水一切冷病車前子炒澤瀉各半兩神麯炒一兩半夏湯泡七次乾生薑各三錢紅花甘草炙各二錢茯苓七錢上為細末每三錢匕白湯調食前服五苓散方見濕門按以上三方並太陽例藥妙利之劑也三稜消積丸治傷生冷硬物不能消化心腹滿悶丁皮益智仁各三錢陳皮青皮各五錢茴香炒半兩炒曲廣朮炮京三稜炮各七錢巴豆和米炒去米五錢上為細末醋糊丸如桐子大每十丸至二十丸溫薑湯下食前服備急大黃丸療心腹諸卒暴百病大黃乾薑巴豆去皮各一兩上須精擇好藥搖羅蜜和更搗一千杵丸如小豆大每三丸大小量之若中惡客忤心腹脹滿卒痛如錐刀刺痛氣急口噤屍卒死者以暖水若酒服之或不下捧頭起下咽須臾未瘥更與三丸以腹中鳴轉即吐下便愈若口已噤亦須折齒嚾之令入尤妙忌蘆筍豬肉冷水肥臟易水張先生又名獨行丸乃急劑也海藏神應丸治因一切冷物冷水及潼乳酪水腹痛腸鳴米穀不化巴豆杏仁乾薑百草霜各半兩丁香木香各二錢黃蠟一兩上先將黃蠟用好醋煮去渣將巴豆杏仁同炒黑煙盡研如泥將蠟再上火入小油半兩溶開入在杏仁等泥子內同攪旋下丁香木香等藥末研勻搓作挺子油紙裹了旋丸每用三五十丸溫米飲下食前服吐劑瓜蒂散方見疾飲門按論云若不兩尺脈絕無不宜便用此藥恐損元氣令人胃氣不復若止是胸中窒塞悶亂不通以指探去之如不得吐者以物探去之得吐則已如食不去用此藥去之補益之劑補中益氣湯方見熱門按立方本指云夫脾胃虛者因飲食勞倦心火亢甚而乘其土位其次肺氣受邪須用黃耆最多人參甘草次之脾胃一虛肺氣先絕故用黃耆以益皮毛而閉腠理不令自汗上喘氣短損其元氣人參以補之心火乘脾炙甘草之甘溫以瀉火熱而補脾胃中元氣若脾胃急痛脹中急縮者宜多用之經云急者緩之白朮苦甘溫除胃中熱利腰臍間血胃中清氣在下升麻柴胡以引之引黃耆甘草甘溫之氣味上升能補衛氣之散解而實其表也又緩帶脈之縮急二味苦平味之薄者陰中之陽引清氣上升也氣亂於胸中為清濁相干用陳皮以理之又能助陽氣之升以散滯氣助諸甘辛為用也脾胃氣虛不能升浮為陰火傷其生髮之氣榮血大虧營氣不榮陰火熾盛是血中伏火日漸煎熬血氣日減心主血血減則心無所養致使心亂而煩病名曰悗悗者心惑而煩悶不安也故加辛甘微溫之劑生陽氣陽旺則能生陰血更以當歸和之少加黃柏以救腎水能瀉陰中之伏火如煩不止少加生地黃補腎水水旺而心火自降如氣浮心亂以硃砂安神丸鎮固之則愈安神丸方見熱門頭痛加蔓荊子三分痛甚加川芎五分頂痛腦痛加藁本五分細辛三分諸頭痛並用此四味頭痛有痰沉重懶倦者乃太陰厥頭痛加半夏半錢姜三分耳鳴目黃頰頷腫頸有臑肘臂外後臁痛面赤脈洪大者以羌活一錢防風七分甘草五分藁本七分通其經血加黃芩三分黃連三分消其腫人參五分黃耆七分益元氣而瀉火邪嗌痛頷腫脈洪大面赤加黃芩三分桔梗七分甘草三分口乾嗌乾者加葛根五分升引胃氣上行以潤之心下痞夯悶者加芍藥黃連各一錢如痞腹脹加枳實三分厚朴七分木香三分砂仁三分如天寒少加乾薑心下痞覺中寒加附子黃連各一錢不能食而心下痞加生薑陳皮各一錢能食而心下痞加黃連半錢枳實三分脈緩有痰而痞加半夏黃連各一錢腹中痛加白芍半錢甘草三分如惡寒覺冷痛加中桂半錢夏月腹中痛不惡寒不惡熱者加黃芩五分芍藥一錢甘草五分以治時熱也腹痛在寒涼時加半夏益智豆蔻之類脅下痛或縮急俱加柴胡臍下痛加真熟地黃半錢有寒者加肉桂半錢升陽散火湯方見火門當歸補血湯方見熱門升陽順氣湯治因飲食不節勞役所傷腹脅滿悶短氣遇春則口無味遇夏雖熱猶寒飢常如飽不喜食冷升麻柴胡各一錢黃耆一兩半夏三錢甘草炙半錢陳皮一錢人參三錢神麯炒一錢當歸身一錢黃柏半錢草豆蔻仁二錢上㕮咀每三錢或半兩水煎入生薑三片按論云脾胃不足之證須用升麻柴胡苦平味之薄者陰中之陽引脾胃中清氣行於陽道及諸經生髮陰陽之氣以滋春氣之和也又引黃耆參草甘溫之氣味上行充實腠理使陽氣得衛外而為固也凡治脾胃之藥多以升陽補氣名之者此也升陽補氣湯治飲食不時飢飽勞役胃氣不足脾氣下溜氣短無力不能寒熱早飯罷轉增昏悶須要眠睡怠惰四肢不收懶倦動作及五心煩熱升麻羌活獨活防風白芍澤瀉甘草炙各一錢厚朴半錢制柴胡二錢半生地黃一錢半上為粗末每五錢水煎入姜三片棗二枚如腹脹及窄狹加厚朴腹中似硬加砂仁三分按此用升浮扶持胃氣抑肝清脾藥也參朮調中湯瀉熱補氣止嗽定喘和脾胃進飲食黃耆四分桑白皮五分人參甘草炙白茯苓各三分五味子二十個白朮三分地骨皮麥門冬陳皮各二分青皮一分上㕮咀作一服水煎大溫服早飯後忌多言語勞役按論云內經曰火位之主其瀉以甘以黃耆甘溫瀉熱補氣桑白皮苦微寒瀉肺火定喘故以為君肺欲收急食酸以收之以五味之酸收耗散之氣止咳嗽脾胃不足以甘補之白朮人參炙甘草苦甘溫補脾緩中為臣地骨皮苦微寒善解肌熱茯苓甘平降肺火麥門冬甘微寒保肺氣為佐青陳皮苦辛溫散胸中滯氣為使也升陽益胃湯治脾胃虛則怠惰嗜臥四肢不收時值秋燥令行濕熱少退體重節痛口乾舌乾飲食無味大便不調小便頻數食不消兼見肺病灑淅惡寒慘慘不樂面色惡而不和乃陽氣不伸故也當以升陽益胃名之羌活獨活防風各半兩以秋旺故以辛溫瀉之柴胡白朮茯苓渴者勿用澤瀉各三錢黃耆二兩人參半夏甘草炙各一兩黃連一錢陳皮四錢白芍五錢何故秋旺用參朮芍藥之類反補旺脾胃虛則肺俱受邪故因時而補易為力也上㕮咀每服三錢水煎入薑棗溫服早飯後或加至半兩服藥後如小便罷而病加劇是不宜利小便當少去茯苓澤瀉若喜食初一二日不可飽食恐胃再傷以藥力尚少胃氣不得轉運升發也須薄味之食或美食助其藥力益外浮之氣而滋其胃氣慎不可淡食以損力而助邪氣之降沉也可以小役形體使胃與藥得轉運升發慎勿大勞役使氣復苦脾胃得安靜為佳若胃氣稍強少食果以助谷藥之力經云五穀為養五果為助者也雙和散補血益氣治虛勞少力黃耆川芎當歸熟地黃各一兩官桂甘草炙各七錢半白芍二兩半上為粗末每四錢入薑棗水四盞煎溫服論云治大疾之後虛勞氣乏者以此調治不熱不冷溫而有餘調中益氣湯夫脈弦洪緩而沉按之中之下得一澀其證四肢滿閉肢節煩疼難以屈伸身體沉重煩心不安忽肥忽瘦四肢懶倦口失滋味大小便清利而數或上飲下便或大便澀滯不行一二日一見夏月飧泄米穀不化或便後見血見白膿胸滿短氣咽膈不通安臥嗜睡無力不思飲食升麻二分黃耆一錢甘草半錢蒼朮四分木香一分人參五分柴胡橘皮各二分上㕮咀作一服水煎食前熱服如時顯熱躁是下元陰火蒸蒸發也加生地黃黃柏如大便虛並不得或大便了而不了腹常逼迫血虛血澀也加當歸身白朮和胃丸治病久不能食而臟腑或結或溏此胃氣虛弱也常服則和中理氣消痰去濕和脾胃進飲食厚朴制半夏各一兩白朮一兩二錢陳皮八錢檳榔枳實各二錢半木香一錢人參七錢甘草炙三錢上為細末生薑汁浸蒸餅為丸如桐子大每三十丸溫水送下食遠服之寬中進食丸滋形氣美飲食神麯炒五錢甘草炙一錢木香五分草豆蔻仁五錢枳實炒四錢半夏七錢人參一錢乾生薑一錢青皮一錢陳皮白朮白茯苓澤瀉各二錢豬苓一錢砂仁一錢半大麥芽一兩上為細末湯浸蒸為丸如桐子大每三四十丸溫米飲下食遠服之厚朴溫中湯治脾胃虛寒心腹脹滿及秋冬客寒犯胃時作疼痛厚朴制陳皮各一兩茯苓草豆蔻甘草炙木香各半兩乾薑二錢上為粗末每五錢入姜煎食前服論云戊火已衰不能運化又加客寒聚為滿痛散以辛熱佐以苦甘以淡泄之氣溫胃和痛自止矣按此三方又消導之劑也益胃散治服寒藥過多或脾胃虛弱胃脘痛又名溫胃湯白豆蔻薑黃乾生薑各三錢澤瀉砂仁甘草人參厚朴陳皮黃耆各七錢益智仁六錢上為細末每服三錢水煎溫服如脈弦惡寒腹痛乃中氣弱也以仲景小建中加黃耆錢氏異攻散加芍藥選而用之沉香溫胃丸治中焦氣弱脾胃受寒飲食不美氣不調和臟腑積冷心腹冷痛大便滑泄腹中雷鳴霍亂吐瀉手足厥逆大便利無度又治下焦陽虛臍腹疼痛及療傷寒陰濕形氣沉困自汗沉香甘草炙良薑當歸吳茱萸人參木香茯苓白朮白芍各半兩附子炮巴戟酒浸乾薑炮茴香各一兩官桂七錢丁香二錢上為細末用好醋打麵糊為丸如桐子大每五七十丸熱米飲空心下日二服忌一切生冷物按此治腎之脾胃虛寒藥也論云凡脾胃之證調治差誤或妄下之未傳寒中復遇時寒則四肢厥逆而心胃絞痛冷汗出舉痛論云寒氣客於五臟厥逆上泄陽氣未入故卒然痛死不知人氣復則生矣夫六氣之勝皆能為病惟寒毒最重陰主殺故也聖人以辛熱散之復其陽氣故曰寒邪客之得炅則痛立止此之謂也神聖復氣湯治氣乘冬足太陽寒氣足少陰腎水子能令母實手太陰肺實反來侮土火木受邪腰背胸膈閉塞疼痛善嚏口中涎目中泣鼻流濁涕不止或瘜肉不聞香臭咳嗽痰沫上熱如火下寒如水頭作陣痛目中流火視物目䀮䀮耳鳴耳韻頭並口鼻或惡風寒喜日陽夜臥不安常覺痰塞膈咽不通口失味兩脅縮急而痛牙齒動搖不能嚼物陰汗前陰冷行步欹側起居艱難掌中寒風痹麻木小便數而晝多夜頻而欠氣短喘渴少氣不足以息卒遺失無度婦人白帶陰戶中痛牽心而痛面如赭色食少大便不調煩心霍亂逆氣裡急而腹皮色白後出餘氣復不能努或腸鳴膝下筋急肩甲大痛此皆寒水木復火土之讎也乾薑炮三分半夏湯洗七分柴胡一錢藁本八分防風人參郁李仁研各半錢升麻七分附子炮二分當歸身六分羌活一錢甘草八分白葵花五朵去心上㕮咀都作一服水五盞煎至二盞入黃耆一錢陳皮五分草豆蔻麵裹煨一錢在內煎至一盞再入下項藥黃柏酒浸黃連酒洗枳殼生地黃各三分以上四味預一日別用新水浸又以華細辛二分川芎蔓荊子各三分預一日用新水半大盞分作二處浸此三味並黃柏等煎正藥作一大盞不去渣入此浸者藥再上火煎至一大盞去渣空心稍熱服又能治咬頰咬唇咬舌舌根強硬等證如神宜食肉湯不宜食肉不助經絡中火邪也大抵腎與膀胱經中有寒元氣不足者皆宜服之神驗於月生月滿時隔三五日一服如病急不拘時分益胃湯治頭悶勞動則微痛不喜飲食四肢怠墜躁熱氣短口不知味腸鳴大便微溏黃色身體昏悶口乾不喜食冷黃耆半錢甘草二分黃芩三分當歸半錢蒼朮一錢半陳皮升麻各五分柴胡人參白朮益智仁各三分半夏二分上㕮咀作一服水煎食前稍熱服忌生冷硬物酒濕面強胃湯治因飲食勞倦所傷腹脅滿悶短氣遇春口淡無味遇夏雖熱而惡寒常如飽不喜食冷物前方減黃芩蒼白朮益智加草豆蔻黃柏麴生姜論曰治法已驗者可以意求其的觸類而長之則不可勝用矣予病脾胃久衰視聽半失此陰乘陽而上氣短精神不足且脈弦皆陽氣衰弱伏匿於陰中故耳癸卯歲六七月間霖雨陰寒逾月不止時人多病瀉痢乃濕多成五泄故也一日體重肢節疼痛大便泄並下者三而小便閉塞默思內經有云在下者引而竭之是先利小便也又治諸瀉小便不利者先分利之治濕不利小便非其治也法當淡滲之劑意聖人之法雖布在方策其不盡者以意求之今客邪寒濕之勝自外入里而甚暴若以淡滲之劑利之病雖即已是降之又降復益其陰而重竭其陽也則陽氣愈削而精神愈短陰重強而陽重衰也茲以升陽之藥是為宜爾羌活獨活升麻各一錢防風半錢炙甘草半錢一劑乃愈大法云寒濕之勝助風以平之又曰下者舉之此得陽氣升騰故愈是因曲而為之直也夫聖人之法可以類推舉一則知百矣雜方拔萃檳榔丸治傷食心腹膨脹檳榔二錢半陳皮一兩木香二錢半牽牛頭末半兩枳實半兩上為細末醋糊丸桐子大米飲下二三十丸千金紫丸治食癇赤石脂代赭石各一錢巴豆三十個另研杏仁五個另研成膏上以杏仁膏相和杵二千下入蜜些小丸麻子大三十日兒一丸乳下丹溪越鞠丸治食鬱方見熱門
