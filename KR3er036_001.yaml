body:
  text: 卷一中風門中風敘論之始內經曰風之傷人也或為寒熱或為寒中或為熱中或為偏枯風善行而數變至其變化乃為他病歷陳五臟與胃之傷及風病名皆多汗而惡風詳見本文按風論發明風邪系外感之病有內外臟腑虛實寒熱之不同別無癱瘓痿弱卒中不省僵仆喎邪攣縮眩運語澀不語之文後世始與痿證混淆矣要略云風之為病當半身不遂經絡空虛賊邪不瀉或左或右邪氣反緩正氣即急正氣引邪喎僻不遂邪在於絡肌膚不仁在經即重不勝邪入腑則不識人入臟即難言口吐涎千金云岐伯中風大法有四一曰偏枯半身不遂二曰風痱於身無痛四肢不收三曰風懿奄忽不知人四曰風痹諸痹類風狀按後世編集中風方治皆祖要略巢氏千金之論但不當以外中風邪立名而與內臟痿證袞同出治此千古之弊也中風脈法要略云脈微而數中風使然又云頭痛脈滑者中風風脈虛弱也又寸口脈浮而緊寸口脈緩而遲皆曰中風也脈經雲浮而大者風又浮而緩皮膚不仁風寒入肌肉又滑而浮散者癱瘓風又診人被風不仁痿蹶其脈虛者生堅急疾者死中風不治證髮直吐沫搖頭上竄直視口開手撒眼合遺尿不知人或面赤如妝或頭面青黑汗綴如珠聲如鼾睡皆不可治風分在臟在腑之異病機機要云風本為熱熱勝則風動宜以靜勝其燥是養血也治須少汗亦宜少下多汗則虛其衛多下則損其榮宜治在經雖有汗下之戒而有中臟中腑之分中腑者多著四肢有表證而脈浮惡風寒拘急不仁中臟者多滯九竅唇緩失音耳聾鼻塞目瞀大便結祕中腑者宜汗之中臟者宜下之表裡已和宜治之在經當以大藥養之發明雲中血脈則口眼喎斜中腑則支節廢中臟則性命危三治各不同中血脈外有六經之形證則從小續命加減中腑內有便溺之阻隔宜三化湯等通利之外無六經之形證內無便溺之阻隔宜養血通氣大秦艽湯羌活愈風湯主之按此分在表在裡在經之三證立汗下調養之三法可謂開後世之盲聾但所用諸方學者宜詳審之治風不可下論發明云治風當通因通用惟宜宣發以散之不可便以苦寒之藥妄下龍麝硃砂牛黃諸鎮墜之藥瀉之按此言風本外邪惟宜宣散此風在表之時也如傷寒中風傳入於胃亦未嘗不可下論中便字妄字可見其意便者有早與急之義妄者謂有不當下之義治風不可利小便如小便少不可以藥利之既以自汗則津液外亡小便自少若利之使榮衛枯竭無以制火煩熱愈甚當俟熱退汗止小便自行也兼此證乃陽明經大忌利小便濕病似中風論元戎云酒濕之為病亦能作痹證口眼喎斜半身不遂渾似中風舌強不正當瀉濕毒不可作風病治之而汗也衍義論甚當易簡所言與此相同按此則知口眼喎邪半身不遂之病豈止風之一端而已況六氣皆能中人其證亦有縱急搐搦不知人等證不可不以脈證分別中風先調氣説嚴用和云人之元氣強壯榮衛和平腠理致密外邪焉能為害或因七情飲食勞役致真氣先虛榮衛空疏邪氣乘虛而入故致此疾若內因七情而得者法當調氣不當治風外因六淫而得者亦當先調氣後依所感六氣治之此良法也宜八味順氣散按此説真氣先虛榮衛空疏邪氣乘虛而入擴前人所未發但既曰虛矣邪又入矣補虛散邪理所當然而止曰調者意其謂因病而氣壅不通調其通暢條達則真氣自復邪氣自行之義惜乎不能詳也況中風治法豈止一端而已氣中論許學士云世言氣中者雖不見於方書然暴怒傷陰暴喜傷陽憂愁不已氣多厥逆往往得此疾便覺涎潮昏塞牙關緊急若便作中風用藥多致殺人惟宜蘇合香丸灌之便醒然後隨寒熱虛實而調之無不愈者經云無故而喑脈不至不治自已謂氣暴逆也氣復則已審如是雖不服藥自可按氣中之説即七情內火之動氣厥逆由其本虛故也用蘇合香丸通行經絡其決烈之性如推枯拉朽恐血氣虛者非所宜也後云不治自復之意蓋警用藥之失實勝誤於庸醫之手也四肢不舉有虛有實病機云四肢不舉俗曰癱瘓經謂土太過則令人四肢不舉此真膏粱之疾非肝腎經虛其治瀉令氣弱陽虛土平而愈三化湯調胃承氣湯選而用之若脾虛亦令人四肢不舉其治可補十全散加減四物去邪留正按四肢不舉世俗皆以為中風病此云脾土太過不及皆能致之其可一概用藥乎論風非外來乃本氣病發明曰經雲陽之氣以天地之疾風名之此中風者非外來風邪乃本氣病也凡人年逾四旬氣衰之際或因憂喜忿怒傷其氣者多有此疾壯歲之時無有也若肥盛則間有之亦是形盛氣衰而如此治法當和臟腑通經絡便是治風然亦有賊風襲虛傷之者也治法輕重有三見前分在經在腑在臟之異按此云本氣自病乃與劉河間論內熱所生相合但彼云熱而此云虛虛之與熱並行而不相悖也風本於熱論河間曰風病多因熱甚俗云風者言末而忘其本也所以中風有癱瘓者非謂肝木之風實甚而卒中之也亦非外中於風良由將息失宜而心火暴甚腎水虛衰不能制之則陰虛陽實而熱氣拂鬱心神昏冒筋骨不用而卒倒無知也多因喜怒悲憂恐五志過極而卒中者皆為熱甚故也若微則但僵仆氣血流通筋脈不攣緩者發過如故或熱氣太甚鬱滯不通陰氣暴絶陽氣後竭而死疾涎者由熱甚則水化制火而生偏枯者由經絡一側得通否者痹和癱瘓也口噤筋急者由風熱太甚以勝水濕又津液滯於胸膈以為痰涎則筋太燥然燥金主於收斂徑切故也或筋反緩者乃燥之甚血液衰少也諸筋攣易愈諸筋痿難復以見燥之微甚也治風用汗吐下三法子和云諸風掉眩皆屬肝木掉搖眩運目喎筋急手搐瘛瘲昏厥陰肝木之用也經云風淫所勝平以卒涼世何以熱藥治風邪豫治驚風癇病屢用汗吐下三法隨治愈木鬱達之者吐之令其條達也汗者風隨汗出也下者推陳致新也失音悶亂口眼喎斜可用三聖散吐之如牙關緊急鼻內灌之吐出涎口自開也次用通聖散涼膈散大人參半夏丸甘露飲除熱養液之寒藥排而用之按此法的系邪氣卒中痰涎壅盛實熱者可用否則不敢輕易也論中風不當與痿證同治丹溪曰今世所謂風病大率與諸痿證袞同論治良由局方多以治風之藥通治痿也古聖論風痿各有條目源流不同治法亦異夫風病外感善行數變其病多實發表行滯有何不可局方治風之外又歷述神魂恍惚起便須人手足不隨神志昏憒癱瘓嚲曳手足筋衰眩運倒僕半身不遂腳膝軟弱四肢無力顫掉拘攣不語語澀諸痿等證悉皆治之不思諸痿皆起於肺熱傳入五臟散為諸證其昏惑瘛瘲瞀悶瞀昧暴病鬱冒矇昧暴喑瘈昧皆屬於火曰四肢不舉舌本強足痿不收痰涎有聲皆屬於土悉是濕熱之病當作諸痿論治若以外感風邪治之寧免虛虛實實之禍乎若夫岐伯仲景孫思邈之言風大意似指外之感劉河間之言風明指內傷熱證實與痿證所言諸痿生於熱相合外感之邪有寒熱虛實而挾寒者多內熱之傷皆是虛證無寒可散無熱當作實可瀉謹按中風之病古方冠諸方首以其為人之大病也夫風乃六淫中之一天之邪氣自外而入者也古人用藥皆是發散表邪通行經絡之劑以其自表而入亦當自表而出也至於東垣分在經在腑在臟而有汗下調養之法可謂詳備精密則又通表裡中三法而治矣若劉河間以為熱甚制金不能平木或濕土過甚反兼木化皆非外中於風乃因內熱而生迥出前古之論我先師丹溪先生謂數千年得經意者河間一人耳由是觀之若病從外邪而得元氣壯實者當從古方發散之例但用藥不宜小續命湯須分所挾有寒熱溫涼之異受邪有臟腑經絡之殊若病因內熱而生者當從劉河間之論但有用藥不宜如子和專以吐汗下為法蓋病邪有虛有實難一概論又況痿病實與內熱所生相同醫者須宜識此或問外邪之感與內熱之傷何者為多也丹溪曰西北氣寒為風所中誠有之矣東南氣溫而地多濕有風病者非風也皆濕生痰痰生熱熱生風也經曰亢則害承乃制是也治痿之法詳見痿條此不贅及內因似中風論續添盧砥鏡曰經云神傷于思慮則內脫意傷於憂愁則肢廢魂傷於悲哀則筋攣魄傷於喜樂則皮稿志傷於盛怒則腰脊難以俯仰也何侍郎有女適夫夫早世女患十指拳攣掌垂莫舉膚體瘡瘍粟粟然湯劑雜進飲食頓減幾於半載適與診之則非風也正乃憂愁悲哀所致耳病屬內因於是料內因藥仍以鹿角膠輩多用麝香熬膏貼痿垂處漸得掌能舉指能伸病漸近安謹按經云風之傷人也為病善行而數變變至他證之類故為治不得其病情者往往或以風為他證或以他證為風皆不免乎得失之誚惟近代河間東垣丹溪諸先生者出始論他證之非中風治法當異此又盧氏治例可謂深達病情之機者即河間所論五志過極為病之例非真中風也而王安道又曰人有卒暴僵仆或偏枯或四肢不舉或不知人或死或不死者世以中風呼之而方書亦以中風治之因嘗考諸內經論風為諸證其卒暴僵仆不知人四肢不舉者並無所論止有偏枯一語而已及觀千金方則皆引岐伯之旨金匱要略具脈證邪在絡在經入腑入臟之異由是觀之則卒暴僵仆不知人偏枯四肢不舉等證固為因風而致者矣乃用大小續命西州續命排風八風等諸湯散治之及近代河間東垣丹溪三子者出所論始與昔人有異河間主於火東垣主於氣丹溪主於濕反以風為虛象而大異於昔人矣籲昔人之與三子者果孰是與果孰非與若以三子為是則三子未出之前固有從昔人而治愈者矣以昔人為是則三子已出之後亦有從三子而治愈者矣故不善讀其書者往往不得其奧以余觀之昔人與三子之論皆不可偏廢但三子以類乎中風之病視為中風而立論故使後人狐疑而不能決殊不知因於風者真中風也因火因氣因於濕者類中風而非中風也三子所論者自是因火因氣因濕而為暴病暴死之證與風何相干哉如內經所謂三陰三陽發病為偏枯痿易四肢不舉亦未嘗必因於風而後然也夫風火氣濕之殊望聞問切之間豈無所辨乎辨之為風則從昔人以治辨之為火氣濕則從三子以治如此庶乎析理明而用法當矣惟其以因火因氣因濕之證強引風而合論之所以真偽不分名實相紊若以因火因氣因濕證分而出之則真中風病彰矣所謂西北有中風東南無中風者其然與否與斯辨諸子所論名實相紊而不明真中風之異可謂精切又何疑丹溪東南無中風之語哉夫風者天地之大氣也五運之造化四時之正令耳上下八方無所不至者且人在氣中形虛者即感之傷之中之有輕重不同實八風虛實之異耳矧有痿濕火熱痰氣虛諸證而似中風故古今治例不一是以徐先生折衷諸經之旨辨以上諸證不得與中風同治又豈惟三子所論哉然王氏以擴充其例因有是辨亦不害其為叮嚀也余嘗居涼州即漢之武威郡也其地高阜四時多風少雨土藝粟麥引泉灌溉天氣常寒人之氣實腠密每見中風或暴死者有之蓋折風燥烈之甚也時洪武乙亥秋八月大風起自西北時甘州城外路死者數人余亦始悟經謂西北之折風傷人至病暴死之旨不誣丹溪之言有所本也人蓋不經其所雖審經意故莫不有疑者也籲醫之不明運氣造化地理病機之微而欲行通變之法者難矣哉中風治法發表之劑金匱續命湯千金名西州續命治中風痱身不收口不能言冒昧不知痛處拘急不能轉側麻黃三兩去節桂枝去皮當歸人參石膏碎綿裹炙甘草各二兩川芎一兩杏仁去皮尖十四枚乾薑二兩上咀水煎按心肺脾胃肝之藥也又太陽經血氣藥也千金大續命湯比前方無人參有黃芩荊澀元戎作竹瀝局方小續命湯出千金治卒暴中風不省人事半身不遂口眼喎斜手足戰掉語言謇澀神清氣亂及治諸風云云防己肉桂去粗皮杏仁去皮尖炒黃黃芩白芍甘草煨川芎麻黃去節人參去蘆各一兩防風兩半附子炮去皮臍半兩上為粗末每三錢薑五片棗一枚煎按心肺脾胃肝三焦命門藥也古今録驗有白朮無杏仁救急無芎藭杏仁只十味延年無防風機要春夏加石膏知母秋冬加桂附芍藥易老六經加減法詳見本方麻黃續命湯桂枝續命湯白虎續命湯葛根續命湯附子續命湯羌活連翹續命湯按續命湯治太陽外感風邪之藥然外感挾寒者多故用桂枝等輩千金等方所收此類之藥甚多無分經絡不辨虛實寒熱所謂雖多亦奚以為易老分六經庶乎活法也丹溪曰局方比要略少當歸石膏多防風附子防己果與仲景意合否也仲景謂汗出則止藥局方則曰久服瘥又曰治諸風似皆非仲景意然麻黃防己可久服乎諸風可通治乎局方排風湯治風虛冷濕邪氣入臟狂言妄語精神錯亂及五臟風發等證詳見本方白鮮皮當歸酒浸肉桂白芍杏仁甘草炒防風芎藭白朮各二兩獨活麻黃去根節茯苓各三兩上粗末每服三錢薑四片水煎丹溪曰此云治邪氣入臟而又曰風發又似有內出之意夫病既在五臟道遠而所感深用麻黃以發其表寧不犯誅伐無過之戒乎按此與小續命相類而無所發明因世俗用之故收入其餘雷同發散風寒者並略去寶鑑秦艽升麻湯治風寒客手足陽明經口眼喎斜惡風寒四肢拘急脈浮緊升麻乾葛甘草芍藥人參各半兩秦艽白芷防風桂枝各三錢上咀每一兩連須蔥白二根同煎按此治風寒外入陽明經即小續命之變法也古人續命雖有加減之不同大抵多因太陽一經之藥今特留此方以見風邪所傷有六經之異也寶鑑不換金丹退風散熱羌活川芎白附子烏頭藿香葉蠍梢各半兩荊芥穗天麻炙甘草殭蠶各一兩薄荷三兩防風一兩上為末煉蜜丸彈子大每一丸細嚼茶酒任下塗喎處亦可按古方治風解表多兼用熱劑至守真開發涼劑始行然此等方極多姑存此以見意若防風通聖散治風熱雖佳則又表裡之劑也攻裡之劑機要三化湯中風外有六經之形證先以加減續命湯治之內有便溺之阻隔者此方主之厚朴大黃枳實羌活各八分上銼每服一兩水煎此治風邪入里之下藥也即傷寒用承氣之意非內實者不可子和搜風丸治風熱上攻眼昏耳鳴鼻塞頭痛眩運痰逆涎嗽心腹痞痛大小便結滯人參茯苓天南星薄荷各半兩乾生薑寒水石生白礬各一兩蛤粉黃芩大黃各一兩滑石牽牛各四兩藿香一分半夏一兩上為末水丸小豆大生薑湯下日三按此方名為搜風其實乃下實熱痰之藥發表攻裡之劑宣明防風通聖散治一切風熱防風川芎當歸芍藥大黃芒硝連翹薄荷麻黃各半兩甘草二兩石膏桔梗黃芩各一兩滑石三兩白朮山梔荊芥穗各半兩一方去芒硝加牛膝人參半夏上咀末生薑煎按此乃肺脾膀胱胃肝心經之藥也又表裡血氣之藥也海藏云防風麻黃汗劑也大黃芒硝下劑也梔子滑石利小便也發表攻裡合而並進故治雜病則佳治傷寒傷風有失仲景云發表攻裡本自不同在大定間此藥盛行於世而多效何哉當時雖市井之徒口腹備衣著全但志藥而形不苦然是涼亦多效而少失變亂之際齏鹽糟粳有所不充加以天地肅殺之運敢用涼藥如平泰之世耶故多失而少效有如仲景用桂枝當漢之末也韓祗和戒桂枝當宋之隆時時世之異不可不知川芎石膏湯治風熱防風通聖散去朴硝麻黃加人參寒水石甘菊砂仁上為末水煎按此乃通聖散加減藥法劉張此等方極多茲不詳録調血養血諸劑機要大秦艽湯治中風外無六經之形證內無便溺之阻隔知是血弱不能養於筋手足不能運口強不能語言宜養血而筋自榮也秦艽石膏各二兩甘草川芎當歸芍藥羌活獨活防風黃芩白芷生地黃熟地黃白茯苓白朮各一兩細辛半兩春夏加知母一兩上銼每服一兩水煎天陰雨加生薑七片羌活愈風湯療腎肝虛筋骨弱語言難精神昏憒此藥安心養神調陰陽無偏勝治中風內外無邪服此藥以行中道羌活甘草炙防風蔓荊子川芎熟地黃細辛枳殼人參麻黃甘菊薄荷枸杞當歸知母地骨皮黃耆獨活白芷杜仲秦艽柴胡半夏前胡厚朴防己各二兩白茯苓黃芩芍藥各三兩桂一兩生地黃石膏蒼朮各四兩天陰雨加生薑上每服一兩水煎如微汗加麻黃如通利加大黃更有四時加減法就以此湯咽下四白丹清肺養魄二丹元安神定志和血是動以安神靜以清肺天麻丸治風因熱而生熱勝則動宜以靜勝其躁是養血也此藥行榮衛壯筋骨天麻牛膝各六兩同酒浸三日焙乾萆薢另研細玄參各六兩附子一兩炮杜仲七兩羌活十四兩或十五兩生地黃一斤當歸十兩一方有獨活五兩去腎間風上為細末蜜丸桐子大常服五七十丸病大至百丸空心食前溫酒或白湯下良久則食服藥半月後覺壅塞以七宣丸疏之按以上三方東垣云調經養血安神之劑然風而挾虛理宜補養仲景治風虛腳氣用八味丸略露端緒而世人莫能擴充之也局方骨碎補丸治肝腎風虛換腿丸治足三陰經虛專用疏通燥疾之藥既失之矣此三方較之局方雖優亦所得不償所失也何以為然秦艽湯愈風湯雖皆有補血之藥而行經散風之劑居其大半將何以養血而益筋骨也天麻丸養血壯筋骨庶幾近理理氣之劑局方烏藥順氣散治風氣攻注四支骨節疼痛遍身頑麻及療癱瘓語言謇澀腳氣步履艱難腳膝痿弱麻黃陳皮烏藥去木各二兩白殭蠶去絲觜妙乾薑炮半兩川芎枳殼麩炒甘草炒白芷桔梗各一兩上為細末每服三錢水一盞生薑三片棗一枚煎服按嚴氏調氣之設或出於此也太陰陽明氣藥也藥性主治恐未必然嚴氏八味順氣散白朮白茯苓青皮香白芷陳皮烏藥人參各一兩甘草炙半兩上為末每服三錢水煎按嚴氏謂真氣虛而得此疾法當調氣故用此藥補虛行氣雖此論迥出前人其用藥則未也何者四君子補脾胃中氣藥也更用白芷去手陽明經風烏藥通腎胃間氣陳皮理肺氣青皮泄肝氣若風果在手陽明經而肝肺腎胃之氣實者可用但人身經有十二皆能中邪五臟之氣互有勝負此方安能盡其變乎又況真氣先虛之人亦難用此也理血之劑良方治風六合湯治風虛眩運機要同四物四兩秦艽一作防風羌活上粗末水煎服愈風湯療産後中風口噤手足瘛瘲如角弓狀亦治血暈四支強直荊芥略炒為末上每服三錢豆淋酒調下用童便亦可其效如神治婦人産後中風口吐涎手足瘛瘲當歸荊芥等分上為細末每服二分水一盞酒少許煎七分灌下之咽即醒按風本陽邪故內經曰陽受風氣又曰賊風虛邪者陽受之所以諸方皆用氣分之藥多血分之藥少惟此二方以産後得疾多因血虛故專用行血之藥通關透肌骨之劑局方至寶丹療卒中急風不語中惡氣絶又療心肺積熱及小兒諸癇急驚心熱詳見本方安息香一兩半為末以無灰酒攪澄飛過濾去砂石約取淨數一兩慢火熬成膏子生烏犀角生玳瑁屑琥珀硃砂雄黃各一兩龍腦麝各一分牛黃半兩銀箔金箔各五十片一半為衣上將生犀玳瑁為細末入余藥研勻將安息香膏重湯煮凝成後入諸藥和搜成劑入不津器中盛並旋丸如桐子大牛黃清心丸治諸風瘓瘲不隨語言謇澀心怔健忘恍惚去來頭目眩冒胸中煩郁痰涎壅塞精神昏憒云云牛黃一兩二錢龍腦麝香羚羊角末各一兩當歸防風黃芩白朮麥門冬白芍各兩半柴胡桔梗白茯苓杏仁芎藭各一兩二錢半肉桂大豆卷阿膠各一兩七錢半蒲黃人參神麯各二兩半雄黃八錢甘草五兩白蘞七錢半乾薑七錢半犀角末二兩乾山藥七兩金箔一千二百片內四百片為衣大棗一百核蒸熟去皮核研爛成膏上為細末煉蜜與棗膏丸每兩作一十丸用金箔為衣每服一丸溫水化下食遠服詳見本書發明云凡用丹劑者為風入骨髓不能得出故用龍麝牛雄犀珀珠金皆入骨髓透肌膚之劑使風邪得以外出也若中血脈中腑之病初不宜用龍麝牛黃恐引風入骨髓如油入面莫之能出若中臟痰涎昏冒煩熱者宜用之下痰鎮墜清神治痰通經諸方局方青州白丸子治半身不遂口眼喎斜痰涎壅塞手足頑麻半夏七兩水洗過生用南星三兩生用川烏頭半兩去皮臍生用白附子二兩生用上制度丸法見局方三生飲治卒中昏不知人口眼喎斜半身不遂並痰厥氣厥南星一兩生用川烏去皮生用附子去皮生用各半兩木香二錢半上每服五錢水二盞薑十片煎八分服按中風之病多因痰得以上二方乃行經治寒痰之藥也相類之方極多茲不再録局方省風湯治中風口噤口眼喎斜筋脈攣急抽掣疼痛風盛痰實防風南星生用各四兩黃芩半夏水浸洗生用甘草生用各二兩上生薑煎湯滓每半兩按此治風痰挾熱之藥也濟生導痰湯治痰涎壅盛或胸膈留飲痞塞方見痰門按此治痰泄痞之藥世俗用之者衆姑存之千金地黃煎治熱風心煩悶及脾胃間熱不下食生地黃汁枸杞子汁各二升生薑汁酥各三升天門冬人參各半斤茯苓六兩荊瀝五升大黃梔子各四兩竹瀝五升上十一味以五物為細末先煎地黃等汁成煎內藥末調服方寸日再漸加至三以利為度竹瀝湯治四肢不收心神恍惚不知人不能言竹瀝二升生葛汁一升生薑汁三合上三味相和溫暖分三服荊瀝湯凡患風人多熱常宜服此荊瀝竹瀝生薑汁各五合上三味相和溫暖為一服三因小竹瀝湯治中風涎潮譫語昏塞四肢縱緩秦艽去苗防風去蘆附子炮去皮臍獨活各一錢上咀以水四盞煎至二盞入生地黃汁淡竹瀝各半盞再煎去滓分四服無時丹溪曰竹瀝本草言大寒其意以與石膏芩連同類而諸方治産後胎前諸病及金瘡口噤與血虛自汗消渴尿多皆是陰虛之病無不用之何世俗因其大寒二字棄而不用內經云陰虛則發熱夫寒而能補正與病對竹瀝味甘性緩能除陰虛之有大熱者大寒言其功也非以氣言也又況假火而成何寒之有按竹瀝等方兼大黃附子者分寒熱之異用兼荊瀝者視痰氣之虛實葛汁秦艽獨活地黃門冬等又隨經而用也不可不知雜方衍義治風涎潮塞氣不通皂角炙一兩白礬生半兩輕粉半錢上末水調一二錢灌之須臾吐涎用礬者分膈下涎也易簡稀涎散治中風四肢不收涎潮膈塞氣閉不通晉礬二兩豬牙皂角上為細末每服一錢至二錢溫水調下寶鑑分涎散治中風涎潮作聲不得口噤手足搐搦藿香乾蠍白附南星硃砂膩粉粉霜各二兩上研和勻每服一錢至二錢薄荷湯調下未吐利再服千金葈耳散治諸風上以葈耳葉曝燥為末酒調服方寸匕日三若吐逆者蜜和為丸服十丸準前汁一方寸匕日三濟生稀蘞丸上以稀蘞草五月五日六月六日採葉九蒸九曝凡蒸用酒蜜灑曬乾為末蜜丸桐子大空心酒下百丸聖惠方治中風口喎巴豆七個去皮爛研如左喎塗右手心右塗左仍以暖水一盞安向手心須臾便正洗去藥頻抽掣手中指宣明防風天麻散治風麻痹走注肢節疼痛中風偏枯或暴喑不語內外風熱壅滯解昏眩西北方人多用之與後方同防風川芎天麻白芷小川烏白附子荊芥穗當歸甘草羌活各半兩滑石二兩上為末熱酒化蜜少許調半錢加至一錢覺藥力運行微麻為度或蜜丸彈大熱酒化下一丸或半丸白湯化下亦得經驗如聖散治中風身體麻木走動眩運頭疼牙關緊急手足搐搦涎潮悶亂及破傷風一切證蒼朮一斤川芎八兩細辛四兩防風白芷八兩草烏四兩川烏五兩天麻二兩上為末每服半錢或一錢溫酒調下茶清亦得如瘋狗蛇蠍等所傷先用漿水口含洗淨用此貼上仍服之至效金瘡血出不止貼上立定灸法風中脈則口眼喎斜中腑則肢體廢中臟則性命危凡治莫如以上發表調氣血治痰諸法然此可扶持疾病若要收全功火艾為良也灸風中脈口眼喎斜聽會二穴在耳前陷者中張口得之有穴動脈應手頰車二穴在耳下二韭葉陷者宛宛中開口得之地倉二穴在橫口吻旁四分外近下有脈微動者是凡喎向右者為左邊脈中風而緩也宜灸左喎陷中二七壯喎向左者為右邊脈中風而緩也宜灸右喎陷中二七壯灸風中腑手足不遂等疾百會一穴在頂中央旋毛中肩髃二穴在肩端兩骨間陷者宛宛中舉臂取之曲池二穴在肘外輔骨屈肘曲骨中以手拱胸取之紋頭陷中是風市二穴在膝外兩筋間平立舒下兩手著腿當中指頭者宛宛中足三里二穴在膝下三寸脛骨外大筋內筋骨之間陷者宛宛中舉足取之絶骨二穴在足外踝上三寸動脈中凡覺手足痹或不仁或痛良久乃已此將中腑之候宜灸此七穴病在左則灸右在右則灸左灸風中臟氣塞涎上不語昏危者下火立效百會一穴如前風池二穴在顳顬後髮際陷中大椎一穴在頂後第一椎上陷者是肩井二穴在肩上陷罅缺盆上大骨前一寸半以三指按之當其中指下陷者中舉臂取之曲池二穴如前間使二穴在掌後三寸兩筋間陷中足三里二穴如前凡覺心中憒亂神思不怡或手足麻痹此將中臟之候不問是風與氣可速灸此七穴但依次第灸之各五七壯日別灸之隨年壯止如素有風人尤宜留意此灸法可保無虞此法能灸粹死經云凡人風發強忍怕痛不肯灸忽然猝死謂是何病風入臟故也
