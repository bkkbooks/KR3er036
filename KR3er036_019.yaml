body:
  text: 卷十九虛損門脈法脈經曰脈來耎者為虛緩者為虛微則為虛弱為虛濡為虛弦為中虛脈來細而微者血氣俱虛脈小者血氣俱少內經曰脈虛氣虛尺虛是謂重虛所謂氣虛者言無常也尺虛者行步恇然脈虛者不象陰也如此者滑則生澀則死要略曰脈芤為虛脈沉小遲者脫氣虛損脈證難經曰至脈從下上損脈從上下也一損損於皮毛皮聚而毛落二損損於血脈血脈虛少不能榮於五臟六腑三損損於肌肉肌肉消瘦飲食不能為肌膚四損損於筋筋緩不能自收持五損損於骨骨痿不能起於床反此者至脈之病也從上下者骨痿不能起於床者死從下上者皮聚而毛落者死然治損之法損其肺者益其氣損其心者調其榮衛損其脾者調其飲食適其寒溫損其肝者緩其中損其腎者益其精病機機要論曰虛損之疾寒熱因虛而感也感寒則損陽陽虛則陰盛自上而下治之宜以辛甘淡過於胃則不可治也感熱則損陰陰虛則陽盛故損自下而上治之宜以苦酸鹹過於脾則不可治也自上而損者一損損於肺皮聚而毛落二損損於心血脈虛少不能榮於臟腑婦人月水不通三損損於胃飲食不為肌膚自下而損者一損損於腎骨痿不能起於床二損損於肝筋緩不能自收持三損損於脾飲食不能消克論曰心肺損而色蔽腎肺損而形痿谷不能化而脾損感此病者皆損之病也漸漬之深皆虛勞之疾也謹按難經論損脈證者謂因勞損其形體血脈臟腑內外因也故治法宜調養之以上論者謂因虛外感也然傷寒中暑初感必先足太陽今歸之於手太陰足少陰者蓋肺主皮毛腎主骨爾若此則因虛外感不獨傷於足經也但足經傷寒有傳變恐不可作損證論乎論虛為陰氣不足丹溪曰人受天地之氣以生天之陽氣為氣地之陰氣為血故氣常有餘血常不足何以言之天地為萬物父母天大也為陽而運於地之外地居天之中為陰天之大氣舉之日實也屬陽而運於月之外月缺也屬陰稟日之光以為明故人身之陰陽其消長亦視月之盈虧焉夫人之生也男子十六歲而精通女子十四歲而經行是有形之後猶有待於乳哺水穀之養陰氣始成而可與陽氣為配以能成人而為人父母古人必待三十二十而後嫁娶可見陰氣之難於成而古人之善於保養也錢仲陽腎有補無瀉正是此意又按禮記注曰惟五十然後養陰者有以加內經曰年至四十陰氣自半而起居衰矣又曰男子六十四而精絶女子四十九而經斷夫以陰氣之成止供給得三十年之運用已先虧矣人之情欲無涯此難成易虧之陰氣若之何而可以縱欲也經曰陽者天氣也主外陰者地氣也主內故陽道實陰道虛非吾之過論也或曰仰觀俯察乎天地日月既若是之不同何寒暑溫涼之見於四時者又如此之相等而無降殺也曰動極復靜靜極復動猶人之噓吸也寒者吸之極氣之沉也熱者噓之極氣之浮也溫者噓之微氣之升也涼者吸之微氣之降也一噓一吸所乘之機有以使之宜其相等而無降殺此以流行之用而言前以大小虛實言者蓋其對待之體也或曰遠取諸天地日月近取諸男女之身曰有餘曰不足吾知之矣人在氣交之中今欲順陰陽之理而為攝養之法如之何則可曰主閉藏者腎也司疏泄者肝也二臟皆有相火而其繫上屬於心心君火也為物所感則易於動心動則相火翕然而隨雖不交會亦暗流而滲漏矣所以聖賢只是教人收心養性其旨深矣天地以五行更迭衰旺而成四時人之五臟六腑亦應之而衰旺四月屬巳五月屬午為火大旺火為肺金之夫火旺則金衰六月屬未為土大旺土為水之夫土旺則水衰況腎水常藉肺金為母以補助其不足故內經諄諄然資其化源也古人以夏月必獨宿而淡味兢兢業業於愛謹保養金水二臟正嫌火土之旺爾內經又曰藏精者春不病溫十月屬亥十一月屬子正大氣潛伏閉臟以養其本然之真而為來春升動發生之本若於此時不恣欲以自戕至春升之際根本壯實氣不輕浮焉有溫熱之病夫夏月火土之旺冬月大氣之伏此論一年之虛耳若上弦前下弦後月廓空亦為一月之虛大風大霧虹電飛雹暴寒暴熱日月薄蝕憂愁忿怒驚恐悲哀醉飽勞倦謀慮勤動又皆為一日之虛若病患初退瘡痍正作尤不止於一日之虛今人多有春末夏初患頭痛腳軟食少體熱仲景論春夏劇秋冬瘥而脈弦大者正世俗謂注夏病也若犯此四者之虛似難免此夫當壯年便有老態仰事俯育一切隳廢與言至此深可驚懼古人謂不見可欲使心不亂夫以溫柔之感於體聲音之感於耳顏色之感於目馨香之感於鼻誰是鐵心漢不為動善養生者於此五個月出居於外苟值一月之虛一日之虛亦宜暫遠帷薄久自珍重保全天和庶可以滋助化源水得所養陰無虧必與陽齊平然後陽得所附而無飛越之尤遂成天地交之泰何病之可言願相與遵守期無負敬身之教幸世謹按人身肖天地一氣實同陽有餘陰不足而常若是此其道也故有起居不時七情六欲而增虛極者多在陰爾但世俗不審此理往往補陽是以先生論此誠千古不傳之妙實啓後人之盲瞶也且於內經謂以身之虛而逢天之虛兩虛相感其氣至骨入則傷五臟二候救之弗能傷也旨趣為明白養生者最宜玩味論虛為勞倦所傷東垣曰經云陰虛生內熱云云見熱門又云勞則氣耗勞則喘且汗出內外皆越故氣耗矣夫喜怒不節起居不時有所勞傷皆損其氣氣衰則火旺火旺則乘其脾土脾主四肢故困熱無氣以動懶於言語動作喘之表熱自汗心煩不安當病之時宜安心靜坐以養其氣以甘寒瀉其火熱以酸味收其散氣以甘溫補其中氣經言勞者溫之損者溫之者是也要略云平人脈大為勞以黃耆建中湯治之之意也謹按丹溪先生曰治病之方先顧原氣蓋謂諸病多因虛致故也是以勞倦之證其因甚多東垣丹溪論治詳矣然比之虛損證不同有因病致虛者如傷寒暑飲食後或久病所致之類是也因虛致損者如病後形瘁痿弱勞瘵之類是也此則虛損皆與勞倦不同大抵因病致虛則為輕蓋病勢尚淺原氣未虛也至病初愈而復勞或復飲食勞倦或房勞七情六欲陽瘁陰弱加至羸損此因虛致損則為重病勢已過原氣已索故也愚謂此當分治如因病致虛及勞倦不足與以下諸證兼虛者宜從東垣丹溪之論治之因虛致損者又當於東垣丹溪論治而推充行之可也論虛證為痿詳見痿門論虛證發熱詳見熱門論虛證惡寒詳見寒門論虛證為瀉痢詳見滯下門論虛證似中風詳見中風門論虛為頭痛頭眩詳見各門論虛證夾痰有似邪祟丹溪曰血氣者身之神也神既衰乏邪因而入理或有之若夫血氣俱虧痰客中焦妨礙升降不得運用以致十二宮各失其職視聽言動皆有虛妄以邪治之焉能愈病憲幕傅兄之子年十七暑月因勞而渴恣飲梅漿又連得大驚三四次妄言妄見病似邪鬼兩脈皆虛弦而沉數豫曰數為有熱虛弦是大驚又酸漿停於中脘補虛清熱導去痰滯病乃可安與參朮陳皮茯苓芩連等濃作湯入竹瀝薑汁與浹旬未效衆皆尤藥之未對豫知其虛之未回痰之未導仍與前藥加荊瀝又旬余而安外弟一日醉飽後亂言妄見且言伊兄生前事甚的乃叔叱之曰食魚肉與酒大過痰所為耳灌鹽湯一大碗吐痰一升許汗因大作困睡一宵而安又金氏婦壯年暑月赴筵回乃姑詢其座次失序自愧因成病言語失倫其中又時間一句曰奴奴不是兩脈皆弦而數豫曰非鬼神乃病也但與補脾導痰清熱數日自安其弟不信以數巫者噴水而咒之旬余而死或曰病無鬼以邪治之何至於死曰暑月赴筵外境蒸熱辛辣適口內境鬱熱而況舊有積痰加之愧悶其痰與熱何可云喻今乃驚以法尺是驚其神而血不寧也噴以法水是冷密其肌汗不得泄也汗不得泄則熱內燔血不得寧則陰消而陽不能獨立也不死何俟或曰外臺祕要有禁咒一科庸可廢乎豫曰移精變氣乃小術耳可治小病若內有虛邪外有實邪自有定法符何能也惟符水可治膈上熱痰一呷涼冷豈不清快若內傷而虛與冬令嚴寒符水入口必冰胃而死斯言也可與識者道論原氣陷下因虛所致內經曰感虛乃陷下也謹按針經曰陷下則灸之夫病有邪氣陷下正氣陷下者也然經謂邪氣陷下者是經虛氣少邪入故曰感虛乃陷下也故諸邪陷下在經者宜灸之正氣陷下者若東垣所謂飲食勞倦內傷元氣胃脘之陽不能升舉並心肺之氣陷入於中焦藥以扶持元氣胃氣是也然用藥亦有輕重輕者用升浮之劑如補中益氣湯益胃升陽湯之類是也重者宜用劫劑來復丹靈砂丹之類是也沉諸邪陷下宜灸之證亦有標本不同論見寒門方後論精氣奪則虛奪謂精氣減少如奪去也出內經通評虛實論謹按人稟沖和之氣而生身有三曰元精曰元氣曰元神者本身中之真精真氣真脈也夫精乃腑臟之真非榮血之比故曰天癸氣乃腑臟之大經為動靜之主故曰神機脈為天真委和之一氣經謂其名有三曰命之本氣之神形之道其機運升降皆隨氣而動因血而榮精氣資始相生不失以養一身為人之司命形質之體用也至若精不足則氣失資化氣不足則血失所營血不足則氣無所附天真散亂則氣血精神無所稟命矣是以相生長養之道精化氣氣生神而皆稟乎身中臟腑之真也夫氣血從乎榮衛榮衛又宗乎經隧榮衛者精氣之化為先天清濁之始經隧者胃之水穀氣化此經隧不能不生榮衛榮衛不能不散而養經脈經脈不能不順而資天真為生養涵容造化形質理之然也凡人之視聽言動壯壽皆此理之常也疾病盲瞶關格夭折皆此理之失也故有精神氣血不足則病真脈散亂則死者皆由平日攝養之過與不及動止之不逾常度也經云出入廢則神機化滅升降息則氣立孤危然房勞甚則精血竭而神無所依氣無所附則忽致暴絶也竊嘗第究先哲經義濟生微旨益氣之補肺補精之滋腎皆滋其化源也蓋人之精血而常不足加之數奪其真資化失則榮氣乃虛虛則衛氣不固精亦滑奪腎氣竭而陰微不能與胃氣上升以接清陽之氣故病多頭重或痛氣弱而食少元氣下陷脈即微弱外散欲絶而虛洪或見損脈此實元精不足之所致非有外感賊邪之病也論形氣不足有餘用補瀉法東垣曰黃帝云形氣之逆順奈何岐伯曰形氣不足病氣有餘是邪勝也急瀉之形氣有餘病氣不足急補之形氣不足病氣不足此陰陽俱不足也不可刺之刺之重不足重不足則陰陽俱竭血氣皆盡五臟空虛筋骨髓枯老者絶滅壯者不復矣形氣有餘病氣有餘此謂陰陽俱有餘也急瀉其邪調其虛實故曰有餘者瀉之不足者補之此之謂也按釋云聖人垂慈仁之心已詳矣不合立言誠恐市井莊農山野間不知文理故以俚語開解之云但病來潮作之時病氣精神增添者是為病氣有餘乃邪氣騰也急瀉之以寒涼酸苦之劑若病來潮作之時神氣困弱者為病氣不足乃真氣不足也急補之以辛甘溫熱之劑不問形氣有餘並不足只取病氣有餘不足也不足者補之有餘者瀉之夫形氣者氣謂口鼻中喘息也形謂皮肉筋骨血脈也形勝者為有餘消瘦者為不足其氣者審口鼻中氣勞役如故為氣有餘也若喘息氣促氣短或不足以息者為不足故曰形氣也乃人之身形中氣血也當補當瀉令不在於此只在病勢潮作之時病氣增加者是邪氣勝也急當瀉之如潮作之時精神困弱語言無力及懶語者是真氣不足急當補之若病人形氣不足病來潮作之時病氣亦不足此乃陰陽俱不足也禁用針宜補之以甘藥不可以盡劑不已臍下一寸五分氣海穴取之論無病好補之誤子和曰人之好補者有無病而補有有病而補或咨之庸醫或問諸遊客庸醫以要用相求故所論者輕輕之則草木而已草木則蓯蓉牛膝巴戟菟絲之類遊客以好名自高故所論者重重之則金石而已金石則丹砂起石硫黃之類吾不知此為補也而補何臟乎以為補心耶而心為丁火其經則手少陰熱則瘡瘍之類生矣以為補肝耶肝為乙木其經則足厥陰熱則掉眩之類生矣脾為己土而經則足太陰以熱補之則病腫滿肺為辛金而經則手太陰以熱補之病憤郁心不可補肝不可補脾不可補肺不可補莫非為補腎乎人皆知腎為癸水而不知其經則子午君火焉補腎之火火得熱而益熾補腎之水水得熱而益涸既熾其火又涸其水上接於心之丁火火獨用事肝不得以制脾土肺金不得以制肝木五臟之極傳而之六腑六腑之極遍而之三焦則百病交起萬疾俱生小不足言大則可懼不宜則中不中則暴喑而死矣以為無病而補之者所得也且如有病而補之者嘔而補吐而補泄而補痢而補瘧而補咳而補勞而補産而補嘔吐則和胃丸丁沉煎瀉痢豆蔻丸御米殼散咳嗽則寧神散勞不桂附則山藥産不烏金則黑神吾不知此為補果何意耶殊不知嘔得熱而愈酸吐得熱而愈暴泄得熱而清濁不分痢得熱而休息繼至瘧得熱而進不能退咳得熱而濕不能除勞得熱而火益煩産得熱而血愈崩蓋如是而死者八九生者一二死者枉生者幸幸而一生憔悴之態人之所不堪大抵有餘者損之不足者補之是則補之義也陽有餘而陰不足則當損陽而補陰陰有餘而陽不足則當損陰而補陽熱則芒硝大黃損陽而補陰也寒則乾薑附子損陰而補陽也豈可以熱藥云乎哉而寒藥亦有補之義也經曰因其盛而減之因其衰而彰之此之謂也謹按仲景論傷寒脈結代為血氣虛衰不能相續而用炙甘草湯實補虛之法也殊無常補之例後世俗往往例用常補故子和極論其弊善莫大矣但所言大黃芒硝損陽而補陰是指仲景所謂陰陽虛盛之意非補不足之法也學者當審東垣丹溪之論則可以擴充矣又曰人知補之為利而不知補之為害也論補者蓋有六法平補峻補溫補寒補筋力之補房室之補以人參黃耆之類為平補以附子硫黃之類為峻補以豆蔻官桂之類為溫補以天門冬五加皮之類為寒補以巴戟蓯蓉之類為筋力之補以石燕海馬起石丹砂之類為房室之補此六者近代之所謂補者也若施之治病非徒功效疏闊至其害不可勝言難經言東方實西方虛瀉南方補北方此言肝木實而肺金虛瀉心火補腎水也以此論之前所謂六補者了不相涉試舉補之所以為害者皆溫補之罪也內經雖言形不足者溫之以氣精不足者補之以味氣屬陽天之所以食人者血屬陰地之所以食人者戒乎偏勝非便以溫為熱也又若經曰損者補之勞者溫之此溫乃溫存之溫也豈以溫為熱哉又如虛則補其母實則瀉其子者此欲權衡之得其平也又烏在燔針壯火煉石燒砒硫薑烏附然後為補哉所謂平補者使陰陽兩停是已奈時人往往惡寒喜溫甘受酷烈之毒雖死而不悔也可勝嘆哉寶鑑曰諺云無病服藥如壁里安柱此無稽之説為害甚大夫天之生物五味備焉食之以調五臟過則生疾至於五穀為養五果為助五畜為益五菜為充氣味合而食之補精補氣倘用之不時食之不節猶或生疾況藥乃攻邪之物無病而可服哉聖濟經云彼修真者弊於補養輕餌金石藥陽劑剛勝病起則天癸竭而榮涸陰劑柔勝病生則真火微而衛散一味偏勝一臟偏傷安得不病唐孫思邈言藥勢有所偏助令人臟氣不平裴潾諫憲宗曰夫藥以攻疾非朝夕常用之物況金石性酷烈有毒又加煉以火氣非人五臟所能禁至於張皋諫穆宗也亦謂神慮清則血氣和嗜欲多而疾疢作夫藥以攻疾無疾不可餌也故昌黎伯銘李子之墓曰余不知服食説起自何世殺人不可計而世慕尚之益至此其惑也今直取目見親與之遊而以藥敗者六七公以為世誠今復取目見者三四人皆無故求益生之祥病反生焉或至喪身壁里安柱果何如哉且夫高堂大廈梁楝安墓址固壞塗毀塈柱於壁中甚不近人情潔古老人云無病服藥乃無事生事此誠不易之論人之養身幸而五臟安泰六腑和平謹於攝生春夏奉以養生之道秋冬奉以收藏之理飲食有節起居有常少思寡欲恬淡虛無精神內守不藥之藥也噫前人既往不可咎矣後人其鑑焉謹按近世俗謂壁里安柱為安鼠安鼠則必致穿壞垣壁矣此無病服藥致無事生事斯為近理然亦必古人之深戒也後世俗因為柱字之語説爾不然則因有所化之矣論局方用諸熱藥補虛之失丹溪曰虛者補而養之局方何例用辛香燥熱之劑以火濟火不無實實虛虛之禍若曰菟絲子丸之治腎虛金叉石斛丸之治氣不足茴香丸之治臟虛冷玉霜丸之治氣虛養正丹之治諸虛朴附丸之治脾虛弱按氣丹之治真元虛四神丹之治五臟虛蓯蓉大補丸之治元臟虛鍾乳白澤丸之治諸虛三健湯之治氣不足甚者內聚丹劑悉曰補脾胃補腎補五臟補真氣而方各條下曰口苦面黃曰氣促喘急口淡曰舌澀曰噫酸曰舌乾曰溺數曰水道澀痛曰唇口乾燥等證悉是明具熱論如何類聚燥熱而謂可以健脾溫胃而滋腎補氣乎又骨碎補丸治肝腎風虛乳香宣經丸治體虛換腿丸治足三陰經虛或因感風而虛或因虛而感寒既曰體虛肝腎虛足三陰經虛病非輕小理宜補養而自然銅半夏威靈仙荊芥地龍川楝烏藥防風牽牛靈脂草烏羌活石南天麻南星檳榔等疏通燥疾之藥俱補劑之大半果何以補虛乎地仙丹既曰補腎而滋補之藥與僣燥走竄之藥相半用之腎惡燥而謂可以補腎乎借曰足少陰經非附子輩不能自達八味丸仲景腎經藥也八兩地黃以一兩附子佐之觀此則是非可得而定矣虛損治法調理之劑金匱桂枝加龍骨牡蠣湯治諸脈芤動微緊男子失精女人夢交桂枝白芍生薑各三錢甘草一錢大棗一枚龍骨牡蠣各三錢上㕮咀水煎食前服小建中湯治虛勞裡急悸衄腹中痛失精四肢痠疼手足煩熱咽乾口燥桂枝甘草炙各三錢大棗二枚白芍生薑二錢阿膠炒一合上㕮咀水煎黃耆建中湯治虛勞裡急諸不足前方加黃耆二錢炙甘草湯治虛勞不足汗出而悶脈結悸行動如常不出百日危急者十一日死甘草二錢炙桂枝生薑各一錢半麥門冬一合麻子仁一合人參阿膠各一錢大棗二枚生地黃三錢上㕮咀水煎入酒些小日作三四料服局方人參養榮湯方見熱門按以上諸方並太陽例藥也十味人參散人參黃耆散東垣補中益氣湯方並見熱門益胃升陽湯血脫益氣古聖人之法也先補胃氣以助生髮之氣故曰陽生陰長諸甘藥為之先務舉世皆以為補氣殊不知甘能生血此陽生陰長之理故先理胃氣人之身內谷為寶前方加炒曲一錢半生黃芩瀉盛暑之伏庚金肺逆每服少許秋涼去之上㕮咀水煎按以上諸方並少陽例藥也東垣雲表虛用桂枝黃耆裡虛用人參芍藥以上方有兼用者治表裡俱虛也然觀其法有辛溫甘溫甘寒主治之別苦寒酸苦之佐升降奇耦之意皆異者蓋虛中有兼寒兼熱或氣虛血虛陰陽氣血俱不足或陰虛陽虛虛脫與夫胃氣下陷精神不足等因不同故也用者當細分之補氣之劑嚴氏耆附湯治氣虛陽弱虛汗不止肢體倦怠黃耆蜜炙附子炮等分上咀每四錢加生薑煎參附湯治真陽不足上氣喘急自汗盜汗氣短頭暈人參半兩附子炮去皮臍一兩上咀分作三服加生薑煎按此二方少陰例藥也四君子湯治肺損皮聚而毛落宜此益氣人參白朮茯苓甘草炙上㕮咀水煎服濟生茯神湯治脈虛極或咳則心痛喉中介或腫茯神人參遠志通草麥門冬黃耆桔梗甘草等分上㕮咀每半兩入薑煎瑞竹堂補氣湯治氣虛脈浮而軟怔忡無力自汗黃耆三兩蜜水拌炒人參甘草炙各半兩麥門冬去心桔梗炒各一兩上㕮咀每四錢水煎入薑三片三因方名潤神散按此三方手太陰少陰藥也補血之劑四物湯滋榮血不足方見婦人門當歸補血湯方見熱門按此二方滋榮氣藥也丹溪大補丸降陰火補腎水黃柏炒褐色知母酒浸炒各四兩熟地黃酒蒸敗龜板酥炙黃為末各六兩上為末豬脊髓和煉蜜丸如桐子大每七十丸空心淡鹽湯送下補陰丸黃柏半斤鹽酒炒知母酒浸炒熟地黃各三兩敗龜板四兩酒浸炙白芍炒陳皮牛膝各二兩鎖陽當歸各一兩半虎骨一兩酒浸酥炙上為末酒煮羊肉丸如桐子大每五六十丸鹽湯下冬加乾薑半兩按此二方滋陽之藥也補氣血之劑局方十全大補湯治心肺損及胃損飲食不為肌膚方見熱門十四味建中湯治榮衛失調血氣不足勞損形體瘦弱短氣嗜臥當歸白芍白朮麥門冬黃耆甘草炙蓯蓉人參川芎官桂半夏熟地黃茯苓各半錢附子三分上㕮咀作一服入薑棗煎食前服按此並手足三陰藥也養氣丹治諸虛百損真陽不固上實下虛氣不升降一切體弱氣虛之人禹餘糧石紫石英赤石脂代赭石磁石以上各煅法見局方附子二兩肉蓯蓉一兩半當歸茴香破故紙木香肉桂巴戟肉豆蔻丁香山藥鹿茸白茯苓沉香遠志並制乳香五靈脂沒藥硃砂陽起石煅鍾乳粉並別研各一兩上同碾為細末糯米粉糊為丸按此固滑脫鎮虛逆復陽助陰藥也出太陽例古方類此者甚多姑存此一法如真氣結薄氣不升降陰寒濕勝胃冷肝虛者非此藥不可蓋宜重劑劫之是也然有陰陽兩虛濕熱自甚元氣下陷津液涸竭氣血無所滋養濁陰下溜虛火上乘惟宜調之補之以輕清之劑者此方安能盡其變乎用者自宜詳審金匱腎氣丸治形體瘦弱無力多困腎氣久虛久新憔悴寢汗發熱五臟齊損瘦弱下血乾山藥山茱萸肉各四兩澤瀉牡丹皮白茯苓各三兩熟地黃八兩上為末煉蜜丸如梧子大每五六十丸空心溫水下拔萃三才封髓丹降心火益腎水天門冬熟地黃人參各半兩黃柏炒三兩砂仁一兩半甘草七錢半炙一方無上為細末水糊丸梧子大每五十丸用蓯蓉半兩切作片子酒一大盞浸一宿次日煎三四沸去滓空心送丸下除前三味五臟治要作鳳髓丹按此二方足少陰手太陰藥也機要八物湯治心肺虛損皮聚而毛落血脈虛損婦人月水愆期宜益氣和血四君子合四物湯按此手足太陰少陰藥也補虛損壯筋骨之劑金匱崔氏八味丸治腎虛氣乏下元冷憊腹臍疼痛夜多旋溺腳膝緩弱肢體倦怠麵皮痿黃或黧黑及虛勞不足渴欲飲水腰重疼痛小腹急痛小便不利並宜服之前腎氣丸加桂心一兩附子炮一兩上為細末煉蜜丸如桐子大每五七十丸溫酒送下鹽湯亦得空心食前婦人淡醋湯下局方西川石刻安腎丸治真氣虛憊腳膝弱緩夜夢遺積小便滑數而清青鹽四兩鹿茸炙柏子仁淨石斛附子川烏炮巴戟去心肉桂菟絲子蓯蓉韭子葫蘆巴杜仲破故紙炒石棗遠志赤石脂茯苓茯神茴香炒各一兩蒼朮川楝川椒山藥各四兩上為末山藥酒糊丸如梧子大每七八十丸空心鹽湯下無比山藥丸治諸虛百損五勞七傷肌體消瘦膚燥脈弱赤石脂茯神各一兩山藥三兩蓯蓉四兩酒浸巴戟牛膝酒浸澤瀉山茱萸肉各一兩五味子二兩杜仲菟絲子熟地黃各三兩上石臼內杵為末煉蜜丸梧子大每四五十丸空心溫酒下楊氏還少丹大補真氣虛損肌體瘦弱肉蓯蓉遠志茴香巴戟山藥枸杞子熟地黃石菖蒲山茱萸牛膝杜仲楮實子五味子白茯苓上石臼內搗為末煉蜜丸如梧子大每五十丸空心溫酒送下機要牛膝丸治腎肝損骨痿不能起於床宜益精筋緩不能自收持宜緩中此丸主之牛膝酒浸萆薢杜仲炒蓯蓉酒浸菟絲子防風葫蘆巴炒桂減半補骨脂沙苑蒺藜上等分為細末酒煮豬腰子為丸每五七十丸空心溫酒下按此用防風以升發肝氣非補肝也地黃丸治陽盛陰虛肝腎不足房室虛損形瘦無力面多青黃而無常色宜此養榮血腎氣蒼朮泔浸熟地黃各一斤乾薑春七錢夏半兩秋七錢冬一兩上石臼杵為末蒸棗肉為丸桐子大每五七十丸至百丸諸飲下若加五味子為腎氣丸述類像形神品藥也按以上諸方少陰例藥也蓋謂腎為真水有補無瀉故古人立腎氣丸法後世俗因之以補陽然陽虛者亦有之但不可例為常補爾謹按虛損之證其源雖多莫不因胃氣元氣不足致氣虛血虛陰陽俱虛或房勞精竭榮衛弱而腑臟氣痿不能輸養為疲極甚者變為勞瘵之疾但世俗處治昧此病機源委例用香燥或金石之劑往往誤人惟有宋錢仲陽建五臟虛方迥出前人之論我丹溪先生髮揮局方之失示用補端緒言東垣所謂飲食勞倦內傷元氣則胃脘之陽不能升舉並心肺之氣陷入於中焦而用補中益氣治之此實前人之所無也然天不足於西北地不滿於東南天陽而地陰西北之人陽氣易降東南之人陰氣易升苟不知此而徒取其法則於氣之降者固可以獲效而於氣之升者亦從而用之吾恐反增其病矣意此不可恃為通行之法云人之虛者多是陰不足邵子謂天地自相依附天依形地附氣其形也有涯其氣也無涯人之形質有涯者也天癸絶後則形衰矣苟不益陰以內守則陽亦無得以發揚為健運之能是天失所依也而為飄散飛蕩如喪家之狗耳陽既飄散則地愈失所附也形氣不相依附則死矣人其補養殘衰傷朽之質又何云哉斯論虛衰與東垣製法雖證不同實本乎內經陰精所奉其人壽陽精所降其人夭之旨蓋謂人之壽夭比之經論南北二方亦自微甚不等升陽之例當為活法滋陰之劑義亦是焉必求的在之虛合病機而行其法如此與世俗不明造化之理概用溫補者天地懸隔故於諸書補劑而不詳録學者審是則思過半矣
