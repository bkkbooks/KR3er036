front:
  text: 原序此編輯於會稽徐彥純吳陵劉宗厚續有增益皆明於醫者凡五十卷門分類集於論病因證治條理粲然既詳備矣夫醫家神農軒岐伊尹及秦越人張仲景之書萬世所宗不可易也歷晉唐宋代有明者近代張元素起北方蓋得神授深造間奧再傳李明之二傳王好古南方朱彥修得私淑馬遂為醫家之正派彥純宗厚又私淑彥修者也論者謂元素醫家之王道蓋王道以養民為本元素之法厚脾土為要此知本之務也是編主素難金匱及元素一派之旨若諸家治法不倍此者亦旁採而附益之雖中醫執此施治可以成功如病者有能知之亦必不為庸醫所誤其所濟利豈小補哉東里楊士奇
