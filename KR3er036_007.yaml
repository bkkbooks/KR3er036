body:
  text: 卷七瘧門內經敘瘧內經云夏傷於暑秋必痎瘧又云先寒後熱者名曰寒瘧先熱而後寒名曰溫瘧其但熱而不寒者名曰癉瘧按內經論瘧謂陰陽相併之虛實發為寒熱歷敘四時及六經五臟與胃之瘧以至連日間日發之早晏最為詳盡學者必通考全文以熟玩之瘧脈略要雲師曰瘧脈自弦弦數者多熱弦遲者多寒弦小緊者下之差弦遲者可溫之弦緊者可發汗針灸也浮大者可吐之弦數者風發也以飲食消息止之脈經云瘧脈自弦微則為虛代散則死瘧備三因陳無擇云夫瘧備三因外則感四氣內則動七情飲食飢飽房室勞逸皆能致之經所謂夏傷暑秋痎瘧者此則因時而敘耳不可專以此論外所因證有寒瘧有溫瘧有癉瘧並同素問有濕瘧者寒熱身重骨節煩疼脹滿自汗善嘔因汗出復浴濕舍皮膚及冒雨濕有牝瘧者寒多不熱但慘慼慄病以時作此則多感陰濕陽不能制陰也五種瘧疾以外感風寒暑濕與衛氣相併而成除癉瘧獨熱溫瘧先熱牝瘧無熱外諸瘧皆先寒後熱內所因證病者以蓄怒傷肝氣鬱所致名曰肝瘧以喜傷心心氣耗散所致名曰心瘧以思傷脾氣鬱涎結所致名曰脾瘧以憂傷肺肺氣凝痰所致名曰肺瘧以失志傷腎所致名曰腎瘧所致之證不同素問此五種瘧疾以感氣不和鬱結痰飲所致不內外因有疫瘧者一歲之間長幼相似有鬼瘧者夢寐不祥多生恐怖有瘴瘧者乍熱乍寒乍有乍無南方多病有胃瘧者飲食飢飽傷胃而成世謂食瘧有勞瘧者經年不瘥前後復發微勞不任亦有數年不瘥結成癥癖在腹脅名曰老瘧亦曰母瘧以上諸證各有方治宜推而用之按無擇有七情感動鬱氣成瘧之論可謂發千古之未發但所集隨證施治之方皆是溫熱脾胃之劑止有四獸飲云治五臟氣虛結聚涎飲夫以各臟君臣之藥補虛瀉實之法各各不同豈可以一方通治七情之瘧哉豈欲學者自求之與嗟夫醫之為學宋三百年錢仲陽之下一人而已其集方者尚如是欲使人據證撿方烏可得也論痰能致瘧嚴用和云素問謂瘧生於風又夏傷於暑此四時之氣也或乘涼飲冷當風臥濕飢飽失時致脾胃不和痰積中脘遂成此疾所謂無痰不成瘧一日一發易治間日一發難愈三日一發者尤其難愈按此謂胃氣不和痰積中脘而成瘧則自內而生病於外也與素問風暑外傷雖異然外既受傷則內氣必郁亦生痰此自外而生病於內也瘧而挾痰誠有之矣其引以無痰不成瘧之一句則失之偏也其用藥治法亦且未詳瘧分三陽三陰淺深之異病機機要云經曰夏傷於暑秋必痎瘧傷之淺者近而暴傷之重者遠而為痎痎者久瘧也是知夏傷暑氣閉而不能發泄於外邪氣內行至秋而為瘧也有中三陽者有中三陰者其證各殊同傷寒也在太陽經謂之寒瘧治多汗之在陽明經謂之熱瘧治多下之在少陽經謂之風瘧治多和之此三陽受病謂之暴瘧發在夏至後處暑前此乃傷之淺者近而暴也在陰經則不分三經總謂之濕瘧當從太陰經論之發在處暑後冬至前此乃傷之重者遠而為痎痎者老也居西方宜毒藥療之按此分風暑所傷有陰陽淺深之異發前人所未論也詳見後論中瘧非脾寒及鬼食辨後添論斷子和云內經既以夏傷於暑而為瘧何世醫皆以脾寒治之用姜附硫黃之類甚者歸之祟怪良可笑耶又或因夏月飲食生冷之類指為食瘧此又非也豈知內經之論則不然皆夏傷於暑遇秋風寒而後作也邪熱淺則連日邪熱深則間日併入於裡則寒併入於表則熱若此論則了不相干於脾也治平之時其民夷靜雖用砒石辰砂有毒之藥以熱治熱亦能取效擾攘之時其民勞苦內火與外火俱動以熱攻熱轉為吐血瀉血瘡瘍嘔吐之疾豈與夷靜之人同治哉余嘗用張長沙汗吐下三法愈瘧病極多大忌錯作脾寒治之按此云無脾寒及鬼瘧皆是得之於暑又謂平治與擾攘之時治瘧不同皆確論也然食瘧則世亦有之者然觀其用藥以白虎加人參湯小柴胡五苓桂苓甘露之類則調之也甚者臟用承氣大紫胡下之更不愈以常山散吐之悉是寒藥降火之劑蓋以瘧從火之化也又有謂治芻蕘貧賤之人與富貴膏粱不同之論固是然仍用溫脾散辰砂丹劫藥貧賤之人豈與治平時人同歟貧賤者脾胃虛寒其可用劫劑歟此恐非出於子和之筆也學者試思之或問俗以瘧為脾寒何也曰此亦有理天地之間惟吳楚閩廣人患此至多為陽氣之所盛處其地卑濕長夏之時人多患暍瘧霍亂瀉痢傷濕熱也本暑盛陽極人伏陰在內脾困體倦腠理開發或因納涼於水間木陰及泉水澡浴而微寒客於肌肉之間經所謂遇夏氣悽愴之小寒迫之是也或勞役飢飽內傷而即病作故指肌肉屬脾發則多惡寒戰慄乃謂之脾寒爾實由風寒濕暍之邪鬱於腠理夏時毛竅疏通而不為病至秋氣斂之際表邪不能發越故進退不已往來寒熱病勢如凌瘧人之狀所以名瘧即四時之傷寒故十二經皆能為病古方治法多兼於理內傷取效脾胃和而精氣疏通陰陽和解諸邪悉散此實非脾病也但病氣隨經升降其發早暮日次不等內經具病例已詳專世以發表解肌溫經散寒等法亦未嘗執於燥脾劫劑也又曰既瘧本夏傷於暑為病世有不服藥餌或人與符咒厭之亦止何也曰此夏時天地氣交百物生髮濕熱熏蒸禽蟲吐毒之際人因暑熱汗出神氣虛耗感得時間乖戾之氣為病故與厭之亦止若移精變氣之謂也然古人稱瘧不得為脾寒者正恐人專於溫脾之說不明造化之源而失病機氣宜之要故也痎瘧丹溪曰內經謂夏傷於暑至秋為痎又曰痎瘧皆生於風痎瘧老瘧也以其隔兩日一作纏綿未去前賢或用峻劑恐其稟受怯弱與居養所移者所宜始悟常山烏梅砒母劫劑或誤投之輕病為重重者危矣夫三日一作者陰經受病也作於子午卯酉少陰瘧也作於寅甲巳亥厥陰瘧也作於辰戌丑未日太陰瘧也瘧得於暑當汗而解或因取涼太過汗郁成痰其初感也弱者即病胃氣強者伏而不動至於再感復因內傷其病乃作宜其難瘥夫感暑與風皆外邪也非汗多不解來求治者皆已經試劫劑胃氣重傷似難速愈必先與參朮等補劑加減以取汗得汗而虛又行補養下體屬陰最難得汗補藥力得汗出至足方是佳兆又有感病極深邪氣必自臟傳出至腑其發無時若發於午之後寅之前者血受病也為難愈須漸漸趲早方是佳兆故治此病者春夏易秋冬難大忌飽食以汗之難易為優劣也僉憲詹公春得痎瘧累試劫藥綿延至冬來求治予知其久得汗惟胃氣未完非補不可一味白朮末之粥丸與二斤盡藥大汗而安如此者多但略有加減不必盡述按內經以瘧從風寒暑而得之乃天之邪氣所傷當以汗解仲景河間悉用發表之藥但以寒熱多少分經絡而治然亦有三陰三陽之異也蓋傷在陽者遲而暴傷在陰者遠而深在氣則發之早在血則發之晏淺則日作深則間之此雖分在陰在陽是乃淺深之謂皆當從汗而解也機要謂在三陽經其汗下和解同傷寒治外邪解而內未已者以早晚分氣血而用大柴胡大承氣桃仁承氣下之久瘧胸中鬱郁欲吐而不能吐當以藜蘆散雄黃散吐之此為暴病而氣實者設也我丹溪先生論邪氣深入陰分血分而成久瘧者當用升發之藥自臟而出之於腑然後自表作汗而解若用下藥則邪氣愈陷下而難出也又久瘧之人正氣虛者不可用劫藥損其胃氣劫之數次不愈者病若不變必待春來氣升瘧氣隨升發之氣而出方已遇此者當以補之一婦人久痢一子亦痢死哭甚數日後痢止瘧作醫與四獸飲之類凡兩月召予視之一日五六作汗如雨無休歇不能起臥食少懶語脈微數予以痢後無陰悲哀傷氣又進濕熱之藥助起旺火正氣愈虛汗既大出無邪可治陰虛陽散將在旦夕豈小劑之所能補今用人參二兩白朮二兩芍藥一兩黃耆半兩甘草少許作一服濃煎一鍾日服四五次兩日寒熱止又二婦同病瘧一者面光澤予以濕在氣分非汗不解兩發汗出而愈一者面赤黑色予以暑傷血分用四物湯加辛苦寒之劑二日發唇瘡而愈臨病處治其可執一乎前論又有食瘧痰瘧疫瘧瘴瘧者其方皆未備學者又當隨證而思其所以治之也瘧門治法解表之劑仲景白虎加桂枝湯治溫瘧知母六兩甘草二兩炙石膏一斤碎桂枝三兩粳米六合上咀以水一斗二升煮米熟去滓煎至三升溫服一升日三服汗出愈按此太陽陽明經藥也柴胡桂薑湯治寒多微有熱或但寒不熱名曰牝瘧柴胡八兩桂枝黃芩各二兩栝蔞根四兩牡蠣甘草炙乾薑各二兩上咀水煎服一升日三初煩汗出愈按此少陽太陽經藥也機要桂枝羌活湯治瘧處暑以前發頭項痛脈浮惡風有汗桂枝羌活防風甘草各半兩上為粗末每服半兩水一盞半煎至一盞溫服清迎發而服之如吐加半夏曲麻黃羌活湯活證如前惡風無汗麻黃去節羌活防風甘草各半兩上如前服加法同按以上二方太陽經藥也治瘧病身熱目痛熱多寒少脈長先以大柴胡下之微利為度後餘熱不盡者當服白芷湯以盡其邪白芷一兩知母一兩七錢石膏四兩上粗末依前服按此陽明經藥也桂枝芍藥湯治瘧寒熱大作不論先後此太陽陽明合病也謂之大爭寒熱作則必戰經曰熱勝而動也發熱則必汗泄經曰汗出不愈知內熱也陽盛陰虛之證當內實外虛不治恐久而傳陰經也此湯主之桂三錢黃耆知母石膏芍藥各一兩上粗末每服五錢加至一兩水煎按此太陽陽明經藥也桂枝黃芩湯如服前藥轉大者知三陽合病也宜此和之柴胡一兩二錢黃芩人參甘草各四錢半半夏四錢石膏知母各五錢桂枝二錢上為粗末依前服之前服此藥已如外邪已罷內邪未已再服下藥從卯至午發者宜大柴胡下之從午至酉發者知其邪氣在內也宜大承氣下之從酉至子發者或至寅發者知其邪氣在血也宜桃仁承氣下之微利後更以小柴胡徹其邪氣可也按此太陽陽明少陽經藥也以上諸方並系發風寒暑熱之氣自外而入中於三陽之經者也桂枝石膏湯治瘧無他證隔日發先寒後熱寒少熱多桂枝五錢石膏一兩半知母一兩半黃芩一兩上為粗末分三服水煎服按此太陽陽明經藥也治隔日發則邪氣所含深者也麻黃黃芩湯治瘧發如前證而夜發者麻黃一兩去節甘草炙三錢桃仁三十個去皮尖桂二錢黃芩五錢上為細末依前服桃仁味苦甘辛肝者血之海血驟則肝氣燥經所謂肝苦急急食甘以緩之故桃仁散血緩肝謂邪氣深遠而入血故夜發乃陰經有邪此湯發散血中風寒之劑按此治風暑深入陰分而夜發乃血受病邪氣所舍尤深者也麻黃桂枝桃仁等乃太陽經血藥也非三陰經藥也溫熱燥脾之劑寶鑑交解飲子治痰瘧闢瘴氣肉豆蔻草豆蔻各二個麵裹煨熟一個生用厚朴二寸半生半薑汁製大甘草二寸生炒各半生薑二塊一生一濕紙煨熟上等分銀石器內水煎發日空心服未愈再服必效局方常山飲治瘧疾發散不愈漸成勞瘵知母川常山草果各二斤良薑二十兩甘草炙一斤烏梅去核一斤上咀姜五片棗一枚水煎溫服易簡七寶飲治一切瘧疾或先寒後熱或先熱後寒不問鬼瘧食瘧常山厚朴青皮陳皮甘草檳榔草果仁等分上咀每服半兩於未發隔夜用水一碗酒一盞煎至一大盞濾出露一宿再將滓如前煎另放亦露一宿來日當發之早蕩溫面東先服頭藥少歇再服藥渣大有神效人參養胃湯治外感風寒內傷生冷四時溫疫或飲食傷脾發為痎瘧方見局方平胃散加人參茯苓半夏草果藿香生薑烏梅煎按此平胃散加減法也出太陰厚朴例以上諸方悉是溫脾燥烈之藥蓋認此疾為脾寒故也然人用之亦或有效遂指為治瘧之良方殊不知偶值病者陰陽相併脾氣鬱結暫得溫散則氣易行濁液凝痰中脘閉塞因得燥熱亦以暫開所以氣通而疾止內經所謂勇者氣行則已是也此古人為病氣淺而厚質者設也若中氣虛弱之人內有鬱火之證復用燥熱愈劫愈虛咎將誰執嚴氏清脾湯治癉瘧脈來弦數但熱不寒或熱多寒少口苦咽乾大小赤澀青皮厚朴白朮草果柴胡茯苓半夏黃芩甘草炙等分上咀姜五片煎按此小柴胡湯加減也治口苦咽乾大小赤澀則是內熱之證用柴胡黃芩所以瀉少陽之熱乃前方溫脾之一變也方名清脾其義可知然後以草果等藥寒熱兼用則是未能免俗也三因四獸飲治五臟氣虛七情兼併結聚涎飲與衛氣相搏發為瘧疾兼治瘴瘧半夏茯苓人參草果陳皮甘草烏梅肉白朮各等分上咀同棗姜等分以鹽少許淹食須厚皮紙裹煨令香熟焙乾每服半兩水煎未發前並進三服按此四君子加減也出太陰藥例七棗湯治五臟氣虛陰陽相勝乍為痎瘧不問寒熱先後並治附子一枚炮以鹽水浸再炮如此七次去皮臍上銼水一碗姜七片棗七個煎至八分當發日空心溫服按陳無擇謂七情感動鬱氣成瘧故此二方以治五臟氣虛結聚涎飲等證未審孰為補虛孰為散結郁孰為導痰學者宜自詳之消瘧之劑仲景鱉甲煎丸治瘧不瘥結為癥瘕名曰瘧母方見金匱嚴氏鱉甲飲子治瘧久不愈腹中結塊名曰瘧母鱉甲醋炙白朮黃耆草果檳榔芎藭橘紅白芍甘草炙厚朴等分上咀生薑七片棗一枚烏梅少許煎按痎瘧多成癖於左脅之下名曰瘧母乃肝之積也瘧屬少陽病少陽東方之氣故同歸於肝又況久瘧病在血分血亦屬肝所主也當以鱉甲君佐使之藥隨證虛實用之不必泥此也消食之劑三因紅丸子專治食瘧蓬朮三稜各二兩醋煮一伏時胡椒一兩青皮三兩炒阿魏一分醋化上為末別研蒼朮末用阿魏醋米糊為丸桐子大炒土朱為衣每服五十至百丸按此出厥陰南星半夏例消積滯通鬱氣之溫藥也食瘧既因飲食而得亦當隨其所傷而治之吐瘧之劑子和常山散吐瘧常山二兩水煮曬乾上水煎空心服機要梨蘆散雄黃散方並見吐劑按瘧因外感病屬上焦又胸膈多結聚痰涎故用吐法以取效然常山砒霜之類發吐取涎縱使獲安脾胃不能不損能用無毒之藥以取效者為佳寶鑑溫脾散治瘧疾寒熱發歇多時不瘥紫河車綠豆各一兩甘草半兩生砒一兩半另研子和作錢半上為末與砒一處研勻每服半錢新汲水少許調下須於發日隔夜夜深服藥忌葷酒瓜果生冷魚腥肉物三日孕婦勿服但至心合此藥與人並不吐此雖有砒一味河車甘草綠豆三味性涼解得新水亦解得一剪金治瘧疾乃是聖藥也信豆硫黃各等分上作一處乳缽內杵為末用緋絹子捻藥一捻在絹上裹如豆大細絲牢纏定訖剪下每服一丸星宿全用新汲水送下空心服毋令人知或先一日夜服之唇砂丹治瘧硃砂一兩五錢入藥中留五錢為衣信雄黃各五錢另研上為末入白麵六錢研勻滴水丸如綠豆大硃砂為衣星宿全時用無根水吞下宣明辟邪丹治嵐瘴鬼瘧食瘧綠豆雄黑豆各四十九個信砒半錢另研硃砂二粒黃丹一錢為衣上為末同入乳缽內滴水為丸分作三十粒每服一粒用東南桃心取七枝研汁將井花水於發日早辰日欲出未出向日吞之醋湯亦得三因紅散子黃丹炒色變上入建茶合和二錢七白湯調下或溫酒調下一方用蒜不以多少杵黃丹丸雞頭大每服一丸臨晨面東新水下按瘧丹多用砒霜大毒之藥本草主諸瘧風痰在胸膈可作吐藥蓋以其性之至燥大能燥痰也黃丹本草能主驚癇癲疾除熱下氣亦是勝痰去積之藥大抵瘧丹雖有燥痰之功大傷胃氣脾胃虛者切宜戒之謹按治瘧之方風暑外傷者解表之藥機要詳矣痎瘧之治宜從丹溪所論陳無擇論濕瘧有朮附湯此不詳載又機要有中三陰經之論而治法用藥雖有痎瘧入血之一方然亦失於詳悉嚴氏謂瘧生於痰三因疫瘧食瘧瘴瘧七情感動等瘧而諸方未有可取況亦多所缺略竊觀其意蓋以脾濕燥熱之方可以兼治諸瘧故不詳述此缺略之所由也學者知其名識其意苟能思之則可得而施治矣又何必待其詳也哉
